# ────────────────────────────────────────────────────────────────────────────
# Codemagic CI/CD — あの日 (Madeleine) iOS → TestFlight
#
# 狙い: Mac を持たずに、App Store Connect API キーによる「自動署名」で
#       iOS アプリをビルドし TestFlight へ自動アップロードする。
#
# 前提（Codemagic の Web UI で一度だけ設定する。詳細は会話のガイド参照）:
#   1. App Store Connect で API キー（Issuer ID / Key ID / .p8）を発行
#   2. Codemagic の Team settings → Integrations → App Store Connect に
#      その API キーを登録し、名前を付ける（下の app_store_connect に書く名前）
#   3. このリポを Codemagic に接続し、このワークフローを選ぶ
#   4. 配布証明書の「秘密鍵」を Codemagic に登録（これが今回の修正の肝）:
#      ローカルで RSA 鍵を生成（ssh-keygen -t rsa -b 2048 -m PEM -f key -q -N ""）し、
#      その中身を Codemagic の環境変数 CERTIFICATE_PRIVATE_KEY（Secure・グループ signing）に貼る。
#      これが無いと fetch-signing-files が証明書を作れず（秘密鍵不足）archive が exit 65 で落ちる。
#
# 技術メモ:
#   - Capacitor 8 は CocoaPods ではなく Swift Package Manager (SPM)。
#     → `pod install` は不要。xcodebuild がビルド時に SPM を解決する。
#   - web 本体はリポのルート（GitHub Pages 配信元）。CI で sync:web → www/ を生成し
#     `cap sync ios` で ios/App/App/public/ にバンドルする。
#   - 署名は CODE_SIGN_STYLE=Automatic ＋ `xcode-project use-profiles`。
# ────────────────────────────────────────────────────────────────────────────

workflows:
  ios-testflight:
    name: あの日 iOS → TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      # ↓ Codemagic UI で登録した App Store Connect API キーの「名前」に書き換える
      app_store_connect: MadeleineASC
    environment:
      groups:
        - signing
      vars:
        BUNDLE_ID: "io.github.yutsutke.madeleine"
      node: 22
      xcode: latest
    scripts:
      - name: npm 依存をインストール
        script: npm install

      - name: web を www/ へ同期し Capacitor iOS を sync
        script: |
          npm run sync:web
          npx cap sync ios

      # 新規アカウントは証明書/プロファイルが未作成なので --create で自動生成する。
      # （ios_signing ブロックの自動署名は「既存を探すだけ」で無い時に作らず
      #  "No matching profiles found" で落ちるため、明示スクリプトに切替）
      - name: 署名ファイルを取得/作成し Xcode に適用
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key @env:CERTIFICATE_PRIVATE_KEY \
            --create
          keychain add-certificates
          xcode-project use-profiles

      - name: ビルド番号を採番（Codemagic の連番を使う）
        script: |
          cd ios/App
          agvtool new-version -all "$BUILD_NUMBER"

      - name: IPA をビルド（App Store 配布用）
        script: |
          xcode-project build-ipa \
            --project "ios/App/App.xcodeproj" \
            --scheme "App"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        # 最初のビルドは TestFlight まで（審査提出はしない）
        submit_to_testflight: true

  # ────────────────────────────────────────────────────────────────────────────
  # Android — クリーン版（位置なし・広告なし）のデバッグAPK を生成する de-risk 用。
  #
  # 狙い: iOS のクリーン起動成功パターンを Android で踏襲。まず「web ラッパーが
  #       Android で起動するか」だけを確かめる。署名は debug keystore（自動生成）で
  #       Play 向けの署名(Play App Signing)は Android v2。位置/広告は入れない。
  #
  # 使い方: Codemagic の Web UI でこの android-debug workflow を選び「Start new build」。
  #        完了後 artifacts の *.apk をダウンロードし、Android 端末で
  #        「提供元不明のアプリ」を許可してサイドロード → 起動を確認する。
  #
  # 技術メモ:
  #   - instance は iOS と同じ mac_mini_m2（無料/個人プランは macOS M2 のみ利用可＝
  #     linux_x2 は "instance type not available with the current billing plan" で即失敗。
  #     mac も Android SDK / JDK を同梱するので Android ビルド可＝ただし Mac の分数を共有）。
  #     web 本体はリポのルート（GitHub Pages 配信元）＝CI で sync:web → www/ →
  #     `cap sync android` で android/app/src/main/assets/public/ にバンドル。
  #   - background-location / photo-library の2プラグインは iOS のみ宣言＝Android では
  #     登録されず Gradle を壊さない（クリーン版に好都合。写真の Android 実装＝
  #     MediaStore(Kotlin) は本丸として別途）。
  #   - ★ 初回ビルドは Codemagic イメージの SDK/JDK/build-tools 版と compileSdk 36 の
  #     整合でコケることがある＝ログを確認し、必要なら java/instance/SDK を調整。
  # ────────────────────────────────────────────────────────────────────────────
  android-debug:
    name: あの日 Android → デバッグAPK（クリーン版）
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      node: 22
      # ★ Capacitor 8.4 の capacitor-android は Java 21 ソースレベル＝JDK 21 必須。
      #   17 だと compileDebugJavaWithJavac が "invalid source release: 21" で落ちる。
      java: 21
    scripts:
      - name: npm 依存をインストール
        script: npm install

      - name: web を www/ へ同期し Capacitor Android を sync
        script: |
          npm run sync:web
          npx cap sync android

      - name: デバッグ APK をビルド
        script: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug --stacktrace

    artifacts:
      - android/app/build/outputs/**/*.apk

  # ────────────────────────────────────────────────────────────────────────────
  # Android — リリース版（位置あり・広告なし・v150/v142 入り）の署名付き AAB を作る。
  #
  # 狙い: Google Play にアップロードする成果物（.aab）を作る。android-debug が
  #       「起動するか」の de-risk だったのに対し、これは配布物そのもの。
  #       位置/写真/カメラ権限は local-plugins 側 Manifest から merge される（app 本体は
  #       INTERNET のみのクリーン）＝この AAB は iOS 1.2 相当の「位置あり・広告なし」フル版。
  #
  # 前提（Codemagic の Web UI で一度だけ設定する）:
  #   1. アップロード鍵（keystore=.jks）を用意（keytool で生成＝Play App Signing の「アップロード鍵」）。
  #   2. Codemagic → Code signing identities → Android keystores に .jks と
  #      パスワード/エイリアスを登録し、reference name を付ける（下の android_signing の名前に合わせる）。
  #   3. Codemagic がビルド時に CM_KEYSTORE_PATH / CM_KEYSTORE_PASSWORD / CM_KEY_ALIAS /
  #      CM_KEY_PASSWORD を注入 → android/app/build.gradle の signingConfigs.release が読む。
  #
  # 使い方: この android-release を選び「Start new build」→ artifacts の *.aab を
  #        Play Console にアップロード（初回は手動アップロードでよい）。
  #
  # 技術メモ:
  #   - versionCode は $BUILD_NUMBER で自動採番（build.gradle 側で読む）＝手で上げない。
  #   - instance は iOS と同じ mac_mini_m2（個人プランは macOS M2 のみ＝Android も可）。
  # ────────────────────────────────────────────────────────────────────────────
  android-release:
    name: あの日 Android → Play（署名付き AAB）
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      android_signing:
        # ↓ Codemagic UI で登録した Android keystore の reference name に合わせる
        - madeleine_upload
      node: 22
      # Capacitor 8.4 の capacitor-android は Java 21 ソースレベル＝JDK 21 必須。
      java: 21
    scripts:
      - name: npm 依存をインストール
        script: npm install

      - name: web を www/ へ同期し Capacitor Android を sync
        script: |
          npm run sync:web
          npx cap sync android

      - name: リリース AAB をビルド（署名付き）
        script: |
          cd android
          chmod +x ./gradlew
          ./gradlew bundleRelease --stacktrace

    artifacts:
      - android/app/build/outputs/**/*.aab

    # 初回は Play Console へ手動アップロード。サービスアカウント JSON を登録したら
    # 下を有効化して track: internal（内部テスト）へ自動アップロードもできる。
    # publishing:
    #   google_play:
    #     credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
    #     track: internal
    #     submit_as_draft: true
