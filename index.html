<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>写真思い出スパイク — Phase 0</title>
<style>
  :root { font-family: system-ui, -apple-system, "Hiragino Kaku Gothic ProN", sans-serif; }
  body { margin: 0; padding: 16px; background: #111; color: #eee; }
  h1 { font-size: 18px; margin: 0 0 12px; }
  .desc { font-size: 13px; color: #aaa; margin: 0 0 16px; line-height: 1.6; }
  .picker { display: block; padding: 14px; border: 2px dashed #555; border-radius: 8px; text-align: center; cursor: pointer; }
  .picker:hover { border-color: #888; }
  input[type=file] { display: none; }
  .stats { margin: 16px 0 8px; font-size: 13px; color: #ddd; }
  .stats b { color: #8bf; }
  .log { font-family: ui-monospace, "SF Mono", Consolas, monospace; font-size: 11px; background: #000; border: 1px solid #333; border-radius: 6px; padding: 8px; max-height: 50vh; overflow: auto; white-space: pre-wrap; word-break: break-all; }
  .row { padding: 4px 0; border-bottom: 1px solid #1a1a1a; }
  .row.ok { color: #9f9; }
  .row.warn { color: #fc6; }
  .row.err { color: #f88; }
</style>
</head>
<body>

<h1>写真思い出スパイク — Phase 0（前提検証）</h1>
<p class="desc">
  写真を選んで <b>DateTimeOriginal</b> と <b>GPS</b> が読めるかコンソールと下のログに出します。
  日時取得率がほぼ100%なら Phase 1 に進む。HEIC は次の段階で heic2any 対応。
</p>

<label class="picker" for="picker">📷 写真を選ぶ（複数OK）</label>
<input id="picker" type="file" multiple accept="image/*">

<div class="stats" id="stats">未選択</div>
<div class="log" id="log"></div>

<script type="module">
  // exifr は CDN から ESM 取得
  import exifr from 'https://cdn.jsdelivr.net/npm/exifr@7/dist/lite.esm.js';

  const $picker = document.getElementById('picker');
  const $stats  = document.getElementById('stats');
  const $log    = document.getElementById('log');

  function row(cls, text) {
    const div = document.createElement('div');
    div.className = 'row ' + cls;
    div.textContent = text;
    $log.appendChild(div);
  }

  $picker.addEventListener('change', async (e) => {
    const files = Array.from(e.target.files || []);
    $log.innerHTML = '';
    if (!files.length) { $stats.textContent = '未選択'; return; }

    let withDate = 0, withGPS = 0, errors = 0, heic = 0;
    $stats.textContent = `読み込み中… 0 / ${files.length}`;

    for (let i = 0; i < files.length; i++) {
      const f = files[i];
      const isHeic = /\.hei[cf]$/i.test(f.name) || /hei[cf]/i.test(f.type);
      if (isHeic) heic++;

      try {
        const meta = await exifr.parse(f, { gps: true });
        const dto = meta?.DateTimeOriginal || meta?.CreateDate || null;
        const lat = meta?.latitude ?? null;
        const lng = meta?.longitude ?? null;
        if (dto) withDate++;
        if (lat != null && lng != null) withGPS++;

        const tag = isHeic ? '[HEIC]' : '';
        const cls = dto ? 'ok' : 'warn';
        row(cls, `${tag} ${f.name}  date=${dto ?? '—'}  gps=${lat != null ? `${lat.toFixed(4)},${lng.toFixed(4)}` : '—'}  size=${(f.size/1024).toFixed(0)}KB`);
        console.log(f.name, meta);
      } catch (err) {
        errors++;
        row('err', `[ERR] ${f.name}  ${err.message}`);
        console.error(f.name, err);
      }
      $stats.textContent = `読み込み中… ${i+1} / ${files.length}`;
    }

    const pctDate = ((withDate / files.length) * 100).toFixed(0);
    const pctGPS  = ((withGPS  / files.length) * 100).toFixed(0);
    $stats.innerHTML = `<b>${files.length}枚</b>  日時取得 <b>${withDate} (${pctDate}%)</b>  GPS取得 <b>${withGPS} (${pctGPS}%)</b>  HEIC <b>${heic}</b>  エラー <b>${errors}</b>`;
  });
</script>

</body>
</html>
