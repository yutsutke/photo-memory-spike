}

// GPS 写真 (datetime 昇順) を、撮影時刻が gapMs を超えて空いたら新しい動線に切る。
function segmentByGap(gpsPhotos, gapMs) {
  const segs = [];
  let cur = null;
  for (const p of gpsPhotos) {
    if (!cur || (p.datetime.getTime() - cur[cur.length - 1].datetime.getTime()) > gapMs) {
      cur = [p]; segs.push(cur);
    } else {
      cur.push(p);
    }
  }
  return segs;
}
// 写真の暦日キー (色を日ごとに変える判定に使う)。
function dayKeyOf(p) { const d = p.datetime; return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`; }

// ════════════════════════════════════════════════════════════
// 位置ロガー (v73)
// アプリを「開いている間だけ」現在地を記録し、あとで地図でその日の軌跡を振り返れるようにする。
// web は前面でしか位置を取れない (背景の常時記録 SLC/CLVisit は native の宿題 = Notion §④)。
// モード: 'off' / 'important'(前の点から大きく動いた時だけ=疎・電池軽い) / 'frequent'(開いてる間ずっと=密)。
// 記録点は座標+時刻なので写真キーに依存せず機種変更で移せる (Notion §⑥ の「必ず運ぶ」side)。
// ════════════════════════════════════════════════════════════
const LOG_IMPORTANT_M = 500;    // 重要な移動: 前の記録点から 500m 以上動いたら1点
const LOG_FREQUENT_M  = 25;     // こまめ: 25m 以上 動いたら、または
const LOG_FREQUENT_MS = 20000;  //          20秒 経過したら1点

let loggerMode = (() => { try { const v = localStorage.getItem('pms-loggerMode'); return (v === 'important' || v === 'frequent') ? v : 'off'; } catch { return 'off'; } })();
let loggerWatchId = null;
let loggerLast = null;          // 最後に記録した点 {t,lat,lng}
let loggerWake = null;          // 記録中の wakeLock sentinel (画面を点けて watch を生かす)
let loggerStatus = '';          // パネル表示用の一言 (権限拒否など)
let loggerPanelUpdate = null;   // パネルが開いている間だけ、その更新関数

function loggerOn() { return loggerMode === 'important' || loggerMode === 'frequent'; }

async function loggerAcquireWake() {
  try { if (navigator.wakeLock?.request && !loggerWake) loggerWake = await navigator.wakeLock.request('screen'); } catch {}
}
function loggerReleaseWake() { try { loggerWake?.release(); } catch {} loggerWake = null; }

// 1点を記録 (モードのしきい値でフィルタ。force=開いた瞬間/復帰時の1点は無条件で残す)。
async function loggerRecord(pos, force) {
  const c = pos.coords, lat = c.latitude, lng = c.longitude;
  const t = pos.timestamp || Date.now();
  if (!force && loggerLast) {
    const d = haversine(loggerLast.lat, loggerLast.lng, lat, lng);
    if (loggerMode === 'important') { if (d < LOG_IMPORTANT_M) return; }
    else { if (d < LOG_FREQUENT_M && (t - loggerLast.t) < LOG_FREQUENT_MS) return; }
  }
  loggerLast = { t, lat, lng };
  loggerStatus = '';
  try { await trackPut({ id: crypto.randomUUID(), t, lat, lng, acc: Math.round(c.accuracy || 0), mode: loggerMode }); } catch {}
  loggerRefreshUI();
  if (mapState && mapState.refreshTrack) mapState.refreshTrack();   // 地図が開いていれば軌跡を更新
}

function loggerOnError(e) {
  loggerStatus = (e && e.code === 1) ? '位置情報が許可されていません（端末の設定から許可してください）' : '位置を取得できません';
  loggerRefreshUI();
}

// ── ネイティブ背景ロガー (v96): アプリを閉じても効く。点はネイティブが UserDefaults にバッファし、
//    JS は起動/復帰/タイマーで drain して track ストアへ合流させる（座標+時刻のみ・端末内だけ）──
let loggerDrainTimer = null;
let loggerNativeAuth = '';     // 'always'|'whenInUse'|'denied'|'restricted'|'notDetermined'
async function drainNativeTrack() {
  if (!BgLoc) return;
  let res; try { res = await BgLoc.drain(); } catch { return; }
  const pts = (res && res.points) || [];
  let added = 0;
  for (const p of pts) {
    if (!p || typeof p.lat !== 'number' || typeof p.lng !== 'number') continue;
    const t = Math.round(p.t || Date.now());
    try { await trackPut({ id: p.id || crypto.randomUUID(), t, lat: p.lat, lng: p.lng, acc: Math.round(p.acc || 0), mode: loggerMode }); added++; } catch {}
    if (!loggerLast || t >= loggerLast.t) loggerLast = { t, lat: p.lat, lng: p.lng };
  }
  if (added) {
    loggerRefreshUI();
    if (mapState && mapState.refreshTrack) mapState.refreshTrack();   // 地図が開いていれば軌跡を更新
  }
}
function startNativeDrainTimer() {
  stopNativeDrainTimer();
  loggerDrainTimer = setInterval(() => { if (document.visibilityState === 'visible' && loggerOn()) drainNativeTrack(); }, 8000);
}
function stopNativeDrainTimer() { if (loggerDrainTimer) { clearInterval(loggerDrainTimer); loggerDrainTimer = null; } }
function loggerSyncStatusFromAuth() {
  if (!BgLoc) return;
  if (loggerNativeAuth === 'denied' || loggerNativeAuth === 'restricted')
    loggerStatus = '位置情報が許可されていません（設定 →「あの日」→ 位置情報 →「常に許可」）';
  else if (loggerNativeAuth === 'whenInUse')
    loggerStatus = '「常に許可」にすると、アプリを閉じている間も記録できます（設定 → 位置情報）';
  else loggerStatus = '';
  loggerRefreshUI();
}
async function refreshNativeAuth() {
  if (!BgLoc) return;
  try { const r = await BgLoc.status(); loggerNativeAuth = (r && r.status) || ''; loggerSyncStatusFromAuth(); } catch {}
}

function startLogger() {
  if (!loggerOn()) return;
  if (BgLoc) {                       // ネイティブ＝アプリを閉じても背景で記録（SLC/背景更新）
    BgLoc.start({ mode: loggerMode })
      .then(r => { if (r && r.status) { loggerNativeAuth = r.status; loggerSyncStatusFromAuth(); } })
      .catch(() => { loggerStatus = '位置記録を開始できませんでした'; loggerRefreshUI(); });
    drainNativeTrack();              // 直前まで背景でたまった点を即合流
    startNativeDrainTimer();
    loggerRefreshUI();
    return;
  }
  // --- web（前面のみ）既存ロジック ---
  if (loggerWatchId != null) return;
  if (!navigator.geolocation) { loggerStatus = 'この端末は位置情報に未対応です'; loggerRefreshUI(); return; }
  if (document.visibilityState === 'hidden') return;   // 前面でしか記録できない
  const opts = loggerMode === 'frequent'
    ? { enableHighAccuracy: true,  maximumAge: 5000,  timeout: 30000 }
    : { enableHighAccuracy: false, maximumAge: 30000, timeout: 60000 };
  navigator.geolocation.getCurrentPosition(p => loggerRecord(p, true), loggerOnError, opts);   // 開いた瞬間の1点
  loggerWatchId = navigator.geolocation.watchPosition(p => loggerRecord(p, false), loggerOnError, opts);
  loggerAcquireWake();
  loggerRefreshUI();
}

function stopLogger() {
  if (BgLoc) { try { BgLoc.stop(); } catch {} stopNativeDrainTimer(); return; }   // ネイティブは背景記録ごと停止
  if (loggerWatchId != null) { try { navigator.geolocation.clearWatch(loggerWatchId); } catch {} loggerWatchId = null; }
  loggerReleaseWake();
}

function setLoggerMode(m) {
  loggerMode = (m === 'important' || m === 'frequent') ? m : 'off';
  try { localStorage.setItem('pms-loggerMode', loggerMode); } catch {}
  stopLogger();
  loggerLast = null;
  loggerStatus = '';
  if (loggerOn()) {
    // ネイティブはユーザー操作の文脈で「常に許可」を要求（背景記録の前提）。許可は idempotent。
    if (BgLoc) { BgLoc.requestAlways().then(r => { if (r && r.status) { loggerNativeAuth = r.status; loggerSyncStatusFromAuth(); } }).catch(() => {}); }
    startLogger();
  }
  loggerRefreshUI();
}

// ヘッダボタンの点灯 + パネルが開いていれば中身を更新。
function loggerRefreshUI() {
  const btn = document.getElementById('btnLogger');
  if (btn) btn.classList.toggle('logging', loggerOn());
  if (loggerPanelUpdate) loggerPanelUpdate();
}

// 画面を背景↔前面に切り替えたら記録を止める/再開する (web は前面でしか記録できない)。
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') {
    if (BgLoc) { if (loggerOn()) { refreshNativeAuth(); drainNativeTrack(); } }   // 復帰時に背景でたまった点を取り込む
    else { if (loggerOn()) startLogger(); }
  } else {
    if (!BgLoc) stopLogger();   // native は背景でも回し続ける（止めない）。web は前面のみなので停止
  }
});

// 位置ロガーのパネル (ヘッダ 🛰️)。モード選択 + 状態 + 地図へ + 記録削除。

      : 'アプリを開いている間だけ、いまいる場所を記録します。あとで「🗺 地図」を開くと、その日の軌跡を青緑の線で振り返れます。<br>※ 閉じている間も記録し続ける常時ログは、今後のアプリ版で対応予定です。') + `</p>` +

    try { await trackClear(); } catch {}
    loggerLast = null;
    if (mapState && mapState.refreshTrack) mapState.refreshTrack();

  });

  // パネル内容を現在状態で更新 (モード選択・今日の記録数・ステータス)。
  async function updateLoggerPanel() {
    radios.forEach(r => { r.checked = (r.value === loggerMode); });
    const line = card.querySelector('#loggerStatusLine');
    if (!line) return;
    if (loggerStatus) { line.textContent = `⚠ ${loggerStatus}`; return; }

    const now = new Date();
    const s = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();

function closeLoggerPanel() {

// 位置を手動入力する時の初期値: 時間的に最も近い GPS 写真 (maxMs 以内) の座標。旅行中の抜け落ち写真を最小操作で救う (v59)。
function nearestGps(photo, maxMs) {
  let best = null, bestDt = Infinity;
  const t = photo.datetime.getTime();
  for (const q of allPhotos) {
    if (q.id === photo.id || q.excluded || q.lat == null || q.lng == null) continue;
    const dt = Math.abs(q.datetime.getTime() - t);
    if (dt < bestDt) { bestDt = dt; best = q; }
  }
  return (best && bestDt <= maxMs) ? [best.lat, best.lng] : null;
}

// ── GPSなし写真の位置補完 (v74) ──────────────────────────────
// 写真の時刻に「ロガーの軌跡上のどこにいたか」を推定する。Notion §③(b) の最小実装。
//  ・写真時刻を挟む前後の記録点があり、その時間差が TRACK_BRACKET_MS 以内 → 線形補間 (歩いた途中の位置)。
//  ・挟めない時は近い片側の点に TRACK_SNAP_MS 以内なら snap。
//  ・どちらも満たさない (記録のある時間帯の外) → null = 補完しない (= ユーザー指定「記録が残っている時間帯のみ」)。
const TRACK_BRACKET_MS = 60 * 60 * 1000;   // 前後点がこの差以内なら間を補間 (1時間)
const TRACK_SNAP_MS    = 30 * 60 * 1000;   // 片側だけの時はこの差以内なら snap (30分)
function estimateFromTrack(timeMs, pts) {
  if (!pts || !pts.length) return null;
  let lo = 0, hi = pts.length;                         // 二分探索: t >= timeMs の最初の index
  while (lo < hi) { const mid = (lo + hi) >> 1; if (pts[mid].t < timeMs) lo = mid + 1; else hi = mid; }
  const next = pts[lo] || null;                         // t >= timeMs の最初
  const prev = pts[lo - 1] || null;                     // t <  timeMs の最後
  if (prev && next) {
    const gap = next.t - prev.t;
    if (gap <= TRACK_BRACKET_MS) {
      const f = gap > 0 ? (timeMs - prev.t) / gap : 0;
      return { lat: prev.lat + f * (next.lat - prev.lat), lng: prev.lng + f * (next.lng - prev.lng) };
    }
  }
  const cand = [prev, next].filter(Boolean).map(p => ({ p, d: Math.abs(p.t - timeMs) })).sort((a, b) => a.d - b.d)[0];
  if (cand && cand.d <= TRACK_SNAP_MS) return { lat: cand.p.lat, lng: cand.p.lng };
  return null;
}

// 推定位置を写真に確定保存 (v59 の手動保存と同じ流儀。geoFromTrack で由来を区別)。確定後は通常のGPS写真扱いに。
async function confirmEstimatedPos(photo, est) {
  photo.lat = +est.lat.toFixed(6);
  photo.lng = +est.lng.toFixed(6);
  photo.geoFromTrack = true;
  if (seals.length) photo._sealed = seals.some(s => sealMatches(s, photo));   // 場所封印に該当しうる
  try { await dbPut(photo); } catch (e) { logErr(`位置の確定に失敗: ${e?.message || e}`); return; }
  if (mapState && mapState.refreshData) mapState.refreshData();   // GPS扱いになり通常マーカー/動線へ
  render();
}

    maxZoom: 19, attribution: "&copy; <a href='https://www.openstreetmap.org/copyright'>OpenStreetMap</a> &copy; <a href='https://carto.com/attributions'>CARTO</a>" });
  const gsiStd = L.tileLayer("https://cyberjapandata.gsi.go.jp/xyz/std/{z}/{x}/{y}.png", { maxZoom: 18, attribution: GSI_ATTR });
  const gsiPale = L.tileLayer("https://cyberjapandata.gsi.go.jp/xyz/pale/{z}/{x}/{y}.png", { maxZoom: 18, attribution: GSI_ATTR });
  // ベースタイルの選択を記憶 (v86): 前回選んだ地図 (例: 地理院 淡色) で開く。未選択は既定=ダーク。
  const BASE_LAYERS = [
    { key: 'dark',    name: 'ダーク',       layer: dark },
    { key: 'gsiStd',  name: '地理院(標準)', layer: gsiStd },
    { key: 'gsiPale', name: '地理院(淡色)', layer: gsiPale },
  ];
  let savedLayerKey = null; try { savedLayerKey = localStorage.getItem('pms-mapLayer'); } catch {}
  const initialBase = BASE_LAYERS.find(b => b.key === savedLayerKey) || BASE_LAYERS[0];
  const map = L.map('mapEl', { layers: [initialBase.layer], zoomControl: false }).setView([36.2, 138.2], 5);  // 既定: 日本全体・前回のタイル
  L.control.zoom({ position: 'bottomleft' }).addTo(map);
  const layersForCtrl = {}; for (const b of BASE_LAYERS) layersForCtrl[b.name] = b.layer;
  L.control.layers(layersForCtrl, null, { position: 'topright' }).addTo(map);
  map.on('baselayerchange', (e) => {   // 選んだタイルを保存 → 次回その地図で開く
    const b = BASE_LAYERS.find(x => x.name === e.name);
    if (b) { try { localStorage.setItem('pms-mapLayer', b.key); } catch {} }
  });

  // 表示する「日」を入り口で決める。pickDays = 表示する暦日キーの配列 (ヘッダ=ランダム3日 / 写真=その日)、null=従来の期間ブラウズ。
  // focusedDay = 1本の軌跡をタップした時、その日以外を暗くするための注目日。
  mapState = { overlay, map, range: { start: null, end: null }, tripLayers: [], filteredGps: [], lineGps: [],
               pickDays: null, pickMode: null, focusedDay: null,
               trackLayers: [], showTrack: true,        // 🛰️ 位置ロガーの軌跡 (v73)
               estLayers: [], showEstimated: true };    // 📍 GPSなし写真を軌跡の時刻位置に配置 (v74)

  // GPS 写真を撮影順に。除外・封印は出さない (初期表示の判定用。再描画は applyFilter が allPhotos から都度算出)。
  const gps = allPhotos.filter(p => visible(p) && p.lat != null && p.lng != null)
                       .sort((a, b) => a.datetime - b.datetime);

  // クラスタとマーカー索引は「中身を入れ替えて」使う (日付/期間フィルタで張り替えても、
  // タイムライン側の closure が握る参照を保つため、Map/cluster は作り直さず clear→再投入)。
  // animate:false = クラスタのズーム/分裂アニメを切る (瞬時クラスタ化で機敏)。
  // removeOutsideVisibleBounds:false = moveend ごとの「画面外マーカーの付け外し」をやめる。これが
  //   近接マーカー + fitBounds/zoomToShowLayer の組合せで稀に「_leaflet_id in undefined」を投げる箇所
  //   (非同期なので呼び出し側で捕まえられない) → 通らなくする。数十〜数百規模なら全保持で問題なし。
  const cluster = L.markerClusterGroup({ maxClusterRadius: 45, spiderfyOnMaxZoom: true, animate: false, removeOutsideVisibleBounds: false });
  const markerById = new Map();
  map.addLayer(cluster);
  mapState.cluster = cluster;
  mapState.markerById = markerById;

  // 表示フィルタ (日付/期間)。range.start==null は全期間。
  function inRange(p) {
    const r = mapState.range;
    if (r.start == null) return true;
    const t = p.datetime.getTime();
    return t >= r.start && t <= r.end;
  }
  // 地図に出す GPS 写真集合。封印/除外を都度反映するため allPhotos から算出 (封印の追加/解除で張り替わる)。
  // pickDays = 選ばれた日 (ヘッダ=ランダム3日 / 写真=その日) の全 GPS。null = 期間内の全 GPS (従来ブラウズ)。
  function visibleGps() {
    let pool;
    if (mapState.pickDays) {
      const set = new Set(mapState.pickDays);
      pool = allPhotos.filter(p => set.has(dayKeyOf(p)));
    } else {
      pool = allPhotos.filter(p => inRange(p));
    }
    return pool.filter(p => visible(p) && p.lat != null && p.lng != null)
               .sort((a, b) => a.datetime - b.datetime);
  }
  function makePhotoMarker(p) {
    const icon = L.divIcon({
      className: 'photo-marker-wrap',
      html: `<div class="photo-marker" style="background-image:url(${thumbUrl(p)})"></div>`,
      iconSize: [44, 44], iconAnchor: [22, 22], popupAnchor: [0, -22],
    });
    const mk = L.marker([p.lat, p.lng], { icon });
    mk.bindPopup(() => buildMarkerPopup(p), { minWidth: 180, closeButton: true });
    return mk;
  }

  // 動線を描く。
  // ・pickDays モード = 選ばれた各日を独立した1本の軌跡に (色分け / 1本タップで他を暗く / 単一日は時刻→空の色)。
  // ・ブラウズ = 旅行(1日以上あいたら別線)を連続線で日ごと色替え (v58)。表示が単一日なら時刻→空の色 (v63)。
  function drawTrips() {
    for (const l of mapState.tripLayers) map.removeLayer(l);
    mapState.tripLayers = [];
    const line = mapState.lineGps;
    if (!line.length) return;

    // 単一日の軌跡を時刻→空の色のグラデーションで描く (v63)。dim 時は薄く。
    const drawSkyLine = (pts, opacity) => {
      for (let i = 0; i < pts.length - 1; i++) {
        const a = pts[i], b = pts[i + 1];
        mapState.tripLayers.push(L.polyline([[a.lat, a.lng], [b.lat, b.lng]],
          { color: skyColor(a.datetime), weight: 4, opacity, lineCap: 'round' }).addTo(map));   // 出発点の時刻で色付け
      }
      if (L.polylineDecorator && L.Symbol) {   // 進行方向は薄い白の矢印 (空色の上で読めるように)
        mapState.tripLayers.push(L.polylineDecorator(pts.map(p => [p.lat, p.lng]), {
          patterns: [{ offset: 24, repeat: 90, symbol: L.Symbol.arrowHead({ pixelSize: 9, polygon: false, pathOptions: { color: 'rgba(255,255,255,0.65)', weight: 2, opacity: 0.8 } }) }]
        }).addTo(map));
      }
    };

    // pickDays モード: 選ばれた各日を独立した軌跡に (タップでその日だけ残して他を暗く)。
    if (mapState.pickDays) {
      const days = [...new Set(line.map(dayKeyOf))].sort();
      days.forEach((dk, idx) => {
        const pts = line.filter(p => dayKeyOf(p) === dk);   // line は時刻昇順
        if (pts.length < 2) return;                          // GPS 1枚の日は線なし (マーカーのみ、それでよい)
        // タイムラインで折りたたんだ日は、地図でも線を出さない (マーカーは残す)。
        const ds = (() => { const [yy, mm, dd] = dk.split('-').map(Number); return new Date(yy, mm, dd).getTime(); })();
        if (mapState.foldedDays && mapState.foldedDays.has(ds)) return;
        const dim = mapState.focusedDay && mapState.focusedDay !== dk;
        if (days.length === 1) { drawSkyLine(pts, dim ? 0.2 : 0.9); return; }   // 1日だけなら空色
        const color = TRIP_COLORS[idx % TRIP_COLORS.length];
        const op = dim ? 0.15 : 0.85;
        const latlngs = pts.map(p => [p.lat, p.lng]);
        const pl = L.polyline(latlngs, { color, weight: 3, opacity: op, lineCap: 'round' }).addTo(map);
        pl.on('click', (e) => {   // 1本タップ → その日だけ残して他を暗く (もう一度タップで解除)
          L.DomEvent.stop(e);
          mapState.focusedDay = (mapState.focusedDay === dk ? null : dk);
          drawTrips();
        });
        mapState.tripLayers.push(pl);
        if (L.polylineDecorator && L.Symbol) {
          mapState.tripLayers.push(L.polylineDecorator(latlngs, {
            patterns: [{ offset: 24, repeat: 90, symbol: L.Symbol.arrowHead({ pixelSize: 9, polygon: false, pathOptions: { color, weight: 2, opacity: op } }) }]
          }).addTo(map));
        }
      });
      return;
    }

    // ブラウズ: 表示が単一日なら空色、複数日は旅行ごとの連続線 (v58)。
    if (new Set(line.map(dayKeyOf)).size === 1) { drawSkyLine(line, 0.9); return; }
    const drawSub = (latlngs, color) => {
      if (latlngs.length < 2) return;
      mapState.tripLayers.push(L.polyline(latlngs, { color, weight: 3, opacity: 0.85, lineCap: 'round' }).addTo(map));
      if (L.polylineDecorator && L.Symbol) {
        mapState.tripLayers.push(L.polylineDecorator(latlngs, {
          patterns: [{ offset: 24, repeat: 90, symbol: L.Symbol.arrowHead({ pixelSize: 9, polygon: false, pathOptions: { color, weight: 2, opacity: 0.85 } }) }]
        }).addTo(map));
      }
    };
    segmentByGap(line, TRIP_GAP_MS).forEach(seg => {
      if (seg.length < 2) return;
      // 旅行内を「日ごと」のサブ線に分けて色を変える。境界は前日最後の点から引いて連続に見せる。
      let curDay = null, dayIdx = -1, sub = null, prev = null;
      for (const p of seg) {
        const k = dayKeyOf(p);
        if (k !== curDay) {
          if (sub) drawSub(sub, TRIP_COLORS[dayIdx % TRIP_COLORS.length]);   // 前日分を確定
          dayIdx++;
          sub = prev ? [[prev.lat, prev.lng]] : [];   // 前日の最後の点から橋渡し
          curDay = k;
        }
        sub.push([p.lat, p.lng]);
        prev = p;
      }
      if (sub) drawSub(sub, TRIP_COLORS[dayIdx % TRIP_COLORS.length]);   // 最終日分
    });
  }

  // GPSなし写真を「軌跡の時刻位置」に置く推定マーカー (v74)。実GPSの白枠と違い青緑の破線枠で「推定」を示す。
  function makeEstimatedMarker(p, est) {
    const icon = L.divIcon({
      className: 'photo-marker-wrap',
      html: `<div class="photo-marker photo-marker-est" style="background-image:url(${thumbUrl(p)})"></div>`,
      iconSize: [40, 40], iconAnchor: [20, 20], popupAnchor: [0, -20],
    });
    const mk = L.marker([est.lat, est.lng], { icon });
    mk.bindPopup(() => buildEstPopup(p, est), { minWidth: 180, closeButton: true });
    return mk;
  }

  // 🛰️ 位置ロガーの軌跡 (自分の足取り) と、📍 GPSなし写真の推定位置を、いま地図に出ている日/期間ぶんだけ描く。
  // ・軌跡 = 青緑の点線 + 点 (写真の動線とは別レイヤ・別の見た目)。showTrack で ON/OFF (v73)。
  // ・推定 = GPSなし写真を「その写真の時刻に軌跡上のどこにいたか」で配置。showEstimated で ON/OFF (v74)。
  // どちらも座標+時刻のみ由来。畳んだ日は写真と同じく出さない。canFit=GPS写真ゼロの窓でも収まるよう寄せる。
  async function refreshTrack(canFit) {
    for (const l of mapState.trackLayers) map.removeLayer(l);
    for (const l of mapState.estLayers) map.removeLayer(l);
    mapState.trackLayers = []; mapState.estLayers = [];
    if (!mapState.showTrack && !mapState.showEstimated) return;
    const windows = [];                              // 表示中の時間窓を集める
    if (mapState.pickDays) {
      const folded = mapState.foldedDays;
      for (const dk of mapState.pickDays) {
        const [yy, mm, dd] = dk.split('-').map(Number);
        const s = new Date(yy, mm, dd).getTime();    // dayKeyOf は month 0-based
        if (folded && folded.has(s)) continue;        // 畳んだ日は軌跡も推定も出さない
        windows.push([s, s + 86400000 - 1]);
      }
    } else if (mapState.range.start != null) {
      windows.push([mapState.range.start, mapState.range.end]);
    } else {
      windows.push([0, Date.now()]);                  // 全期間ブラウズ (foreground 記録なので疎)
    }
    const myMap = map;
    const fitPts = [];
    for (const [s, e] of windows) {
      let pts = [];
      try { pts = await trackGetRange(s, e); } catch {}
      if (!mapState || mapState.map !== myMap) return;   // 閉じられた/再オープン → 破棄
      if (!pts.length) continue;
      if (mapState.showTrack) {
        const byDay = new Map();                          // 日ごとに分割 (日をまたぐ移動で線が飛ばないように)
        for (const p of pts) { const d = new Date(p.t); const k = `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`; if (!byDay.has(k)) byDay.set(k, []); byDay.get(k).push(p); }
        for (const arr of byDay.values()) {
          if (arr.length >= 2) {
            mapState.trackLayers.push(L.polyline(arr.map(p => [p.lat, p.lng]),
              { color: '#2ee6c0', weight: 3, opacity: 0.9, dashArray: '1 7', lineCap: 'round' }).addTo(myMap));
          }
          for (const p of arr) {
            mapState.trackLayers.push(L.circleMarker([p.lat, p.lng],
              { radius: 3, color: '#2ee6c0', weight: 1, opacity: 0.9, fillColor: '#2ee6c0', fillOpacity: 0.9 }).addTo(myMap));
            fitPts.push([p.lat, p.lng]);
          }
        }
      }
      if (mapState.showEstimated) {                        // GPSなし写真を軌跡の時刻位置に配置
        const ghosts = allPhotos.filter(p => visible(p) && p.lat == null && p.lng == null
          && p.datetime.getTime() >= s && p.datetime.getTime() <= e);
        for (const ph of ghosts) {
          const est = estimateFromTrack(ph.datetime.getTime(), pts);   // 記録のある時間帯のみ非null
          if (!est) continue;
          const mk = makeEstimatedMarker(ph, est).addTo(myMap);
          mapState.estLayers.push(mk);
          fitPts.push([est.lat, est.lng]);
        }
      }
    }
    // GPS写真が無く軌跡/推定しか無い窓でも画面に収まるように (applyFilter の fitBounds は fg ベースで空振りする)。
    if (canFit && mapState.filteredGps.length === 0 && fitPts.length) {
      try { map.fitBounds(fitPts, { padding: [40, 40], maxZoom: 14, animate: false }); } catch {}
    }
  }
  mapState.refreshTrack = refreshTrack;

  // 日付/期間フィルタを適用: 表示するマーカーと動線を絞り、bounds を合わせ、タイムライン UI を更新。
  function applyFilter(opts) {
    const fgAll = visibleGps();
    // 選択モード (random3 / day / days) で折りたたんだ日は、地図から「線も写真(マーカー)も」消す。
    // 線の色 index は全日基準で安定させたいので lineGps は全日のまま (drawTrips が畳んだ日をスキップ)、
    // マーカー(filteredGps)だけ畳んだ日を除外する。
    const folded = mapState.foldedDays;
    const useFold = folded && folded.size && (mapState.pickMode === 'random3' || mapState.pickMode === 'day' || mapState.pickMode === 'days');
    const fg = useFold
      ? fgAll.filter(p => !folded.has(new Date(p.datetime.getFullYear(), p.datetime.getMonth(), p.datetime.getDate()).getTime()))
      : fgAll;
    mapState.filteredGps = fg;     // マーカー (畳んだ日を除く)
    mapState.lineGps = fgAll;      // 線の色 index 用 (全日。畳んだ日の線は drawTrips でスキップ)
    cluster.clearLayers();
    markerById.clear();
    fg.forEach(p => {
      const mk = makePhotoMarker(p);
      cluster.addLayer(mk);
      markerById.set(p.id, { marker: mk, latlng: [p.lat, p.lng] });
    });
    drawTrips();
    if (!(opts && opts.skipFit) && fg.length) {
      map.fitBounds(fg.map(p => [p.lat, p.lng]), { padding: [40, 40], maxZoom: 14, animate: false });
    }
    if (mapState.updateTimelineUI) mapState.updateTimelineUI();
    if (mapState.updateCtrlLabels) mapState.updateCtrlLabels();
    if (mapState.updateCtrlMode) mapState.updateCtrlMode();
    refreshTrack(!(opts && opts.skipFit));   // 🛰️ 軌跡 + 📍 GPSなし写真の推定配置を貼り直す (await しない) (v73/v74)
  }
  mapState.applyFilter = applyFilter;

  // マップ上のコントロール: 📅日付/期間フィルタ と 〰線の日数 を、アイコン → 開くパネルで操作 (ユーザー要望)。
  // 状態はタイムラインの日付タップとも共有 (どちらから絞っても applyFilter / mapState.range に集約)。
  const elFilterBtn = overlay.querySelector('#mcFilter');
  const elMoreBtn   = overlay.querySelector('#mcMore');
  const elHelpBtn   = overlay.querySelector('#mcHelp');
  const popFilter   = overlay.querySelector('#mcPopFilter');
  const popMore     = overlay.querySelector('#mcPopMore');
  const popSeal     = overlay.querySelector('#mcPopSeal');
  const popHelp     = overlay.querySelector('#mcPopHelp');

  const startOfDay = ms => { const d = new Date(ms); return new Date(d.getFullYear(), d.getMonth(), d.getDate()).getTime(); };
  const endOfDay   = ms => startOfDay(ms) + 86400000 - 1;
  const toInputVal = ms => { const d = new Date(ms); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; };
  const fromInputVal = v => { const [y, m, d] = v.split('-').map(Number); return new Date(y, m - 1, d).getTime(); };
  const fmtMD = ms => { const d = new Date(ms); return `${d.getMonth()+1}/${d.getDate()}`; };
  const fmtYMD = ms => { const d = new Date(ms); return `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`; };

  // データの日時レンジ (片側だけ指定した時の補完用)
  let dataMin = null, dataMax = null;
  for (const p of allPhotos) { if (!visible(p)) continue; const t = p.datetime.getTime(); if (dataMin == null || t < dataMin) dataMin = t; if (dataMax == null || t > dataMax) dataMax = t; }

  // ボタン/メニューのラベルを現在の状態で更新 (📅フィルタ / 〰線のつなぎ方)。タイムラインから絞っても反映される。
  function updateCtrlLabels() {
    if (mapState.pickMode === 'days') {   // 非連続の複数日選択中は 📅 ボタンに枚数を出す
      elFilterBtn.textContent = `📅 ${mapState.pickDays.length}日`;
      elFilterBtn.classList.add('on');
      return;
    }
    const r = mapState.range;
    if (r.start == null) { elFilterBtn.textContent = '📅 全期間'; elFilterBtn.classList.remove('on'); }
    else {
      const single = r.end === endOfDay(r.start);
      elFilterBtn.textContent = single ? `📅 ${fmtMD(r.start)}` : `📅 ${fmtMD(r.start)}〜${fmtMD(r.end)}`;
      elFilterBtn.classList.add('on');
    }
  }
  mapState.updateCtrlLabels = updateCtrlLabels;

  // ── 表示する日 (地図=軌跡から想起) ───────────────────────────────────
  const mcRoll  = overlay.querySelector('#mcRoll');
  const mcPrev  = overlay.querySelector('#mcPrev');
  const mcToday = overlay.querySelector('#mcToday');
  const mcNext  = overlay.querySelector('#mcNext');
  const mcAll   = overlay.querySelector('#mcAll');

  // 入口モード (random3=もう一度引く / day=写真入口) は 📅期間/⋯表示 を隠し 🎲 / ↩︎全部を見る を出す。
  // 'days' (全期間の文脈で組む非連続の複数日) は 📅/⋯ を残し、解除はタイムラインの「✕ 全部を見る」で行う。
  function updateCtrlMode() {
    const m = mapState.pickMode;
    const entry = (m === 'random3' || m === 'day' || m === 'today');   // 'today' も入口モード (v83)
    elFilterBtn.style.display = entry ? 'none' : '';
    elMoreBtn.style.display   = entry ? 'none' : '';
    // 入口モードでは 🎲偶然3日 / 📆今日 / ↩︎全部 をアイコンのみで並べる (情報量を抑える)。
    // 🎲 は random3 中だけ「もう一度引く」の意味になる → title だけ切替 (アイコンは据え置き)。
    mcRoll.hidden = !entry;
    mcRoll.title = (m === 'random3') ? 'もう一度引く' : '偶然の3日';
    mcToday.hidden = !entry || !hasTodayPhotos;
    // ◀▶ は 'today' モードのとき「過去の今日」を前後の日にずらす入口 (v87)。並び= 🎲 ◀ 📆 ▶ ↩︎。
    mcPrev.hidden = (m !== 'today');
    mcNext.hidden = (m !== 'today');
    mcAll.hidden   = !entry;
  }
  mapState.updateCtrlMode = updateCtrlMode;

  // 表示する日の集合をセット。mode: 'today' (ヘッダ=今日の数年分) | 'random3' (偶然3日) | 'day' (写真入口=その日)。
  function setPick(days, mode) {
    mapState.pickDays = days;
    mapState.pickMode = mode;
    mapState.focusedDay = null;
    mapState.range = { start: null, end: null };   // 日選択が「どこまで」を担うので期間はリセット
    if (mapState.rebuildTimeline) mapState.rebuildTimeline();
    applyFilter();
  }
  mapState.setPick = setPick;

  // GPS 写真のある日からランダムに最大3日 (= 偶然の3本の軌跡)。
  function pickRandom3() {
    const dayKeys = [...new Set(allPhotos.filter(p => visible(p) && p.lat != null && p.lng != null).map(dayKeyOf))];
    for (let i = dayKeys.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [dayKeys[i], dayKeys[j]] = [dayKeys[j], dayKeys[i]]; }
    return dayKeys.slice(0, 3);
  }
  mapState.pickRandom3 = pickRandom3;

  // v83: 今日と同じ月日の写真がある「年」をすべて (= 数年分の今日を重ねる)。毎日の習慣の入口。
  // v87: offset で起点の日をずらせる (0=今日 / -1=昨日 / +1=明日 …) → 「過去の昨日/明日/明後日」。予定立て・振り返りに。
  // 位置の有無は問わない (GPS 有=軌跡 / 無=タイムラインに出る・v74 で時刻位置に推定配置)。昔→今の順。
  function pickToday(offset = 0) {
    const base = new Date(); base.setHours(0, 0, 0, 0); base.setDate(base.getDate() + offset);
    const mo = base.getMonth(), da = base.getDate();
    const keys = [...new Set(allPhotos.filter(p => visible(p) && p.datetime.getMonth() === mo && p.datetime.getDate() === da).map(dayKeyOf))];
    keys.sort((a, b) => (+a.split('-')[0]) - (+b.split('-')[0]));   // 年の昇順 = 昔→今 (パレットが時系列で読める)
    return keys;
  }
  mapState.pickToday = pickToday;
  mapState.todayOffset = 0;   // 📆 起点からの日数ずれ (v87)。◀▶ で増減・📆 で 0 に戻す。
  const hasTodayPhotos = pickToday().length > 0;   // 📆今日ボタンの出し分け (今日と同月日の写真があるか)

  // offset → 相対の日本語ラベル (見出し用)。0=今日 / ±1=昨日・明日 / ±2=一昨日・明後日 / それ以上は N日前/後。
  function relDayLabel(off) {
    if (off === 0) return '今日';
    if (off === -1) return '昨日';   if (off === 1) return '明日';
    if (off === -2) return '一昨日'; if (off === 2) return '明後日';
    return off < 0 ? `${-off}日前` : `${off}日後`;
  }
  mapState.relDayLabel = relDayLabel;

  // 📆 を offset の日にずらして表示 (today モード維持)。写真ゼロの日でも setPick して「0年分」を正直に出す (予定立てに有用)。
  function gotoTodayOffset(offset) {
    mapState.todayOffset = offset;
    setPick(pickToday(offset), 'today');
  }

  // 日の選択を抜けて従来の期間ブラウズ (全 GPS) に戻る。
  function clearPick() {
    mapState.pickDays = null;
    mapState.pickMode = null;
    mapState.focusedDay = null;
    if (mapState.rebuildTimeline) mapState.rebuildTimeline();
    applyFilter();
  }
  mapState.clearPick = clearPick;

  mcRoll.addEventListener('click', () => { const d = pickRandom3(); if (d.length) setPick(d, 'random3'); });   // もう一度引く / 偶然の3日
  mcToday.addEventListener('click', () => { gotoTodayOffset(0); });                                            // 今日 (数年分) に戻る = offset 0 (v83/v87)
  mcPrev.addEventListener('click', () => { gotoTodayOffset((mapState.todayOffset || 0) - 1); });               // 前の日へ (過去の昨日…) v87
  mcNext.addEventListener('click', () => { gotoTodayOffset((mapState.todayOffset || 0) + 1); });               // 次の日へ (過去の明日…) v87
  mcAll.addEventListener('click', () => clearPick());
  // ───────────────────────────────────────────────────────────────────

  function closePops() {
    popFilter.hidden = true; popMore.hidden = true; popSeal.hidden = true; popHelp.hidden = true;
    elFilterBtn.classList.remove('open'); elMoreBtn.classList.remove('open'); elHelpBtn.classList.remove('open');
  }
  mapState.closePops = closePops;

  // 日付/期間フィルタパネル (date 入力 2つ + 適用 / 全期間)
  popFilter.innerHTML =
    `<div class="mc-pop-title">日付・期間で絞り込み</div>` +
    `<label class="mc-pop-row">開始 <input type="date" id="fFrom"></label>` +
    `<label class="mc-pop-row">終了 <input type="date" id="fTo"></label>` +
    `<div class="mc-pop-actions"><button class="mc-pop-btn" id="fClear">全期間</button><button class="mc-pop-btn" id="fAdd">＋ 追加</button><button class="mc-pop-btn primary" id="fApply">適用</button></div>` +
    `<div class="mc-pop-status" id="fStatus"></div>` +
    `<div class="mc-pop-hint"><b>適用</b>＝その期間「だけ」を続けて表示。<b>＋追加</b>＝その日／期間を今の表示に<b>重ねる</b>（離れた日や旅行を何度でも足せる。各日が別色の軌跡）。タイムラインの日付タップでも足せます。</div>`;
  const fFrom = popFilter.querySelector('#fFrom');
  const fTo   = popFilter.querySelector('#fTo');
  if (dataMin != null) { fFrom.min = fTo.min = toInputVal(dataMin); fFrom.max = fTo.max = toInputVal(dataMax); }
  popFilter.querySelector('#fApply').addEventListener('click', () => {
    mapState.pickDays = null; mapState.pickMode = null; mapState.focusedDay = null;   // 連続範囲に切替 = 非連続の日選択は解除
    const fromV = fFrom.value, toV = fTo.value;
    if (!fromV && !toV) {
      mapState.range = { start: null, end: null };
    } else {
      let sDay = fromV ? startOfDay(fromInputVal(fromV)) : (dataMin != null ? startOfDay(dataMin) : null);
      let eDay = toV   ? startOfDay(fromInputVal(toV))   : (dataMax != null ? startOfDay(dataMax) : null);
      if (sDay != null && eDay != null && sDay > eDay) { const t = sDay; sDay = eDay; eDay = t; }   // 逆指定は入れ替え
      mapState.range = { start: sDay, end: eDay != null ? endOfDay(eDay) : (sDay != null ? endOfDay(sDay) : null) };
    }
    applyFilter();
    closePops();
  });
  popFilter.querySelector('#fClear').addEventListener('click', () => {
    mapState.pickDays = null; mapState.pickMode = null; mapState.focusedDay = null;   // 全期間 = 日選択も解除
    mapState.range = { start: null, end: null };
    fFrom.value = ''; fTo.value = '';
    applyFilter();
    closePops();
  });

  // 「＋ 追加」: いま入力中の日／期間を「重ねて表示する日の集合」(pickDays / 'days') に足す。
  // タイムラインの日付タップ (toggleDayFilter) と同じ状態に集約 → 片方で足した日がもう片方にも反映され、
  // 出し入れが相互にできる。数年前の日も、タイムラインを延々スクロールせずカレンダーから一発で足せる。
  const fStatus = popFilter.querySelector('#fStatus');
  function dayKeysWithPhotos(startMs, endMs) {   // 期間内で実際に写真がある日だけを dayKeyOf 形式で
    const set = new Set();
    for (const p of allPhotos) {
      if (!visible(p)) continue;
      const t = p.datetime.getTime();
      if (t >= startMs && t <= endMs) set.add(dayKeyOf(p));
    }
    return [...set];
  }
  function refreshFilterStatus(msg) {
    if (msg != null) { fStatus.textContent = msg; return; }
    fStatus.textContent = (mapState.pickMode === 'days' && mapState.pickDays && mapState.pickDays.length)
      ? `📅 いま ${mapState.pickDays.length}日を重ねて表示中` : '';
  }
  popFilter.querySelector('#fAdd').addEventListener('click', () => {
    const fromV = fFrom.value, toV = fTo.value;
    if (!fromV && !toV) { refreshFilterStatus('日付を入れてから「＋ 追加」を押してください'); return; }
    let s = startOfDay(fromInputVal(fromV || toV));   // 開始のみ＝その1日 / 終了のみ＝その1日 / 両方＝範囲
    let e = startOfDay(fromInputVal(toV || fromV));
    if (s > e) { const t = s; s = e; e = t; }
    const keys = dayKeysWithPhotos(s, endOfDay(e));
    if (!keys.length) { refreshFilterStatus('その期間に写真がありません'); return; }
    const cur = (mapState.pickMode === 'days' && mapState.pickDays) ? mapState.pickDays.slice() : [];
    const merged = [...new Set([...cur, ...keys])];
    const added = merged.length - cur.length;
    mapState.pickDays = merged;
    mapState.pickMode = 'days';   // 手で組んだ非連続の集合 (🎲 は出さない / 📅 N日 表示)
    mapState.focusedDay = null;
    mapState.range = { start: null, end: null };   // 日選択が「どこまで」を担う
    applyFilter();   // 地図(マーカー/軌跡/fit) + タイムラインの ✓ 強調を更新 (DOM 再構築なし)
    fFrom.value = ''; fTo.value = '';   // 次の期間を続けて足しやすく入力をクリア (パネルは開いたまま)
    refreshFilterStatus(added ? `✓ ${added}日を追加（いま ${merged.length}日を重ねて表示）`
                              : `その日はもう表示中（いま ${merged.length}日）`);
  });

  // 📅 期間ボタン: トグルで日付パネルを開閉 (開く時に現在の絞り込みを入力欄へ反映)。
  elFilterBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    const willOpen = popFilter.hidden;
    closePops();
    if (willOpen) {
      const r = mapState.range;
      fFrom.value = r.start != null ? toInputVal(r.start) : '';
      fTo.value   = r.start != null ? toInputVal(r.end)   : '';
      popFilter.hidden = false; elFilterBtn.classList.add('open');
      refreshFilterStatus();   // days モードなら「いま N日を重ねて表示中」を出す
    }
  });

  // ⋯ 表示メニュー (v57→v58): よく使わない設定を1アイコンにまとめる。線のつなぎ方は固定化したので
  // 今は「記憶の封印」のみ (ユーザー要望: 封印が表示の中にある UI は継続)。期間(📅)だけは常時トップに残す。
  popMore.innerHTML =
    `<div class="mc-pop-title">表示の設定</div>` +
    `<label class="mc-pop-check"><input type="checkbox" id="mmTrack"> 🛰️ 自分の軌跡（ロガー）</label>` +
    `<label class="mc-pop-check"><input type="checkbox" id="mmEst"> 📍 GPSなし写真を軌跡から配置</label>` +
    `<button class="mc-menu-item" id="mmSeal">🔒 記憶の封印</button>`;
  const mmTrack = popMore.querySelector('#mmTrack');
  mmTrack.checked = mapState.showTrack;
  mmTrack.addEventListener('change', () => { mapState.showTrack = mmTrack.checked; refreshTrack(); });
  const mmEst = popMore.querySelector('#mmEst');
  mmEst.checked = mapState.showEstimated;
  mmEst.addEventListener('change', () => { mapState.showEstimated = mmEst.checked; refreshTrack(); });
  const mmSeal = popMore.querySelector('#mmSeal');
  mmSeal.addEventListener('click', () => { closePops(); openSealPanel(); });
  elMoreBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    const willOpen = popMore.hidden;
    closePops();
    if (willOpen) { popMore.hidden = false; elMoreBtn.classList.add('open'); }
  });

  // ⓘ アイコンの説明 (v88): アイコンのみのコントロール (v85) は意味が分かりにくい、というユーザー指摘。
  // 既定はアイコンだけのまま、説明は「押した時だけ開く」凡例に逃がす ([[ui-minimalism-works]] の「使う時だけ広がる」)。
  popHelp.innerHTML =
    `<div class="mc-pop-title">この画面のアイコン</div>` +
    `<div class="mc-help-row"><b>📆</b><span>今日（数年分の同じ月日を重ねる）</span></div>` +
    `<div class="mc-help-row"><b>◀ ▶</b><span>前後の日へ（過去の昨日・明日・明後日…）</span></div>` +
    `<div class="mc-help-row"><b>🎲</b><span>偶然の3日（ランダムな3本の軌跡）</span></div>` +
    `<div class="mc-help-row"><b>↩︎</b><span>全部を見る（全期間に戻る）</span></div>` +
    `<div class="mc-help-row"><b>📅</b><span>期間でしぼる</span></div>` +
    `<div class="mc-help-row"><b>⋯</b><span>表示の設定（自分の軌跡・記憶の封印）</span></div>`;
  elHelpBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    const willOpen = popHelp.hidden;
    closePops();
    if (willOpen) { popHelp.hidden = false; elHelpBtn.classList.add('open'); }
  });

  // 🔒 封印パネル (v56): いま地図に見えている範囲 × 期間 を条件に封印 + 封印中の一覧/解除。
  // 期間は地図のフィルタ状態 (mapState.range)、場所は地図の表示範囲 (map.getBounds()) を流用する。
  popSeal.innerHTML =
    `<div class="mc-pop-title">🔒 記憶の封印</div>` +
    `<div class="mc-pop-row"><span>期間</span><span class="seal-val" id="sealRange"></span></div>` +
    `<label class="mc-pop-check"><input type="checkbox" id="sealBounds" checked> 📍 いま地図に見えている範囲だけ</label>` +
    `<label class="mc-pop-row">名前 <input type="text" id="sealLabel"></label>` +
    `<div class="seal-preview" id="sealPreview"></div>` +
    `<div class="mc-pop-actions"><button class="mc-pop-btn primary" id="sealAdd">🔒 封印する</button></div>` +
    `<div class="mc-pop-hint">封印した写真は3枚引き・連想・地図・タイムラインに出なくなります（削除ではないので blob は残り、下の一覧でいつでも解除できます）。位置情報のない写真は「範囲だけ」では封印されません（期間で封印できます）。</div>` +
    `<div class="seal-list-title">封印中の記憶</div>` +
    `<div class="seal-list" id="sealList"></div>`;
  const sealRangeEl   = popSeal.querySelector('#sealRange');
  const sealBoundsEl  = popSeal.querySelector('#sealBounds');
  const sealLabelEl   = popSeal.querySelector('#sealLabel');
  const sealPreviewEl = popSeal.querySelector('#sealPreview');
  const sealAddEl     = popSeal.querySelector('#sealAdd');
  const sealListEl    = popSeal.querySelector('#sealList');

  // いま選んでいる封印条件 {from, to, bounds}。bounds は「範囲だけ」ON のときだけ地図の表示範囲。
  function currentSealSpec() {
    const r = mapState.range;
    const spec = { from: r.start, to: r.end, bounds: null };
    if (sealBoundsEl.checked) {
      const b = map.getBounds();
      spec.bounds = { south: b.getSouth(), west: b.getWest(), north: b.getNorth(), east: b.getEast() };
    }
    return spec;
  }
  function rangeLabel(from, to) {
    if (from == null) return '全期間';
    return to === endOfDay(from) ? fmtYMD(from) : `${fmtYMD(from)}〜${fmtYMD(to)}`;
  }
  function autoSealLabel(spec) {
    const parts = [];
    if (spec.from != null) parts.push(rangeLabel(spec.from, spec.to));
    if (spec.bounds) parts.push('この辺り');
    return parts.join(' / ') || '全部';
  }
  function updateSealPreview() {
    const r = mapState.range;
    sealRangeEl.textContent = rangeLabel(r.start, r.end);
    const spec = currentSealSpec();
    const noConstraint = spec.from == null && !spec.bounds;   // 全期間×範囲なし = 全部の封印 → 禁止
    sealLabelEl.placeholder = autoSealLabel(spec);
    if (noConstraint) {
      sealPreviewEl.textContent = '期間を絞るか、範囲を限定してください';
      sealPreviewEl.className = 'seal-preview warn';
      sealAddEl.disabled = true;
      return;
    }
    const n = countSealed(spec);
    if (n === 0) {
      sealPreviewEl.textContent = 'この条件に当てはまる写真はありません';
      sealPreviewEl.className = 'seal-preview';
      sealAddEl.disabled = true;
    } else {
      sealPreviewEl.textContent = `この条件に ${n} 枚が当てはまります`;
      sealPreviewEl.className = 'seal-preview on';
      sealAddEl.disabled = false;
    }
  }
  function updateSealList() {
    sealListEl.innerHTML = '';
    if (!seals.length) { sealListEl.innerHTML = '<div class="seal-empty">まだありません</div>'; return; }
    seals.forEach(s => {
      const row = document.createElement('div');
      row.className = 'seal-item';
      const info = document.createElement('div');
      info.className = 'seal-item-info';
      const lab = document.createElement('div'); lab.className = 'seal-item-label'; lab.textContent = s.label || '(無名)';
      const sub = document.createElement('div'); sub.className = 'seal-item-sub';
      sub.textContent = `${countSealed(s)} 枚` + (s.bounds ? ' · 📍範囲' : '');
      info.appendChild(lab); info.appendChild(sub);
      const del = document.createElement('button');
      del.className = 'seal-del';
      del.textContent = '解除';
      del.addEventListener('click', () => { removeSeal(s.id); updateSealList(); updateSealPreview(); });
      row.appendChild(info); row.appendChild(del);
      sealListEl.appendChild(row);
    });
  }
  mapState.updateSealPanel = () => { updateSealPreview(); updateSealList(); };
  sealBoundsEl.addEventListener('change', updateSealPreview);
  sealAddEl.addEventListener('click', () => {
    const spec = currentSealSpec();
    if ((spec.from == null && !spec.bounds) || countSealed(spec) === 0) return;
    spec.label = sealLabelEl.value.trim() || autoSealLabel(spec);
    addSeal(spec);   // recomputeSealed + refreshData + render
    closePops();
  });
  // 封印パネルを開く (v57: 「⋯ 表示」メニューの 🔒 項目から呼ぶ)。
  function openSealPanel() {
    sealLabelEl.value = '';
    updateSealPreview();
    updateSealList();
    popSeal.hidden = false;
  }

  // ── 位置を後から設定/修正 (v59) ──────────────────────────────────
  // 撮ったのに GPS が入らなかった写真に、地図のピンをドラッグして位置を付ける (タイムライン/マーカーから起動)。
  function cancelLocationEdit() {
    if (!mapState || !mapState.locEdit) return;
    try { map.removeLayer(mapState.locEdit.pin); } catch {}
    try { mapState.locEdit.bar.remove(); } catch {}
    mapState.locEdit = null;
  }
  async function saveLocationEdit() {
    if (!mapState || !mapState.locEdit) return;
    const { photo, pin } = mapState.locEdit;
    const ll = pin.getLatLng();
    photo.lat = +ll.lat.toFixed(6);
    photo.lng = +ll.lng.toFixed(6);
    photo.geoManual = true;                                              // 手動で付けた位置 (将来の区別用)
    if (seals.length) photo._sealed = seals.some(s => sealMatches(s, photo));   // 場所封印に該当しうる
    try { await dbPut(photo); } catch (e) { logErr(`位置の保存に失敗: ${e?.message || e}`); }
    cancelLocationEdit();
    mapState.refreshData();                                             // マーカー追加 + タイムライン更新
    render();                                                           // 本体側の件数等も整合
    const rec = mapState.markerById.get(photo.id);                      // 付けた位置へ寄せる
    if (rec) map.setView(rec.latlng, Math.max(map.getZoom(), 13));
  }
  function startLocationEdit(photo, seedLatLng) {
    cancelLocationEdit();
    closePops();
    map.closePopup();
    const sheet = overlay.querySelector('.timeline-sheet');             // モバイルはシートを畳んで地図を見せる
    if (sheet && sheet.classList.contains('open') && window.matchMedia('(max-width:719px)').matches) {
      sheet.classList.remove('open');
      setTimeout(() => map.invalidateSize(), 260);
    }
    // 初期位置: 推定/指定座標(seed=軌跡からの推定など) → 既存GPS → 時間的に近いGPS写真(3日以内) → 地図中心
    let start = seedLatLng || ((photo.lat != null && photo.lng != null) ? [photo.lat, photo.lng] : null);
    if (start) { map.setView(start, Math.max(map.getZoom(), 14)); }
    else {
      const g = nearestGps(photo, 3 * 86400000);
      if (g) { start = g; map.setView(start, Math.max(map.getZoom(), 13)); }
      else { const c = map.getCenter(); start = [c.lat, c.lng]; }
    }
    const pin = L.marker(start, {
      draggable: true, autoPan: true, zIndexOffset: 1000,
      icon: L.divIcon({ className: 'loc-edit-pin-wrap', html: `<div class="loc-edit-pin" style="background-image:url(${thumbUrl(photo)})"></div>`, iconSize: [50, 54], iconAnchor: [25, 53] }),
    }).addTo(map);
    const bar = document.createElement('div');
    bar.className = 'loc-edit-bar';
    bar.innerHTML =
      `<img class="le-thumb" src="${thumbUrl(photo)}">` +
      `<div class="le-text"><div class="le-title">📍 ピンをドラッグして位置を合わせる</div><div class="le-coords"></div></div>` +
      `<button class="le-cancel" type="button">キャンセル</button>` +
      `<button class="le-save" type="button">保存</button>`;
    overlay.appendChild(bar);
    const coordsEl = bar.querySelector('.le-coords');
    const updateReadout = () => {
      const ll = pin.getLatLng();
      const place = fmtPlace(ll.lat, ll.lng);
      coordsEl.textContent = (place ? place + ' · ' : '') + `${ll.lat.toFixed(5)}, ${ll.lng.toFixed(5)}`;
    };
    pin.on('drag', updateReadout);
    pin.on('dragend', updateReadout);
    updateReadout();
    mapState.locEdit = { photo, pin, bar, updateReadout };
    bar.querySelector('.le-cancel').addEventListener('click', cancelLocationEdit);
    bar.querySelector('.le-save').addEventListener('click', saveLocationEdit);
  }
  mapState.startLocationEdit = startLocationEdit;

  map.on('click', (e) => {                  // 編集中は地図タップでもピンを移動できる
    if (mapState && mapState.locEdit) { mapState.locEdit.pin.setLatLng(e.latlng); mapState.locEdit.updateReadout(); }
  });
  map.on('click', () => {   // 背景タップ: パネルを閉じ、軌跡のハイライト(他を暗く)も解除
    closePops();
    if (mapState.focusedDay) { mapState.focusedDay = null; drawTrips(); }
  });

  // タイムライン (フィルタ操作の主役) を先に組み、updateTimelineUI フックを mapState に立ててから適用。
  // 封印の追加/解除でデータが変わったら地図(マーカー/線)とタイムラインを貼り直す (refreshData)。
  const sheetBody = overlay.querySelector('.sheet-body');
  mapState.rebuildTimeline = () => buildTimeline(sheetBody, map, cluster, markerById, applyFilter);
  mapState.refreshData = () => {
    mapState.rebuildTimeline();
    applyFilter({ skipFit: true });
    if (!popSeal.hidden && mapState.updateSealPanel) mapState.updateSealPanel();
  };
  mapState.rebuildTimeline();

  // 入り口で「表示する日」を変える: 写真から来たら その写真の日 (= フィルタ=その日)、
  // ヘッダ(写真なし)は GPS のある日からランダムに3日 = 偶然の3本の軌跡。
  const explicit = !!(focusPhoto && focusPhoto.id);
  if (explicit) setPick([dayKeyOf(focusPhoto)], 'day');
  else {   // ヘッダ 🗺 = 毎日の入口「今日 (数年分の同じ月日)」(v83)。今日の写真が無ければ偶然の3日 → それも無ければ従来ブラウズ。
    const t = pickToday();
    if (t.length) setPick(t, 'today');
    else { const d = pickRandom3(); if (d.length) setPick(d, 'random3'); else applyFilter(); }
  }
  if (!gps.length) {
    const note = document.createElement('div');
    note.className = 'map-empty-note';
    note.textContent = '位置情報のある写真がありません（下のタイムラインから一覧で見られます）';
    overlay.appendChild(note);
  }

  // 配線
  overlay.querySelector('.map-close').addEventListener('click', closeMapView);
  const sheet = overlay.querySelector('.timeline-sheet');
  overlay.querySelector('.sheet-handle').addEventListener('click', () => {
    sheet.classList.toggle('open');
    setTimeout(() => map.invalidateSize(), 260);   // シート開閉でコンテナ高が変わる → Leaflet に反映
  });

  setTimeout(() => {
    if (!mapState) return;
    map.invalidateSize();       // overlay 表示後のレイアウト確定
    if (explicit) {   // 特定の写真から来た時 → その写真ピンの popup を開く
      const rec = markerById.get(focusPhoto.id);
      if (rec) {
        if (cluster.zoomToShowLayer) cluster.zoomToShowLayer(rec.marker, () => rec.marker.openPopup());
        else rec.marker.openPopup();
      }
    }
  }, 80);
}

// タイムライン: 全写真 (GPS 有無問わず) を日付降順 (新しい旅が上) に。
// 日付見出しタップで地図を「その日 / 期間」に絞り込む (別の日をタップで期間レンジ、✕ で解除)。
// 写真タップ: いま地図に出ている GPS 写真ならフォーカス、それ以外 (フィルタ圏外/GPS無し) はフル画像。
function buildTimeline(container, map, cluster, markerById, applyFilter) {
  container.innerHTML = '';
  const all = allPhotos.filter(visible).slice().sort((a, b) => b.datetime - a.datetime);
  if (!all.length) { container.innerHTML = '<div class="tl-empty">写真がありません</div>'; return; }
  const isMobile = () => window.matchMedia('(max-width:719px)').matches;
  const dayStartOf = d => new Date(d.getFullYear(), d.getMonth(), d.getDate()).getTime();
  const dayEndOf = ms => ms + 86400000 - 1;
  const fmtDay = ms => { const d = new Date(ms); return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`; };
  mapState.foldedDays = new Set();   // 入口モードで畳んでいる日 (dayStart ms)。タイムライン再構築ごとにリセット。

  // フィルタバー (絞り込み状態 + 解除)。リスト先頭に固定。
  const bar = document.createElement('div');
  bar.className = 'tl-filterbar';
  container.appendChild(bar);
  // 期間を絞った結果その期間に写真が無いときの注記 (既定は非表示)。
  const emptyNote = document.createElement('div');
  emptyNote.className = 'tl-empty tl-out';
  emptyNote.textContent = 'この期間に写真はありません';
  container.appendChild(emptyNote);

  const frag = document.createDocumentFragment();
  const dayHeaders = [];   // { el, dayStart }
  const itemEls = [];      // { el, dayStart }
  let lastDay = '';
  for (const p of all) {
    const d = p.datetime;
    const dayStart = dayStartOf(d);
    const dayKey = fmtDay(dayStart);
    if (dayKey !== lastDay) {
      lastDay = dayKey;
      const h = document.createElement('div');
      h.className = 'tl-day';
      h.textContent = dayKey;
      h.addEventListener('click', () => {
        const m = mapState.pickMode;
        // 表示中の日だけを見せる選択モード (ランダム3日 / 写真の日 / 重ねた複数日) は日見出しタップ = 折りたたみ
        // (その日の線・ピンを地図から隠す / もう一度で戻す)。ブラウズ (全期間) だけタップで日選択を始める。
        if (m === 'random3' || m === 'day' || m === 'days') toggleFold(dayStart);
        else toggleDayFilter(dayStart);
      });
      frag.appendChild(h);
      dayHeaders.push({ el: h, dayStart });
    }
    const hasGps = p.lat != null && p.lng != null;
    const item = document.createElement('div');
    item.className = 'tl-item' + (hasGps ? '' : ' tl-nogps');
    item.innerHTML =
      `<img src="${thumbUrl(p)}">` +
      `<div class="tl-meta"><div class="tl-time">${fmtShortDate(d)}</div>` +
      `<div class="tl-badge">${hasGps ? '📍 地図で見る' : '位置情報なし'}</div></div>` +
      `<div class="tl-actions">` +
        `<button class="tl-locedit" type="button">${hasGps ? '位置を直す' : '📍 位置を設定'}</button>` +
        `<button class="tl-del" type="button" title="削除（♻️で戻せる）">🗑</button>` +
      `</div>`;
    item.querySelector('.tl-locedit').addEventListener('click', (e) => {
      e.stopPropagation();   // 項目本体のタップ (フォーカス/フル画像) と衝突させない
      if (mapState && mapState.startLocationEdit) mapState.startLocationEdit(p);
    });
    item.querySelector('.tl-del').addEventListener('click', (e) => {
      e.stopPropagation();
      excludePhoto(p);       // 除外 (♻️ で復元可)。refreshData でこの項目も消える
    });
    item.addEventListener('click', () => {
      if (markerById.has(p.id)) {          // いま地図に出ている (フィルタ内の GPS 写真) → フォーカス
        const rec = markerById.get(p.id);
        map.setView(rec.latlng, Math.max(map.getZoom(), 13), { animate: true });
        if (cluster.zoomToShowLayer) cluster.zoomToShowLayer(rec.marker, () => rec.marker.openPopup());
        else rec.marker.openPopup();
        const sheet = container.closest('.timeline-sheet');   // モバイルはシートを畳んで地図を見せる
        if (sheet && sheet.classList.contains('open') && isMobile()) {
          sheet.classList.remove('open');
          setTimeout(() => map.invalidateSize(), 260);
        }
      } else {                              // フィルタ圏外 or GPS 無し → フル画像
        showFullImage(p);
      }
    });
    frag.appendChild(item);
    itemEls.push({ el: item, dayStart });
  }
  container.appendChild(frag);

  // ブラウズ (全期間) で日見出しをタップ → その日だけの選択を始める (→ days モード)。
  // 選択モード (random3 / day / days) では日タップは折りたたみ (toggleFold) なのでここには来ない。
  // 飛び飛びの複数日を「重ねて」足すのは 📅パネルの「＋ 追加」(v71) に集約。
  function toggleDayFilter(dayStart) {
    if (mapState.pickMode === 'random3' || mapState.pickMode === 'day' || mapState.pickMode === 'days') return;
    const d = new Date(dayStart);
    const dk = `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;   // dayKeyOf と同形式
    const days = mapState.pickDays ? mapState.pickDays.slice() : [];
    const i = days.indexOf(dk);
    if (i >= 0) days.splice(i, 1); else days.push(dk);
    if (!days.length) { if (mapState.clearPick) mapState.clearPick(); return; }   // 全部外したらブラウズへ
    mapState.pickDays = days;
    mapState.pickMode = 'days';            // 手で組んだ集合 = 'days' (🎲 は出さない)
    mapState.focusedDay = null;
    mapState.range = { start: null, end: null };
    applyFilter();                          // 地図(マーカー/軌跡/fit) + タイムラインの強調/畳みを更新 (DOM 再構築なし=スクロール維持)
  }

  // 入口モード (もう一度引く/写真) で日見出しタップ → その日の写真を折りたたむ/開く。
  // 地図の軌跡も連動 (折りたたんだ日は線を非表示)。ビューは維持 (skipFit)、マーカーは残る。
  function toggleFold(dayStart) {
    if (mapState.foldedDays.has(dayStart)) mapState.foldedDays.delete(dayStart);
    else mapState.foldedDays.add(dayStart);
    applyFilter({ skipFit: true });   // drawTrips で線を貼り直し + updateTimelineUI→applyFold でタイムラインの畳みを反映
  }
  // 折りたたみを反映。選択モード (random3 / day / days) で有効 (見出しに ▾/▸ を出し、畳んだ日の写真を隠す)。
  function applyFold() {
    const foldable = (mapState.pickMode === 'random3' || mapState.pickMode === 'day' || mapState.pickMode === 'days');
    for (const { el, dayStart } of dayHeaders) {
      el.classList.toggle('tl-foldable', foldable && !el.classList.contains('tl-out'));
      el.classList.toggle('tl-folded', foldable && mapState.foldedDays.has(dayStart));
    }
    for (const { el, dayStart } of itemEls) el.classList.toggle('tl-fold', foldable && mapState.foldedDays.has(dayStart));
  }

  // フィルタ状態に合わせてバー/見出し/淡色を更新 (applyFilter から呼ばれる)。
  mapState.updateTimelineUI = () => {
    // 選択モード (random3 / day / days): タイムラインは「地図に出ている日 (= 選ばれた日) だけ」を見せる。
    // 他の日は見出しごと隠す (足す候補は出さない。日の追加は 📅「＋ 追加」/ ブラウズの日タップに集約)。
    if (mapState.pickDays) {
      bar.classList.add('active');
      const pickStarts = new Set(mapState.pickDays.map(dk => { const [y, m, d] = dk.split('-').map(Number); return new Date(y, m, d).getTime(); }));
      const multi = (mapState.pickMode === 'days');   // 飛び飛びの複数日を重ねた選択
      let label;
      if (mapState.pickMode === 'random3') label = '🎲 ランダムな3日';
      else if (mapState.pickMode === 'today') { const off = mapState.todayOffset || 0; const td = new Date(); td.setDate(td.getDate() + off); const rel = mapState.relDayLabel ? mapState.relDayLabel(off) : '今日'; label = `📆 ${rel} ${td.getMonth()+1}/${td.getDate()}（${mapState.pickDays.length}年分）`; }
      else if (multi) label = `📅 ${mapState.pickDays.length}日を重ねて`;
      else { const parts = mapState.pickDays[0].split('-').map(Number); label = `📅 ${fmtDay(new Date(parts[0], parts[1], parts[2]).getTime())}`; }
      bar.innerHTML = `<span class="fb-text">${label}</span>`;
      const clr = document.createElement('button');
      clr.className = 'fb-clear';
      clr.textContent = '✕ 全部を見る';
      clr.addEventListener('click', () => { if (mapState.clearPick) mapState.clearPick(); });
      bar.appendChild(clr);
      // 選ばれた日だけ表示 + 日見出しタップで折りたたみ (applyFold が ▾/▸、畳んだ日は写真も地図の線/ピンも消える)。
      for (const { el, dayStart } of dayHeaders) { el.classList.remove('tl-day-on'); el.classList.toggle('tl-out', !pickStarts.has(dayStart)); }
      for (const { el, dayStart } of itemEls) el.classList.toggle('tl-out', !pickStarts.has(dayStart));
      applyFold();
      emptyNote.classList.add('tl-out');
      return;
    }
    const r = mapState.range;
    bar.innerHTML = '';
    if (r.start == null) {
      bar.classList.remove('active');
      bar.innerHTML = `<span class="fb-text">全期間</span><span class="fb-hint">日付をタップで絞り込み</span>`;
    } else {
      bar.classList.add('active');
      const single = r.end === dayEndOf(r.start);
      bar.innerHTML = single
        ? `<span class="fb-text">📅 ${fmtDay(r.start)}</span>`
        : `<span class="fb-text">📅 ${fmtDay(r.start)} 〜 ${fmtDay(r.end)}</span>`;
      const clr = document.createElement('button');
      clr.className = 'fb-clear';
      clr.textContent = '✕ 解除';
      clr.addEventListener('click', () => { mapState.range = { start: null, end: null }; applyFilter(); });
      bar.appendChild(clr);
    }
    // v55: フィルタ中はその期間「だけ」を見せる (淡色化でなく非表示)。タイムライン=絞り込んだ期間の一覧。
    const inR = ds => r.start == null || (ds >= r.start && ds <= r.end);
    let visible = 0;
    for (const { el, dayStart } of dayHeaders) { el.classList.remove('tl-day-on'); el.classList.toggle('tl-out', !inR(dayStart)); }
    for (const { el, dayStart } of itemEls) { const v = inR(dayStart); el.classList.toggle('tl-out', !v); if (v) visible++; }
    emptyNote.classList.toggle('tl-out', !(r.start != null && visible === 0));
  };
  mapState.updateTimelineUI();
}

function closeMapView() {
  if (!mapState) return;
  try { mapState.map.remove(); } catch {}
  mapState.overlay.remove();
  mapState = null;
}
window.addEventListener('keydown', (e) => { if (e.key === 'Escape' && mapState) closeMapView(); });

// ワンタップ除外ボタン (✕)。親カードの tap/長押しと衝突しないよう pointer 系を止める。
function makeExcludeBtn(photo) {
  const x = document.createElement('button');
  x.className = 'exclude-btn';
  x.textContent = '✕';
  x.title = '二度と表示しない';
  const stop = e => e.stopPropagation();
  x.addEventListener('pointerdown', stop);
  x.addEventListener('pointermove', stop);
  x.addEventListener('pointerup', stop);
  x.addEventListener('click', (e) => { e.stopPropagation(); excludePhoto(photo); });
  return x;
}

function makeCard(photo, onClick) {
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `<img src="${thumbUrl(photo)}" loading="lazy">
    <div class="meta">
      <div class="date">${fmtDate(photo.datetime)}${srcTagHtml(photo)}</div>
      ${fmtPlace(photo.lat, photo.lng) ? `<div class="place">${fmtPlace(photo.lat, photo.lng)}</div>` : ''}
    </div>`;
  attachPhotoGestures(card, photo, onClick);
  card.appendChild(makeExcludeBtn(photo));
  return card;
}

function makeThumb(photo, onClick) {
  const t = document.createElement('div');
  t.className = 'thumb';
  t.innerHTML = `<img src="${thumbUrl(photo)}" loading="lazy"><div class="lbl">${fmtShortDate(photo.datetime)}</div>`;
  attachPhotoGestures(t, photo, onClick);
  t.appendChild(makeExcludeBtn(photo));
  return t;
}

// 除外: excluded フラグを立てて永続化 (非破壊、blob は残す)。表示は filter で消える。
// 直後にトーストで取り消し可能。
// 描画を先 / DB 保存は後 (保存失敗でも UX をブロックしない、メモリ状態が真実)
async function excludePhoto(photo) {
  photo.excluded = true;
  showUndoToast(photo);
  if (state === 'explore' && currentCenter && currentCenter.id === photo.id) {
    drawRandom();  // 中心を除外 → 別の3枚へ
  } else {
    render();      // 除外写真は filter で消える
  }
  if (mapState && mapState.refreshData) mapState.refreshData();   // 地図が開いていればマーカー/タイムラインから消す (v61)
  try { await dbPut(photo); } catch (e) { logErr(`除外保存失敗: ${e?.message || String(e)}`); }
}

async function undoExclude(photo) {
  photo.excluded = false;
  render();
  if (mapState && mapState.refreshData) mapState.refreshData();   // 地図が開いていれば戻す (v61)
  try { await dbPut(photo); } catch (e) { logErr(`取消保存失敗: ${e?.message || String(e)}`); }
}

let toastEl = null, toastTimer = null;
function showUndoToast(photo) {
  hideToast();
  const t = document.createElement('div');
  t.className = 'toast';
  const span = document.createElement('span');
  span.textContent = '1枚を除外しました';
  const btn = document.createElement('button');
  btn.textContent = '取り消す';
  btn.addEventListener('click', () => { hideToast(); undoExclude(photo); });
  t.appendChild(span);
  t.appendChild(btn);
  document.body.appendChild(t);
  toastEl = t;
  toastTimer = setTimeout(hideToast, 5000);
}
function hideToast() {
  if (toastTimer) { clearTimeout(toastTimer); toastTimer = null; }
  if (toastEl) { toastEl.remove(); toastEl = null; }
}

// 使い方・注意モーダル (v38)。散らばっていた注意書きを 1 箇所にまとめる。
// reminiscence 画面は汚さず、ℹ️ を押した時だけ開く ([[ui-minimalism-works]])。
function openInfoModal()  { infoModalOpen = true;  render(); }
function closeInfoModal() { infoModalOpen = false; render(); }

      <p style="margin:.8em 0 .2em;color:#fff;">🖼 拡大表示 / 📅 日付を直す</p>

      <p style="margin:.2em 0;">3枚引く→タップでその近くへ。「モード」で <b>時空 / 色 / 意味</b> のミックスを切り替えられます。✕ で「もう出さない」除外（直後のトースト、または右上の <b>♻️</b> からいつでも戻せます）。歩いた道は <b>🔖 足跡</b> を開くとたどり直せます（タップでその地点へ戻る・最近 30 枚はリロードしても残ります）。</p>
