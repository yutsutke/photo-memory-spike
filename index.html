  }

  // フィルタバー (絞り込み状態 + 解除)。リスト先頭に固定。
  const bar = document.createElement('div');
  bar.className = 'tl-filterbar';
  container.appendChild(bar);
  // 期間を絞った結果その期間に写真が無いときの注記 (既定は非表示)。
  const emptyNote = document.createElement('div');
  emptyNote.className = 'tl-empty tl-out';
  emptyNote.textContent = tr('この期間に写真はありません', 'No photos in this range');
  container.appendChild(emptyNote);
  // v125: 位置情報のない写真は地図に出ない → タイムラインに出る、を明示 (GPSなし写真がある時だけ)。
  if (all.some(p => p.lat == null || p.lng == null)) {
    const gpsHint = document.createElement('div');
    gpsHint.className = 'tl-gpshint';
    gpsHint.textContent = tr('📍位置情報のない写真は地図に出ません。ここ（タイムライン）に表示されます。', '📍 Photos without location don\'t appear on the map. They show here (timeline).');
    container.appendChild(gpsHint);
  }

  const frag = document.createDocumentFragment();
  const dayHeaders = [];   // { el, dayStart }
  const itemEls = [];      // { el, dayStart }
  let lastDay = '';
  for (const p of all) {
    const d = p.datetime;
    const dayStart = dayStartOf(d);
    const dayKey = fmtDay(dayStart);
    if (dayKey !== lastDay) {
      lastDay = dayKey;
      const h = document.createElement('div');
      h.className = 'tl-day';
      h.textContent = dayKey;
      h.addEventListener('click', () => {
        const m = mapState.pickMode;
        // 表示中の日だけを見せる選択モード (ランダム3日 / 写真の日 / 重ねた複数日) は日見出しタップ = 折りたたみ
        // (その日の線・ピンを地図から隠す / もう一度で戻す)。ブラウズ (全期間) だけタップで日選択を始める。
        if (m === 'random3' || m === 'day' || m === 'days') toggleFold(dayStart);
        else toggleDayFilter(dayStart);
      });
      frag.appendChild(h);
      dayHeaders.push({ el: h, dayStart });
    }
    const hasGps = p.lat != null && p.lng != null;
    const item = document.createElement('div');
    item.className = 'tl-item' + (hasGps ? '' : ' tl-nogps');
    item.innerHTML =
      `<img src="${thumbUrl(p)}">` +
      `<div class="tl-meta"><div class="tl-time">${fmtShortDate(d)}</div>` +
      `<div class="tl-badge">${hasGps ? tr('📍 地図で見る', '📍 See on map') : tr('位置情報なし', 'No location')}</div></div>` +
      `<div class="tl-actions">` +
        `<button class="tl-locedit" type="button">${hasGps ? tr('位置を直す', 'Fix location') : tr('📍 位置を設定', '📍 Set location')}</button>` +
        `<button class="tl-del" type="button" title="${tr('削除（♻️で戻せる）', 'Delete (restore from ♻️)')}">🗑</button>` +
      `</div>`;
    item.querySelector('.tl-locedit').addEventListener('click', (e) => {
      e.stopPropagation();   // 項目本体のタップ (フォーカス/フル画像) と衝突させない
      if (mapState && mapState.startLocationEdit) mapState.startLocationEdit(p);
    });
    item.querySelector('.tl-del').addEventListener('click', (e) => {
      e.stopPropagation();
      excludePhoto(p);       // 除外 (♻️ で復元可)。refreshData でこの項目も消える
    });
    item.addEventListener('click', () => {
      if (markerById.has(p.id)) {          // いま地図に出ている (フィルタ内の GPS 写真) → フォーカス
        const rec = markerById.get(p.id);
        map.setView(rec.latlng, Math.max(map.getZoom(), 13), { animate: true });
        if (cluster.zoomToShowLayer) cluster.zoomToShowLayer(rec.marker, () => rec.marker.openPopup());
        else rec.marker.openPopup();
        const sheet = container.closest('.timeline-sheet');   // モバイルはシートを畳んで地図を見せる
        if (sheet && sheet.classList.contains('open') && isMobile()) {
          sheet.classList.remove('open');
          setTimeout(() => map.invalidateSize(), 260);
        }
      } else {                              // フィルタ圏外 or GPS 無し → フル画像 (v115: タイムラインを左右スワイプでめくれる)
        showFullImage(p, { list: all, index: all.indexOf(p) });
      }
    });
    frag.appendChild(item);
    itemEls.push({ el: item, dayStart });
  }
  container.appendChild(frag);

  // ブラウズ (全期間) で日見出しをタップ → その日だけの選択を始める (→ days モード)。
  // 選択モード (random3 / day / days) では日タップは折りたたみ (toggleFold) なのでここには来ない。
  // 飛び飛びの複数日を「重ねて」足すのは 📅パネルの「＋ 追加」(v71) に集約。
  function toggleDayFilter(dayStart) {
    if (mapState.pickMode === 'random3' || mapState.pickMode === 'day' || mapState.pickMode === 'days') return;
    const d = new Date(dayStart);
    const dk = `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;   // dayKeyOf と同形式
    const days = mapState.pickDays ? mapState.pickDays.slice() : [];
    const i = days.indexOf(dk);
    if (i >= 0) days.splice(i, 1); else days.push(dk);
    if (!days.length) { if (mapState.clearPick) mapState.clearPick(); return; }   // 全部外したらブラウズへ
    mapState.pickDays = days;
    mapState.pickMode = 'days';            // 手で組んだ集合 = 'days' (🎲 は出さない)
    mapState.focusedDay = null;
    mapState.range = { start: null, end: null };
    applyFilter();                          // 地図(マーカー/軌跡/fit) + タイムラインの強調/畳みを更新 (DOM 再構築なし=スクロール維持)
  }

  // 入口モード (もう一度引く/写真) で日見出しタップ → その日の写真を折りたたむ/開く。
  // 地図の軌跡も連動 (折りたたんだ日は線を非表示)。ビューは維持 (skipFit)、マーカーは残る。
  function toggleFold(dayStart) {
    if (mapState.foldedDays.has(dayStart)) mapState.foldedDays.delete(dayStart);
    else mapState.foldedDays.add(dayStart);
    applyFilter({ skipFit: true });   // drawTrips で線を貼り直し + updateTimelineUI→applyFold でタイムラインの畳みを反映
  }
  // 折りたたみを反映。選択モード (random3 / day / days) で有効 (見出しに ▾/▸ を出し、畳んだ日の写真を隠す)。
  function applyFold() {
    const foldable = (mapState.pickMode === 'random3' || mapState.pickMode === 'day' || mapState.pickMode === 'days');
    for (const { el, dayStart } of dayHeaders) {
      el.classList.toggle('tl-foldable', foldable && !el.classList.contains('tl-out'));
      el.classList.toggle('tl-folded', foldable && mapState.foldedDays.has(dayStart));
    }
    for (const { el, dayStart } of itemEls) el.classList.toggle('tl-fold', foldable && mapState.foldedDays.has(dayStart));
  }

  // フィルタ状態に合わせてバー/見出し/淡色を更新 (applyFilter から呼ばれる)。
  mapState.updateTimelineUI = () => {
    // 選択モード (random3 / day / days): タイムラインは「地図に出ている日 (= 選ばれた日) だけ」を見せる。
    // 他の日は見出しごと隠す (足す候補は出さない。日の追加は 📅「＋ 追加」/ ブラウズの日タップに集約)。
    if (mapState.pickDays) {
      bar.classList.add('active');
      const pickStarts = new Set(mapState.pickDays.map(dk => { const [y, m, d] = dk.split('-').map(Number); return new Date(y, m, d).getTime(); }));
      const multi = (mapState.pickMode === 'days');   // 飛び飛びの複数日を重ねた選択
      let label;
      if (mapState.pickMode === 'random3') label = tr('🎲 ランダムな1日', '🎲 A random day');
      else if (mapState.pickMode === 'today') { const off = mapState.todayOffset || 0; const td = new Date(); td.setDate(td.getDate() + off); const rel = mapState.relDayLabel ? mapState.relDayLabel(off) : tr('今日', 'Today'); label = tr(`📆 ${rel} ${td.getMonth()+1}/${td.getDate()}（${mapState.pickDays.length}年分）`, `📆 ${rel} ${td.getMonth()+1}/${td.getDate()} (${mapState.pickDays.length} yr)`); }
      else if (multi) label = tr(`📅 ${mapState.pickDays.length}日を重ねて`, `📅 ${mapState.pickDays.length} days overlaid`);
      else { const parts = mapState.pickDays[0].split('-').map(Number); label = `📅 ${fmtDay(new Date(parts[0], parts[1], parts[2]).getTime())}`; }
      bar.innerHTML = `<span class="fb-text">${label}</span>`;
      const clr = document.createElement('button');
      clr.className = 'fb-clear';
      clr.textContent = tr('✕ 全部を見る', '✕ See all');
      clr.addEventListener('click', () => { if (mapState.clearPick) mapState.clearPick(); });
      bar.appendChild(clr);
      // 選ばれた日だけ表示 + 日見出しタップで折りたたみ (applyFold が ▾/▸、畳んだ日は写真も地図の線/ピンも消える)。
      for (const { el, dayStart } of dayHeaders) { el.classList.remove('tl-day-on'); el.classList.toggle('tl-out', !pickStarts.has(dayStart)); }
      for (const { el, dayStart } of itemEls) el.classList.toggle('tl-out', !pickStarts.has(dayStart));
      // v122: 動線を1本フォーカス中は、その日以外の表示中の日を淡色化＝地図の dim と揃える。
      const fdStart = mapState.focusedDay ? (() => { const [y, m, d] = mapState.focusedDay.split('-').map(Number); return new Date(y, m, d).getTime(); })() : null;
      for (const { el, dayStart } of dayHeaders) el.classList.toggle('tl-dim', fdStart != null && pickStarts.has(dayStart) && dayStart !== fdStart);
      for (const { el, dayStart } of itemEls) el.classList.toggle('tl-dim', fdStart != null && pickStarts.has(dayStart) && dayStart !== fdStart);
      applyFold();
      emptyNote.classList.add('tl-out');
      return;
    }
    const r = mapState.range;
    bar.innerHTML = '';
    if (r.start == null) {
      bar.classList.remove('active');
      bar.innerHTML = `<span class="fb-text">${tr('全期間', 'All time')}</span><span class="fb-hint">${tr('日付をタップで絞り込み', 'Tap a date to filter')}</span>`;
    } else {
      bar.classList.add('active');
      const single = r.end === dayEndOf(r.start);
      bar.innerHTML = single
        ? `<span class="fb-text">📅 ${fmtDay(r.start)}</span>`
        : `<span class="fb-text">📅 ${fmtDay(r.start)} 〜 ${fmtDay(r.end)}</span>`;
      const clr = document.createElement('button');
      clr.className = 'fb-clear';
      clr.textContent = tr('✕ 解除', '✕ Clear');
      clr.addEventListener('click', () => { mapState.range = { start: null, end: null }; applyFilter(); });
      bar.appendChild(clr);
    }
    // v55: フィルタ中はその期間「だけ」を見せる (淡色化でなく非表示)。タイムライン=絞り込んだ期間の一覧。
    const inR = ds => r.start == null || (ds >= r.start && ds <= r.end);
    let visible = 0;
    for (const { el, dayStart } of dayHeaders) { el.classList.remove('tl-day-on'); el.classList.toggle('tl-out', !inR(dayStart)); }
    for (const { el, dayStart } of itemEls) { const v = inR(dayStart); el.classList.toggle('tl-out', !v); if (v) visible++; }
    emptyNote.classList.toggle('tl-out', !(r.start != null && visible === 0));
  };
  mapState.updateTimelineUI();
}

function closeMapView() {
  if (!mapState) return;
  if (mapState.encircle) endEncircleMode();   // v120: 円ジェスチャ中なら後始末してから閉じる
  if (mapState.hereMode) endHereRadiusMode();   // v154: 「いまの場所」半径選択中なら後始末
  try { mapState.map.remove(); } catch {}
  mapState.overlay.remove();
  mapState = null;
}
window.addEventListener('keydown', (e) => { if (e.key === 'Escape' && mapState && !compareState) closeMapView(); });   // 比較ビューが上にある時は先にそちらを閉じる

// ============================================================
// 囲んで比べる (v120) — 地図で一帯を円で囲み、円内の写真を左右2リールで
//   「この場所の、あの頃と今」として見比べる。コア(偶然/久しぶり/よみがえる)を地図上で。
//   remove-to-reveal(囲って外を消す) + なぞって時間を復元。左右並置(重ねない＝画角が
//   合わなくても成立し、ズレ自体が年月の証拠)。スクラブ軸は全期間・時季自由(純度版は作らない)。
//   発見は不随意・操作だけ随意。円の半径=手が決める「ここ」の粒度。GPS 必須。
//   既存部品の組合せ: haversine(円内フィルタ)・scroll-snap(.full-slide を縦に)・年昇順(pickToday)。
// ============================================================

// 円内(中心+半径m)の表示可能 GPS 写真を、昔→今の順で返す。
function photosInCircle(lat, lng, radiusM) {
  return allPhotos
    .filter(p => visible(p) && p.lat != null && p.lng != null && haversine(lat, lng, p.lat, p.lng) <= radiusM)
    .sort((a, b) => a.datetime - b.datetime);   // 昔→今 (pickToday と同じ並び)
}

// 地図に円を描くモードに入る。中心を押して外へドラッグ=半径。離すと円内の写真で比較ビュー。
function startEncircleMode() {
  if (!mapState || mapState.encircle) return;
  const { map, overlay } = mapState;
  const mapEl = overlay.querySelector('#mapEl');
  try { map.closePopup(); } catch {}
  if (mapState.closePops) mapState.closePops();
  // 描画ジェスチャと衝突しないよう地図のパン/ズームを一時停止 (endEncircleMode で必ず戻す)。
  try { map.dragging.disable(); map.doubleClickZoom.disable(); map.boxZoom.disable(); if (map.tap) map.tap.disable(); } catch {}

  const layer  = document.createElement('div'); layer.className  = 'encircle-layer';
  const banner = document.createElement('div'); banner.className = 'encircle-banner';
  banner.innerHTML = `<span>${tr('見たい場所を押して、外へ広げて囲む', 'Press a spot and drag outward to encircle it')}</span><button class="enc-cancel" type="button">${tr('やめる', 'Cancel')}</button>`;
  const liveCount = document.createElement('div'); liveCount.className = 'encircle-count'; liveCount.hidden = true;
  overlay.appendChild(layer); overlay.appendChild(banner); overlay.appendChild(liveCount);

  let circle = null, centerLL = null, drawing = false, moveRaf = null;
  const ptToLatLng = (clientX, clientY) => {
    const rect = mapEl.getBoundingClientRect();
    return map.containerPointToLatLng(L.point(clientX - rect.left, clientY - rect.top));
  };
  const onDown = (e) => {
    if (drawing) return;                         // 2本目のタッチ(ピンチ等)は無視
    if (e.button != null && e.button > 0) return;
    drawing = true;
    try { layer.setPointerCapture(e.pointerId); } catch {}
    centerLL = ptToLatLng(e.clientX, e.clientY);
    if (circle) map.removeLayer(circle);
    circle = L.circle(centerLL, { radius: 1, color: '#33c1b0', weight: 2, fillColor: '#33c1b0', fillOpacity: 0.12 }).addTo(map);
    liveCount.hidden = false; liveCount.textContent = tr('0枚', '0 photos');
    e.preventDefault();
  };
  const onMove = (e) => {
    if (!drawing || !centerLL || !circle) return;
    e.preventDefault();
    const cur = ptToLatLng(e.clientX, e.clientY);
    circle.setRadius(map.distance(centerLL, cur));
    if (moveRaf) return;                          // 件数計算は rAF で間引き (大量写真でも軽く)
    moveRaf = requestAnimationFrame(() => {
      moveRaf = null;
      if (!centerLL || !circle) return;
      const n = photosInCircle(centerLL.lat, centerLL.lng, circle.getRadius()).length;
      liveCount.textContent = tr(`${n}枚`, `${n} photos`);
    });
  };
  const onUp = (e) => {
    if (!drawing) return;
    drawing = false;
    e.preventDefault();
    const r = circle ? circle.getRadius() : 0;
    const list = (centerLL && r > 0) ? photosInCircle(centerLL.lat, centerLL.lng, r) : [];
    if (list.length >= 2) {
      const ci = { lat: centerLL.lat, lng: centerLL.lng, radius: r };   // v121: 思い出の場所登録用に円を渡す
      const target = attachTargetAnniv; attachTargetAnniv = null;   // v143: 詳細の「別の場所」経由なら直接 attach
      endEncircleMode();
      if (target) attachLocationDirect(target, ci, list);
      else openEncircleTimeline(list, ci);   // v151: 囲む後は deck(1枚) ではなく ログ(タイムライン) で見る（未登録＝「📍登録」で残す）
      return;
    }
    // 足りない → 円を消してやり直し (モードは継続)。
    liveCount.hidden = false;
    liveCount.textContent = (list.length === 1) ? tr('1枚 — もう少し広く囲んで', '1 photo — encircle a bit wider') : tr('この辺りに写真がありません', 'No photos around here');
    if (circle) { map.removeLayer(circle); circle = null; }
    centerLL = null;
    setTimeout(() => { if (mapState && mapState.encircle) mapState.encircle.liveCount.hidden = true; }, 1500);
  };
  layer.addEventListener('pointerdown', onDown);
  layer.addEventListener('pointermove', onMove);
  layer.addEventListener('pointerup', onUp);
  layer.addEventListener('pointercancel', onUp);
  banner.querySelector('.enc-cancel').addEventListener('click', () => endEncircleMode());

  mapState.encircle = { layer, banner, liveCount, clear: () => { if (circle) { map.removeLayer(circle); circle = null; } } };
}

function endEncircleMode() {
  attachTargetAnniv = null;   // v143: モード終了で attach ターゲットもクリア（やり直し/キャンセル対策）
  if (!mapState || !mapState.encircle) return;
  const { map } = mapState;
  const enc = mapState.encircle;
  try { enc.clear(); } catch {}
  enc.layer.remove(); enc.banner.remove(); enc.liveCount.remove();
  try { map.dragging.enable(); map.doubleClickZoom.enable(); map.boxZoom.enable(); if (map.tap) map.tap.enable(); } catch {}
  mapState.encircle = null;
}

// 左右2リール (縦 scroll-snap) の比較ビュー。同じ円内写真を左右独立にスクラブ＝片方を止めて見比べる。
// 初期は 左=いちばん古い / 右=いちばん新しい ＝「あの頃」と「今」を最初から対面させる。
let compareState = null;
function openCompareView(list, circleInfo, canRegister, anniv, opts) {
  opts = opts || {};   // v159: 食べ物レンズ等から場所文脈なしで呼ぶ用（title 差し替え・足跡地図ボタン抑止）
  if (!list || list.length < 2) return;
  if (compareState) closeCompareView();
  const a = list[0].datetime, b = list[list.length - 1].datetime;
  const ya = a.getFullYear(), yb = b.getFullYear();
  const span = (ya === yb) ? tr(`${ya}年`, `${ya}`) : tr(`${ya}〜${yb}年`, `${ya}–${yb}`);
  const overlay = document.createElement('div');
  overlay.className = 'compare-overlay';
  overlay.innerHTML =
    `<div class="cmp-header">` +
      `<div class="cmp-title">${opts.title ? annivEsc(opts.title) : tr('この場所の、あの頃と今', 'This place, then and now')}<span class="cmp-sub"> · ${tr(`${list.length}枚`, `${list.length} photos`)} · ${span}</span></div>` +
      `<div class="cmp-head-btns">` +
        (opts.hideTripMap ? '' : `<button class="cmp-tripmap" type="button">${tr('🗺 足跡の地図', '🗺 Footprint map')}</button>`) +   // v124: 比較からも足跡の地図へ（v159: food は場所文脈外なので隠す）
        (anniv ? `<button class="cmp-log" type="button">${tr('📖 ログ', '📖 Log')}</button>` : '') +   // v127: 思い出の場所由来なら ログへ
        ((circleInfo && canRegister) ? `<button class="cmp-anniv" type="button">${tr('📍 思い出の場所に登録', '📍 Save as memory place')}</button>` : '') +   // v121: 円を名前付き保存 (未登録の時だけ)
        `<button class="cmp-close" type="button">✕</button>` +
      `</div>` +
    `</div>` +
    `<div class="cmp-hint">${tr('左右それぞれ上下にスワイプして時間を行き来。気になる一枚で片方を止め、もう片方を送って見比べる。', 'Swipe each side up/down to move through time. Stop one on a photo that catches your eye, and scroll the other to compare.')}</div>` +
    `<div class="cmp-reels"><div class="cmp-reel" data-side="L"></div><div class="cmp-reel" data-side="R"></div></div>`;
  document.body.appendChild(overlay);
  overlay.querySelectorAll('.cmp-reel').forEach(reel => {
    const frag = document.createDocumentFragment();
    list.forEach(p => {
      const slide = document.createElement('div');
      slide.className = 'cmp-slide';
      slide.innerHTML = `<img src="${thumbUrl(p)}" loading="lazy"><div class="cmp-dt">📅 ${fmtDate(p.datetime)}</div>`;
      frag.appendChild(slide);
    });
    reel.appendChild(frag);
  });
  // 右リールを末尾(最新)へ。左は先頭(最古)のまま＝開いた瞬間に時間の幅が見える。
  // clientHeight×(n-1) で最後のスライド位置へ (scrollHeight 未確定タイミングに左右されない)。
  requestAnimationFrame(() => { const reels = overlay.querySelectorAll('.cmp-reel'); if (reels[1]) reels[1].scrollTop = reels[1].clientHeight * (list.length - 1); });
  compareState = { overlay, circleInfo, anniv: anniv || null };
  overlay.querySelector('.cmp-close').addEventListener('click', closeCompareView);
  const tripDayKeys = [...new Set(list.map(dayKeyOf))];   // v124: この一帯の全訪問日
  const tmBtn = overlay.querySelector('.cmp-tripmap');
  if (tmBtn) tmBtn.addEventListener('click', () => { closeCompareView(); showTripsMap(tripDayKeys, anniv || null); });   // v159: hideTripMap 時はボタン無し
  const logBtn = overlay.querySelector('.cmp-log');   // v127: 比較 → 思い出の場所ログ
  if (logBtn) logBtn.addEventListener('click', () => { closeCompareView(); openAnnivTimeline(anniv); });
  const annivBtn = overlay.querySelector('.cmp-anniv');
  if (annivBtn) annivBtn.addEventListener('click', () => {
    registerAnniversary(circleInfo, list, () => { annivBtn.textContent = tr('✓ 思い出の場所に登録', '✓ Registered'); annivBtn.disabled = true; });
  });
}
function closeCompareView() {
  if (!compareState) return;
  compareState.overlay.remove();
  compareState = null;
}
window.addEventListener('keydown', (e) => { if (e.key === 'Escape' && compareState) closeCompareView(); });

// ============================================================
// 思い出の場所 (v121) — このアプリ初の「ユーザーが能動的に作り名前をつける、写真から派生しない持続オブジェクト」。
//   囲む(円)プリミティブを保存して使い回す器＝「この場所に、過去の自分が積もっていく」。
//   過去半分だけが あの日 の中に住む(純粋・ローカル)。未来(カレンダー書き出し)は native フェーズで別途。
//   ⚠ spike の curation 境界(⭐お気に入りは作らない)を自覚的にまたぐ判断 (Notion WHY に決定として記録)。
// ============================================================
function annivEsc(s) { return String(s == null ? '' : s).replace(/[&<>"]/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[c])); }
function annivThumb(photoId) { const p = photoId ? photoById(photoId) : null; return p ? thumbUrl(p) : ''; }
function lastVisitDate(a) { return (a.visits && a.visits.length) ? a.visits[a.visits.length - 1].date : ''; }
function annivYearSpan(a) {
  if (!a.visits || !a.visits.length) return '';
  const ya = a.visits[0].date.slice(0, 4), yb = a.visits[a.visits.length - 1].date.slice(0, 4);
  return ya === yb ? `${ya}年` : `${ya}〜${yb}年`;
}
// 円内写真(昇順)を「日」ごとにまとめて訪問リストに (昔→今)。各訪問に代表写真 id を数枚持つ。
function visitsFromPhotos(list) {
  const byDay = new Map();
  for (const p of list) { const dk = dayKeyOf(p); if (!byDay.has(dk)) byDay.set(dk, []); byDay.get(dk).push(p); }
  const visits = [];
  for (const [dk, ps] of byDay) {
    ps.sort((a, b) => a.datetime - b.datetime);
    const d = ps[0].datetime;
    const date = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    visits.push({ dayKey: dk, date, memo: '', photoIds: ps.slice(0, 4).map(p => p.id) });
  }
  visits.sort((a, b) => a.date < b.date ? -1 : a.date > b.date ? 1 : 0);   // 昔→今
  return visits;
}

// ============================================================
// 思い出の場所は「複数の場所（円）を積める器」(v143)。移転など座標が変わっても、場所の同一性は
// 1つの思い出の場所として続く。旧レコード(center/radius 単一)は circlesOf で1円に正規化して読む。
// center/radius は circles[0] の別名として残す（後方互換・地図センタリング等の保険）。
// ============================================================
function circlesOf(a) {
  if (a && a.circles && a.circles.length) return a.circles;
  if (a && a.center) return [{ center: a.center, radius: a.radius }];
  return [];
}
// 点がこの思い出の場所のどれかの円に入るか。
function annivContains(a, lat, lng) {
  return circlesOf(a).some(c => c.center && haversine(lat, lng, c.center.lat, c.center.lng) <= c.radius);
}
// この思い出の場所の全写真 = 全円の和集合（id 重複除去・時刻昇順）。live（新しく撮った写真も拾う）。
function photosInAnniv(a) {
  const seen = new Set(); const out = [];
  for (const c of circlesOf(a)) {
    if (!c.center) continue;
    for (const p of photosInCircle(c.center.lat, c.center.lng, c.radius)) {
      if (!seen.has(p.id)) { seen.add(p.id); out.push(p); }
    }
  }
  out.sort((x, y) => x.datetime - y.datetime);
  return out;
}
// 円を1つ足す（移転など）。circles に集約し、center/radius は primary(=先頭)のまま維持。
function annivAddCircle(a, ci) {
  a.circles = circlesOf(a).slice();
  a.circles.push({ center: { lat: ci.lat, lng: ci.lng }, radius: ci.radius });
}
// fresh 訪問をマージ（昔→今）。同じ日(dayKey)が既にあれば、その訪問に新しい場所の代表写真を
// 統合する（v143fix: 移転などで同じ日に別の場所を足しても、タイムラインにその写真が載るように。
// 以前は同日を丸ごとスキップ＝比べる[全円ライブ]には出るのにタイムライン[visits スナップ]に出ない差が出ていた）。
function mergeVisits(a, fresh) {
  const byDay = new Map((a.visits || []).map(v => [v.dayKey, v]));
  for (const nv of fresh) {
    const ex = byDay.get(nv.dayKey);
    if (ex) ex.photoIds = [...new Set([...(ex.photoIds || []), ...(nv.photoIds || [])])].slice(0, 8);   // 同じ日＝写真を統合(重複除去・上限8)
    else byDay.set(nv.dayKey, nv);                                                                       // 新しい日＝訪問を追加
  }
  a.visits = [...byDay.values()].sort((x, y) => x.date < y.date ? -1 : x.date > y.date ? 1 : 0);
}

// 比較ビュー/囲む から「📍 思い出の場所に登録」。v143: 自動吸収をやめ、重なり時は必ず選ばせる
// （◯◯に足す / 新規）＋「移転など：既存の場所に足す」も同じモーダルで選べる。
async function registerAnniversary(circleInfo, list, onDone) {
  if (!circleInfo || !list || !list.length) return;
  let all = [];
  try { all = await annivGetAll(); } catch {}
  const fresh = visitsFromPhotos(list);
  const overlaps = all.filter(a => annivContains(a, circleInfo.lat, circleInfo.lng));
  const choice = await promptAnnivRegister(circleInfo, all, overlaps);
  if (!choice) return;   // キャンセル
  const save = async (a) => { try { await annivPut(a); return true; } catch (e) { logErr(tr(`思い出の場所の保存: ${e?.message || e}`, `Failed to save memory place: ${e?.message || e}`)); return false; } };
  if (choice.kind === 'add') {              // 重なった既存に訪問を積む（点は既にその円内）
    const a = choice.anniv; mergeVisits(a, fresh);
    if (!await save(a)) return;
    logInfo(tr(`📍「${a.name}」に追加（訪問 ${a.visits.length}回）`, `📍 Added to “${a.name}” (${a.visits.length} visits)`));
    if (onDone) onDone(a);
  } else if (choice.kind === 'attach') {    // 移転など：離れた場所を既存の思い出の場所にもう1つの円として足す
    const a = choice.anniv; annivAddCircle(a, circleInfo); mergeVisits(a, fresh);
    if (!await save(a)) return;
    logInfo(tr(`📍「${a.name}」に別の場所を追加（場所 ${circlesOf(a).length}／訪問 ${a.visits.length}回）`, `📍 Added a place to “${a.name}” (${circlesOf(a).length} places / ${a.visits.length} visits)`));
    if (onDone) onDone(a);
  } else {                                  // 新しい場所＝名前をつけて登録
    const name = choice.name;
    const c = { center: { lat: circleInfo.lat, lng: circleInfo.lng }, radius: circleInfo.radius };
    const rec = { id: crypto.randomUUID(), name: name || tr('この場所', 'This place'), center: c.center, radius: c.radius, circles: [c], created: Date.now(), visits: fresh };
    if (!await save(rec)) return;
    logInfo(tr(`📍 思い出の場所「${rec.name}」を登録（訪問 ${rec.visits.length}回）`, `📍 Saved memory place “${rec.name}” (${rec.visits.length} visits)`));
    if (onDone) onDone(rec);
  }
}

// v143: 登録の選択モーダル。重なり(overlaps)があれば「◯◯に足す」を並べ、常に「新規(名前)」、
// 他に思い出の場所があれば「移転など：既存に足す(select)」も出す。returns {kind,anniv?,name?}|null。
function promptAnnivRegister(ci, all, overlaps) {
  return new Promise(resolve => {
    const others = all.filter(a => !overlaps.includes(a));
    const modal = document.createElement('div');
    modal.className = 'ai-modal anniv-z';
    let h = `<div class="ai-modal-card"><h2>${tr('📍 この場所を思い出の場所に', '📍 Save this place')}</h2>`;
    if (overlaps.length) {
      h += `<p>${tr('この場所は既存の思い出の場所と重なっています。積み重ねる？ それとも別の場所として登録する？', 'This place overlaps an existing memory place. Add to it, or save as a separate place?')}</p>`;
      h += `<div class="anniv-choice-list">` + overlaps.map((a, i) =>
        `<button class="anniv-choice" data-add="${i}">${tr(`「${annivEsc(a.name)}」に足す`, `Add to “${annivEsc(a.name)}”`)}</button>`).join('') + `</div>`;
      h += `<div class="anniv-or">${tr('または', 'or')}</div>`;
    }
    h += `<label class="anniv-new-label">${tr('新しい思い出の場所にする', 'Save as a new memory place')}</label>`;
    h += `<input type="text" class="anniv-name-input" maxlength="40" placeholder="${tr('場所の名前（例: ◯◯のカフェ）', 'Place name (e.g. the café at ◯◯)')}">`;
    h += `<button class="primary anniv-new-btn" type="button">${tr('新規で登録', 'Save as new')}</button>`;
    if (others.length) {
      h += `<div class="anniv-reloc"><div class="anniv-reloc-t">${tr('移転など：既存の場所に足す', 'Moved? Add to an existing place')}</div>`;
      h += `<select class="anniv-reloc-sel"><option value="">${tr('思い出の場所を選ぶ…', 'Choose a memory place…')}</option>` +
        others.map(a => `<option value="${annivEsc(a.id)}">${annivEsc(a.name)}</option>`).join('') + `</select>`;
      h += `<button class="anniv-reloc-btn" type="button">${tr('この場所を足す', 'Add this place')}</button></div>`;
    }
    h += `<button class="anniv-cancel" type="button">${tr('キャンセル', 'Cancel')}</button></div>`;
    modal.innerHTML = h;
    document.body.appendChild(modal);
    const done = (v) => { modal.remove(); resolve(v); };
    modal.querySelectorAll('.anniv-choice').forEach(b => b.addEventListener('click', () => done({ kind: 'add', anniv: overlaps[+b.dataset.add] })));
    modal.querySelector('.anniv-new-btn').addEventListener('click', () => done({ kind: 'new', name: modal.querySelector('.anniv-name-input').value.trim() }));
    modal.querySelector('.anniv-name-input').addEventListener('keydown', e => { if (e.key === 'Enter') done({ kind: 'new', name: e.target.value.trim() }); });
    const rb = modal.querySelector('.anniv-reloc-btn');
    if (rb) rb.addEventListener('click', () => {
      const id = modal.querySelector('.anniv-reloc-sel').value;
      const a = others.find(x => x.id === id);
      if (!a) { logInfo(tr('足したい思い出の場所を選んでください', 'Please choose a memory place to add to')); return; }
      done({ kind: 'attach', anniv: a });
    });
    modal.querySelector('.anniv-cancel').addEventListener('click', () => done(null));
    modal.addEventListener('click', e => { if (e.target === modal) done(null); });
  });
}

// 思い出の場所詳細の「📍 別の場所を追加（移転など）」→ 地図のエンサークルで attach する。
let attachTargetAnniv = null;
function addLocationToAnniv(a) {
  closeAnnivTimeline();
  const start = () => {
    if (!mapState) return;
    attachTargetAnniv = a;   // startEncircleMode の直前でセット（openMapView 後でも消えない）
    startEncircleMode();
    try {
      const span = mapState.encircle && mapState.encircle.banner.querySelector('span');
      if (span) span.textContent = tr(`「${a.name}」に足す場所を囲む`, `Encircle a place to add to “${a.name}”`);
    } catch {}
  };
  if (mapState) start();
  else { openMapView(); setTimeout(start, 350); }   // 地図を開いてから（Leaflet の初期化待ち）
}
// エンサークルからの直接 attach（詳細の「別の場所」経由）。最新レコードを取り直して足す。
async function attachLocationDirect(target, ci, list) {
  let cur = target;
  try { const all = await annivGetAll(); cur = all.find(x => x.id === target.id) || target; } catch {}
  annivAddCircle(cur, ci); mergeVisits(cur, visitsFromPhotos(list));
  try { await annivPut(cur); } catch (e) { logErr(tr(`思い出の場所の保存: ${e?.message || e}`, `Failed to save memory place: ${e?.message || e}`)); return; }
  logInfo(tr(`📍「${cur.name}」に別の場所を追加（場所 ${circlesOf(cur).length}／訪問 ${cur.visits.length}回）`, `📍 Added a place to “${cur.name}” (${circlesOf(cur).length} places / ${cur.visits.length} visits)`));
}

// 名前入力モーダル (比較ビュー z4000 の上に出すため anniv-z)。Promise<string|null> (null=キャンセル)。
function promptAnnivName(initial = '') {
  return new Promise(resolve => {
    const modal = document.createElement('div');
    modal.className = 'ai-modal anniv-z';
    modal.innerHTML =
      `<div class="ai-modal-card">` +
        `<h2>${tr('📍 思い出の場所に登録', '📍 Save as memory place')}</h2>` +
        `<p>${tr('この場所に名前をつけてください（例: いつもの公園、◯◯のカフェ）。', 'Give this place a name (e.g. Our usual park, the café at ◯◯).')}</p>` +
        `<input type="text" class="anniv-name-input" maxlength="40" placeholder="${tr('場所の名前', 'Place name')}">` +
        `<div class="actions"><button id="anNameCancel">${tr('キャンセル', 'Cancel')}</button><button class="primary" id="anNameSave">${tr('保存', 'Save')}</button></div>` +
      `</div>`;
    document.body.appendChild(modal);
    const input = modal.querySelector('.anniv-name-input');
    input.value = initial || '';
    setTimeout(() => { try { input.focus(); } catch {} }, 50);
    const done = (val) => { modal.remove(); resolve(val); };
    modal.querySelector('#anNameSave').addEventListener('click', () => done(input.value.trim()));
    modal.querySelector('#anNameCancel').addEventListener('click', () => done(null));
    modal.addEventListener('click', e => { if (e.target === modal) done(null); });
    input.addEventListener('keydown', e => { if (e.key === 'Enter') done(input.value.trim()); });
  });
}

// 思い出の場所モーダル群 (一覧 / 詳細)。複数重なるので配列で管理し一括クローズ。
let annivModals = [];
function closeAnnivModals() { annivModals.forEach(m => m.remove()); annivModals = []; }
async function openAnnivList() {
  let all = [];
  try { all = await annivGetAll(); } catch (e) { logErr(tr(`思い出の場所の読み込み: ${e?.message || e}`, `Failed to load memory places: ${e?.message || e}`)); }
  all.sort((a, b) => lastVisitDate(b).localeCompare(lastVisitDate(a)));   // 直近の訪問が新しい順
  const modal = document.createElement('div');
  modal.className = 'ai-modal anniv-z';
  let body;
  if (!all.length) {
    body = `<p class="anniv-empty">${tr('まだ思い出の場所がありません。<br>地図で一帯を囲み、比較ビューの「📍 思い出の場所に登録」から作れます。<br><small>同じ場所に毎年通うほど、訪問が積もっていきます。</small>', 'No memory places yet.<br>Encircle an area on the map, then create one from “📍 Save as memory place” in the compare view.<br><small>The more you return to the same place each year, the more visits accumulate.</small>')}</p>`;
  } else {
    body = `<div class="anniv-list">` + all.map(a => {
      const t = annivThumb((a.visits[a.visits.length - 1] || {}).photoIds && a.visits[a.visits.length - 1].photoIds[0]);
      const span = annivYearSpan(a);
      return `<div class="anniv-row-wrap">` +   // v172: 左スワイプで「削除」（scroll-snap）
        `<div class="anniv-row" data-id="${a.id}">` +
          `<div class="anniv-row-main">` +
            (t ? `<img class="anniv-row-thumb" src="${t}">` : `<div class="anniv-row-thumb noimg">📍</div>`) +
            `<div class="anniv-row-info"><div class="anniv-row-name">${annivEsc(a.name)}</div>` +
            `<div class="anniv-row-sub">${tr(`訪問 ${a.visits.length}回`, `${a.visits.length} visit(s)`)}${span ? ` · ${span}` : ''}</div></div>` +
          `</div>` +
        `</div>` +
        `<button class="anniv-row-swdel" data-id="${a.id}" title="${tr('削除', 'Delete')}">${tr('削除', 'Delete')}</button></div>`;
    }).join('') + `</div>`;
  }
  modal.innerHTML = `<div class="ai-modal-card"><h2>${tr('📍 思い出の場所', '📍 Memory places')}</h2>${body}<div class="actions"><button class="primary" id="annivClose">${tr('閉じる', 'Close')}</button></div></div>`;
  document.body.appendChild(modal);
  annivModals.push(modal);
  modal.querySelector('#annivClose').addEventListener('click', closeAnnivModals);
  modal.addEventListener('click', e => { if (e.target === modal) closeAnnivModals(); });
  modal.querySelectorAll('.anniv-row-main').forEach(main => main.addEventListener('click', () => {
    const a = all.find(x => x.id === main.parentElement.dataset.id); if (a) { closeAnnivModals(); openAnnivTimeline(a); }   // v127: 一覧→ログ(タイムライン)へ
  }));
  modal.querySelectorAll('.anniv-row-swdel').forEach(del => del.addEventListener('click', async (e) => {
    e.stopPropagation();
    const a = all.find(x => x.id === del.dataset.id); if (!a) return;
    if (!confirm(tr(`思い出の場所「${a.name}」を削除しますか？（写真は消えません）`, `Delete the memory place “${a.name}”? (Photos are not deleted.)`))) return;
    try { await annivDelete(a.id); } catch (err) { logErr(`削除失敗: ${err?.message || err}`); }
    closeAnnivModals(); openAnnivList();
  }));
}

// 円/思い出の場所の写真を deck (showFullImage) で開く共通入口。cap から 比較/足跡の地図/(思い出の場所なら)ログ/(canRegister なら)登録 へ。
// 囲む(v120)後も 思い出の場所タップ(v122)と同じ動線にする＝違いは canRegister の「📍思い出の場所に登録」ボタンだけ (v124)。anniv 付きなら📖ログ (v126)。
function openAnnivDeck(list, circleInfo, canRegister, onClose, anniv) {
  if (!list || !list.length) return;
  const dayKeys = [...new Set(list.map(dayKeyOf))];
  showFullImage(list[0], { list, index: 0, annivCtx: { list, circleInfo, dayKeys, canRegister: !!canRegister, anniv: anniv || null }, onClose: onClose || null });
}

// v151: 囲んだ結果を「未登録のまま」ログ(タイムライン)で見る。円+写真から一時的な思い出の場所を作り、
//   既存の openAnnivTimeline を再利用（_transient で編集系＝メモ/基準日/代表写真/続き を隠し、代わりに
//   「📍思い出の場所に登録」を出す）。登録すると本物のログ（編集可）で開き直す。
function openEncircleTimeline(list, ci) {
  if (!list || list.length < 2 || !ci) return;
  const c = { center: { lat: ci.lat, lng: ci.lng }, radius: ci.radius };
  const transient = { id: null, name: tr('囲んだ場所', 'Encircled area'), center: c.center, radius: c.radius,
                      circles: [c], visits: visitsFromPhotos(list), _transient: true, _ci: ci, _list: list };
  openAnnivTimeline(transient);
}

// v153/v154: トップの「📍 いまの場所」＝ アプリを開いて最短手順で「現在地まわりの思い出」まで行く動線。
//   現在地に寄せて青ドット＋円を出し、v154 で半径をユーザーが選べるようにした（店＝小さく／地域＝大きく）。
//   スライダーでライブに枚数が見えるので「写真が少ない→広げる」も自明（写真が少ない場合の混乱を解消）。
//   位置オフ/スクショ用 build(LOCATION_AVAILABLE=false)ではボタン自体を出さない＝位置許可を求めない。
async function openHereTimeline(btn) {
  if (!LOCATION_AVAILABLE) return;
  if (!navigator.geolocation) { logInfo(tr('この端末は位置情報に未対応です', 'This device doesn’t support location')); return; }
  if (btn) { btn.disabled = true; btn.classList.add('locating'); }
  const done = () => { if (btn) { btn.disabled = false; btn.classList.remove('locating'); } };
  navigator.geolocation.getCurrentPosition(async pos => {
    const { latitude: lat, longitude: lng } = pos.coords;
    if (!mapState) await openMapView();
    done();
    if (!mapState) return;   // 地図ライブラリ読込失敗など
    const map = mapState.map;
    // 現在地に寄せる＋青ドット（flyToCurrentLocation と同じ hereMarker を共有）。
    map.setView([lat, lng], Math.max(map.getZoom() || 0, 15), { animate: true });
    if (mapState.hereMarker) { try { map.removeLayer(mapState.hereMarker); } catch {} }
    const icon = L.divIcon({ className: 'here-marker-wrap', html: '<div class="here-marker"></div>', iconSize: [16, 16], iconAnchor: [8, 8] });
    mapState.hereMarker = L.marker([lat, lng], { icon, interactive: false, zIndexOffset: 1000 }).addTo(map);
    // v154: 自動で開かず、半径をユーザーに選ばせる（円＋スライダー＋ライブ枚数）。
    enterHereRadiusMode(lat, lng);
  }, err => {
    done();
    logInfo((err && err.code === 1)
      ? tr('位置情報が許可されていません（設定で許可すると使えます）', 'Location permission is off (allow it in Settings to use this)')
      : tr('現在地を取得できませんでした', 'Couldn’t get your current location'));
  }, { enableHighAccuracy: true, timeout: 10000, maximumAge: 30000 });
}

// v154: 現在地を中心に半径を選ぶモード。円＋スライダー（100m〜10km・対数）＋ライブ枚数。
//   2枚以上で「この範囲で見る」→ openEncircleTimeline。初期半径＝2枚以上入る最小（開いた瞬間に写真が見える＋調整可）。
const HERE_MIN_R = 100, HERE_MAX_R = 10000;
const hereSliderToRadius = (v) => Math.round(HERE_MIN_R * Math.pow(HERE_MAX_R / HERE_MIN_R, Math.max(0, Math.min(100, v)) / 100));
const hereRadiusToSlider = (r) => Math.round(100 * Math.log(r / HERE_MIN_R) / Math.log(HERE_MAX_R / HERE_MIN_R));
function enterHereRadiusMode(lat, lng) {
  if (!mapState) return;
  endHereRadiusMode();
  const { map, overlay } = mapState;
  if (mapState.closePops) mapState.closePops();

  // 初期半径＝2枚以上入る最小（無ければ 1km から「広げてみて」状態で始まる）
  let initR = 1000;
  for (const r of [400, 800, 1500, 3000, 6000, 10000]) {
    if (photosInCircle(lat, lng, r).length >= 2) { initR = r; break; }
  }
  const circle = L.circle([lat, lng], { radius: initR, color: '#33c1b0', weight: 2, fillColor: '#33c1b0', fillOpacity: 0.12 }).addTo(map);

  const panel = document.createElement('div');
  panel.className = 'here-panel';
  panel.innerHTML =
    `<div class="here-panel-top"><span class="here-panel-title">📍 ${tr('いまの場所の思い出', 'Memories around here')}</span><button class="here-cancel" type="button">${tr('やめる', 'Cancel')}</button></div>` +
    `<input type="range" class="here-radius" min="0" max="100" step="1" aria-label="${tr('半径', 'Radius')}">` +
    `<div class="here-panel-row"><span class="here-rlabel"></span><span class="here-count"></span></div>` +
    `<button class="here-go" type="button">${tr('この範囲で見る', 'See this range')}</button>` +
    `<div class="here-hint"></div>`;
  overlay.appendChild(panel);

  const slider = panel.querySelector('.here-radius');
  const rlabel = panel.querySelector('.here-rlabel');
  const countEl = panel.querySelector('.here-count');
  const goBtn = panel.querySelector('.here-go');
  const hint = panel.querySelector('.here-hint');
  slider.value = hereRadiusToSlider(initR);

  const fmtR = (r) => (r >= 1000)
    ? tr(`半径 ${(r / 1000).toFixed(r % 1000 === 0 ? 0 : 1)}km`, `${(r / 1000).toFixed(r % 1000 === 0 ? 0 : 1)} km radius`)
    : tr(`半径 ${r}m`, `${r} m radius`);

  function refresh() {
    const r = hereSliderToRadius(+slider.value);
    circle.setRadius(r);
    const n = photosInCircle(lat, lng, r).length;
    rlabel.textContent = fmtR(r);
    countEl.textContent = tr(`${n}枚`, `${n} photos`);
    const ok = n >= 2;
    goBtn.disabled = !ok;
    hint.textContent = ok ? ''
      : (n === 1 ? tr('この範囲には写真が1枚だけ。スライダーを右にして広げてみて。', 'Only 1 photo in this range. Slide right to widen it.')
                 : tr('この範囲には写真がありません。スライダーを右にして広げてみて。', 'No photos in this range. Slide right to widen it.'));
  }
  slider.addEventListener('input', refresh);
  slider.addEventListener('change', () => { try { map.fitBounds(circle.getBounds(), { padding: [60, 60], maxZoom: 16, animate: true }); } catch {} });
  goBtn.addEventListener('click', () => {
    const r = hereSliderToRadius(+slider.value);
    const list = photosInCircle(lat, lng, r);
    if (list.length < 2) return;
    endHereRadiusMode();
    openEncircleTimeline(list, { lat, lng, radius: r });
  });
  panel.querySelector('.here-cancel').addEventListener('click', endHereRadiusMode);

  mapState.hereMode = { panel, circle };
  refresh();
  try { map.fitBounds(circle.getBounds(), { padding: [60, 60], maxZoom: 16, animate: true }); } catch {}
}
function endHereRadiusMode() {
  if (!mapState || !mapState.hereMode) return;
  const hm = mapState.hereMode;
  try { if (hm.circle) mapState.map.removeLayer(hm.circle); } catch {}
  try { hm.panel.remove(); } catch {}
  mapState.hereMode = null;
}

// 思い出の場所の写真リスト: 保存した円で再計算 (新しく撮った写真も拾う=live)。取れなければ保存済み photoId で解決。
async function annivPhotoList(a) {
  let list = photosInAnniv(a);
  if (!list.length) {
    const ids = [...new Set(a.visits.flatMap(v => v.photoIds || []))];
    const ps = [];
    for (const id of ids) { let p = photoById(id); if (!p) { try { p = await dbGet(id); } catch {} } if (p) ps.push(p); }
    ps.sort((x, y) => x.datetime - y.datetime);
    list = ps;
  }
  return list;
}

// 訪問日(複数)を「動線」として地図に (1本タップでその日だけ明るく＋タイムライン連動, v122)。

  if (mapState && mapState.setPick) { mapState.anniv = anniv || null; mapState.setPick(dayKeys, 'days'); if (mapState.closePops) mapState.closePops(); }   // v127: 地図に思い出の場所ログへの動線を持たせる

  const actReg = overlay.querySelector('[data-act="register"]');   // v151: 囲んだ結果を思い出の場所として残す → 登録後は本物のログ(編集可)で開き直す

function renderAnnivTimeline() {

  const body = overlay.querySelector('.atl-body');

  const dateMs = s => { const [y, m, d] = s.split('-').map(Number); return new Date(y, m - 1, d).getTime(); };
  const visits = (a.visits || []).slice().sort((x, y) => x.date > y.date ? -1 : x.date < y.date ? 1 : 0);   // v127: 新しい→古い（現在から過去へ遡る）
  body.innerHTML = '';
  // v147: 表示モード切替（📖ログ=日ごと・メモ / 🖼写真=全写真を時系列でいっぱい）

  if (annivTLState.transient) {   // v151: 未登録の囲み＝一言説明のみ（基準日/メモは登録後に）
    const hint = document.createElement('div'); hint.className = 'atl-thint';

    body.appendChild(hint);
  } else {
    // v129: 基準日バー（任意）。設定すると各日に「N日前／N日後」を表示＝あの日からの隔たりを日数で感じる。

      ? `<span class="atl-base-txt">${tr('🎯 基準日', '🎯 Base date')} <b>${a.baseDate}</b></span><button class="atl-base-edit" type="button">${tr('変更', 'Change')}</button><button class="atl-base-clear" type="button">${tr('解除', 'Clear')}</button>`
      : `<button class="atl-base-set" type="button">${tr('🎯 基準日を設定', '🎯 Set a base date')}</button><span class="atl-base-hint">${tr('各日に「何日前／何日後」を出す', 'Show “N days before/after” on each day')}</span>`;
    body.appendChild(baseBar);

    const bEdit = baseBar.querySelector('.atl-base-edit'); if (bEdit) bEdit.addEventListener('click', () => setAnnivBaseDate(a));
    const bClear = baseBar.querySelector('.atl-base-clear'); if (bClear) bClear.addEventListener('click', async () => { delete a.baseDate; await saveAnniv(a); renderAnnivTimeline(); });
  }
  if (circlesOf(a).length > 1) {   // v143: 移転などで場所が複数積み重なっている印
    const pl = document.createElement('div'); pl.className = 'anniv-places';
    pl.textContent = tr(`📍 ${circlesOf(a).length} か所（移転などで場所が積み重なっています）`, `📍 ${circlesOf(a).length} places (moved / accumulated over locations)`);
    body.appendChild(pl);
  }
  if (!visits.length) { const em = document.createElement('div'); em.className = 'atl-empty'; em.textContent = tr('まだ記録がありません。', 'No records yet.'); body.appendChild(em); }
  visits.forEach((v, idx) => {
    const isFuture = !!v.planned || v.date > today;
    const entry = document.createElement('div');
    entry.className = 'atl-entry' + (isFuture ? ' planned' : '');
    const ids = (v.photoIds || []).filter(id => annivThumb(id));   // サムネが引ける id だけ
    const photosHtml = ids.length ? `<div class="atl-photos">${ids.map(id => `<img src="${annivThumb(id)}" data-id="${id}">`).join('')}</div>` : '';
    // v129: 基準日からの隔たり（何日前／何日後）。基準日そのものは「基準日」。
    let offsetHtml = '';
    if (a.baseDate) {
      const off = Math.round((dateMs(v.date) - dateMs(a.baseDate)) / 86400000);
      offsetHtml = off === 0 ? `<span class="atl-offset base">${tr('基準日', 'Base date')}</span>` : `<span class="atl-offset">${tr(`${Math.abs(off).toLocaleString()}日${off > 0 ? '後' : '前'}`, `${Math.abs(off).toLocaleString()} days ${off > 0 ? 'later' : 'before'}`)}</span>`;
    }
    entry.innerHTML =
      `<div class="atl-date">${v.date}${offsetHtml}${isFuture ? `<span class="atl-badge">${tr('これから', 'Upcoming')}</span>` : ''}</div>` +
      photosHtml +
      (!isFuture && !annivTLState.transient ? `<button class="atl-editphotos" type="button">${tr('🖼 代表写真を選ぶ', '🖼 Choose cover photos')}</button>` : '') +
      (!annivTLState.transient ? `<textarea class="atl-comment" rows="2" placeholder="${isFuture ? tr('この日にしたいこと・行く理由…', 'What you want to do / your reason to go…') : tr('この日のこと・思い出したこと…', 'About this day / what you remembered…')}"></textarea>` : '');
    body.appendChild(entry);
    const ta = entry.querySelector('.atl-comment');
    if (ta) { ta.value = v.memo || ''; ta.addEventListener('change', () => { v.memo = ta.value; saveAnniv(a); }); }   // v151: 未登録(囲み)は memo 欄なし
    const ep = entry.querySelector('.atl-editphotos');
    if (ep) ep.addEventListener('click', () => openVisitPhotoPicker(a, v));
    entry.querySelectorAll('.atl-photos img[data-id]').forEach(im => im.addEventListener('click', () => openAnnivPhotoZoom(a, im.dataset.id)));   // v127: 代表写真タップ→拡大(日にち横断スワイプ)
    if (isFuture) {                                            // 予定は削除できる（過去の訪問は写真由来なので消さない）
      const del = document.createElement('button');
      del.className = 'atl-delplan'; del.type = 'button'; del.textContent = tr('この予定を削除', 'Delete this plan');

        await saveAnniv(a); renderAnnivTimeline();

      entry.appendChild(del);
    }
    // v127: 次(より過去)の訪問との「空き」を高さで可視化＝時間の長さを感じる。長く空いた時ほど間が広がる。
    const nxt = visits[idx + 1];
    if (nxt) {
      const gapMs = dateMs(v.date) - dateMs(nxt.date);
      const days = Math.max(0, Math.round(gapMs / 86400000));
      const h = Math.min(160, Math.max(6, Math.round(18 * Math.log2(1 + days / 20))));
      const gap = document.createElement('div');
      gap.className = 'atl-gap';
      gap.style.minHeight = h + 'px';
      if (days >= 45) gap.innerHTML = `<span class="atl-gap-label">${tr(`${annivEsc(intervalLabel(gapMs))}のあいだ`, `${annivEsc(intervalLabel(gapMs))} apart`)}</span>`;
      body.appendChild(gap);
    }
  });
  if (!annivTLState.transient) {   // v151: 「＋あの日の続き」(未来の予定)は保存が要る＝登録後のみ
    const add = document.createElement('button');
    add.className = 'atl-add'; add.type = 'button';
    add.textContent = tr('＋ あの日の続き', '＋ Continue that day');
    add.addEventListener('click', () => addPlannedEntry(a));

}
// v147/v148: 「⇆ 比べる」共通（写真タブのバー内から呼ぶ＝写真を見る操作として自然な位置に）。

// v147: 写真モード — この思い出の場所の全写真を「新しい→古い」の時系列グリッドでいっぱい表示。
// 月見出しで時の流れを可視化・小/大トグル・タップで全画面スワイプ(既存 openAnnivPhotoZoom)。
const _annivMonJa = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
const _annivMonEn = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

// 間隔ラベル（久しぶり感を出す）。v152: 英語UIで単位が日本語のまま残っていた（"2.0年 apart"）→ tr() でロケール対応＋英語は複数形。
function intervalLabel(ms) {
  const days = Math.round(ms / 86400000);
  if (days < 45) return tr(`${days}日`, `${days} day${days === 1 ? '' : 's'}`);
  const months = Math.round(days / 30.4);
  if (months < 18) return tr(`${months}ヶ月`, `${months} month${months === 1 ? '' : 's'}`);
  const years = days / 365.25;
  const y = years.toFixed(years < 10 ? 1 : 0);
  return tr(`${y}年`, `${y} year${y === '1' ? '' : 's'}`);
}
// ログの代表写真タップ → 思い出の場所内の写真を日にち横断で左右スワイプできる拡大表示。閉じるとログへ戻る。
function openAnnivPhotoZoom(a, photoId) {

  const savedMode = (annivTLState && annivTLState.mode) || 'log';   // v147: 全画面から戻ったら同じモードへ
  const idx = full.findIndex(p => p.id === photoId);
  closeAnnivTimeline();   // deck(z2000) はログ(z5000)より下＝先にログを閉じる
  const reopen = () => { openAnnivTimeline(a); if (annivTLState && savedMode !== 'log') { annivTLState.mode = savedMode; renderAnnivTimeline(); } };
  if (idx >= 0) showFullImage(full[idx], { list: full, index: idx, onClose: reopen });
  else { const p = photoById(photoId); if (p) showFullImage(p, { onClose: reopen }); else reopen(); }

// 代表写真を選ぶ（その日の円内写真から・最大6枚・時刻順）。自動選択(登録時 photoIds)を手動で変更可能。
function openVisitPhotoPicker(a, visit) {

  if (!cands.length) { logInfo(tr('この日の写真が見つかりませんでした', 'No photos found for this day')); return; }
  const sel = new Set(visit.photoIds || []);

// 除外: excluded フラグを立てて永続化 (非破壊、blob は残す)。表示は filter で消える。
// 直後にトーストで取り消し可能。
// 描画を先 / DB 保存は後 (保存失敗でも UX をブロックしない、メモリ状態が真実)
async function excludePhoto(photo) {
  photo.excluded = true;
  showUndoToast(photo);
  if (state === 'explore' && currentCenter && currentCenter.id === photo.id) {
    drawRandom();  // 中心を除外 → 別の3枚へ
  } else {
    render();      // 除外写真は filter で消える
  }
  if (mapState && mapState.refreshData) mapState.refreshData();   // 地図が開いていればマーカー/タイムラインから消す (v61)
  try { await dbPut(photo); } catch (e) { logErr(tr(`除外保存失敗: ${e?.message || String(e)}`, `Failed to save exclusion: ${e?.message || String(e)}`)); }
}

async function undoExclude(photo) {
  photo.excluded = false;
  render();
  if (mapState && mapState.refreshData) mapState.refreshData();   // 地図が開いていれば戻す (v61)
  try { await dbPut(photo); } catch (e) { logErr(tr(`取消保存失敗: ${e?.message || String(e)}`, `Failed to save undo: ${e?.message || String(e)}`)); }
}

let toastEl = null, toastTimer = null;
function showUndoToast(photo) {
  hideToast();
  const t = document.createElement('div');
  t.className = 'toast';
  const span = document.createElement('span');
  span.textContent = tr('1枚を除外しました', 'Excluded 1 photo');
  const btn = document.createElement('button');
  btn.textContent = tr('取り消す', 'Undo');
  btn.addEventListener('click', () => { hideToast(); undoExclude(photo); });
  t.appendChild(span);
  t.appendChild(btn);
  document.body.appendChild(t);
  toastEl = t;
  toastTimer = setTimeout(hideToast, 5000);
}
function hideToast() {
  if (toastTimer) { clearTimeout(toastTimer); toastTimer = null; }
  if (toastEl) { toastEl.remove(); toastEl = null; }
}
