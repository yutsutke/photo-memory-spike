// 削除（除外）した写真の一覧モーダル (v48): ✕ で除外した写真を後からまとめて見て、戻せる。
// 既存の excluded フラグ + undoExclude を流用 (新ストア/新フラグ不要)。
function openExcludedModal()  { excludedModalOpen = true;  render(); }
function closeExcludedModal() { excludedModalOpen = false; render(); }

async function restoreAllExcluded() {
  const list = allPhotos.filter(p => p.excluded);
  for (const p of list) p.excluded = false;
  render();
  for (const p of list) { try { await dbPut(p); } catch (e) { logErr(`復元保存失敗: ${e?.message || e}`); } }
}

function renderExcludedModal() {
  const old = document.getElementById('excludedModal');
  if (old) old.remove();
  if (!excludedModalOpen) return;

  const excluded = allPhotos.filter(p => p.excluded);
  const modal = document.createElement('div');
  modal.className = 'ai-modal';
  modal.id = 'excludedModal';
  modal.addEventListener('click', (e) => { if (e.target === modal) closeExcludedModal(); });

  const card = document.createElement('div');
  card.className = 'ai-modal-card';

  const h2 = document.createElement('h2');
  h2.textContent = `🗑 削除した写真 (${excluded.length})`;
  card.appendChild(h2);

  const desc = document.createElement('p');
  desc.textContent = '✕ で「もう出さない」にした写真です。「戻す」で連想に復活します。';
  card.appendChild(desc);

  if (excluded.length === 0) {
    const e0 = document.createElement('p');
    e0.style.color = '#888';
    e0.textContent = '削除した写真はありません。';
    card.appendChild(e0);
  } else {
    const grid = document.createElement('div');
    grid.className = 'trash-grid';
    for (const photo of excluded) {
      const cell = document.createElement('div');
      cell.className = 'trash-cell';
      const img = document.createElement('img');
      img.src = thumbUrl(photo);   // URL は握らず都度取得 (iOS の revoke 後も render で回復)
      img.loading = 'lazy';
      const btn = document.createElement('button');
      btn.textContent = '戻す';
      btn.addEventListener('click', () => undoExclude(photo));  // render() で一覧から消える
      cell.appendChild(img);
      cell.appendChild(btn);
      grid.appendChild(cell);
    }
    card.appendChild(grid);
  }

  const actions = document.createElement('div');
  actions.className = 'actions';
  if (excluded.length > 1) {
    const allBtn = document.createElement('button');
    allBtn.textContent = 'すべて戻す';
    allBtn.addEventListener('click', restoreAllExcluded);
    actions.appendChild(allBtn);
  }
  const closeBtn = document.createElement('button');
  closeBtn.className = 'primary';
  closeBtn.textContent = '閉じる';
  closeBtn.addEventListener('click', closeExcludedModal);
  actions.appendChild(closeBtn);
  card.appendChild(actions);

  modal.appendChild(card);
  document.body.appendChild(modal);
}

// AI モーダル (Phase 2 pilot エントリ)。document.body に独立 overlay として出す。
// state には依存しない (任意の画面から開閉できる)。
function openAIModal()  { aiModalOpen = true;  render(); }
function closeAIModal() { aiModalOpen = false; render(); }

function renderAIModal() {
  // 既存のモーダルがあれば一旦消す (再描画のたびに作り直す)
  const old = document.getElementById('aiModal');
  if (old) old.remove();
  if (!aiModalOpen) return;

  const total = allPhotos.length;
  const done = aiEmbeddedCount();
  const remain = allPhotos.filter(p => visible(p) && !p.embedding).length;
  const room = Math.max(0, MEANING_SAMPLE_CAP - done);   // 標本上限までの残り枠 (v27)
  const toAnalyze = Math.min(remain, room);              // 次に解析する枚数 (上限超えはランダム間引き)
  const capped = total > MEANING_SAMPLE_CAP;             // 上限を超える規模か (間引きが効く)

  const modal = document.createElement('div');
  modal.className = 'ai-modal';
  modal.id = 'aiModal';
  // 背景タップで閉じる (進行中は閉じない=誤タップ救済)
  modal.addEventListener('click', (e) => { if (e.target === modal && !aiExtracting && !aiLoading) closeAIModal(); });

  const card = document.createElement('div');
  card.className = 'ai-modal-card';

  let body = `<h2>🧠 AI で「意味の近傍」を引く</h2>`;

  if (aiLoading || aiExtracting) {
    // 進行中
    const pct = aiStatus && aiStatus.total ? Math.round(100 * aiStatus.done / aiStatus.total) : 0;
    body += `
      <p>${aiStatus?.msg || '処理中…'}</p>
      <div class="stat">${aiStatus?.done ?? 0} / ${aiStatus?.total ?? '?'}</div>
      <div class="bar"><div style="width:${pct}%"></div></div>
      <p style="font-size:11px;color:#888;">画面を閉じても処理は続きます (ヘッダに 🧠 進捗)。タブを背景にすると iOS は処理を遅らせます。</p>
    `;
  } else {
    // 待機 / 完了
    body += `
      <p>「色」「時空」と並ぶ 3 つ目の連想軸として、CLIP モデルで写真の <b>意味</b> (被写体・シーン) を埋め込み、コサイン類似で近傍を引きます。explore のモード切替に「🧠 意味」が出ます。</p>
      <div class="stat">解析済み: ${done.toLocaleString()} 枚 ${capped ? `/ 標本上限 ${MEANING_SAMPLE_CAP.toLocaleString()} (全 ${total.toLocaleString()} 枚中)` : `/ ${total} 枚 ${remain > 0 ? `(未解析 ${remain})` : '(全件解析済)'}`}</div>
      ${capped ? `<p style="font-size:11px;color:#888;">枚数が多いので意味解析は <b>${MEANING_SAMPLE_CAP.toLocaleString()} 枚のランダム標本</b>に間引きます (発熱・時間対策)。色・時空・ランダム引きは全 ${total.toLocaleString()} 枚を使います。</p>` : ''}
      ${done > 0 ? `<p style="font-size:11px;color:#888;">explore で写真をタップ → モード「🧠 意味」で確認。</p>` : ''}
      ${aiLastError ? `<p style="color:#f88;font-size:11px;">エラー: ${aiLastError}</p>` : ''}
      <p style="font-size:11px;color:#888;">初回はモデル DL (~100MB)。Wi-Fi 推奨。抽出自体は速いです。</p>
      <p style="font-size:11px;color:#6fce92;">🔒 解析も端末内。写真はどこにもアップロード・送信されません (DL するのは AI モデルだけ)。</p>
    `;
  }

  card.innerHTML = body;

  const actions = document.createElement('div');
  actions.className = 'actions';
  if (aiLoading || aiExtracting) {
    const closeBtn = document.createElement('button');
    closeBtn.textContent = '閉じる (処理は続く)';
    closeBtn.addEventListener('click', closeAIModal);
    actions.appendChild(closeBtn);
    if (aiExtracting) {
      // 中断ボタン (DL 中は中断できない、抽出ループ中のみ)
      const cancelBtn = document.createElement('button');
      cancelBtn.textContent = '中断';
      cancelBtn.addEventListener('click', () => { aiCancel = true; });
      actions.appendChild(cancelBtn);
    }
  } else {
    const closeBtn = document.createElement('button');
    closeBtn.textContent = '閉じる';
    closeBtn.addEventListener('click', closeAIModal);
    const runBtn = document.createElement('button');
    runBtn.className = 'primary';
    // v27: 解析対象は「標本上限までの残り枠」。上限超え分は間引く (= toAnalyze)。
    runBtn.textContent = toAnalyze > 0 ? `${toAnalyze.toLocaleString()} 枚を解析` : (room === 0 ? '標本上限に到達' : '解析完了');
    runBtn.disabled = (toAnalyze === 0);
    runBtn.addEventListener('click', () => { runEmbeddingExtraction(room); });  // room 枠だけ (シャッフル済=ランダム標本)
    actions.appendChild(closeBtn);
    actions.appendChild(runBtn);
  }
  card.appendChild(actions);

  modal.appendChild(card);
  document.body.appendChild(modal);
}

// ヘッダの ♻️ (削除/除外した写真を戻す入口)。0 のときは隠す ([[ui-minimalism-works]] 使う時だけ広がる)。
// v52: 連想ウォーク中に件数が目に入るのが余計、との指摘で数値は出さずアイコンのみ (件数は一覧モーダル側で見える)。
function updateTrashBtn() {
  const el = document.getElementById('btnTrash');
  if (!el) return;
  const n = allPhotos.reduce((a, p) => a + (p.excluded ? 1 : 0), 0);
  if (n > 0) { el.textContent = '♻️'; el.classList.remove('hidden'); }
  else el.classList.add('hidden');
}

function render() {
  $main.innerHTML = '';
  const activeCount = allPhotos.reduce((n, p) => n + (visible(p) ? 1 : 0), 0);
  $count.textContent = activeCount > 0 ? `${activeCount} 枚` : '— 枚';
  renderAIModal();    // モーダルは独立 (state に依存しない overlay)
  renderInfoModal();  // 使い方・注意モーダル (v38)
  renderExcludedModal();  // 削除（除外）一覧モーダル (v48)
  updateTrashBtn();       // ヘッダの ♻️N (除外数) を更新

  if (state === 'loading') {
    $main.innerHTML = `<p style="text-align:center;color:#888;margin-top:40px;">読み込み中…</p>`;
    return;
  }

  if (state === 'empty') {
    // ネイティブ (Capacitor) のときは「ライブラリ全体から始める」を主役に、web ピッカーは
    // 「数枚で試す」副導線に下げる (核＝偶然/久しぶり/よみがえる の段階導線, v94)。
    const nativeBlock = IS_NATIVE ? `
        <button class="primary" id="emptyNative">📚 写真ライブラリ全体から始める</button>
        <p style="margin:.4em 0;font-size:12px;opacity:.7;">この端末の<b>すべての写真</b>から連想を始めます（端末内だけで処理）。<b>まず数枚で試す</b>なら下のボタンへ。</p>` : '';
    $main.innerHTML = `
      <div class="empty">
        <h2>写真を取り込んで始める</h2>
        <div class="privacy">🔒 <b>写真はこの端末の中だけ。</b>クラウドや外部サーバーにアップロードされません。すべて端末内 (IndexedDB) に保存され、AI 解析も端末内で行います。</div>
        ${nativeBlock}
        <p>まず 20〜30 枚くらい入れて感触を見るのが目安です。</p>
        <button class="${IS_NATIVE ? 'secondary' : 'primary'} import-trigger" id="emptyAdd">📷 ${IS_NATIVE ? '数枚だけ選んで試す' : '画像を取り込む'}</button>
        <p style="margin:.4em 0;font-size:12px;opacity:.7;">押すと <b>ファイル / フォルダー</b> を選べます。撮影日時があればそれを、なければ<b>保存日</b>を使って取り込みます。細かい基準は <b>⚙️ 詳細設定</b> から。</p>
        <button id="emptyIg" style="margin-top:6px;">📦 Instagram / X の zip から取り込む</button>
        <p style="margin:.4em 0;font-size:12px;opacity:.7;">（上級者向け）Instagram「情報をダウンロード」(JSON形式) / X(Twitter) アーカイブの zip。投稿日時を復元します。</p>
      </div>`;
    if (IS_NATIVE) {
      const en = document.getElementById('emptyNative');
      if (en) en.addEventListener('click', () => importNativeLibrary());
    }
    document.getElementById('emptyAdd').addEventListener('click', (e) => openImportMenu(e.currentTarget));
    document.getElementById('emptyIg').addEventListener('click', () => $igzip.click());
    return;
  }

  // picker を開いた瞬間〜change が来るまで。
  // 注: iOS のネイティブ写真ピッカーが前面にいる間はこれは裏に隠れる。
  //     ピッカーが閉じてから change までの隙間でだけ見える (それも出せない区間がある)。
  if (state === 'preparing') {
    $main.innerHTML = `
      <div class="progress" style="text-align:center;">
        <div class="spinner"></div>
        <div class="text">📷 写真を読み込んでいます…</div>
        <div class="text" style="color:#888;font-size:11px;margin-top:6px;">写真が多いと選択後の準備に数十秒かかることがあります</div>
        <div class="text" id="prep-hint" style="color:#e6a23c;font-size:11px;margin-top:8px;"></div>
        <div class="privacy-line">🔒 アップロードではありません。この端末内だけで処理しています</div>
      </div>
      <div class="actions"><button class="secondary" id="cancelPrep">やめる</button></div>`;
    document.getElementById('cancelPrep').addEventListener('click', cancelPicker);
    return;
  }

  if (state === 'importing') {
    $main.innerHTML = `
      <div class="progress">
        <div class="text" id="prog-text">読み込み開始…</div>
        <div class="bar"><div id="prog-bar" style="width:0%"></div></div>
        <div class="privacy-line" style="text-align:center;">🔒 写真はアップロードされません（端末内で処理）</div>
      </div>`;
    return;
  }

  if (state === 'random') {
    // v38: 常時表示していた取り込み注意書きは ℹ️「使い方・注意」へ集約。reminiscence 画面は写真に集中。

    // フィルタチップ (デフォルト 'all' で従来通り完全ランダム)
    const chips = document.createElement('div');
    chips.className = 'filter-chips';
    for (const f of FILTERS) {
      const btn = document.createElement('button');
      btn.className = 'chip' + (currentFilter === f.key ? ' selected' : '');
      btn.textContent = f.label;
      btn.addEventListener('click', () => {
        if (currentFilter === f.key) return;
        currentFilter = f.key;
        drawRandom();
      });
      chips.appendChild(btn);
    }
    $main.appendChild(chips);

    // 母数の脚注 (どのフィルタでも何枚から引いているかを見える化)
    // 副次的に「近場/遠出 は GPS つき写真のみ対象」が自然に伝わる
    const currentFilterObj = FILTERS.find(x => x.key === currentFilter);
    const active = allPhotos.filter(visible);
    const filtered = pickPool(currentFilter, active);
    const gpsCount = active.filter(p => p.lat != null && p.lng != null).length;
    const note = document.createElement('div');
    note.className = 'filter-note';
    if (currentFilterObj?.needsGPS) {
      note.textContent = `${filtered.length} 枚から (GPS付き ${gpsCount} / ${allPhotos.length} 枚)`;
    } else {
      note.textContent = `${filtered.length} 枚から`;
    }
    $main.appendChild(note);

    // 表示は除外を除いた先頭3枚。除外で次が繰り上がり、取り消しで元に戻る (他の2枚は不動)
    const visibleRandom = currentRandom.filter(visible).slice(0, 3);
    if (currentRandom.length === 0) {
      const msg = document.createElement('p');
      msg.style.cssText = 'text-align:center;color:#888;margin:40px 0;';
      if (currentFilter === 'all') {
        msg.textContent = '写真がありません';
      } else if (currentFilterObj?.needsGPS && gpsCount === 0) {
        msg.innerHTML = `GPS情報を持つ写真がありません<br><span style="font-size:11px;color:#666;">「${currentFilterObj.label}」は位置情報がある写真から引きます</span>`;
      } else {
        msg.textContent = `「${currentFilterObj.label}」に該当する写真がありません`;
      }
      $main.appendChild(msg);
    } else if (visibleRandom.length === 0) {
      const msg = document.createElement('p');
      msg.style.cssText = 'text-align:center;color:#888;margin:40px 0;';
      msg.textContent = '全部除外されています。引き直すかフィルタを変えてください。';
      $main.appendChild(msg);
    } else {
      const cards = document.createElement('div');
      cards.className = 'cards';
      visibleRandom.forEach(p => cards.appendChild(makeCard(p, () => showExplore(p))));
      $main.appendChild(cards);
    }

    const actions = document.createElement('div');
    actions.className = 'actions';
    actions.innerHTML = `<button class="primary" id="reroll">🎲 もう一度引く</button>`;
    $main.appendChild(actions);
    document.getElementById('reroll').addEventListener('click', drawRandom);
    return;
  }

  if (state === 'explore') {
    const center = currentCenter;

    const centerEl = document.createElement('div');
    centerEl.className = 'center-card';
    // v51: 座標 (📍 lat,lng) は「🗺 地図でこの場所を見る」が担うので中心カードからは外す
    // (raw 座標は人にとって意味が薄く、連想ウォーク中の写真への集中を逸らす情報だった)。
    centerEl.innerHTML = `<img src="${thumbUrl(center)}">
      <div class="meta">
        <div class="date">${fmtDate(center.datetime)}${srcTagHtml(center)}</div>
      </div>`;
    // 中心カードは tap action なし、長押しでフル画像のみ
    attachPhotoGestures(centerEl, center, null);
    centerEl.appendChild(makeExcludeBtn(center));
    // 地図への導線。GPS があれば「その場所」へ。GPS が無くても日時さえあれば
    // 「その日の地図」へ飛べる (v80: その日に GPS 写真が無くても常に出す＝ユーザー要望。
    // 飛び先で v74 がこの写真を軌跡上の時刻位置に推定配置・GPS 皆無の日でもタイムラインは出る)。
    const centerHasGps = center.lat != null && center.lng != null;
    if (centerHasGps || center.datetime) {
      const mapBtn = document.createElement('button');
      mapBtn.className = 'center-map-btn';
      mapBtn.textContent = centerHasGps ? '🗺 地図でこの場所を見る' : '🗺 この日の地図へ';
      const stop = e => e.stopPropagation();   // 長押し(フル画像)/カードのジェスチャと衝突させない
      mapBtn.addEventListener('pointerdown', stop);
      mapBtn.addEventListener('pointerup', stop);
      mapBtn.addEventListener('pointermove', stop);
      mapBtn.addEventListener('click', (e) => { e.stopPropagation(); openMapView(center); });
      centerEl.querySelector('.meta').appendChild(mapBtn);
      // 位置情報なしの「この日の地図へ」は飛び先に軌跡が無いことがある → 何が出るか一言添える (v81)。
      if (!centerHasGps) {
        const hint = document.createElement('div');
        hint.className = 'center-map-hint';
        hint.textContent = '位置のある写真が無い日でも、その日の写真一覧（タイムライン）が開きます。並びを眺めたり、写真を選んで位置を直すのも想起のきっかけに。';
        centerEl.querySelector('.meta').appendChild(hint);
      }
    }
    $main.appendChild(centerEl);

    // モード切替の開閉 opener (普段は隠し、必要時に展開して軸を固定)
    const modeBar = document.createElement('div');
    modeBar.className = 'mode-toggle';
    const opener = document.createElement('button');
    opener.textContent = modeToggleVisible ? 'モード ▲' : 'モード ▼';
    opener.style.cssText = 'border-color:#333;color:#888;';
    opener.addEventListener('click', () => {
      modeToggleVisible = !modeToggleVisible;
      saveModePrefs();
      render();
    });
    modeBar.appendChild(opener);
    $main.appendChild(modeBar);

    // 展開時のみ ミックス / 時空 / カラー / 意味 を出す
    // 意味モードは embedding を持つ写真が ≥3 枚ある時だけ表示 (Phase 2 pilot)
    if (modeToggleVisible) {
      const toggle = document.createElement('div');
      toggle.className = 'mode-toggle';
      const mkBtn = (mode, label) => {
        const b = document.createElement('button');
        b.textContent = label;
        if (exploreMode === mode) b.classList.add('selected');
        b.addEventListener('click', () => {
          if (exploreMode === mode) return;
          exploreMode = mode;
          saveModePrefs();
          refreshNeighbors();
          render();
        });
        return b;
      };
      toggle.appendChild(mkBtn('mix', '🎲 ミックス'));
      toggle.appendChild(mkBtn('spacetime', '⏳ 時空'));
      toggle.appendChild(mkBtn('color', '🎨 カラー'));
      if (aiEmbeddedCount() >= 3) toggle.appendChild(mkBtn('meaning', '🧠 意味'));
      $main.appendChild(toggle);
    }

    // バックフィル中の注釈 (カラー優先で中心に color が無いケースなど)
    if (backfillStatus && backfillStatus.done < backfillStatus.total) {
      const note = document.createElement('div');
      note.className = 'backfill-note';
      note.textContent = `🌀 色情報を準備中… ${backfillStatus.done} / ${backfillStatus.total}`;
      $main.appendChild(note);
    }

    // ラベル + グリッド
    if (exploreMode === 'color' && !center.color) {
      const label = document.createElement('div');
      label.className = 'neighbor-label';
      label.textContent = 'この写真の色情報がまだありません';
      $main.appendChild(label);
    } else if (exploreMode === 'meaning' && !center.embedding) {
      const label = document.createElement('div');
      label.className = 'neighbor-label';
      label.textContent = 'この写真はまだ AI 解析されていません (🧠 から追加解析)';
      $main.appendChild(label);
    } else {
      const ns = currentNeighbors.filter(visible).slice(0, 6);
      const label = document.createElement('div');
      label.className = 'neighbor-label';
      if (ns.length === 0) {
        label.textContent = '近くに写真がありません';
      } else if (exploreMode === 'color') {
        label.textContent = `色の近く ${ns.length} 枚`;
      } else if (exploreMode === 'spacetime') {
        label.textContent = `この時空の近く ${ns.length} 枚`;
      } else if (exploreMode === 'meaning') {
        label.textContent = `意味の近く ${ns.length} 枚`;
      } else {
        label.textContent = `この写真のまわり ${ns.length} 枚`;
      }
      $main.appendChild(label);

      if (ns.length > 0) {
        const grid = document.createElement('div');
        grid.className = 'grid';
        ns.forEach(p => grid.appendChild(makeThumb(p, () => showExplore(p))));
        $main.appendChild(grid);
      }
    }

    // 足跡 (タップ履歴): 連想ウォークで辿った写真。ウォークをまたいで貯まり、リロードしても残る (最大 MAX_TRAIL 枚、古い順に消える)。
    // = デフォルト体験は最小のまま、歩き始めて初めて広がる ([[ui-minimalism-works]])。
    // モード切替と同じ開閉式: 普段は小さな opener だけ、開いた時にサムネ帯が出る (写真への集中を守る)。
    // 写真そのものを並べる → 思い出しの意識を逸らさない。タップで過去の地点へ戻る。
    const displayTrail = walkTrailIds.map(id => photoById(id)).filter(p => p && visible(p));
    if (displayTrail.length >= 2) {
      const trailBar = document.createElement('div');
      trailBar.className = 'mode-toggle';   // モード opener と同じ見た目・配置
      const trailOpener = document.createElement('button');
      trailOpener.textContent = trailVisible ? '🔖 足跡 ▲' : `🔖 足跡 ${displayTrail.length} ▼`;
      trailOpener.style.cssText = 'border-color:#333;color:#888;';
      trailOpener.addEventListener('click', () => {
        trailVisible = !trailVisible;
        saveModePrefs();
        render();
      });
      trailBar.appendChild(trailOpener);
      $main.appendChild(trailBar);

      if (trailVisible) {
        const trail = document.createElement('div');
        trail.className = 'trail';
        const strip = document.createElement('div');
        strip.className = 'trail-strip';
        displayTrail.forEach(p => {
          const step = document.createElement('div');
          const isHere = center && p.id === center.id;
          step.className = 'trail-step' + (isHere ? ' current' : '');
          step.innerHTML = `<img src="${thumbUrl(p)}" loading="lazy">`;
          if (!isHere) step.addEventListener('click', () => showExplore(p));
          strip.appendChild(step);
        });
        trail.appendChild(strip);
        $main.appendChild(trail);
        // 現在地が見えるようスクロール: 中ほどに戻った時は中央寄せ、末尾なら右端
        const cur = strip.querySelector('.trail-step.current');
        if (cur) {
          const sr = strip.getBoundingClientRect(), cr = cur.getBoundingClientRect();
          strip.scrollLeft += (cr.left - sr.left) - (strip.clientWidth - cr.width) / 2;
        } else {
          strip.scrollLeft = strip.scrollWidth;
        }
      }
    }

    const actions = document.createElement('div');
    actions.className = 'actions';
    actions.innerHTML = `<button class="secondary" id="backRandom">← ランダム3枚に戻る</button>`;
    $main.appendChild(actions);
    document.getElementById('backRandom').addEventListener('click', drawRandom);
    return;
  }
}

// ============================================================
// 画面遷移
// ============================================================
// Progressive Indexing (Phase 1.8):
//   フェーズA = 先頭 FAST_TRACK_COUNT 枚だけ処理 → 即メイン画面へ (待ち時間ここで終了)
//   フェーズB = 残りをバックグラウンドキューで低優先処理 (ユーザーは裏で遊べる)
// 大量投入でも「数枚処理したら遊べる」状態に最速で入る。
const FAST_TRACK_COUNT = 6;     // ランダム3枚 + 予備。これだけ処理したら遊べる
const BG_IMPORT_DELAY  = 220;   // バックグラウンド1枚ごとの間 (ms)。v36: 古い端末の GC 余裕のため少し広げた

// render() 後に1フレーム描画させてから重い処理に入る (進捗画面が見えるように)。
// rAF が発火しない環境 (背景タブ等) でハングしないよう setTimeout の保険を併設。
function nextPaint() {
  return new Promise(r => {
    let done = false;
    const finish = () => { if (!done) { done = true; r(); } };
    requestAnimationFrame(() => requestAnimationFrame(finish));
    setTimeout(finish, 100);
  });
}

// importOne の戻り値を当該セッションの差分集計に加算 (v22)。
function tallyImport(r) {
  if (!importStats) return;
  if (r?.ok) importStats.added++;
  else if (r?.skipped === 'duplicate') importStats.dup++;
  else importStats.skipped++;   // no-datetime 等、取り込めなかったもの
}

// 取り込み完了時に「新規 N / 重複スキップ M」を緑のログで表示 (差分が起きたことの可視化, v22)。
// 「アプリを開くと自動で差分 UP」は web では不可能 → ピッカーで選び直す → 既存はスキップ、を見える化する。
function showImportSummary() {
  if (!importStats) return;
  const { added, dup, skipped, failed, heic } = importStats;
  let msg;
  if (added === 0 && dup > 0 && skipped === 0 && failed === 0) {
    msg = `✓ 新規なし — 選んだ ${dup} 枚はすべて取り込み済みでした`;
  } else {
    const parts = [`✓ 新規 ${added} 枚`];
    if (dup)     parts.push(`既にある分はスキップ ${dup}`);
    if (skipped) parts.push(`日時なしで除外 ${skipped}`);
    if (failed)  parts.push(`失敗 ${failed}`);
    msg = parts.join(' / ');
  }
  if (heic) msg += ` (うち HEIC変換 ${heic})`;  // v37 診断: heic2any を呼んだ枚数 (0 なら表示なし)
  logInfo(msg);
  importStats = null;
}

async function importFiles(files, opts = {}) {
  const fallbackMtime = !!opts.fallbackMtime;   // v46: フォルダ取り込みは保存日で日時補完
  clearTimeout(prepareHintTimer);  // 取り込みに入ったら準備ガイドは不要 (v34)
  importStats = { added: 0, dup: 0, skipped: 0, failed: 0, heic: 0 };  // 差分集計 (v22) + heic2any 呼出数 (v37 診断)
  state = 'importing';
  render();
  await nextPaint();
  const $text = document.getElementById('prog-text');
  const $bar  = document.getElementById('prog-bar');

  // --- フェーズA: 先頭を処理して即メイン画面へ ---
  const fast = files.slice(0, FAST_TRACK_COUNT);
  const rest = files.slice(FAST_TRACK_COUNT);

  const fastAdded = [];
  for (let i = 0; i < fast.length; i++) {
    try {
      const r = await withTimeout(importOne(fast[i], fallbackMtime ? { fallbackMtime: true } : undefined), IMPORT_TIMEOUT_MS, fast[i].name);
      tallyImport(r);
      if (r?.ok && r.record) fastAdded.push(r.record);
    } catch (e) {
      if (importStats) importStats.failed++;
      const stackTop = (e.stack || '').split('\n').find(l => l.trim()) || '';
      logErr(`取込失敗: ${fast[i].name}: ${e.message}  @ ${stackTop.slice(0, 80)}`);
    }
    if ($text) $text.textContent = `読み込み中… ${i+1} / ${fast.length}`;
    if ($bar)  $bar.style.width = `${((i+1)/fast.length*100).toFixed(0)}%`;
  }

  // v28: 全件 dbGetAll で読み直さず、新規分だけ追記 (大量ライブラリに取り込んでも起動級の待ちを出さない)。
  // 既存の allPhotos / thumb URL キャッシュはそのまま有効なので revoke も不要。
  addPhotos(fastAdded);
  if (allPhotos.length === 0) { state = 'empty'; render(); }
  else await drawRandom();

  // --- フェーズB: 残りはバックグラウンドへ (await しない=ユーザーに制御を返す) ---
  // 残りがあれば runBackgroundImport の末尾で backfill→自動 embedding を回す。
  // fast-track だけ (rest 無し) の時はここで色 backfill → AI opt-in 済なら自動 embedding 抽出。
  if (rest.length) {
    enqueueBackground(rest, fallbackMtime);  // 残りの集計とサマリは runBackgroundImport 末尾で
  } else {
    showImportSummary();      // fast-track だけで完結 → ここで差分サマリ
    backfillColors().then(maybeAutoExtractEmbeddings).catch(e => logErr(`backfill: ${e?.message || e}`));
  }
}

// バックグラウンド取り込み: キューに積んで1本のループで低優先消化。
// 再インポートが来たらキューに足すだけ (多重ループを作らない)。
function enqueueBackground(files, fallbackMtime = false) {
  for (const f of files) bgQueue.push({ file: f, fallbackMtime });
  if (!bgRunning) runBackgroundImport();
}

async function runBackgroundImport() {
  bgRunning = true;
  let processed = 0;
  importStatus = { done: 0, total: bgQueue.length };
  updateBgStatus();

  while (bgQueue.length) {
    const { file, fallbackMtime } = bgQueue.shift();
    try {
      const r = await withTimeout(importOne(file, fallbackMtime ? { fallbackMtime: true } : undefined), IMPORT_TIMEOUT_MS, file.name);
      tallyImport(r);
      if (r.ok && r.record) {
        // 表示中の thumb URL を壊さないため revokeAllThumbUrls はしない。
        // 新規レコードだけ in-memory で足す (URL は表示時に lazy 生成される)。addPhotos で id 重複防止 (v28)。
        addPhotos([r.record]);
        // まだ empty 画面なら最初の1枚で random へ
        if (state === 'empty') await drawRandom();
      }
    } catch (e) {
      if (importStats) importStats.failed++;
      logErr(`取込失敗(裏): ${file.name}: ${e.message}`);
    }
    processed++;
    importStatus = { done: processed, total: processed + bgQueue.length };
    updateBgStatus();
    await new Promise(r => setTimeout(r, BG_IMPORT_DELAY));
  }

  bgRunning = false;
  importStatus = null;
  updateBgStatus();
  showImportSummary();  // fast + background の合算で差分サマリを表示 (v22)
  // 新規分は color 付き。古い color 無しレコードがあれば backfill → その後 AI opt-in 済なら
  // 新規写真の embedding を自動抽出 (mix の意味軸を生かし続ける、v20)。
  backfillColors().then(maybeAutoExtractEmbeddings).catch(e => logErr(`backfill: ${e?.message || e}`));
}

// ヘッダの控えめな進捗 (🌀 12/30 取り込み / 🧠 40/300 AI 解析)。完了で消える。
function updateBgStatus() {
  const el = document.getElementById('bgStatus');
  if (el) {
    if (importStatus) {
      el.textContent = `🌀 ${importStatus.done}/${importStatus.total}`;
      el.classList.remove('hidden', 'ai-bg');
    } else if (aiExtracting && aiStatus && aiStatus.phase === 'extract') {
      el.textContent = `🧠 ${aiStatus.done}/${aiStatus.total}`;
      el.classList.remove('hidden');
      el.classList.add('ai-bg');
    } else if (restLoading) {
      el.textContent = `📥 ${allPhotos.length}`;   // 起動後の残り背景読み込み (v28)
      el.classList.remove('hidden', 'ai-bg');
    } else {
      el.classList.add('hidden');
      el.classList.remove('ai-bg');
    }
  }
  const activeCount = allPhotos.reduce((n, p) => n + (visible(p) ? 1 : 0), 0);
  $count.textContent = activeCount > 0 ? `${activeCount} 枚` : '— 枚';
}

// 既存写真で color フィールドが無いものに、保存済み thumb から色彩特徴を計算して付与する。
// 低優先度ループ (1枚 50ms 程度の待ちを挟む) でメイン操作を止めない。
// 二重実行を避けるためフラグを持つ。
let backfillRunning = false;
async function backfillColors() {
  if (backfillRunning) return;
  const missing = allPhotos.filter(p => !p.color);
  if (!missing.length) { backfillStatus = null; return; }

  backfillRunning = true;
  backfillStatus = { done: 0, total: missing.length };
  // explore 表示中ならインジケータを更新
  if (state === 'explore') render();

  // メモリ抑制: thumb を 16x16 に縮小して描画してから getImageData。
  // 4x4 グリッド平均と精度ほぼ同じで、 iOS Safari の Blob ストア圧迫を避ける。
  // (300x300 の thumb をそのまま getImageData だと 135枚 × 90,000px = 1200万ピクセル分のバッファ)
  const TINY = 16;
  const tinyCanvas = document.createElement('canvas');
  tinyCanvas.width = TINY;
  tinyCanvas.height = TINY;
  const tinyCtx = tinyCanvas.getContext('2d');

  for (const p of missing) {
    let url = null;
    try {
      url = URL.createObjectURL(p.thumb);
      const img = await new Promise((resolve, reject) => {
        const im = new Image();
        im.onload = () => resolve(im);
        im.onerror = () => reject(new Error('thumb load failed'));
        im.src = url;
      });
      tinyCtx.clearRect(0, 0, TINY, TINY);
      tinyCtx.drawImage(img, 0, 0, TINY, TINY);
      const color = extractColorFeature(tinyCtx, TINY, TINY);
      const updated = { ...p, color };
      await dbPut(updated);
      const idx = allPhotos.findIndex(x => x.id === p.id);
      if (idx >= 0) allPhotos[idx] = updated;
    } catch (e) {
      console.warn(`[backfill] ${p.name}: ${e.message}`);
    } finally {
      if (url) URL.revokeObjectURL(url);
    }
    backfillStatus.done++;
    await new Promise(r => setTimeout(r, 50));
  }

  // 後始末: iOS Safari がバックフィル中に古い thumb URL を解放してしまっていても
  // 復活させるため、URL キャッシュを破棄して画面を再描画 (?マーク防止)
  revokeAllThumbUrls();
  backfillStatus = null;
  backfillRunning = false;
  if (state === 'random' || state === 'explore') render();
}

// ============================================================
// Phase 2: CLIP embedding による意味の近傍 (opt-in)
// pilot で「意味での手触り最高」と実機検証 → 全件 backfill を主に。
// モデル DL (~100MB) 後の抽出は速い、~300枚まで待ち許容 (実機 signal)。
// ============================================================
const PHASE2_MODEL = 'Xenova/clip-vit-base-patch32';
const PHASE2_CDN   = 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.0.2/dist/transformers.min.js';

let aiExtractor = null;       // transformers pipeline インスタンス (lazy)
let aiLoading   = false;      // モデル DL or init 中
let aiExtracting = false;     // embedding 抽出ループ中
let aiCancel = false;         // 抽出の中断要求
let aiStatus = null;          // { phase: 'dl'|'extract', done, total, msg }
let aiModalOpen = false;      // モーダル表示中フラグ
let aiLastError = null;       // 直近のエラー (モーダルに出す)
let infoModalOpen = false;    // 「使い方・注意」モーダル表示中フラグ (v38)
let excludedModalOpen = false; // 「削除（除外）した写真」一覧モーダル表示中フラグ (v48)

async function loadAIPipeline() {
  if (aiExtractor) return aiExtractor;
  aiLoading = true;
  aiStatus = { phase: 'dl', done: 0, total: 100, msg: 'AI モデル DL 中…' };
  if (aiModalOpen) render();
  try {
    const tx = await import(PHASE2_CDN);
    const { pipeline } = tx;
    aiExtractor = await pipeline('image-feature-extraction', PHASE2_MODEL, {
      progress_callback: (data) => {
        // data: { status, name, file, progress, loaded, total }
        if (data?.status === 'progress' && typeof data.progress === 'number') {
          aiStatus = { phase: 'dl', done: Math.round(data.progress), total: 100, msg: `モデル DL ${data.file || ''} ${Math.round(data.progress)}%` };
          if (aiModalOpen) render();
        }
      }
    });
    return aiExtractor;
  } finally {
    aiLoading = false;
  }
}

async function extractEmbeddingForPhoto(p) {
  const url = URL.createObjectURL(p.thumb);
  try {
    const result = await aiExtractor(url, { pooling: 'mean', normalize: true });
    // Float32Array(512) を期待、Tensor の場合は .data
    return result?.data || result;
  } finally {
    URL.revokeObjectURL(url);
  }
}

// embedding 抽出。limit 未指定なら未解析の全件 (実機検証で ~300枚まで待ち許容と確認)。
// 中断可能 (aiCancel)。閉じても処理継続 (ヘッダ 🧠 N/M で進捗)。
async function runEmbeddingExtraction(limit) {
  if (aiExtracting) return;
  const candidates = allPhotos.filter(p => visible(p) && !p.embedding);
  if (!candidates.length) { aiStatus = null; if (aiModalOpen) render(); return; }

  // シャッフル: 途中で中断しても満遍なく解析されているように
  for (let i = candidates.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [candidates[i], candidates[j]] = [candidates[j], candidates[i]];
  }
  const target = (limit && limit < candidates.length) ? candidates.slice(0, limit) : candidates;

  try {
    await loadAIPipeline();
  } catch (e) {
    aiLastError = e?.message || String(e);
    aiStatus = null;
    if (aiModalOpen) render();
    return;
  }

  aiExtracting = true;
  aiCancel = false;
  aiLastError = null;
  aiStatus = { phase: 'extract', done: 0, total: target.length, msg: '🧠 解析中…' };
  if (aiModalOpen) render();
  updateBgStatus();

  for (const p of target) {
    if (aiCancel) break;
    try {
      const embedding = await extractEmbeddingForPhoto(p);
      const updated = { ...p, embedding };
      await dbPut(updated);
      const idx = allPhotos.findIndex(x => x.id === p.id);
      if (idx >= 0) allPhotos[idx] = updated;
    } catch (e) {
      console.warn(`[ai-extract] ${p.name}: ${e?.message || e}`);
    }
    aiStatus.done++;
    if (aiStatus.done % 3 === 0) { if (aiModalOpen) render(); updateBgStatus(); }
    await new Promise(r => setTimeout(r, 0));
  }

  aiExtracting = false;
  aiCancel = false;
  aiStatus = null;
  try { localStorage.setItem('pms-phase2-tried', '1'); } catch {}
  // 後始末: iOS Safari は CLIP の重い推論中に「表示中サムネの blob URL」を巻き込んで無効化することがある
  // (? 化, CHANGELOG v5/v7 と同じ罠)。backfillColors と同様に URL キャッシュを破棄し、新しい URL で
  // 描き直す。これをしないと解析後に一部サムネが ? のまま残る。
  revokeAllThumbUrls();
  if (state === 'explore') refreshNeighbors();  // 新しい embedding を mix/意味の近傍に反映
  render();                                      // 常に再描画 (modal も renderAIModal で同時に更新される)
  updateBgStatus();
}

function aiEmbeddedCount() {
  return allPhotos.reduce((n, p) => n + (p.embedding ? 1 : 0), 0);
}

// 意味解析 (CLIP) のサンプル上限 (v27, ユーザー案「1万超えたらランダム間引き」)。
// embedding 抽出は最大この枚数の「ランダム標本」で止める (runEmbeddingExtraction はシャッフル済)。
// 重い CLIP だけを代表標本に絞り、発熱・時間が青天井にならないようにする。
// 色 / 時空 / ランダム引き / フィルタは O(N) でも激安なので全件のまま → 「枚数=満足度」は保たれる。
// (これは間引いていいのは "重い処理 = embedding だけ" という切り分けに基づく。)
const MEANING_SAMPLE_CAP = 10000;

// 新規取り込み後の自動 embedding 抽出 (v20)。
// mix の意味軸 ([[mix-walk-works]] v19 で「混ざったほうがおもしろい」と確定) を新しい写真でも生かし続ける。
// ゲート: AI を一度でも使った人 (embedding を 1 枚以上持つ) だけ自動起動。
//   未 opt-in (embedding ゼロ) には一切何もしない = 100MB DL を強制しない (UI 最小干渉の原則)。
// 色 backfill の後にチェーンして呼ぶ (色計算と CLIP 推論を同時に走らせず iOS のメモリ/発熱を抑える)。
// モデルは初回 opt-in 時に DL 済 → Cache Storage から高速復元 (meaning-walk-works の性能 signal)。
async function maybeAutoExtractEmbeddings() {
  if (aiExtracting) return;                                       // 既に解析中なら任せる (多重起動しない)
  if (aiEmbeddedCount() === 0) return;                            // AI 未 opt-in → 何もしない
  const room = MEANING_SAMPLE_CAP - aiEmbeddedCount();
  if (room <= 0) return;                                          // 間引き: サンプル上限に達したら自動解析しない (v27)
  if (!allPhotos.some(p => visible(p) && !p.embedding)) return;  // 未解析の新規写真なし (封印・除外は対象外)
  await runEmbeddingExtraction(room);                             // 残り枠だけ。シャッフル済なのでランダム標本になる
}

async function drawRandom() {
  if (allPhotos.length === 0) { state = 'empty'; render(); return; }
  const filtered = pickPool(currentFilter, allPhotos.filter(visible));
  if (filtered.length === 0) {
    currentRandom = [];  // 該当無し → render(random) 内で専用メッセージ
  } else {
    const pool = filtered.slice();
    for (let i = pool.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [pool[i], pool[j]] = [pool[j], pool[i]];
    }
    currentRandom = pool;  // 全候補を保持。表示は先頭3枚、除外すると次が繰り上がる (取り消しで戻る)
  }
  state = 'random';
  render();
}

function showExplore(photo) {
  // 足跡を更新。連想ウォークをまたいで貯まり、リロードしても残る (localStorage, [[tap-history-wanted]])。
  // 初めての写真は末尾に追加。上限 MAX_TRAIL を超えたら古い順に消える (リングバッファ)。
  // 既に足跡にある写真へ戻る (近傍タップ or 足跡タップ) 時は重複させず順序もそのまま (タップで過去地点に戻れる)。
  if (!walkTrailIds.includes(photo.id)) {
    walkTrailIds.push(photo.id);
    while (walkTrailIds.length > MAX_TRAIL) walkTrailIds.shift();
  }
  currentCenter = photo;
  saveTrail();
  refreshNeighbors();
  state = 'explore';
  render();
}

// 起動時 (v42): 足跡の記憶はそのまま保持しつつ、画面はランダム3枚から始める (ユーザー要望)。
// 足跡の写真を id で先読みしておく (初期ロード窓=ランダム3000件の外にあっても、後で開いた時に strip へ出せる)。
async function restoreOrRandom() {
  const need = walkTrailIds.filter(id => !photoById(id));
  if (need.length) {
    try { addPhotos((await Promise.all(need.map(dbGet))).filter(Boolean)); } catch {}
  }
  walkTrailIds = walkTrailIds.filter(id => photoById(id));   // 削除済み等で解決できない id は落とす
  try { localStorage.setItem('pms-walkTrail', JSON.stringify(walkTrailIds)); } catch {}
  await drawRandom();   // 画面はいつもランダム3枚から
}

// currentCenter + exploreMode から近傍を計算してキャッシュ。
// 中心/モードが変わった時だけ呼ぶ (再描画のたびに mix が再シャッフルされるのを防ぐ)。
function refreshNeighbors() {
  const c = currentCenter;
  if (!c) { currentNeighbors = []; return; }
  // 表示は6枚だが、除外時に繰り上げる候補を確保するため 12 枚キャッシュする
  const active = allPhotos.filter(visible);
  if (exploreMode === 'spacetime') currentNeighbors = spacetimeNeighbors(c, active, 12);
  else if (exploreMode === 'color') currentNeighbors = colorNeighbors(c, active, 12);
  else if (exploreMode === 'meaning') currentNeighbors = meaningNeighbors(c, active, 12);
  else currentNeighbors = mixedNeighbors(c, active, 12);
}

function saveModePrefs() {
  try {
    localStorage.setItem('pms-exploreMode', exploreMode);
    localStorage.setItem('pms-modeToggleVisible', modeToggleVisible ? '1' : '0');
    localStorage.setItem('pms-trailVisible', trailVisible ? '1' : '0');
  } catch {}
}

// picker を開く共通入口。開いた瞬間に「読み込み中」画面へ切り替え、連打を弾く。
// iOS は Done 後にファイル準備で数秒かかる (HEIC 変換等) → その間も画面が変わって見える。
let prepareHintTimer = null;   // 準備が長い時のガイド表示タイマー (v34)
function openPicker() {
  if (importBusy) return;  // 準備中/取り込み中の連打を無視 (多重 open / 多重 change で詰まるのを防ぐ)
  importBusy = true;
  prevStateBeforePicker = state;
  state = 'preparing';
  render();
  $picker.click();
  // v34: OS 側の準備が長い (古い端末で多数選択時など) と無言で回り続けるので、
  // しばらくしたら「少なめに分けて」とガイドを出す (本体処理ではなく iOS 側の待ちなので分割が効く)。
  clearTimeout(prepareHintTimer);
  prepareHintTimer = setTimeout(() => {
    const el = document.getElementById('prep-hint');
    if (state === 'preparing' && el) {
      el.textContent = '準備が長いときは選んだ枚数が多すぎるかも。一度「やめる」で閉じ、10〜20枚ずつに分けると安定します（古い端末で起きやすい）';
    }
  }, 25000);
}

// picker キャンセル時 (ネイティブ cancel イベント or 「やめる」ボタン) に元の画面へ戻す
function cancelPicker() {
  clearTimeout(prepareHintTimer);
  importBusy = false;
  if (state === 'preparing') { state = prevStateBeforePicker; render(); }
}

// 取り込みボタンの小メニュー (ファイル / フォルダ / 詳細設定)。v53: 口を1本化。
// 日時の扱い (保存日フォールバックの有無) は importMode から都度決める。
function openImportMenu(anchor) {
  closeImportMenu();
  const menu = document.createElement('div');
  menu.id = 'importMenu';
  menu.className = 'import-menu';
  menu.innerHTML = `<div class="im-title">画像を取り込む</div>`
    + (IS_NATIVE ? `<button data-mode="native">📚 ライブラリ全体（おすすめ）</button>` : '')
    + `<button data-mode="file">📄 ファイルを選ぶ</button>`
    + `<button data-mode="folder">📁 フォルダーを選ぶ</button>`
    + `<button data-mode="settings" class="im-adv">⚙️ 詳細設定</button>`;
  document.body.appendChild(menu);
  const r = anchor.getBoundingClientRect();
  const w = menu.offsetWidth || 180;
  menu.style.top = `${r.bottom + 4}px`;
  menu.style.left = `${Math.max(6, Math.min(r.left, window.innerWidth - w - 6))}px`;
  const pick = (mode) => {
    closeImportMenu();
    if (mode === 'settings') { openImportSettings(); return; }
    if (mode === 'native') { importNativeLibrary(); return; }   // ネイティブ全ライブラリ取り込み (v94)
    importFallback = (importMode === 'all');   // all=保存日フォールバックあり / exifOnly=EXIF 必須
    if (mode === 'folder') $folder.click(); else openPicker();
  };
  if (IS_NATIVE) menu.querySelector('[data-mode="native"]').addEventListener('click', () => pick('native'));
  menu.querySelector('[data-mode="file"]').addEventListener('click', () => pick('file'));
  menu.querySelector('[data-mode="folder"]').addEventListener('click', () => pick('folder'));
  menu.querySelector('[data-mode="settings"]').addEventListener('click', () => pick('settings'));
  setTimeout(() => document.addEventListener('click', onDocClickForMenu), 0);
}

// 取り込みの詳細設定モーダル (v53)。初心者は触らなくてよい。既定 = すべて取り込み・撮影日優先・無ければ保存日。
function openImportSettings() {
  closeImportMenu();
  const modal = document.createElement('div');
  modal.className = 'ai-modal';
  modal.innerHTML =
    `<div class="ai-modal-card">` +
      `<h2>⚙️ 取り込みの詳細設定</h2>` +
      `<p>初心者の方は変更不要です。<b>既定</b>は「すべての画像を取り込み、<b>撮影日時(EXIF)</b>があればそれを、なければ<b>保存日(最終更新日)</b>を使う」です。</p>` +
      `<div class="imp-opts">` +
        `<label class="imp-opt"><input type="radio" name="impMode" value="all"><span><b>すべての画像を取り込む</b><small>撮影日時があればそれ・なければ保存日（最終更新日）。おすすめ。</small></span></label>` +
        `<label class="imp-opt"><input type="radio" name="impMode" value="exifOnly"><span><b>撮影日時(EXIF)のある画像だけ</b><small>保存日は使わない。日時が確実な写真だけ入れたい人向け。</small></span></label>` +
      `</div>` +
      `<div class="actions"><button class="primary" id="impClose">閉じる</button></div>` +
    `</div>`;
  document.body.appendChild(modal);
  const cur = modal.querySelector(`input[value="${importMode}"]`);
  if (cur) cur.checked = true;
  modal.querySelectorAll('input[name="impMode"]').forEach(rb => rb.addEventListener('change', () => {
    importMode = rb.value;
    try { localStorage.setItem('pms-importMode', importMode); } catch {}
  }));
  const close = () => modal.remove();
  modal.querySelector('#impClose').addEventListener('click', close);
  modal.addEventListener('click', (e) => { if (e.target === modal) close(); });
}
function closeImportMenu() {
  const m = document.getElementById('importMenu');
  if (m) m.remove();
  document.removeEventListener('click', onDocClickForMenu);
}
function onDocClickForMenu(e) {
  if (!e.target.closest('#importMenu') && !e.target.closest('.import-trigger')) closeImportMenu();
}

document.getElementById('btnAdd').addEventListener('click', (e) => openImportMenu(e.currentTarget));

document.getElementById('btnClear').addEventListener('click', async () => {

// ネイティブ picker のキャンセル (Safari 16.4+ / Chrome 113+)。
// これが来ない古い環境向けに preparing 画面に「やめる」ボタンも併設している。
$picker.addEventListener('cancel', cancelPicker);

$picker.addEventListener('change', async (e) => {
  const files = Array.from(e.target.files || []);
  // 注意: iOS Safari では e.target.value = '' を await 前に呼ぶと
  // File 参照が無効化される疑いがある (createObjectURL で TypeError) → 後始末は finally で
  if (!files.length) { e.target.value = ''; cancelPicker(); return; }
  if (importingNow) { e.target.value = ''; return; }  // 多重 change を弾く
  importingNow = true;
  try {
    await importFiles(files, { fallbackMtime: importFallback });
  } finally {
    // フェーズA 完了で制御を返す (フェーズB は裏で継続)。連打ガードもここで解除。
    importingNow = false;
    importBusy = false;
    e.target.value = '';
  }
});

$igzip.addEventListener('change', async (e) => {
  const file = e.target.files?.[0];
  e.target.value = '';
  if (!file) return;
  if (importingNow) return;   // 多重起動を弾く
  importingNow = true;
  try {
    await importArchiveZip(file);
  } catch (err) {
    logErr(`Instagram取り込み失敗: ${err?.message || err}`);
    alert(`取り込み失敗: ${err?.message || err}`);
  } finally {
    importingNow = false;
    importBusy = false;
  }
});

// フォルダごと取り込み (v46)。webkitdirectory はフォルダ内全ファイルを返すので画像だけ抽出。
// 撮影/投稿日時が無い画像は importFiles の fallbackMtime=true で「保存日」を日時に補完する。
$folder.addEventListener('change', async (e) => {
  const all = Array.from(e.target.files || []);
  e.target.value = '';
  const imgs = all.filter(f => (f.type.startsWith('image/') && f.type !== 'image/tiff')
    || /\.(jpe?g|png|webp|heic|heif|gif|bmp)$/i.test(f.name));
  if (!imgs.length) { alert('画像ファイルが見つかりませんでした。'); return; }
  if (importingNow) return;
  importingNow = true;
  try {
    await importFiles(imgs, { fallbackMtime: importFallback });
  } catch (err) {
    logErr(`フォルダ取り込み失敗: ${err?.message || err}`);
    alert(`取り込み失敗: ${err?.message || err}`);
  } finally {
    importingNow = false;
    importBusy = false;
  }
});

// 開発用 (#dev): ダミー生成 🧪 / ダミーだけ削除 🧹 を出す (通常は隠し)。30k スケール検証用 (v30-32)。
if (location.hash.toLowerCase().includes('dev')) {
  let devBusy = false;   // 生成/削除の多重起動ガード (「OKしてもしても」連打対策, v32)
  const dev = document.getElementById('btnDev');
  if (dev) {
    dev.classList.remove('hidden');
    dev.addEventListener('click', async () => {
      if (devBusy) { alert('処理中です。完了までお待ちください。'); return; }
      const ans = prompt('ダミーを何枚生成しますか? (IndexedDB に直接生成 → 完了後リロード)', '30000');
      if (ans == null) return;
      const n = Math.max(1, Math.min(100000, parseInt(ans, 10) || 0));
      if (!n) return;
      if (!confirm(`${n.toLocaleString()} 枚のダミーを生成します。完了後リロードします。`)) return;
      devBusy = true;
      try {
        await withWakeLock(() => devGenerate(n));
        alert(`生成完了 (${n.toLocaleString()} 枚)。リロードします。`);
        location.reload();
      } catch (e) {
        logErr(`dev生成失敗: ${e?.message || e}`);
        alert(`生成失敗: ${e?.message || e}`);
      } finally { devBusy = false; }
    });
  }
  const devDel = document.getElementById('btnDevDel');
  if (devDel) {
    devDel.classList.remove('hidden');
    devDel.addEventListener('click', async () => {
      if (devBusy) { alert('処理中です。完了までお待ちください。'); return; }
      // 本物 (dedup が 'dummy-' で始まらない) は残す。全削除 (🗑) と違って安全。
      if (!confirm('ダミー (dummy-*) だけ削除します。本物の写真は残ります。続行?')) return;
      devBusy = true;
      try {
        const removed = await withWakeLock(() => dbDeleteDummies());
        alert(`ダミー ${removed.toLocaleString()} 枚を削除しました。リロードします。`);
        location.reload();
      } catch (e) {
        logErr(`dev削除失敗: ${e?.message || e}`);
        alert(`削除失敗: ${e?.message || e}`);
      } finally { devBusy = false; }
    });
  }
}

// ============================================================
// 起動
// ============================================================
// v23: 大量 (数千〜1万枚) のサムネを抱えても Safari に消去されにくくする (best-effort)。
// 失敗しても通常動作には影響しない。usage/quota も console に出して実機で容量を見られるように。
// ============================================================
// 開発用: ダミー大量生成 (#dev でヘッダに 🧪)。30k スケール検証用 (v30)。
// 日時/色/GPS/色つきサムネを持つダミーを IndexedDB に直接生成 → リロードで実起動経路を実数検証。
// 中身はダミー (色の四角+日付) = 機械 (起動/段階読み込み/回転/フィルタ/色・時空連想/メモリ) の検証用。
// 実写真の「思い出しの感じ」とは別。ネット画像は EXIF 日時が無く入らないのでこの方が確実。
// ============================================================
function hslToRgb(h, s, l) {
  s /= 100; l /= 100;
  const k = n => (n + h / 30) % 12;
  const a = s * Math.min(l, 1 - l);
  const f = n => l - a * Math.max(-1, Math.min(k(n) - 3, Math.min(9 - k(n), 1)));
  return [Math.round(255 * f(0)), Math.round(255 * f(8)), Math.round(255 * f(4))];
}

async function devGenerate(count) {
  // 色つきサムネを HUES 種だけ先に作って使い回す (生成を速く・色軸が hue でクラスタするように)
  const HUES = 24;
  const thumbs = [];
  for (let h = 0; h < HUES; h++) {
    const [r, g, b] = hslToRgb(Math.round(360 * h / HUES), 55, 55);
    const c = document.createElement('canvas'); c.width = 64; c.height = 64;
    const ctx = c.getContext('2d'); ctx.fillStyle = `rgb(${r},${g},${b})`; ctx.fillRect(0, 0, 64, 64);
    const blob = await new Promise(res => c.toBlob(res, 'image/jpeg', 0.8));
    const color = new Float32Array(48);  // 4x4 グリッド平均 = 全セル同色
    for (let k = 0; k < 16; k++) { color[k*3] = r; color[k*3+1] = g; color[k*3+2] = b; }
    thumbs.push({ blob, color });
  }
  const baseLat = 35.68, baseLng = 139.76;        // 東京あたりを「近場」基準に
  const span = 12 * 365 * 86400000;               // 直近 ~12年に日時を散らす (各フィルタにデータが乗る)
  const nowMs = Date.now();
  const BATCH = 1000;
  let made = 0;
  importStatus = { done: 0, total: count }; updateBgStatus();
  for (let s = 0; s < count; s += BATCH) {
    const n = Math.min(BATCH, count - s);
    const recs = [];
    for (let i = 0; i < n; i++) {
      const t = thumbs[Math.floor(Math.random() * HUES)];
      const dt = new Date(nowMs - Math.random() * span);
      let lat = null, lng = null;
      const g = Math.random();
      if (g < 0.7) { lat = baseLat + (Math.random() - 0.5) * 0.6; lng = baseLng + (Math.random() - 0.5) * 0.6; }  // 近場 70%
      else if (g < 0.9) { lat = Math.random() * 180 - 90; lng = Math.random() * 360 - 180; }                      // 遠出 20% (残り 10% は GPS なし)
      const id = crypto.randomUUID();
      recs.push({ id, name: `dummy-${s+i}`, datetime: dt, lat, lng, blob: null, thumb: t.blob, color: t.color, dedup: `dummy-${id}`, importedAt: new Date() });
    }
    await dbPutMany(recs);
    made += n;
    importStatus = { done: made, total: count }; updateBgStatus();
    await new Promise(r => setTimeout(r, 0));   // 1フレーム譲る
  }
  importStatus = null; updateBgStatus();
}

// 長時間処理 (dev 生成/削除) の間だけ画面スリープを抑止する (v33)。
// iOS は画面が暗くなると setTimeout を止める → チャンク処理が中断する。Wake Lock で点灯維持。
// 非対応・失敗時は何もせず処理続行 (削除は冪等で再開可能なので安全網はある)。
async function withWakeLock(fn) {
  let sentinel = null;
  try { if (navigator.wakeLock && navigator.wakeLock.request) sentinel = await navigator.wakeLock.request('screen'); }
  catch (e) { console.warn('[wakeLock] 取得失敗', e); }
  try { return await fn(); }
  finally { try { if (sentinel) await sentinel.release(); } catch {} }
}

async function requestPersistentStorage() {
  try {
    if (navigator.storage?.persist) {
      const granted = await navigator.storage.persist();
      console.log(`[storage] persistent=${granted}`);
    }
    if (navigator.storage?.estimate) {
      const { usage, quota } = await navigator.storage.estimate();
      console.log(`[storage] usage=${Math.round((usage || 0) / 1e6)}MB / quota=${Math.round((quota || 0) / 1e6)}MB`);
    }
  } catch (e) { console.warn('[storage] persist/estimate failed', e); }
}

// Phase 2 (v28): 起動で読まなかった残りを、ユーザーが触っている裏でチャンク読みする。
// id(UUID) 昇順で続きを取り、addPhotos で重複防止 (取り込みと並行しても二重化しない)。
// 完了後に色 backfill (古い color 無しレコードがあれば)。
async function loadRestInBackground() {
  if (restLoading) return;
  restLoading = true;
  try {
    // v29: Phase 1 はランダム開始点なので、Phase 2 は先頭から全件を walk し、
    // 既に読んだ分 (~INITIAL_LOAD) は addPhotos の id 重複で弾く (再読込 ~10% は許容)。
    let lastKey = null;
    while (true) {
      const range = (lastKey != null) ? IDBKeyRange.lowerBound(lastKey, true) : null;
      const chunk = await dbGetSome(range, REST_CHUNK);
      if (!chunk.length) break;
      addPhotos(chunk);
      lastKey = chunk[chunk.length - 1].id;   // IDB カーソル位置 (allPhotos の並びに依存しない)
      updateBgStatus();                         // 📥 件数を更新
      if (state === 'explore') { refreshNeighbors(); render(); }  // 候補が増えたので近傍を反映
      if (chunk.length < REST_CHUNK) break;     // 最後のチャンク
      await new Promise(r => setTimeout(r, 0)); // 1フレーム譲ってメイン操作を止めない
    }
  } catch (e) {
    logErr(`残り読み込み: ${e?.message || e}`);
  } finally {
    restLoading = false;
    updateBgStatus();
  }
  backfillColors().catch(e => logErr(`backfill: ${e?.message || e}`));
}

(async () => {
  if (typeof exifr === 'undefined') {
    logErr('exifr ロード失敗 (CDN 到達不可)');
    state = 'empty'; render(); return;
  }
  if (typeof heic2any === 'undefined') {
    logErr('heic2any ロード失敗 (HEIC が混じると失敗します)');
  }
  requestPersistentStorage();  // await しない (起動を遅らせない)
  if (loggerOn()) startLogger(); else loggerRefreshUI();   // 前回モードが ON なら位置記録を再開 (v73)
  try {
    // Phase 1 (v28→v29): UUID 空間の「ランダムな開始点」から INITIAL_LOAD 件読んで即 UI。
    // v28 は先頭固定で毎回同じ初期プールだった (ユーザー指摘) → 毎起動でランダムに回す。
    // id は UUID なのでキー順=撮影日と無相関 → ランダム開始点以降の N 件 = 全期間の代表サンプル、かつ毎回違う。
    // 開始点が後ろ寄りで N 件に満たなければ先頭から補う (UUID リングを回す)。
    const startKey = crypto.randomUUID();
    resetPhotos([]);
    addPhotos(await dbGetSome(IDBKeyRange.lowerBound(startKey), INITIAL_LOAD));
    if (allPhotos.length < INITIAL_LOAD) {
      addPhotos(await dbGetSome(IDBKeyRange.upperBound(startKey, true), INITIAL_LOAD - allPhotos.length));
    }
    if (allPhotos.length === 0) { state = 'empty'; render(); }
    else await restoreOrRandom();   // 足跡 + 直前の中心を復元し、可能なら explore へ戻す (v41)
  } catch (e) {
    logErr(`起動失敗: ${e.message}`);
    state = 'empty'; render();
  }
  // Phase 2: 残りはユーザーが触り始めた裏で追い読み (await しない)。色 backfill はその完了後。
  loadRestInBackground();
})();
</script>

  #spk-overlay button{font:600 14px system-ui;color:#fff;background:#6b4ea0;
    border:none;border-radius:8px;padding:11px 14px;margin:6px 8px 6px 0;}
  #spk-overlay #spk-close{background:#333;}
  #spk-stat{white-space:pre-wrap;background:#15151c;border-radius:8px;
    padding:10px;margin:8px 0;font:12px/1.5 ui-monospace,monospace;}
  #spk-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(86px,1fr));
    gap:6px;margin-top:10px;}
  #spk-grid figure{margin:0;background:#15151c;border-radius:6px;padding:4px;}
  #spk-grid img{width:100%;height:78px;object-fit:cover;border-radius:4px;
    background:#222;display:block;}
  #spk-grid figcaption{font:10px/1.3 ui-monospace,monospace;color:#aaa;
    margin-top:3px;word-break:break-all;white-space:pre-wrap;}
</style>
<script>
(function(){
  "use strict";
  var Cap = window.Capacitor;
  var isNative = !!(Cap && typeof Cap.isNativePlatform === 'function' && Cap.isNativePlatform());
  if (!isNative) return;            // web では何も出さない（既存体験を汚さない）

  // Media プラグインの取得（Plugins 経由 or registerPlugin のどちらでも拾えるよう二段構え）
  var Media = (Cap.Plugins && Cap.Plugins.Media) ||
              (typeof Cap.registerPlugin === 'function' ? Cap.registerPlugin('Media') : null);
  // 自前 PhotoLibrary プラグイン（Approach B）
  var PL = (Cap.Plugins && Cap.Plugins.PhotoLibrary) ||
           (typeof Cap.registerPlugin === 'function' ? Cap.registerPlugin('PhotoLibrary') : null);
  var lastBItems = [];   // B③ enumerate の結果（B④ サムネ用に id を保持）

  function plat(){ try { return Cap.getPlatform ? Cap.getPlatform() : '?'; } catch(e){ return '?'; } }
  function fmtDate(s){ if(!s) return '日時なし';
    try{ var d=new Date(s); if(isNaN(d.getTime())) return String(s).slice(0,16);
      return d.getFullYear()+'/'+(d.getMonth()+1)+'/'+d.getDate(); }catch(e){ return String(s); } }
  function hasGPS(m){ return !!(m && m.location &&
    typeof m.location.latitude==='number' &&
    (m.location.latitude!==0 || m.location.longitude!==0)); }

  // --- 浮きボタン（ネイティブ専用・診断起動） ---
  var fab = document.createElement('button');
  fab.id = 'spk-fab';
  fab.textContent = '🧪 写真スパイク';
  document.body.appendChild(fab);

  // --- オーバーレイ ---
  var ov = document.createElement('div');
  ov.id = 'spk-overlay';
  ov.innerHTML =
    '<h2>🧪 写真全件アクセス 診断</h2>' +
    '<div class="row" id="spk-env"></div>' +
    '<div class="row"><button id="spk-close">閉じる</button></div>' +
    '<div class="spk-sec">— A：コミュニティ媒体プラグイン（全サムネ base64 一括）—</div>' +
    '<div class="row">' +
      '<button id="spk-run300">① 300枚</button>' +
      '<button id="spk-run2000">② 2000枚</button>' +
    '</div>' +
    '<div id="spk-stat">（A の①②、または B の③④を押すと結果。許可ダイアログは「すべての写真へのアクセスを許可」を選ぶ）</div>' +
    '<div class="spk-sec">— B：自前 PhotoLibrary（全件カウント即時＋サムネはオンデマンド）—</div>' +
    '<div class="row">' +
      '<button id="spk-runB1">③ 全件カウント＋メタ2000</button>' +
      '<button id="spk-runB2">④ サムネ48枚をオンデマンド</button>' +
    '</div>' +
    '<div id="spk-statB">（③＝全件数を即時に＋先頭2000のメタ／④＝③の先頭48枚をオンデマンド生成）</div>' +
    '<div id="spk-grid"></div>';
  document.body.appendChild(ov);

  var statEl = ov.querySelector('#spk-stat');
  var statBEl = ov.querySelector('#spk-statB');
  var gridEl = ov.querySelector('#spk-grid');
  ov.querySelector('#spk-env').textContent =
    'platform: ' + plat() +
    ' / Media(A): ' + (Media ? '検出 ✅' : '未検出 ❌') +
    ' / PhotoLibrary(B): ' + (PL ? '検出 ✅' : '未検出 ❌（cap sync 要）');

  fab.addEventListener('click', function(){ ov.classList.add('show'); });
  ov.querySelector('#spk-close').addEventListener('click', function(){ ov.classList.remove('show'); });

  async function run(quantity){
    gridEl.innerHTML = '';
    if(!Media){ statEl.textContent='❌ Media プラグインが見つかりません。Codemagic の cap sync が走ったか確認。'; return; }
    statEl.textContent = '⏳ getMedias(quantity='+quantity+') 実行中…';
    var now = function(){ return (window.performance && performance.now) ? performance.now() : Date.now(); };
    var t0 = now();
    try{
      var res = await Media.getMedias({
        quantity: quantity,
        thumbnailWidth: 96, thumbnailHeight: 96, thumbnailQuality: 70,
        types: 'photos',
        sort: [{ key:'creationDate', ascending:false }]
      });
      var dt = Math.round(now() - t0);
      var medias = (res && res.medias) || [];
      var n = medias.length, gps = 0, withDate = 0, dates = [];
      for(var i=0;i<n;i++){
        if(hasGPS(medias[i])) gps++;
        if(medias[i].creationDate){ withDate++; dates.push(medias[i].creationDate); }
      }
      dates.sort();
      var range = dates.length ? (fmtDate(dates[0]) + ' 〜 ' + fmtDate(dates[dates.length-1])) : '—';
      statEl.textContent =
        '✅ 取得 ' + n + ' 枚  （' + dt + ' ms）\n' +
        '・日時あり: ' + withDate + ' / ' + n + '\n' +
        '・GPSあり : ' + gps + ' / ' + n + '\n' +
        '・日時レンジ: ' + range + '\n' +
        '（先頭48枚のサムネを下に表示）';
      var lim = Math.min(48, n), frag = document.createDocumentFragment();
      for(var j=0;j<lim;j++){
        var m = medias[j];
        var fig = document.createElement('figure');
        var img = document.createElement('img');
        img.src = m.data ? ('data:image/jpeg;base64,' + m.data) : '';
        var cap = document.createElement('figcaption');
        cap.textContent = fmtDate(m.creationDate) +
          (hasGPS(m) ? ('\n📍' + m.location.latitude.toFixed(3) + ',' + m.location.longitude.toFixed(3)) : '\n📍なし');
        fig.appendChild(img); fig.appendChild(cap); frag.appendChild(fig);
      }
      gridEl.appendChild(frag);
    }catch(err){
      var dt2 = Math.round(now() - t0);
      statEl.textContent = '❌ エラー（' + dt2 + ' ms）: ' +
        ((err && (err.message || err.errorMessage)) || String(err)) +
        '\n\nヒント: 写真の許可が「選択した写真のみ」だと全件は見えません。' +
        '\niOS 設定 → あの日 → 写真 → 「すべての写真」を選んでから再実行してください。';
    }
  }
  ov.querySelector('#spk-run300').addEventListener('click', function(){ run(300); });
  ov.querySelector('#spk-run2000').addEventListener('click', function(){ run(2000); });

  // ===== B：自前 PhotoLibrary プラグイン =====
  var nowMs = function(){ return (window.performance && performance.now) ? performance.now() : Date.now(); };

  // ③ 全件メタ列挙（カウントは即時・サムネ含まず）
  async function runB1(){
    gridEl.innerHTML = '';
    if(!PL){ statBEl.textContent = '❌ PhotoLibrary プラグイン未検出。Codemagic の cap sync が走ったか確認。'; return; }
    statBEl.textContent = '⏳ requestAccess → enumerate(limit=2000) 実行中…';
    var t0 = nowMs();
    try{
      var acc = await PL.requestAccess();
      var res = await PL.enumerate({ limit: 2000 });
      var dt = Math.round(nowMs() - t0);
      var items = (res && res.items) || [];
      lastBItems = items;
      var gps = 0, withDate = 0, dates = [];
      for(var i=0;i<items.length;i++){
        var it = items[i];
        if(typeof it.lat === 'number') gps++;
        if(it.date){ withDate++; dates.push(it.date); }
      }
      dates.sort();
      var range = dates.length ? (fmtDate(dates[0]) + ' 〜 ' + fmtDate(dates[dates.length-1])) : '—';
      statBEl.textContent =
        '✅ 許可: ' + ((acc && acc.status) || '?') + '\n' +
        '・全件数(即時): ' + (res && res.count) + ' 枚  ← ピッカー無しの真の総数\n' +
        '・返したメタ: ' + items.length + ' 件  （往復 ' + dt + ' ms / native内部 ' + (res && res.ms) + ' ms）\n' +
        '・日時あり: ' + withDate + ' / ' + items.length + '\n' +
        '・GPSあり : ' + gps + ' / ' + items.length + '\n' +
        '・日時レンジ: ' + range + '\n' +
        '→ ④で先頭48件のサムネをオンデマンド生成';
    }catch(err){
      statBEl.textContent = '❌ enumerate エラー: ' + ((err && (err.message || err.errorMessage)) || String(err)) +
        '\n許可が「選択した写真のみ」だと件数が減ります（設定→あの日→写真→すべての写真）。';
    }
  }

  // ④ 先頭48件のサムネをオンデマンド生成（1枚ずつ＝本命の遅延ロードの型）
  async function runB2(){
    if(!PL){ statBEl.textContent = '❌ PhotoLibrary プラグイン未検出。'; return; }
    if(!lastBItems.length){ statBEl.textContent = '先に「③ 全件カウント」を押してください（id 一覧が要る）。'; return; }
    gridEl.innerHTML = '';
    var lim = Math.min(48, lastBItems.length);
    statBEl.textContent = '⏳ サムネ ' + lim + '枚をオンデマンド生成中…';
    var imgs = [], frag = document.createDocumentFragment();
    for(var j=0;j<lim;j++){
      var it = lastBItems[j];
      var fig = document.createElement('figure');
      var img = document.createElement('img');
      var cap = document.createElement('figcaption');
      cap.textContent = fmtDate(it.date) +
        (typeof it.lat === 'number' ? ('\n📍' + it.lat.toFixed(3) + ',' + it.lng.toFixed(3)) : '\n📍なし');
      fig.appendChild(img); fig.appendChild(cap); frag.appendChild(fig);
      imgs.push(img);
    }
    gridEl.appendChild(frag);
    var t0 = nowMs(), okN = 0;
    for(var k=0;k<lim;k++){
      try{
        var r = await PL.thumbnail({ id: lastBItems[k].id, size: 96 });
        if(r && r.dataUrl){ imgs[k].src = r.dataUrl; okN++; }
      }catch(e){ /* 1枚失敗は無視 */ }
    }
    var dt = Math.round(nowMs() - t0);
    statBEl.textContent = '✅ オンデマンド サムネ ' + okN + ' / ' + lim + ' 枚  （' +
      dt + ' ms ・ ' + Math.round(dt / Math.max(1, lim)) + ' ms/枚）';
  }

  ov.querySelector('#spk-runB1').addEventListener('click', function(){ runB1(); });
  ov.querySelector('#spk-runB2').addEventListener('click', function(){ runB2(); });
})();
</script>
</body>
</html>
