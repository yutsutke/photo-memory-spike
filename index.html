  const remain = allPhotos.filter(p => visible(p) && !p.embedding).length;
  const room = Math.max(0, MEANING_SAMPLE_CAP - done);   // 標本上限までの残り枠 (v27)
  const toAnalyze = Math.min(remain, room);              // 次に解析する枚数 (上限超えはランダム間引き)
  const capped = total > MEANING_SAMPLE_CAP;             // 上限を超える規模か (間引きが効く)

  const modal = document.createElement('div');
  modal.className = 'ai-modal';
  modal.id = 'aiModal';
  // 背景タップで閉じる (進行中は閉じない=誤タップ救済)
  modal.addEventListener('click', (e) => { if (e.target === modal && !aiExtracting && !aiLoading) closeAIModal(); });

  const card = document.createElement('div');
  card.className = 'ai-modal-card';

  let body = `<h2>${tr('🧠 AI で「意味の近傍」を引く', '🧠 Find “nearby by meaning” with AI')}</h2>`;

  if (aiLoading || aiExtracting) {
    // 進行中
    const pct = aiStatus && aiStatus.total ? Math.round(100 * aiStatus.done / aiStatus.total) : 0;
    body += `
      <p>${aiStatus?.msg || tr('処理中…', 'Processing…')}</p>
      <div class="stat">${aiStatus?.done ?? 0} / ${aiStatus?.total ?? '?'}</div>
      <div class="bar"><div style="width:${pct}%"></div></div>
      <p style="font-size:11px;color:#888;">${tr('画面を閉じても処理は続きます (ヘッダに 🧠 進捗)。タブを背景にすると iOS は処理を遅らせます。', 'Processing continues even if you close this (progress shows in the 🧠 header). iOS slows work when the tab is backgrounded.')}</p>
    `;
  } else {
    // 待機 / 完了
    body += `
      <p>${tr('「色」「時空」と並ぶ 3 つ目の連想軸として、CLIP モデルで写真の <b>意味</b> (被写体・シーン) を埋め込み、コサイン類似で近傍を引きます。explore のモード切替に「🧠 意味」が出ます。', 'As a third association axis alongside “color” and “time & place,” the CLIP model embeds each photo’s <b>meaning</b> (subject, scene) and finds neighbors by cosine similarity. A “🧠 Meaning” mode appears in the wander view.')}</p>
      <div class="stat">${tr(`解析済み: ${done.toLocaleString()} 枚 ${capped ? `/ 標本上限 ${MEANING_SAMPLE_CAP.toLocaleString()} (全 ${total.toLocaleString()} 枚中)` : `/ ${total} 枚 ${remain > 0 ? `(未解析 ${remain})` : '(全件解析済)'}`}`, `Analyzed: ${done.toLocaleString()} ${capped ? `/ sample cap ${MEANING_SAMPLE_CAP.toLocaleString()} (of ${total.toLocaleString()})` : `/ ${total} ${remain > 0 ? `(${remain} left)` : '(all analyzed)'}`}`)}</div>
      ${capped ? `<p style="font-size:11px;color:#888;">${tr(`枚数が多いので意味解析は <b>${MEANING_SAMPLE_CAP.toLocaleString()} 枚のランダム標本</b>に間引きます (発熱・時間対策)。色・時空・ランダム引きは全 ${total.toLocaleString()} 枚を使います。`, `With many photos, meaning analysis is thinned to a <b>random sample of ${MEANING_SAMPLE_CAP.toLocaleString()}</b> (to limit heat and time). Color, time & place, and random draws use all ${total.toLocaleString()}.`)}</p>` : ''}
      ${done > 0 ? `<p style="font-size:11px;color:#888;">${tr('explore で写真をタップ → モード「🧠 意味」で確認。', 'Tap a photo in the wander view → check it in the “🧠 Meaning” mode.')}</p>` : ''}
      ${aiLastError ? `<p style="color:#f88;font-size:11px;">${tr(`エラー: ${aiLastError}`, `Error: ${aiLastError}`)}</p>` : ''}
      <p style="font-size:11px;color:#888;">${tr('初回はモデル DL (~100MB)。Wi-Fi 推奨。抽出自体は速いです。', 'First run downloads the model (~100MB). Wi-Fi recommended. Extraction itself is fast.')}</p>
      <p style="font-size:11px;color:#6fce92;">${tr('🔒 解析も端末内。写真はどこにもアップロード・送信されません (DL するのは AI モデルだけ)。', '🔒 Analysis runs on-device too. Photos are never uploaded or sent anywhere (only the AI model is downloaded).')}</p>
    `;
  }

  card.innerHTML = body;

  const actions = document.createElement('div');
  actions.className = 'actions';
  if (aiLoading || aiExtracting) {
    const closeBtn = document.createElement('button');
    closeBtn.textContent = tr('閉じる (処理は続く)', 'Close (keeps running)');
    closeBtn.addEventListener('click', closeAIModal);
    actions.appendChild(closeBtn);
    if (aiExtracting) {
      // 中断ボタン (DL 中は中断できない、抽出ループ中のみ)
      const cancelBtn = document.createElement('button');
      cancelBtn.textContent = tr('中断', 'Stop');
      cancelBtn.addEventListener('click', () => { aiCancel = true; });
      actions.appendChild(cancelBtn);
    }
  } else {
    const closeBtn = document.createElement('button');
    closeBtn.textContent = tr('閉じる', 'Close');
    closeBtn.addEventListener('click', closeAIModal);
    const runBtn = document.createElement('button');
    runBtn.className = 'primary';
    // v27: 解析対象は「標本上限までの残り枠」。上限超え分は間引く (= toAnalyze)。
    runBtn.textContent = toAnalyze > 0 ? tr(`${toAnalyze.toLocaleString()} 枚を解析`, `Analyze ${toAnalyze.toLocaleString()}`) : (room === 0 ? tr('標本上限に到達', 'Sample cap reached') : tr('解析完了', 'Analysis complete'));
    runBtn.disabled = (toAnalyze === 0);
    runBtn.addEventListener('click', () => { runEmbeddingExtraction(room); });  // room 枠だけ (シャッフル済=ランダム標本)
    actions.appendChild(closeBtn);
    actions.appendChild(runBtn);
  }
  card.appendChild(actions);

  modal.appendChild(card);
  document.body.appendChild(modal);
}

// ヘッダの ♻️ (削除/除外した写真を戻す入口)。0 のときは隠す ([[ui-minimalism-works]] 使う時だけ広がる)。
// v52: 連想ウォーク中に件数が目に入るのが余計、との指摘で数値は出さずアイコンのみ (件数は一覧モーダル側で見える)。
function updateTrashBtn() {
  const el = document.getElementById('btnTrash');
  if (!el) return;
  const n = allPhotos.reduce((a, p) => a + (p.excluded ? 1 : 0), 0);
  if (n > 0) { el.textContent = '♻️'; el.classList.remove('hidden'); }
  else el.classList.add('hidden');
}

function render() {
  $main.innerHTML = '';
  const activeCount = allPhotos.reduce((n, p) => n + (visible(p) ? 1 : 0), 0);
  $count.textContent = activeCount > 0 ? `${activeCount} ${tr('枚', 'photos')}` : tr('— 枚', '— photos');
  renderAIModal();    // モーダルは独立 (state に依存しない overlay)
  renderInfoModal();  // 使い方・注意モーダル (v38)
  renderExcludedModal();  // 削除（除外）一覧モーダル (v48)
  updateTrashBtn();       // ヘッダの ♻️N (除外数) を更新

  if (state === 'loading') {
    $main.innerHTML = `<p style="text-align:center;color:#888;margin-top:40px;">${tr('読み込み中…', 'Loading…')}</p>`;
    return;
  }

  if (state === 'empty') {
    // ネイティブ (Capacitor) のときは「ライブラリ全体から始める」を主役に、web ピッカーは
    // 「数枚で試す」副導線に下げる (核＝偶然/久しぶり/よみがえる の段階導線, v94)。
    const nativeBlock = IS_NATIVE ? `
        <button class="primary" id="emptyNative">📚 ${tr('写真ライブラリ全体から始める（おすすめ）', 'Start from your whole photo library (recommended)')}</button>
        <p style="margin:.4em 0;font-size:12px;opacity:.7;">${tr('この端末の<b>すべての写真</b>から連想を始めます（端末内だけで処理）。<b>まず数枚で試す</b>なら下のボタンへ。', 'Begin from <b>all the photos</b> on this device (processed only on-device). To <b>try with just a few</b>, use the button below.')}</p>` : '';
    $main.innerHTML = `
      <div class="empty">
        <h2>${tr('写真を取り込んで始める', 'Start by importing your photos')}</h2>
        <div class="privacy">🔒 ${tr('<b>写真はこの端末の中だけ。</b>クラウドや外部サーバーにアップロードされません。すべて端末内 (IndexedDB) に保存され、AI 解析も端末内で行います。', '<b>Your photos stay on this device.</b> Nothing is uploaded to the cloud or any server. Everything is stored locally (IndexedDB), and AI analysis runs on-device.')}</div>
        ${nativeBlock}
        <p>${tr('まず 20〜30 枚くらい入れて感触を見るのが目安です。', 'Start with about 20–30 photos to get a feel for it.')}</p>
        <button class="${IS_NATIVE ? 'secondary' : 'primary'} import-trigger" id="emptyAdd">📷 ${IS_NATIVE ? tr('数枚だけ選んで試す', 'Pick a few to try') : tr('画像を取り込む', 'Import photos')}</button>
        <p style="margin:.4em 0;font-size:12px;opacity:.7;">${tr('押すと <b>ファイル / フォルダー</b> を選べます。撮影日時があればそれを、なければ<b>保存日</b>を使って取り込みます。細かい基準は <b>⚙️ 詳細設定</b> から。', 'Tap to pick <b>files / folders</b>. Uses the capture date if present, otherwise the <b>saved date</b>. Fine-tune under <b>⚙️ Settings</b>.')}</p>
        <button id="emptyIg" style="margin-top:6px;">📦 ${tr('Instagram / X の zip から取り込む', 'Import from Instagram / X zip')}</button>
        <p style="margin:.4em 0;font-size:12px;opacity:.7;">${tr('（上級者向け）Instagram「情報をダウンロード」(JSON形式) / X(Twitter) アーカイブの zip。投稿日時を復元します。', '(Advanced) Instagram “Download your information” (JSON) / X (Twitter) archive zip. Restores post dates.')}</p>
      </div>`;
    if (IS_NATIVE) {
      const en = document.getElementById('emptyNative');
      if (en) en.addEventListener('click', () => importNativeLibrary());
    }
    document.getElementById('emptyAdd').addEventListener('click', (e) => openImportMenu(e.currentTarget));
    document.getElementById('emptyIg').addEventListener('click', () => $igzip.click());
    return;
  }

  // picker を開いた瞬間〜change が来るまで。
  // 注: iOS のネイティブ写真ピッカーが前面にいる間はこれは裏に隠れる。
  //     ピッカーが閉じてから change までの隙間でだけ見える (それも出せない区間がある)。
  if (state === 'preparing') {
    $main.innerHTML = `
      <div class="progress" style="text-align:center;">
        <div class="spinner"></div>
        <div class="text">📷 ${tr('写真を読み込んでいます…', 'Loading photos…')}</div>
        <div class="text" style="color:#888;font-size:11px;margin-top:6px;">${tr('写真が多いと選択後の準備に数十秒かかることがあります', 'With many photos, preparation can take tens of seconds.')}</div>
        <div class="text" id="prep-hint" style="color:#e6a23c;font-size:11px;margin-top:8px;"></div>
        <div class="privacy-line">🔒 ${tr('アップロードではありません。この端末内だけで処理しています', 'Not an upload — processed only on this device.')}</div>
      </div>
      <div class="actions"><button class="secondary" id="cancelPrep">${tr('やめる', 'Cancel')}</button></div>`;
    document.getElementById('cancelPrep').addEventListener('click', cancelPicker);
    return;
  }

  if (state === 'importing') {
    $main.innerHTML = `
      <div class="progress">
        <div class="text" id="prog-text">${tr('読み込み開始…', 'Starting…')}</div>
        <div class="bar"><div id="prog-bar" style="width:0%"></div></div>
        <div class="privacy-line" style="text-align:center;">🔒 ${tr('写真はアップロードされません（端末内で処理）', 'Photos are not uploaded (processed on-device).')}</div>
      </div>`;
    return;
  }

  if (state === 'random') {
    // v38: 常時表示していた取り込み注意書きは ℹ️「使い方・注意」へ集約。reminiscence 画面は写真に集中。

    // フィルタチップ (デフォルト 'all' で従来通り完全ランダム)
    // v137: チップと枚数は写真の下（最下部）へ＝ヘッダ直下に写真が来て、まず写真に意識が向く（ユーザー要望）。
    //   ここでは組み立てだけして、deck を append した後に $main へ足す。
    const chips = document.createElement('div');
    chips.className = 'filter-chips';
    for (const f of FILTERS) {
      const btn = document.createElement('button');
      btn.className = 'chip' + (currentFilter === f.key ? ' selected' : '');
      btn.textContent = f.label;
      btn.addEventListener('click', () => {
        if (currentFilter === f.key) return;
        currentFilter = f.key;
        drawRandom();
      });
      chips.appendChild(btn);
    }

    // 母数の脚注 (どのフィルタでも何枚から引いているかを見える化)
    // 副次的に「近場/遠出 は GPS つき写真のみ対象」が自然に伝わる
    const currentFilterObj = FILTERS.find(x => x.key === currentFilter);
    const active = allPhotos.filter(visible);
    const filtered = pickPool(currentFilter, active);
    const gpsCount = active.filter(p => p.lat != null && p.lng != null).length;
    const note = document.createElement('div');
    note.className = 'filter-note';
    if (currentFilterObj?.needsGPS) {
      note.textContent = tr(`${filtered.length} 枚から (GPS付き ${gpsCount} / ${allPhotos.length} 枚)`, `from ${filtered.length} photos (with GPS ${gpsCount} / ${allPhotos.length})`);
    } else {
      note.textContent = tr(`${filtered.length} 枚から`, `from ${filtered.length} photos`);
    }

    // 表示は除外を除いた先頭3枚。除外で次が繰り上がり、取り消しで元に戻る (他の2枚は不動)
    const visibleRandom = currentRandom.filter(visible).slice(0, 40);   // v111: 横スワイプで 40 枚までめくれる (端で🎲で次のランダムへ)
    if (currentRandom.length === 0) {
      const msg = document.createElement('p');
      msg.style.cssText = 'text-align:center;color:#888;margin:40px 0;';
      if (currentFilter === 'all') {
        msg.textContent = tr('写真がありません', 'No photos');
      } else if (currentFilterObj?.needsGPS && gpsCount === 0) {
        msg.innerHTML = tr(`GPS情報を持つ写真がありません<br><span style="font-size:11px;color:#666;">「${currentFilterObj.label}」は位置情報がある写真から引きます</span>`, `No photos with GPS<br><span style="font-size:11px;color:#666;">“${currentFilterObj.label}” draws from photos that have location</span>`);
      } else {
        msg.textContent = tr(`「${currentFilterObj.label}」に該当する写真がありません`, `No photos match “${currentFilterObj.label}”`);
      }
      $main.appendChild(msg);
    } else if (visibleRandom.length === 0) {
      const msg = document.createElement('p');
      msg.style.cssText = 'text-align:center;color:#888;margin:40px 0;';
      msg.textContent = tr('全部除外されています。引き直すかフィルタを変えてください。', 'All are excluded. Draw again or change the filter.');
      $main.appendChild(msg);
    } else {
      const deck = document.createElement('div');
      deck.className = 'deck';   // v111: 横スワイプ (scroll-snap) で 1 枚ずつ。タップで連想ウォーク
      visibleRandom.forEach(p => deck.appendChild(makeBigCard(p, () => showExplore(p))));
      $main.appendChild(deck);
      // v112: 「もう一度引く」ボタンは廃止 (スワイプで十分・ユーザー要望)。代わりにスワイプを促すヒント。
      const hint = document.createElement('div');
      hint.className = 'swipe-hint';
      hint.textContent = tr('← スワイプして次の思い出へ →', '← Swipe to the next memory →');
      $main.appendChild(hint);
    }
    // v137: フィルタと枚数は最下部（写真の後）。空メッセージの時もチップは残す＝フィルタを戻せる。
    $main.appendChild(chips);
    $main.appendChild(note);
    return;
  }

  if (state === 'explore') {
    const center = currentCenter;

    const centerEl = document.createElement('div');
    centerEl.className = 'center-card';
    // v51: 座標 (📍 lat,lng) は「🗺 地図でこの場所を見る」が担うので中心カードからは外す
    // (raw 座標は人にとって意味が薄く、連想ウォーク中の写真への集中を逸らす情報だった)。
    centerEl.innerHTML = `<img src="${thumbUrl(center)}">
      <div class="meta">
        <div class="date">${fmtDate(center.datetime)}${srcTagHtml(center)}</div>
      </div>`;
    // 中心カードは tap でフル画像 (v100: 長押しに加えてタップでも開く＝いま見ている写真を拡大したい瞬間に直感的)。
    // 近くの6枚は従来どおり tap=歩く / 長押し=フル画像。初期3枚も従来どおり tap=ウォーク開始 / 長押し=フル画像。
    attachPhotoGestures(centerEl, center, () => showFullImage(center));
    centerEl.appendChild(makeExcludeBtn(center));
    // 地図への導線。GPS があれば「その場所」へ。GPS が無くても日時さえあれば
    // 「その日の地図」へ飛べる (v80: その日に GPS 写真が無くても常に出す＝ユーザー要望。
    // 飛び先で v74 がこの写真を軌跡上の時刻位置に推定配置・GPS 皆無の日でもタイムラインは出る)。
    const centerHasGps = center.lat != null && center.lng != null;
    if (centerHasGps || center.datetime) {
      const mapBtn = document.createElement('button');
      mapBtn.className = 'center-map-btn';
      mapBtn.textContent = centerHasGps ? tr('🗺 地図でこの場所を見る', '🗺 See this place on the map') : tr('🗺 この日の地図へ', '🗺 Map for this day');
      const stop = e => e.stopPropagation();   // 長押し(フル画像)/カードのジェスチャと衝突させない
      mapBtn.addEventListener('pointerdown', stop);
      mapBtn.addEventListener('pointerup', stop);
      mapBtn.addEventListener('pointermove', stop);
      mapBtn.addEventListener('click', (e) => { e.stopPropagation(); openMapView(center); });
      centerEl.querySelector('.meta').appendChild(mapBtn);
      // 位置情報なしの「この日の地図へ」は飛び先に軌跡が無いことがある → 何が出るか一言添える (v81)。
      if (!centerHasGps) {
        const hint = document.createElement('div');
        hint.className = 'center-map-hint';
        hint.textContent = tr('位置のある写真が無い日でも、その日の写真一覧（タイムライン）が開きます。並びを眺めたり、写真を選んで位置を直すのも想起のきっかけに。', 'Even on days with no located photos, the timeline for that day still opens. Browsing the order — or picking a photo to fix its location — can spark a memory.');
        centerEl.querySelector('.meta').appendChild(hint);
      }
    }
    $main.appendChild(centerEl);

    // モード切替の開閉 opener (普段は隠し、必要時に展開して軸を固定)
    const modeBar = document.createElement('div');
    modeBar.className = 'mode-toggle';
    const opener = document.createElement('button');
    opener.textContent = tr('モード', 'Mode') + (modeToggleVisible ? ' ▲' : ' ▼');
    opener.style.cssText = 'border-color:#333;color:#888;';
    opener.addEventListener('click', () => {
      modeToggleVisible = !modeToggleVisible;
      saveModePrefs();
      render();
    });
    modeBar.appendChild(opener);
    $main.appendChild(modeBar);

    // 展開時のみ ミックス / 時空 / カラー / 意味 を出す
    // 意味モードは embedding を持つ写真が ≥3 枚ある時だけ表示 (Phase 2 pilot)
    if (modeToggleVisible) {
      const toggle = document.createElement('div');
      toggle.className = 'mode-toggle';
      const mkBtn = (mode, label) => {
        const b = document.createElement('button');
        b.textContent = label;
        if (exploreMode === mode) b.classList.add('selected');
        b.addEventListener('click', () => {
          if (exploreMode === mode) return;
          exploreMode = mode;
          saveModePrefs();
          refreshNeighbors();
          render();
        });
        return b;
      };
      toggle.appendChild(mkBtn('mix', tr('🎲 ミックス', '🎲 Mix')));
      toggle.appendChild(mkBtn('spacetime', tr('⏳ 時空', '⏳ Time & place')));
      toggle.appendChild(mkBtn('color', tr('🎨 カラー', '🎨 Color')));
      if (aiEmbeddedCount() >= 3) toggle.appendChild(mkBtn('meaning', tr('🧠 意味', '🧠 Meaning')));
      $main.appendChild(toggle);
    }

    // バックフィル中の注釈 (カラー優先で中心に color が無いケースなど)
    if (backfillStatus && backfillStatus.done < backfillStatus.total) {
      const note = document.createElement('div');
      note.className = 'backfill-note';
      note.textContent = tr(`🌀 色情報を準備中… ${backfillStatus.done} / ${backfillStatus.total}`, `🌀 Preparing color data… ${backfillStatus.done} / ${backfillStatus.total}`);
      $main.appendChild(note);
    }

    // ラベル + グリッド
    if (exploreMode === 'color' && !center.color) {
      const label = document.createElement('div');
      label.className = 'neighbor-label';
      label.textContent = tr('この写真の色情報がまだありません', 'No color data for this photo yet');
      $main.appendChild(label);
    } else if (exploreMode === 'meaning' && !center.embedding) {
      const label = document.createElement('div');
      label.className = 'neighbor-label';
      label.textContent = tr('この写真はまだ AI 解析されていません (🧠 から追加解析)', 'This photo isn\'t analyzed by AI yet (analyze from 🧠)');
      $main.appendChild(label);
    } else {
      const ns = currentNeighbors.filter(visible).slice(0, 12);   // v116: 1枚大表示＋横スワイプなので多めに (近傍キャッシュ12枚)
      const label = document.createElement('div');
      label.className = 'neighbor-label';
      if (ns.length === 0) {
        label.textContent = tr('近くに写真がありません', 'No nearby photos');
      } else if (exploreMode === 'color') {
        label.textContent = tr(`色の近く ${ns.length} 枚`, `${ns.length} nearby · color`);
      } else if (exploreMode === 'spacetime') {
        label.textContent = tr(`この時空の近く ${ns.length} 枚`, `${ns.length} nearby · time & place`);
      } else if (exploreMode === 'meaning') {
        label.textContent = tr(`意味の近く ${ns.length} 枚`, `${ns.length} nearby · meaning`);
      } else {
        label.textContent = tr(`この写真のまわり ${ns.length} 枚`, `${ns.length} around this photo`);
      }
      $main.appendChild(label);

      if (ns.length > 0) {
        // v116: 近くの写真も 1 枚大表示＋横スワイプ (トップと同じ deck/makeBigCard)。タップで歩く。
        const deck = document.createElement('div');
        deck.className = 'deck';
        ns.forEach(p => deck.appendChild(makeBigCard(p, () => showExplore(p))));
        $main.appendChild(deck);
        const hint = document.createElement('div');
        hint.className = 'swipe-hint';
        hint.textContent = tr('← スワイプで近くの写真へ・タップで歩く →', '← Swipe for nearby photos · tap to wander →');
        $main.appendChild(hint);
      }
    }

    // 足跡 (タップ履歴): 連想ウォークで辿った写真。ウォークをまたいで貯まり、リロードしても残る (最大 MAX_TRAIL 枚、古い順に消える)。
    // = デフォルト体験は最小のまま、歩き始めて初めて広がる ([[ui-minimalism-works]])。
    // モード切替と同じ開閉式: 普段は小さな opener だけ、開いた時にサムネ帯が出る (写真への集中を守る)。
    // 写真そのものを並べる → 思い出しの意識を逸らさない。タップで過去の地点へ戻る。
    const displayTrail = walkTrailIds.map(id => photoById(id)).filter(p => p && visible(p));
    if (displayTrail.length >= 2) {
      const trailBar = document.createElement('div');
      trailBar.className = 'mode-toggle';   // モード opener と同じ見た目・配置
      const trailOpener = document.createElement('button');
      trailOpener.textContent = trailVisible ? tr('🔖 足跡 ▲', '🔖 Footprints ▲') : tr(`🔖 足跡 ${displayTrail.length} ▼`, `🔖 Footprints ${displayTrail.length} ▼`);
      trailOpener.style.cssText = 'border-color:#333;color:#888;';
      trailOpener.addEventListener('click', () => {
        trailVisible = !trailVisible;
        saveModePrefs();
        render();
      });
      trailBar.appendChild(trailOpener);
      $main.appendChild(trailBar);

      if (trailVisible) {
        const trail = document.createElement('div');
        trail.className = 'trail';
        const strip = document.createElement('div');
        strip.className = 'trail-strip';
        displayTrail.forEach((p, i) => {
          const step = document.createElement('div');
          const isHere = center && p.id === center.id;
          step.className = 'trail-step' + (isHere ? ' current' : '');
          step.innerHTML = `<img src="${thumbUrl(p)}" loading="lazy">`;
          // v115: タップで拡大表示（足跡内を左右スワイプでめくれる）。拡大の「🚶 ここから歩く」で連想ウォークを続ける（辿り直しを両立）。
          step.addEventListener('click', () => showFullImage(p, { list: displayTrail, index: i, onWalk: () => showExplore(p) }));
          strip.appendChild(step);
        });
        trail.appendChild(strip);
        $main.appendChild(trail);
        // 現在地が見えるようスクロール: 中ほどに戻った時は中央寄せ、末尾なら右端
        const cur = strip.querySelector('.trail-step.current');
        if (cur) {
          const sr = strip.getBoundingClientRect(), cr = cur.getBoundingClientRect();
          strip.scrollLeft += (cr.left - sr.left) - (strip.clientWidth - cr.width) / 2;
        } else {
          strip.scrollLeft = strip.scrollWidth;
        }
      }
    }

    const actions = document.createElement('div');
    actions.className = 'actions';
    actions.innerHTML = `<button class="secondary" id="backRandom">${tr('← トップに戻る', '← Back to top')}</button>`;
    $main.appendChild(actions);
    document.getElementById('backRandom').addEventListener('click', drawRandom);
    return;
  }
}

// ============================================================
// 画面遷移
// ============================================================
// Progressive Indexing (Phase 1.8):
//   フェーズA = 先頭 FAST_TRACK_COUNT 枚だけ処理 → 即メイン画面へ (待ち時間ここで終了)
//   フェーズB = 残りをバックグラウンドキューで低優先処理 (ユーザーは裏で遊べる)
// 大量投入でも「数枚処理したら遊べる」状態に最速で入る。
const FAST_TRACK_COUNT = 6;     // ランダム3枚 + 予備。これだけ処理したら遊べる
const BG_IMPORT_DELAY  = 220;   // バックグラウンド1枚ごとの間 (ms)。v36: 古い端末の GC 余裕のため少し広げた

// render() 後に1フレーム描画させてから重い処理に入る (進捗画面が見えるように)。
// rAF が発火しない環境 (背景タブ等) でハングしないよう setTimeout の保険を併設。
function nextPaint() {
  return new Promise(r => {
    let done = false;
    const finish = () => { if (!done) { done = true; r(); } };
    requestAnimationFrame(() => requestAnimationFrame(finish));
    setTimeout(finish, 100);
  });
}

// importOne の戻り値を当該セッションの差分集計に加算 (v22)。
function tallyImport(r) {
  if (!importStats) return;
  if (r?.ok) importStats.added++;
  else if (r?.skipped === 'duplicate') importStats.dup++;
  else importStats.skipped++;   // no-datetime 等、取り込めなかったもの
}

// 取り込み完了時に「新規 N / 重複スキップ M」を緑のログで表示 (差分が起きたことの可視化, v22)。
// 「アプリを開くと自動で差分 UP」は web では不可能 → ピッカーで選び直す → 既存はスキップ、を見える化する。
function showImportSummary() {
  if (!importStats) return;
  const { added, dup, skipped, failed, heic } = importStats;
  let msg;
  if (added === 0 && dup > 0 && skipped === 0 && failed === 0) {
    msg = tr(`✓ 新規なし — 選んだ ${dup} 枚はすべて取り込み済みでした`, `✓ Nothing new — all ${dup} selected photos were already imported`);
  } else {
    const parts = [tr(`✓ 新規 ${added} 枚`, `✓ ${added} new`)];
    if (dup)     parts.push(tr(`既にある分はスキップ ${dup}`, `already imported: ${dup}`));
    if (skipped) parts.push(tr(`日時なしで除外 ${skipped}`, `no date, excluded: ${skipped}`));
    if (failed)  parts.push(tr(`失敗 ${failed}`, `failed: ${failed}`));
    msg = parts.join(' / ');
  }
  if (heic) msg += tr(` (うち HEIC変換 ${heic})`, ` (HEIC converted: ${heic})`);  // v37 診断: heic2any を呼んだ枚数 (0 なら表示なし)
  logInfo(msg);
  importStats = null;
}

async function importFiles(files, opts = {}) {
  const fallbackMtime = !!opts.fallbackMtime;   // v46: フォルダ取り込みは保存日で日時補完
  clearTimeout(prepareHintTimer);  // 取り込みに入ったら準備ガイドは不要 (v34)
  importStats = { added: 0, dup: 0, skipped: 0, failed: 0, heic: 0 };  // 差分集計 (v22) + heic2any 呼出数 (v37 診断)
  state = 'importing';
  render();
  await nextPaint();
  const $text = document.getElementById('prog-text');
  const $bar  = document.getElementById('prog-bar');

  // --- フェーズA: 先頭を処理して即メイン画面へ ---
  const fast = files.slice(0, FAST_TRACK_COUNT);
  const rest = files.slice(FAST_TRACK_COUNT);

  const fastAdded = [];
  for (let i = 0; i < fast.length; i++) {
    try {
      const r = await withTimeout(importOne(fast[i], fallbackMtime ? { fallbackMtime: true } : undefined), IMPORT_TIMEOUT_MS, fast[i].name);
      tallyImport(r);
      if (r?.ok && r.record) fastAdded.push(r.record);
    } catch (e) {
      if (importStats) importStats.failed++;
      const stackTop = (e.stack || '').split('\n').find(l => l.trim()) || '';
      logErr(`取込失敗: ${fast[i].name}: ${e.message}  @ ${stackTop.slice(0, 80)}`);
    }
    if ($text) $text.textContent = `${tr('読み込み中…', 'Loading…')} ${i+1} / ${fast.length}`;
    if ($bar)  $bar.style.width = `${((i+1)/fast.length*100).toFixed(0)}%`;
  }

  // v28: 全件 dbGetAll で読み直さず、新規分だけ追記 (大量ライブラリに取り込んでも起動級の待ちを出さない)。
  // 既存の allPhotos / thumb URL キャッシュはそのまま有効なので revoke も不要。
  addPhotos(fastAdded);
  if (allPhotos.length === 0) { state = 'empty'; render(); }
  else await drawRandom();

  // --- フェーズB: 残りはバックグラウンドへ (await しない=ユーザーに制御を返す) ---
  // 残りがあれば runBackgroundImport の末尾で backfill→自動 embedding を回す。
  // fast-track だけ (rest 無し) の時はここで色 backfill → AI opt-in 済なら自動 embedding 抽出。
  if (rest.length) {
    enqueueBackground(rest, fallbackMtime);  // 残りの集計とサマリは runBackgroundImport 末尾で
  } else {
    showImportSummary();      // fast-track だけで完結 → ここで差分サマリ
    backfillColors().then(maybeAutoExtractEmbeddings).catch(e => logErr(`backfill: ${e?.message || e}`));
  }
}

// バックグラウンド取り込み: キューに積んで1本のループで低優先消化。
// 再インポートが来たらキューに足すだけ (多重ループを作らない)。
function enqueueBackground(files, fallbackMtime = false) {
  for (const f of files) bgQueue.push({ file: f, fallbackMtime });
  if (!bgRunning) runBackgroundImport();
}

async function runBackgroundImport() {
  bgRunning = true;
  let processed = 0;
  importStatus = { done: 0, total: bgQueue.length };
  updateBgStatus();

  while (bgQueue.length) {
    const { file, fallbackMtime } = bgQueue.shift();
    try {
      const r = await withTimeout(importOne(file, fallbackMtime ? { fallbackMtime: true } : undefined), IMPORT_TIMEOUT_MS, file.name);
      tallyImport(r);
      if (r.ok && r.record) {
        // 表示中の thumb URL を壊さないため revokeAllThumbUrls はしない。
        // 新規レコードだけ in-memory で足す (URL は表示時に lazy 生成される)。addPhotos で id 重複防止 (v28)。
        addPhotos([r.record]);
        // まだ empty 画面なら最初の1枚で random へ
        if (state === 'empty') await drawRandom();
      }
    } catch (e) {
      if (importStats) importStats.failed++;
      logErr(`取込失敗(裏): ${file.name}: ${e.message}`);
    }
    processed++;
    importStatus = { done: processed, total: processed + bgQueue.length };
    updateBgStatus();
    await new Promise(r => setTimeout(r, BG_IMPORT_DELAY));
  }

  bgRunning = false;
  importStatus = null;
  updateBgStatus();
  showImportSummary();  // fast + background の合算で差分サマリを表示 (v22)
  // 新規分は color 付き。古い color 無しレコードがあれば backfill → その後 AI opt-in 済なら
  // 新規写真の embedding を自動抽出 (mix の意味軸を生かし続ける、v20)。
  backfillColors().then(maybeAutoExtractEmbeddings).catch(e => logErr(`backfill: ${e?.message || e}`));
}

// ヘッダの控えめな進捗 (🌀 12/30 取り込み / 🧠 40/300 AI 解析)。完了で消える。
function updateBgStatus() {
  const el = document.getElementById('bgStatus');
  if (el) {
    if (importStatus) {
      el.textContent = `🌀 ${importStatus.done}/${importStatus.total}`;
      el.classList.remove('hidden', 'ai-bg');
    } else if (aiExtracting && aiStatus && aiStatus.phase === 'extract') {
      el.textContent = `🧠 ${aiStatus.done}/${aiStatus.total}`;
      el.classList.remove('hidden');
      el.classList.add('ai-bg');
    } else if (restLoading) {
      el.textContent = `📥 ${allPhotos.length}`;   // 起動後の残り背景読み込み (v28)
      el.classList.remove('hidden', 'ai-bg');
    } else {
      el.classList.add('hidden');
      el.classList.remove('ai-bg');
    }
  }
  const activeCount = allPhotos.reduce((n, p) => n + (visible(p) ? 1 : 0), 0);
  $count.textContent = activeCount > 0 ? `${activeCount} ${tr('枚', 'photos')}` : tr('— 枚', '— photos');
}

// 既存写真で color フィールドが無いものに、保存済み thumb から色彩特徴を計算して付与する。
// 低優先度ループ (1枚 50ms 程度の待ちを挟む) でメイン操作を止めない。
// 二重実行を避けるためフラグを持つ。
let backfillRunning = false;
async function backfillColors() {
  if (backfillRunning) return;
  const missing = allPhotos.filter(p => !p.color);
  if (!missing.length) { backfillStatus = null; return; }

  backfillRunning = true;
  backfillStatus = { done: 0, total: missing.length };
  // explore 表示中ならインジケータを更新
  if (state === 'explore') render();

  // メモリ抑制: thumb を 16x16 に縮小して描画してから getImageData。
  // 4x4 グリッド平均と精度ほぼ同じで、 iOS Safari の Blob ストア圧迫を避ける。
  // (300x300 の thumb をそのまま getImageData だと 135枚 × 90,000px = 1200万ピクセル分のバッファ)
  const TINY = 16;
  const tinyCanvas = document.createElement('canvas');
  tinyCanvas.width = TINY;
  tinyCanvas.height = TINY;
  const tinyCtx = tinyCanvas.getContext('2d');

  for (const p of missing) {
    let url = null;
    try {
      url = URL.createObjectURL(p.thumb);
      const img = await new Promise((resolve, reject) => {
        const im = new Image();
        im.onload = () => resolve(im);
        im.onerror = () => reject(new Error('thumb load failed'));
        im.src = url;
      });
      tinyCtx.clearRect(0, 0, TINY, TINY);
      tinyCtx.drawImage(img, 0, 0, TINY, TINY);
      const color = extractColorFeature(tinyCtx, TINY, TINY);
      const updated = { ...p, color };
      await dbPut(updated);
      const idx = allPhotos.findIndex(x => x.id === p.id);
      if (idx >= 0) allPhotos[idx] = updated;
    } catch (e) {
      console.warn(`[backfill] ${p.name}: ${e.message}`);
    } finally {
      if (url) URL.revokeObjectURL(url);
    }
    backfillStatus.done++;
    await new Promise(r => setTimeout(r, 50));
  }

  // 後始末: iOS Safari がバックフィル中に古い thumb URL を解放してしまっていても
  // 復活させるため、URL キャッシュを破棄して画面を再描画 (?マーク防止)
  revokeAllThumbUrls();
  backfillStatus = null;
  backfillRunning = false;
  if (state === 'random' || state === 'explore') render();
}

// ============================================================
// Phase 2: CLIP embedding による意味の近傍 (opt-in)
// pilot で「意味での手触り最高」と実機検証 → 全件 backfill を主に。
// モデル DL (~100MB) 後の抽出は速い、~300枚まで待ち許容 (実機 signal)。
// ============================================================
const PHASE2_MODEL = 'Xenova/clip-vit-base-patch32';
const PHASE2_CDN   = 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.0.2/dist/transformers.min.js';

let aiExtractor = null;       // transformers pipeline インスタンス (lazy)
let aiLoading   = false;      // モデル DL or init 中
let aiExtracting = false;     // embedding 抽出ループ中
let aiCancel = false;         // 抽出の中断要求
let aiStatus = null;          // { phase: 'dl'|'extract', done, total, msg }
let aiModalOpen = false;      // モーダル表示中フラグ
let aiLastError = null;       // 直近のエラー (モーダルに出す)
let infoModalOpen = false;    // 「使い方・注意」モーダル表示中フラグ (v38)
let excludedModalOpen = false; // 「削除（除外）した写真」一覧モーダル表示中フラグ (v48)

async function loadAIPipeline() {
  if (aiExtractor) return aiExtractor;
  aiLoading = true;
  aiStatus = { phase: 'dl', done: 0, total: 100, msg: 'AI モデル DL 中…' };
  if (aiModalOpen) render();
  try {
    const tx = await import(PHASE2_CDN);
    const { pipeline } = tx;
    aiExtractor = await pipeline('image-feature-extraction', PHASE2_MODEL, {
      progress_callback: (data) => {
        // data: { status, name, file, progress, loaded, total }
        if (data?.status === 'progress' && typeof data.progress === 'number') {
          aiStatus = { phase: 'dl', done: Math.round(data.progress), total: 100, msg: `モデル DL ${data.file || ''} ${Math.round(data.progress)}%` };
          if (aiModalOpen) render();
        }
      }
    });
    return aiExtractor;
  } finally {
    aiLoading = false;
  }
}

async function extractEmbeddingForPhoto(p) {
  const url = URL.createObjectURL(p.thumb);
  try {
    const result = await aiExtractor(url, { pooling: 'mean', normalize: true });
    // Float32Array(512) を期待、Tensor の場合は .data
    return result?.data || result;
  } finally {
    URL.revokeObjectURL(url);
  }
}

// embedding 抽出。limit 未指定なら未解析の全件 (実機検証で ~300枚まで待ち許容と確認)。
// 中断可能 (aiCancel)。閉じても処理継続 (ヘッダ 🧠 N/M で進捗)。
async function runEmbeddingExtraction(limit) {
  if (aiExtracting) return;
  const candidates = allPhotos.filter(p => visible(p) && !p.embedding);
  if (!candidates.length) { aiStatus = null; if (aiModalOpen) render(); return; }

  // シャッフル: 途中で中断しても満遍なく解析されているように
  for (let i = candidates.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [candidates[i], candidates[j]] = [candidates[j], candidates[i]];
  }
  const target = (limit && limit < candidates.length) ? candidates.slice(0, limit) : candidates;

  try {
    await loadAIPipeline();
  } catch (e) {
    aiLastError = e?.message || String(e);
    aiStatus = null;
    if (aiModalOpen) render();
    return;
  }

  aiExtracting = true;
  aiCancel = false;
  aiLastError = null;
  aiStatus = { phase: 'extract', done: 0, total: target.length, msg: '🧠 解析中…' };
  if (aiModalOpen) render();
  updateBgStatus();

  for (const p of target) {
    if (aiCancel) break;
    try {
      const embedding = await extractEmbeddingForPhoto(p);
      const updated = { ...p, embedding };
      await dbPut(updated);
      const idx = allPhotos.findIndex(x => x.id === p.id);
      if (idx >= 0) allPhotos[idx] = updated;
    } catch (e) {
      console.warn(`[ai-extract] ${p.name}: ${e?.message || e}`);
    }
    aiStatus.done++;
    if (aiStatus.done % 3 === 0) { if (aiModalOpen) render(); updateBgStatus(); }
    await new Promise(r => setTimeout(r, 0));
  }

  aiExtracting = false;
  aiCancel = false;
  aiStatus = null;
  try { localStorage.setItem('pms-phase2-tried', '1'); } catch {}
  // 後始末: iOS Safari は CLIP の重い推論中に「表示中サムネの blob URL」を巻き込んで無効化することがある
  // (? 化, CHANGELOG v5/v7 と同じ罠)。backfillColors と同様に URL キャッシュを破棄し、新しい URL で
  // 描き直す。これをしないと解析後に一部サムネが ? のまま残る。
  revokeAllThumbUrls();
  if (state === 'explore') refreshNeighbors();  // 新しい embedding を mix/意味の近傍に反映
  render();                                      // 常に再描画 (modal も renderAIModal で同時に更新される)
  updateBgStatus();
}

function aiEmbeddedCount() {
  return allPhotos.reduce((n, p) => n + (p.embedding ? 1 : 0), 0);
}

// ============================================================
// v157: 🍜 食べ物レンズ — 意味(CLIP)を「テキスト検索」に拡張。
//   これまで意味モードは「写真同士の類似」だけ。だが CLIP の画像 embedding は
//   テキスト embedding と同じ 512 次元の共有空間にある (image-feature-extraction は
//   投影後の image_embeds を返す。ゆえに保存済み embedding は 512 次元・正規化済み)。
//   → 「食べ物」等の語を CLIP テキスト側エンコーダで 512 次元に起こせば、保存済み画像
//   embedding とコサイン類似で「ゼロショット分類」できる。食べ物写真だけを日別・時系列
//   (新→古) で全画面表示 = 「最近なにたべたか」は上、下へ辿ると久しぶりの食事 (コア: 久し
//   ぶり/よみがえる)。表示は buildTimelinePhotos を再利用 (月見出し＋タップで全画面スワイプ)。
//   端末内完結: テキストも写真もアップロードしない (DL するのは AI モデルのみ)。
//   注: 食べ物判定のプロンプト/しきい値は実機の手触りで詰める前提 (preview に実写真が無い)。
// ============================================================
let aiTextModel = null;     // CLIPTextModelWithProjection (lazy)
let aiTokenizer = null;     // AutoTokenizer (lazy)
let aiTextLoading = false;  // 文章モデル DL / init 中

// v160: 意味レンズ = カテゴリ(食べ物/風景/人/ペット)・フリーテキスト・写真(似た画像) を同じ CLIP 埋め込みで探す。
//   カテゴリ/テキスト = 陽性プロンプト vs 対抗プロンプトを softmax（食べ物 v157 と同じゼロショット）。
//   写真 = アップロード画像の embedding とコサイン類似で上位N（reverse image search）。語群/しきい値は実機で調整。
const CLIP_LOGIT_SCALE = 100;    // CLIP の学習済み logit_scale ≒ 100
const LENS_MIN_PROB = 0.5;       // カテゴリ/テキスト: softmax 後の一致確率しきい値 (実機で調整)
const LENS_IMAGE_TOPK = 60;      // 写真レンズ: 似た上位N枚
const LENS_IMAGE_MIN_COS = 0.6;  // 写真レンズ: これ未満のコサインは「似ていない」ので除外
// カテゴリ = 陽性プロンプト群。判定は「全カテゴリ＋その他」を並べた softmax でこのカテゴリの確率和 ≥ しきい値
// （＝実質マルチクラス。食べ物 v157 の "food vs 他全部" をそのまま各カテゴリに一般化）。
const LENS_CATEGORIES = [
  { key: 'food',      emoji: '🍜', ja: '食べ物', en: 'Food',    prompts: ['a plate of food', 'a bowl of food', 'a delicious meal', 'food at a restaurant', 'a home cooked meal', 'a dessert or sweets', 'ramen, sushi or Japanese food'] },
  { key: 'landscape', emoji: '🏞', ja: '風景',   en: 'Scenery', prompts: ['a landscape', 'scenery of mountains or the sea', 'a beautiful view', 'nature scenery', 'a cityscape or skyline', 'the sky at sunset'] },
  { key: 'people',    emoji: '👤', ja: '人',     en: 'People',  prompts: ['a person', 'a group of people', 'a portrait of someone', 'a selfie', 'friends together', 'a family photo'] },
  { key: 'pet',       emoji: '🐾', ja: 'ペット', en: 'Pets',    prompts: ['a pet', 'a cat', 'a dog', 'a cute animal', 'a pet at home'] },
];
const LENS_OTHER_PROMPTS = ['a document or a screenshot', 'text or a note', 'an everyday object', 'a car or a vehicle', 'a building or a room', 'a piece of paper'];   // どのカテゴリでもない対抗（誤検出抑制）
const LENS_TEXT_ANCHORS = ['a random photo', 'a person', 'a landscape', 'food', 'an animal', 'a building', 'a document or a screenshot', 'an everyday object'];         // フリーテキストの対抗アンカー
let _lensCategoryVecs = null;    // { food:[], landscape:[], people:[], pet:[], _other:[] } キャッシュ
let _lensTextAnchorVecs = null;  // フリーテキスト対抗アンカーのキャッシュ

// 文章側モデル (tokenizer + text encoder) を遅延ロード。画像モデルは opt-in 済で DL 済のはず →
// 追加分は文章重みのみ。onProgress({pct,file}) で進捗を返す。
async function loadTextEncoder(onProgress) {
  if (aiTextModel && aiTokenizer) return;
  aiTextLoading = true;
  try {
    const tx = await import(PHASE2_CDN);
    const { AutoTokenizer, CLIPTextModelWithProjection } = tx;
    if (!aiTokenizer) aiTokenizer = await AutoTokenizer.from_pretrained(PHASE2_MODEL);
    if (!aiTextModel) aiTextModel = await CLIPTextModelWithProjection.from_pretrained(PHASE2_MODEL, {
      dtype: 'q8',   // 量子化 (小さく DL)。retrieval なら q8 で十分
      progress_callback: (d) => {
        if (onProgress && d?.status === 'progress' && typeof d.progress === 'number') onProgress({ pct: Math.round(d.progress), file: d.file });
      },
    });
  } finally {
    aiTextLoading = false;
  }
}

// 語群を 512 次元・正規化ベクトルに (内積 = コサイン類似)。
async function encodeTexts(prompts, onProgress) {
  await loadTextEncoder(onProgress);
  const inputs = aiTokenizer(prompts, { padding: true, truncation: true });
  const out = await aiTextModel(inputs);
  const t = out.text_embeds;
  const data = t.data, dim = t.dims[t.dims.length - 1], n = t.dims[0];
  const vecs = [];
  for (let i = 0; i < n; i++) {
    const v = new Float32Array(dim);
    let s = 0;
    for (let k = 0; k < dim; k++) { const x = data[i * dim + k]; v[k] = x; s += x * x; }
    s = Math.sqrt(s) || 1;
    for (let k = 0; k < dim; k++) v[k] /= s;
    vecs.push(v);
  }
  return vecs;
}

// カテゴリ全語＋その他を一度だけエンコードしてキャッシュ（key→ベクトル群）。
async function ensureCategoryVecs(onProgress) {
  if (_lensCategoryVecs) return _lensCategoryVecs;
  const flat = [];
  for (const c of LENS_CATEGORIES) flat.push(...c.prompts);
  flat.push(...LENS_OTHER_PROMPTS);
  const vecs = await encodeTexts(flat, onProgress);
  const map = {}; let i = 0;
  for (const c of LENS_CATEGORIES) { map[c.key] = vecs.slice(i, i + c.prompts.length); i += c.prompts.length; }
  map._other = vecs.slice(i);
  _lensCategoryVecs = map;
  return map;
}
// カテゴリ key の対抗 = 他の全カテゴリ＋その他（このカテゴリだけを陽性に、残りを陰性に）。
function categoryNegatives(key, map) {
  const neg = [];
  for (const c of LENS_CATEGORIES) if (c.key !== key) neg.push(...map[c.key]);
  neg.push(...map._other);
  return neg;
}
async function ensureTextAnchorVecs(onProgress) {
  if (_lensTextAnchorVecs) return _lensTextAnchorVecs;
  _lensTextAnchorVecs = await encodeTexts(LENS_TEXT_ANCHORS, onProgress);
  return _lensTextAnchorVecs;
}
// アップロード画像を CLIP 画像エンコーダで 512 次元に（保存済み写真 embedding と同じ空間）。端末内・送信なし。
async function extractImageEmbedding(file) {
  await loadAIPipeline();   // aiExtractor（画像側・opt-in 済なら DL 済）
  const url = URL.createObjectURL(file);
  try {
    const result = await aiExtractor(url, { pooling: 'mean', normalize: true });
    return result?.data || result;
  } finally { URL.revokeObjectURL(url); }
}

function _cosDot(a, b) { let s = 0; const n = Math.min(a.length, b.length); for (let i = 0; i < n; i++) s += a[i] * b[i]; return s; }

// この写真が陽性語群にどれだけ合うか (ゼロショット確率)。陽性＋陰性の logit を softmax し陽性の和。
function lensProbOf(embedding, posVecs, negVecs) {
  const logits = [];
  for (const v of posVecs) logits.push(CLIP_LOGIT_SCALE * _cosDot(embedding, v));
  for (const v of negVecs) logits.push(CLIP_LOGIT_SCALE * _cosDot(embedding, v));
  const mx = Math.max(...logits);
  let sum = 0; const ex = logits.map(l => { const e = Math.exp(l - mx); sum += e; return e; });
  let pos = 0; for (let i = 0; i < posVecs.length; i++) pos += ex[i];
  return pos / (sum || 1);
}

// ---- 🔍 意味レンズ オーバーレイ (全画面・z1900) ----
let lensState = null;   // { overlay, phase, lens, photos, loadMsg, loadPct, groupBy, gridBig, error }

function closeLens() { if (lensState) { lensState.overlay.remove(); lensState = null; } }

// レンズ結果から「⇆ 比べる」。レンズ(z1900)は開いたまま比較(z4000)を上に重ね、閉じると戻る。
// 足跡の地図は意味レンズでは場所文脈外＋z順問題(map z150 が z1900 の下)なので hideTripMap で隠す。
function openLensCompare() {
  if (!lensState) return;
  const list = (lensState.photos || []).slice().reverse();   // 昔→今（compare は先頭=最古/末尾=最新を左右に置く）
  if (list.length < 2) { logInfo(tr('比べるには写真が2枚以上必要です', 'Need at least 2 photos to compare')); return; }
  const lab = (lensState.lens && lensState.lens.label) || '🔍';
  openCompareView(list, null, false, null, { hideTripMap: true, title: `${lab} ${tr('を見比べる', '· compare')}` });
}

async function openLens(initialKey) {
  closeLens();
  const overlay = document.createElement('div');
  overlay.className = 'food-overlay';   // z1900 レイヤ（クラス名は据え置き）
  overlay.innerHTML =
    `<div class="atl-header"><div class="atl-title">🍜 ${tr('食べ物を振り返る', 'Food memories')}</div><button class="atl-close" type="button">✕</button></div>` +
    `<div class="atl-body"></div>`;
  document.body.appendChild(overlay);
  overlay.querySelector('.atl-close').addEventListener('click', closeLens);
  lensState = { overlay, phase: 'ready', lens: null, photos: [], loadMsg: '', loadPct: 0, groupBy: 'month', gridBig: false };

  const embedded = allPhotos.filter(p => visible(p) && p.embedding);
  if (embedded.length < 3) {   // AI 未解析 → まず 🧠 で解析してもらう
    lensState.phase = 'need-ai';
    renderLens();
    return;
  }
  renderLens();   // まずレンズバーを出す
  const cat = LENS_CATEGORIES.find(c => c.key === (initialKey || 'food')) || LENS_CATEGORIES[0];
  runCategoryLens(cat);   // 既定＝食べ物（最初に刺さったカテゴリ）
}

// レンズ共通ランナー: scoreFn(embedded, onProgress)→一致写真配列 を受け、時系列に並べて表示。
async function runLensScoring(scoreFn) {
  if (!lensState) return;
  const embedded = allPhotos.filter(p => visible(p) && p.embedding);
  lensState.phase = 'loading';
  lensState.loadMsg = tr('探しています…', 'Searching…');
  lensState.loadPct = 0;
  renderLens();
  try {
    const matched = await scoreFn(embedded, ({ pct }) => {
      if (!lensState) return;
      lensState.loadMsg = tr('文章モデルを読み込み中…', 'Loading text model…');
      lensState.loadPct = pct;
      renderLens();
    });
    if (!lensState) return;   // 途中で閉じ/切替
    matched.sort((a, b) => b.datetime - a.datetime);   // 新→古（画像レンズは上位N済→ここで時系列に）
    lensState.photos = matched;
    lensState.phase = 'ready';
    renderLens();
  } catch (e) {
    if (!lensState) return;
    lensState.phase = 'error';
    lensState.error = e?.message || String(e);
    renderLens();
    console.warn('[lens]', e);
  }
}

function runCategoryLens(cat) {
  if (!lensState) return;
  lensState.lens = { type: 'category', key: cat.key, label: `${cat.emoji} ${tr(cat.ja, cat.en)}` };
  runLensScoring(async (embedded, onProgress) => {
    const map = await ensureCategoryVecs(onProgress);
    const neg = categoryNegatives(cat.key, map);
    return embedded.filter(p => lensProbOf(p.embedding, map[cat.key], neg) >= LENS_MIN_PROB);
  });
}

function runTextLens(query) {
  if (!lensState) return;
  lensState.lens = { type: 'text', query, label: `🔤 “${query}”` };
  runLensScoring(async (embedded, onProgress) => {
    const anchors = await ensureTextAnchorVecs(onProgress);
    const pos = await encodeTexts([query, `a photo of ${query}`]);   // 語＋"a photo of 語"
    return embedded.filter(p => lensProbOf(p.embedding, pos, anchors) >= LENS_MIN_PROB);
  });
}

function runImageLens(file) {
  if (!lensState) return;
  lensState.lens = { type: 'image', label: tr('📷 似た写真', '📷 Similar photos') };
  runLensScoring(async (embedded) => {
    const q = await extractImageEmbedding(file);   // アップロード画像の embedding
    return embedded
      .map(p => ({ p, s: _cosDot(p.embedding, q) }))
      .filter(x => x.s >= LENS_IMAGE_MIN_COS)
      .sort((a, b) => b.s - a.s)
      .slice(0, LENS_IMAGE_TOPK)
      .map(x => x.p);
  });
}

// レンズバー: カテゴリチップ＋フリーテキスト＋写真で探す（切替でレンズを再実行）。
function appendLensBar(body) {
  const cur = lensState.lens || {};
  const bar = document.createElement('div'); bar.className = 'lens-bar';
  const chips = document.createElement('div'); chips.className = 'lens-chips';
  LENS_CATEGORIES.forEach(c => {
    const b = document.createElement('button');
    b.className = 'lens-chip' + (cur.type === 'category' && cur.key === c.key ? ' on' : '');
    b.type = 'button';
    b.textContent = `${c.emoji} ${tr(c.ja, c.en)}`;
    b.addEventListener('click', () => runCategoryLens(c));
    chips.appendChild(b);
  });
  bar.appendChild(chips);
  const row = document.createElement('div'); row.className = 'lens-search';
  row.innerHTML = `<input type="text" class="lens-q" placeholder="${tr('言葉で探す（例：海、誕生日、桜…）', 'Search by words (e.g. sea, birthday, blossom…)')}" value="${cur.type === 'text' ? annivEsc(cur.query) : ''}"><button class="lens-go" type="button">${tr('探す', 'Go')}</button>`;
  bar.appendChild(row);

}

// 「📷 写真で探す」用の一時ファイル入力（アップロードした写真は端末内で埋め込み化するだけ・送信なし）。
function lensPhotoInput() {
  const inp = document.createElement('input');
  inp.type = 'file'; inp.accept = 'image/*'; inp.style.display = 'none';
  document.body.appendChild(inp);
  inp.addEventListener('change', () => { const f = inp.files && inp.files[0]; inp.remove(); if (f) runImageLens(f); });
  inp.click();
}

// ============================================================
// v161: 📐 定点（同じ角度を時間を空けて重ね撮り）
//   基準写真を半透明でカメラ映像に重ねる「ゴースト」方式（定点観測の定石）＋左右分割切替。
//   輪郭がピタッと合うまで動いて撮る → 撮った1枚は普通の写真として取り込み（importOne・日時=今）
//   ＋基準写真にひも付け（p.rephotoOf = root id・photos ストアはスキーマレス＝DB 移行なし）。
//   シリーズ＝基準＋その子ら。見る側は既存資産を再利用（buildTimelinePhotos ＋ ⇆比べる）。
//   入口＝拡大表示の「🎞️ この角度で撮り重ねる」。前面カメラはプレビューと基準を両方ミラーして
//   合わせ、保存は非ミラー（シリーズ内で向きが揃う）。撮影は基準写真と同じ縦横比で中央 crop
//   ＝シリーズ全部が同じ額縁。カメラ映像は端末内のみ（getUserMedia・どこにも送信しない）。
//   ⚠ native アプリではカメラ権限宣言（Info.plist / Manifest）が必要＝1.5 ビルドから。web は今日から。
// ============================================================
function rephotoRootOf(p) { return p.rephotoOf || p.id; }
function rephotoSeriesOf(p) {
  const root = rephotoRootOf(p);
  return allPhotos
    .filter(x => visible(x) && (x.id === root || x.rephotoOf === root))
    .sort((a, b) => a.datetime - b.datetime);   // 昔→今
}
// v166: 基準写真＝重ねる時の下敷き（ゴースト）＋位置の継承元。既定＝最初の1枚（root）だが
//   root.rpBasePhotoId で変更できる（シリーズ内の任意の写真）。消えていたら root に戻す。
function rephotoBasePhotoOf(root) {
  if (root && root.rpBasePhotoId) { const b = photoById(root.rpBasePhotoId); if (b && visible(b)) return b; }
  return root;
}
// v166+: 重ね撮りメタ（rpTitle/rpBaseDate/rpNotes/rpBasePhotoId/rpInheritLoc/rpFolder）を保存。
//   ⚠ iOS Safari は IDB から読んだ Blob(thumb) を含む写真レコードの再 put で tx が hang することがある
//   （WebKit 既知バグ）。UI は dbPut を待たずに即更新＋再描画し、保存は裏で投げる（失敗は静かにログ）。
function rpPersist(root) { try { return Promise.resolve(dbPut(root)).catch(e => logErr((e && e.message || e) + '')); } catch (e) { logErr('rpPersist: ' + (e && e.message || e)); } }

// ============================================================
// 🎞️ 重ね撮りの削除（v169）
//   ユーザー要望: ①フォルダごと削除 ②フォルダ内の1枚を削除。どちらも2通り選べる:
//    ・「フォルダから外す」= 重ね撮りのひも付けだけ外す→通常写真として地図/タイムラインに残る
//    ・「非表示にする」   = 既存の excluded（どこからも消える・「🗑 削除した写真」から復元可）
//   保存は写真レコード(Blob)を含むので rpPersist と同じく裏で投げる（iOS の tx hang 対策）。
// ============================================================
const RP_META_KEYS = ['rephotoOf', 'rpFolder', 'rpTitle', 'rpBaseDate', 'rpNotes', 'rpBasePhotoId', 'rpInheritLoc'];
function stripRephotoFlags(p) { RP_META_KEYS.forEach(k => { delete p[k]; }); }

// 1枚をフォルダから外して通常写真化。root（器）を外す時は最古の子を新 root に昇格して器を保つ。
// 戻り値 { newRoot, folderGone }（呼び出し側の再描画用）。保存は裏（rpPersist）。
function detachPhotoFromRephoto(p, root) {
  const series = rephotoSeriesOf(root);            // visible・昔→今（p を含む）
  const others = series.filter(x => x.id !== p.id);
  let newRoot = root, folderGone = false;
  if (p.id === root.id) {
    if (others.length) {                           // 器を昇格：最古の子を新 root に、メタを移管
      newRoot = others[0];
      if (root.rpTitle) newRoot.rpTitle = root.rpTitle;
      if (root.rpBaseDate) newRoot.rpBaseDate = root.rpBaseDate;
      if (root.rpNotes) newRoot.rpNotes = root.rpNotes;
      if (root.rpInheritLoc !== undefined) newRoot.rpInheritLoc = root.rpInheritLoc;
      if (root.rpBasePhotoId && root.rpBasePhotoId !== p.id) newRoot.rpBasePhotoId = root.rpBasePhotoId;
      newRoot.rpFolder = true;
      delete newRoot.rephotoOf;
      others.slice(1).forEach(o => { o.rephotoOf = newRoot.id; });
      [newRoot, ...others.slice(1)].forEach(rec => rpPersist(rec));
    } else {
      folderGone = true;                           // 1枚だけのフォルダ→消滅
    }
  }
  stripRephotoFlags(p);                            // p を通常写真化
  rpPersist(p);
  return { newRoot, folderGone };
}

// フォルダ（シリーズ）全体を削除。mode='detach'（写真は残す）/ 'hide'（写真ごと非表示）。
function deleteRephotoFolder(root, mode) {
  const series = rephotoSeriesOf(root);
  if (mode === 'hide') series.forEach(p => { p.excluded = true; });
  else series.forEach(p => stripRephotoFlags(p));
  series.forEach(p => rpPersist(p));
  if (mapState && mapState.refreshData) mapState.refreshData();
  render();
}

// 個別写真の削除2択（拡大表示の「🗑 削除」から）
function promptRephotoPhotoDelete(p, root) {
  const modal = document.createElement('div'); modal.className = 'ai-modal anniv-z';
  modal.innerHTML =
    `<div class="ai-modal-card"><h2>${tr('この写真を…', 'This photo…')}</h2>` +
    `<p>${tr('「フォルダから外す」と、地図やタイムラインには通常の写真として残ります。「非表示」にすると、どこからも見えなくなります（「🗑 削除した写真」から戻せます）。', 'Remove from folder keeps it as a normal photo on the map and timeline. Hide removes it everywhere (restore from “🗑 Deleted photos”).')}</p>` +
    `<div class="rp-del-choices">` +
      `<button class="rp-del-detach" type="button">${tr('📤 フォルダから外す（写真は残す）', '📤 Remove from folder (keep photo)')}</button>` +
      `<button class="rp-del-hide" type="button">${tr('🗑 写真を非表示にする', '🗑 Hide the photo')}</button>` +
    `</div>` +
    `<div class="actions"><button id="rpDelCancel" type="button">${tr('キャンセル', 'Cancel')}</button></div></div>`;
  document.body.appendChild(modal);
  const close = () => modal.remove();
  modal.querySelector('#rpDelCancel').addEventListener('click', close);
  modal.addEventListener('click', e => { if (e.target === modal) close(); });
  modal.querySelector('.rp-del-detach').addEventListener('click', () => {
    const r = detachPhotoFromRephoto(p, root);
    close();
    if (fullImageState) closeFullImage();
    if (!rephoSeriesState) return;
    if (r.folderGone) { closeRephotoSeries(); openRephotoList(); }
    else { rephoSeriesState.root = r.newRoot; renderRephotoSeries(); }
  });
  modal.querySelector('.rp-del-hide').addEventListener('click', () => {
    excludePhoto(p);                               // 既存＝excluded=true・render・トースト・dbPut(裏)
    close();
    if (fullImageState) closeFullImage();
    if (rephoSeriesState) renderRephotoSeries();
  });
}

// フォルダ削除2択（⚙設定の「🗑 このフォルダを削除」から）
function promptRephotoFolderDelete(root) {
  const modal = document.createElement('div'); modal.className = 'ai-modal anniv-z';
  modal.innerHTML =
    `<div class="ai-modal-card"><h2>${tr('このフォルダを削除', 'Delete this folder')}</h2>` +
    `<p>${annivEsc(rephotoTitleOf(root))} — ${tr('「フォルダだけ削除」すると中の写真は通常写真として地図・タイムラインに残ります。「写真ごと非表示」にすると、中の写真はどこからも見えなくなります（「🗑 削除した写真」から戻せます）。', 'Delete folder only: photos stay as normal photos on the map and timeline. Hide photos too: they disappear everywhere (restore from “🗑 Deleted photos”).')}</p>` +
    `<div class="rp-del-choices">` +
      `<button class="rp-fdel-detach" type="button">${tr('📤 フォルダだけ削除（写真は残す）', '📤 Delete folder only (keep photos)')}</button>` +
      `<button class="rp-fdel-hide" type="button">${tr('🗑 写真ごと非表示にする', '🗑 Hide the photos too')}</button>` +
    `</div>` +
    `<div class="actions"><button id="rpFDelCancel" type="button">${tr('キャンセル', 'Cancel')}</button></div></div>`;
  document.body.appendChild(modal);
  const close = () => modal.remove();
  modal.querySelector('#rpFDelCancel').addEventListener('click', close);
  modal.addEventListener('click', e => { if (e.target === modal) close(); });
  const done = (mode) => { deleteRephotoFolder(root, mode); close(); closeRephotoSeries(); openRephotoList(); };
  modal.querySelector('.rp-fdel-detach').addEventListener('click', () => done('detach'));
  modal.querySelector('.rp-fdel-hide').addEventListener('click', () => done('hide'));
}

let rephoState = null;   // { overlay, base, stream, facing, mode, busy, aspect, _onResize }
function closeRephotoCamera() {
  if (!rephoState) return;
  try { (rephoState.stream ? rephoState.stream.getTracks() : []).forEach(t => t.stop()); } catch {}
  if (rephoState._onResize) window.removeEventListener('resize', rephoState._onResize);
  rephoState.overlay.remove();
  rephoState = null;
}

async function startRephotoStream() {
  if (!rephoState) return;
  try { (rephoState.stream ? rephoState.stream.getTracks() : []).forEach(t => t.stop()); } catch {}
  rephoState.stream = null;
  const video = rephoState.overlay.querySelector('video');
  let stream = null;
  try {
    stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: rephoState.facing }, audio: false });
  } catch (e1) {
    try { stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false }); } catch (e2) {
      if (!rephoState) return;
      const st = rephoState.overlay.querySelector('.repho-stage');
      st.innerHTML = `<div class="repho-err">${tr('カメラを使えませんでした。ブラウザのカメラ許可を確認してください。', 'Could not access the camera. Please check the browser camera permission.')}<br><span style="color:#888;font-size:11px;">${e2?.message || e2}</span></div>`;
      return;
    }
  }
  if (!rephoState) { try { stream.getTracks().forEach(t => t.stop()); } catch {} return; }   // 待ち中に閉じられた
  rephoState.stream = stream;
  video.srcObject = stream;
  video.muted = true;
  try { await video.play(); } catch {}
}

// v165: 重ね撮り＝定点（同じ場所を時間を空けて）。撮った1枚に位置を持たせて 地図/いまの場所/囲む に
//   乗せる（定点なので相性が良い）。優先＝撮影時の現在地 GPS（あなたは今その場所にいる＝最も正確）。
//   取れなければ基準写真の位置を継承（同じ場所なので良い近似）。位置はアプリ内レコードに持つだけ＝
//   端末内・書き出す JPEG には焼き込まない（「Data Not Collected」不変）。?shot 等 LOCATION_AVAILABLE=false
//   では GPS を呼ばず（許可を求めず）基準継承のみ。カメラを開いた時点で先取りしてシャッターに間に合わせる。
function currentGeoOnce() {
  return new Promise(resolve => {
    if (!LOCATION_AVAILABLE || !navigator.geolocation) { resolve(null); return; }
    navigator.geolocation.getCurrentPosition(
      pos => resolve({ lat: pos.coords.latitude, lng: pos.coords.longitude }),
      () => resolve(null),
      { enableHighAccuracy: true, maximumAge: 30000, timeout: 8000 }
    );
  });
}

function openRephotoCamera(base, opts) {
  opts = opts || {};
  const newSeries = !!opts.newSeries;   // v166: 一覧の「＋新規」＝下敷きの写真が無い新しいフォルダー。最初の1枚が root になる
  if (!base && !newSeries) return;
  if (!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia)) { logErr(tr('この環境ではカメラを使えません', 'Camera is not available here')); return; }
  closeRephotoCamera();
  const overlay = document.createElement('div');
  overlay.className = 'repho-cam' + (newSeries ? ' newseries' : '');
  // v165: 全画面化＝ヘッダ/黒帯を廃止。ステージ inset:0、ツールはアイコン円ボタン(左上)・✕(右上)・
  //   スライダー＋シャッター(下部グラデ) を映像の上にオーバーレイ（実機FB「できるだけ大きな画面で」）。
  overlay.innerHTML =
    `<div class="repho-stage"><div class="repho-frame"><video autoplay muted playsinline></video><img class="repho-ghost" alt="">` +
      `<span class="repho-tag repho-tag-cam">📷 ${tr('いま', 'Now')}</span><span class="repho-tag repho-tag-ref">🖼 ${tr('基準', 'Reference')}</span>` +
      `<div class="repho-guide"></div><div class="repho-grid repho-grid-cam"></div><div class="repho-grid repho-grid-ref"></div><div class="repho-count"></div></div></div>` +
    `<div class="repho-tools">` +
      `<button class="repho-tool repho-mode" type="button" title="${tr('2画面で両方まるごと見る（縦持ち=上下・横持ち=左右）', 'Split view, both shown whole (portrait: stacked / landscape: side by side)')}">⊟</button>` +
      `<button class="repho-tool repho-gridbtn" type="button" title="${tr('3×3 のグリッド線（構図合わせ用）', 'Show a 3×3 grid for composition')}">⊞</button>` +
      `<button class="repho-tool repho-timer" type="button" title="${tr('セルフタイマー（オフ / 3秒 / 10秒）', 'Self-timer (off / 3s / 10s)')}">⏱</button>` +
      `<button class="repho-tool repho-size" type="button" title="${tr('保存する写真のサイズ（S=小1024 / M=標準2048 / L=大3072）', 'Saved photo size (S=small 1024 / M=standard 2048 / L=large 3072)')}">M</button>` +
      `<button class="repho-tool repho-flip" type="button" title="${tr('前後カメラ切替', 'Flip camera')}">🔄</button>` +
    `</div>` +
    `<button class="repho-x" type="button" title="${tr('閉じる', 'Close')}">✕</button>` +
    `<div class="repho-ctrl">` +
      `<div class="repho-refbar" style="display:none">` +   // v173: 基準スワイプバー（フォルダー2枚以上で表示）
        `<button class="repho-refarrow repho-refprev" type="button" title="${tr('前の写真を下敷きに', 'Previous photo as underlay')}">‹</button>` +
        `<span class="repho-refinfo"></span>` +
        `<button class="repho-refarrow repho-refnext" type="button" title="${tr('次の写真を下敷きに', 'Next photo as underlay')}">›</button>` +
        `<button class="repho-refpin" type="button" title="${tr('表示中の写真をこのフォルダーの基準写真にする', 'Make the shown photo this folder’s reference photo')}">📌</button>` +
      `</div>` +
      `<div class="repho-opacity"><span>${tr('基準', 'Ref')}</span><input type="range" min="0" max="85" value="45"><span>${tr('濃く', 'More')}</span></div>` +
      `<button class="repho-shutter" type="button" title="${tr('撮る', 'Shoot')}"></button>` +
    `</div>`;
  document.body.appendChild(overlay);
  rephoState = { overlay, base: base || null, newSeries, title: opts.title || '', stream: null, facing: 'environment', mode: 'ghost', grid: false, timer: 0, busy: false, aspect: null, _onResize: null, geo: null, captureMax: 2048 };
  currentGeoOnce().then(g => { if (rephoState && rephoState.overlay === overlay) rephoState.geo = g; });   // v165: 現在地を先取り（撮影時に使う）
  const frame = overlay.querySelector('.repho-frame');
  const ghost = overlay.querySelector('.repho-ghost');
  const slider = overlay.querySelector('.repho-opacity input');
  ghost.style.opacity = slider.value / 100;
  slider.addEventListener('input', () => { ghost.style.opacity = slider.value / 100; });
  // v162: 分割(上下)でカメラ側に「実際に保存される範囲」(基準と同じ縦横比の中央) を破線で示す。ゴースト時は非表示
  const guide = overlay.querySelector('.repho-guide');
  const updateGuide = () => {
    if (!rephoState) { guide.style.display = 'none'; return; }
    const v = overlay.querySelector('video');
    if (rephoState.mode !== 'split' || !v.videoWidth || !v.videoHeight) { guide.style.display = 'none'; return; }
    const horiz = frame.classList.contains('split-h');   // v173: 横持ち＝左右分割（カメラは左セル）
    const cellW = horiz ? frame.clientWidth / 2 : frame.clientWidth;
    const cellH = horiz ? frame.clientHeight : frame.clientHeight / 2;
    let dw = cellW, dh = dw * v.videoHeight / v.videoWidth;   // contain されたカメラ映像の表示サイズ
    if (dh > cellH) { dh = cellH; dw = dh * v.videoWidth / v.videoHeight; }
    const A = rephoState.aspect || v.videoWidth / v.videoHeight;
    let gw = dw, gh = gw / A;                                 // その中で保存される中央 crop 範囲
    if (gh > dh) { gh = dh; gw = gh * A; }
    guide.style.display = 'block';
    guide.style.width = Math.round(gw) + 'px';
    guide.style.height = Math.round(gh) + 'px';
  };
  // v164: グリッド線を「写真の実表示領域(contain 後の box)」に合わせる＝写真の外(黒帯)にはみ出さない。
  //   上=カメラ / 下=基準 の両方に同じ 3×3（各写真をそれぞれ3分割＝アスペクトが同じなら線が揃う）。
  const gcam = overlay.querySelector('.repho-grid-cam');
  const gref = overlay.querySelector('.repho-grid-ref');
  const containBox = (dispW, dispH, natW, natH, offX, offY) => {   // dispセル内に contain された写真の box（offX/offY=セルの左上・v173 で左右分割にも対応）
    if (!natW || !natH) return { left: offX, top: offY, w: dispW, h: dispH };
    let w = dispW, h = dispW * natH / natW;
    if (h > dispH) { h = dispH; w = dispH * natW / natH; }
    return { left: offX + (dispW - w) / 2, top: offY + (dispH - h) / 2, w, h };
  };
  const place = (el, b) => { el.style.display = 'block'; el.style.left = Math.round(b.left) + 'px'; el.style.top = Math.round(b.top) + 'px'; el.style.width = Math.round(b.w) + 'px'; el.style.height = Math.round(b.h) + 'px'; };
  const updateGrid = () => {
    if (!rephoState || !rephoState.grid) { gcam.style.display = 'none'; gref.style.display = 'none'; return; }
    const v = overlay.querySelector('video');
    const fw = frame.clientWidth, fh = frame.clientHeight;
    if (rephoState.mode === 'split') {
      if (frame.classList.contains('split-h')) {   // v173: 横持ち＝左右（左=カメラ/右=基準）
        const cellW = fw / 2;
        place(gcam, containBox(cellW, fh, v.videoWidth, v.videoHeight, 0, 0));
        place(gref, containBox(cellW, fh, ghost.naturalWidth, ghost.naturalHeight, cellW, 0));
      } else {                                      // 縦持ち＝上下（上=カメラ/下=基準・従来）
        const cellH = fh / 2;
        place(gcam, containBox(fw, cellH, v.videoWidth, v.videoHeight, 0, 0));
        place(gref, containBox(fw, cellH, ghost.naturalWidth, ghost.naturalHeight, 0, cellH));
      }
    } else {
      place(gcam, { left: 0, top: 0, w: fw, h: fh });   // ゴースト＝frame が基準アスペクト枠＝写真ぴったり（重なるので1枚で両方に乗る）
      gref.style.display = 'none';
    }
  };
  // 枠: ゴースト=基準写真の縦横比の最大内接ボックス（video も ghost も cover で重なる＝同じ額縁）
  //     分割(v162)=ステージいっぱい（各半分に contain で両方まるごと見える・実機FB）
  const fit = () => {
    if (!rephoState) return;
    const stage = overlay.querySelector('.repho-stage');
    // v174: 写真にアイコン類を重ねない（実機FB）＝コントロール分を stage から先に差し引く。
    //   縦持ち＝上帯(ツール) / 下帯(基準バー+スライダー+シャッター)。横持ち＝上帯(ツール+基準バー) / 右帯(シャッター) / 下帯(スライダー・ゴースト時のみ)。
    const landscape = overlay.clientWidth > overlay.clientHeight;
    overlay.classList.toggle('landscape', landscape);
    const tools = overlay.querySelector('.repho-tools');
    stage.style.top = (tools.offsetTop + tools.offsetHeight + 6) + 'px';
    if (landscape) {
      const showSlider = rephoState.mode === 'ghost' && !newSeries;
      stage.style.bottom = (showSlider ? overlay.querySelector('.repho-opacity').offsetHeight + 22 : 8) + 'px';
      stage.style.right = (overlay.querySelector('.repho-shutter').offsetWidth + 30) + 'px';
    } else {
      stage.style.bottom = overlay.querySelector('.repho-ctrl').offsetHeight + 'px';
      stage.style.right = '0px';
    }
    if (rephoState.mode === 'split') {
      frame.classList.toggle('split-h', stage.clientWidth > stage.clientHeight);   // v173: 縦持ち=上下 / 横持ち=左右（回転で自動切替＝resize 経由）
      frame.style.width = '100%';
      frame.style.height = '100%';
    } else {
      const A = rephoState.aspect || 3 / 4;
      let w = stage.clientWidth, h = w / A;
      if (h > stage.clientHeight) { h = stage.clientHeight; w = h * A; }
      frame.style.width = Math.round(w) + 'px';
      frame.style.height = Math.round(h) + 'px';
    }
    updateGuide();
    updateGrid();
  };
  overlay.querySelector('video').addEventListener('loadedmetadata', () => {
    const v = overlay.querySelector('video');
    if (rephoState && rephoState.newSeries && !rephoState.aspect && v.videoWidth) { rephoState.aspect = v.videoWidth / v.videoHeight; fit(); }   // v166: 新規は下敷きが無い＝カメラの実比率で枠＝保存もその比率
    updateGuide(); updateGrid();
  });
  ghost.addEventListener('load', () => {
    if (!rephoState) return;
    if (ghost.naturalWidth && ghost.naturalHeight) rephoState.aspect = ghost.naturalWidth / ghost.naturalHeight;
    fit();
  });
  if (base) ghost.src = thumbUrl(base);   // v166: 新規フォルダーはゴーストなし
  rephoState._onResize = fit;
  window.addEventListener('resize', fit);
  overlay.querySelector('.repho-x').addEventListener('click', closeRephotoCamera);
  overlay.querySelector('.repho-mode').addEventListener('click', (e) => {
    if (!rephoState) return;
    rephoState.mode = rephoState.mode === 'ghost' ? 'split' : 'ghost';
    const split = rephoState.mode === 'split';
    frame.classList.toggle('split', split);
    overlay.classList.toggle('split', split);   // v165: 分割中は透明度スライダーを隠す（重ね表示でだけ意味がある）
    e.currentTarget.classList.toggle('on', split);
    e.currentTarget.textContent = split ? '👻' : '⊟';   // v165: アイコンのみ＝押すと切り替わる先
    e.currentTarget.title = split ? tr('重ねて表示に戻す', 'Back to overlay view') : tr('2画面で両方まるごと見る（縦持ち=上下・横持ち=左右）', 'Split view, both shown whole (portrait: stacked / landscape: side by side)');
    fit();   // v162: 分割=ステージいっぱい／ゴースト=アスペクト枠 に張り替え＋ガイド更新
  });
  overlay.querySelector('.repho-gridbtn').addEventListener('click', (e) => {   // v163→164: グリッド線（写真領域にフィット・上下両方・既定OFF）
    if (!rephoState) return;
    rephoState.grid = !rephoState.grid;
    e.currentTarget.classList.toggle('on', rephoState.grid);
    updateGrid();
  });
  overlay.querySelector('.repho-timer').addEventListener('click', (e) => {   // v164: セルフタイマー オフ→3秒→10秒（比べて撮る時に構え直す時間）
    if (!rephoState) return;
    rephoState.timer = rephoState.timer === 0 ? 3 : rephoState.timer === 3 ? 10 : 0;
    e.currentTarget.classList.toggle('on', rephoState.timer > 0);
    e.currentTarget.textContent = rephoState.timer === 0 ? '⏱' : `${rephoState.timer}s`;   // v165: 円ボタン＝アイコン/秒数のみ
  });
  overlay.querySelector('.repho-size').addEventListener('click', (e) => {   // v170: 保存する写真のサイズ M(2048)→L(3072)→S(1024)
    if (!rephoState) return;
    const cur = rephoState.captureMax || 2048;
    const next = cur === 2048 ? 3072 : cur === 3072 ? 1024 : 2048;
    rephoState.captureMax = next;
    e.currentTarget.textContent = next === 1024 ? 'S' : next === 3072 ? 'L' : 'M';
    e.currentTarget.classList.toggle('on', next !== 2048);
  });
  overlay.querySelector('.repho-flip').addEventListener('click', () => {
    if (!rephoState) return;
    rephoState.facing = rephoState.facing === 'environment' ? 'user' : 'environment';
    frame.classList.toggle('mirror', rephoState.facing === 'user');   // 前面=プレビューと基準を両方ミラー（保存は非ミラー）
    startRephotoStream();
  });
  overlay.querySelector('.repho-shutter').addEventListener('click', rephotoShoot);
  // v173: 基準写真のスワイプ切替（ゴーストでも2画面でも）＝フォルダー内の別の写真を下敷きにできる。
  //   ‹›タップ or 映像を左右スワイプ。表示中の写真が保存の額縁（aspect・ghost load 経由）と位置継承元（s.base）になる。
  //   📌で root.rpBasePhotoId を永続変更（⚙設定の基準写真ピッカーと同じ・先に反映＋保存は裏＝rpPersist・v166+ の教訓）。
  const refbar = overlay.querySelector('.repho-refbar');
  const refSeries = (!newSeries && base) ? rephotoSeriesOf(base) : [];   // 昔→今
  let refIdx = base ? refSeries.findIndex(x => x.id === base.id) : -1;
  const refRootOf = () => photoById(rephotoRootOf(rephoState.base)) || rephoState.base;
  const updateRefbar = () => {
    if (!rephoState || refIdx < 0 || refSeries.length < 2) { refbar.style.display = 'none'; return; }
    refbar.style.display = 'flex';
    const p = refSeries[refIdx];
    const d = p.datetime ? new Date(p.datetime) : null;
    refbar.querySelector('.repho-refinfo').textContent = `🖼 ${refIdx + 1}/${refSeries.length}` + (d ? ` · ${d.getFullYear()}/${d.getMonth() + 1}/${d.getDate()}` : '');
    refbar.querySelector('.repho-refprev').disabled = refIdx <= 0;
    refbar.querySelector('.repho-refnext').disabled = refIdx >= refSeries.length - 1;
    const isBase = rephotoBasePhotoOf(refRootOf()).id === p.id;
    const pin = refbar.querySelector('.repho-refpin');
    pin.classList.toggle('on', isBase);
    pin.disabled = isBase;
    pin.title = isBase ? tr('この写真が基準写真です', 'This photo is the reference photo') : tr('表示中の写真をこのフォルダーの基準写真にする', 'Make the shown photo this folder’s reference photo');   // v174: アイコン化＝文言は title に（実機FB）
  };
  const setRef = (i) => {
    if (!rephoState || rephoState.busy || refIdx < 0 || refSeries.length < 2) return;
    const ni = Math.max(0, Math.min(refSeries.length - 1, i));
    if (ni === refIdx) return;
    refIdx = ni;
    rephoState.base = refSeries[refIdx];
    ghost.src = thumbUrl(rephoState.base);   // load ハンドラが aspect と枠（fit）を更新＝crop 数式は無改修
    updateRefbar();
  };
  refbar.querySelector('.repho-refprev').addEventListener('click', () => setRef(refIdx - 1));
  refbar.querySelector('.repho-refnext').addEventListener('click', () => setRef(refIdx + 1));
  refbar.querySelector('.repho-refpin').addEventListener('click', () => {
    if (!rephoState || refIdx < 0) return;
    const root = refRootOf(), p = refSeries[refIdx];
    if (p.id === root.id) delete root.rpBasePhotoId; else root.rpBasePhotoId = p.id;   // root 自身＝既定（rpBasePhotoId 不要）
    updateRefbar(); rpPersist(root);
    logInfo(tr('📌 この写真を基準写真にしました', '📌 Set as the reference photo'));
  });
  // スワイプ＝stage 全面（ツール/✕/シャッターは兄弟要素なので届かない）。横優勢＋48px 以上だけ反応＝構図合わせの誤爆を避ける。
  const stageEl = overlay.querySelector('.repho-stage');
  let swipeStart = null;
  stageEl.addEventListener('pointerdown', e => { swipeStart = { x: e.clientX, y: e.clientY, id: e.pointerId }; });
  stageEl.addEventListener('pointerup', e => {
    if (!swipeStart || e.pointerId !== swipeStart.id) return;
    const dx = e.clientX - swipeStart.x, dy = e.clientY - swipeStart.y;
    swipeStart = null;
    if (Math.abs(dx) < 48 || Math.abs(dx) < Math.abs(dy) * 1.4) return;
    setRef(refIdx + (dx < 0 ? 1 : -1));   // 左へ払う＝次（新しい方）
  });
  stageEl.addEventListener('pointercancel', () => { swipeStart = null; });
  updateRefbar();
  fit();
  startRephotoStream();
}

// シャッター＝タイマーがあればカウントダウン→撮影、無ければ即撮影。
function rephotoShoot() {
  const s = rephoState;
  if (!s || s.busy) return;
  const video = s.overlay.querySelector('video');
  if (!video.videoWidth || !video.videoHeight) { logErr(tr('カメラの準備がまだです', 'Camera is not ready yet')); return; }
  if (s.timer > 0) { runRephotoCountdown(s.timer); return; }   // v164: セルフタイマー
  doRephotoCapture();
}

// v164: セルフタイマー（比べて撮る時に構え直す・自撮りで離れる）。大きな数字を中央に。
function runRephotoCountdown(sec) {
  const s = rephoState; if (!s) return;
  s.busy = true;   // カウント中はシャッター無効
  const shutter = s.overlay.querySelector('.repho-shutter'); if (shutter) shutter.disabled = true;
  const badge = s.overlay.querySelector('.repho-count');
  badge.classList.add('on');
  let n = sec;
  const step = () => {
    if (!rephoState) return;   // ✕ で閉じられたら中断（撮らない）
    if (n <= 0) { badge.classList.remove('on'); badge.textContent = ''; doRephotoCapture(); return; }
    badge.textContent = n; n--; setTimeout(step, 1000);
  };
  step();
}

// v170/v172: 撮った重ね撮り写真を端末の写真アプリ（カメラロール）に保存する。native のみ（自前 PhotoLibrary の savePhoto）。
//   ⚠v170 で web はダウンロード fallback にしていたが、iOS Safari は blob ダウンロードでページ遷移し、撮影フロー
//     （アプリ内シリーズへの取り込み）を壊して「シリーズに写真が残らない」回帰を生んだ → web の保存は撤去（v172）。
//   web は従来どおりアプリ内シリーズに残すだけ（端末フォトへは native のみ）。ベストエフォート（失敗しても取り込みは続行）。
async function saveRephotoToLibrary(blob, name) {
  if (!(IS_NATIVE && PhotoLib && PhotoLib.savePhoto)) return null;   // web＝端末フォトには保存しない（アプリ内シリーズには残る）
  try {
    const base64 = await new Promise((res, rej) => {
      const fr = new FileReader();
      fr.onload = () => res(String(fr.result).split(',')[1] || '');
      fr.onerror = () => rej(fr.error || new Error('read failed'));
      fr.readAsDataURL(blob);
    });
    await PhotoLib.savePhoto({ base64, name });
    return 'saved';
  } catch (e) {

async function doRephotoCapture() {
  const s = rephoState;
  if (!s) return;
  const video = s.overlay.querySelector('video');
  const vw = video.videoWidth, vh = video.videoHeight;
  if (!vw || !vh) { logErr(tr('カメラの準備がまだです', 'Camera is not ready yet')); s.busy = false; return; }
  s.busy = true;
  const btn = s.overlay.querySelector('.repho-shutter');
  if (btn) btn.disabled = true;
  try {
    // 基準写真と同じ縦横比で中央 crop（プレビューの cover と同じ見え方を保存する）
    const A = s.aspect || vw / vh;
    let cw = vw, ch = vh, cx = 0, cy = 0;
    if (vw / vh > A) { cw = Math.round(vh * A); cx = Math.round((vw - cw) / 2); }
    else { ch = Math.round(vw / A); cy = Math.round((vh - ch) / 2); }
    const MAX = s.captureMax || 2048;   // v170: サイズ選択（S=1024 / M=2048 / L=3072）＝主にカメラロールに残る原画の解像度
    const scale = Math.min(1, MAX / Math.max(cw, ch));
    const canvas = document.createElement('canvas');
    canvas.width = Math.max(1, Math.round(cw * scale));
    canvas.height = Math.max(1, Math.round(ch * scale));
    canvas.getContext('2d').drawImage(video, cx, cy, cw, ch, 0, 0, canvas.width, canvas.height);
    const blob = await new Promise(r => canvas.toBlob(r, 'image/jpeg', 0.92));
    if (!blob) throw new Error('capture failed');
    const now = new Date();
    const pad = n => String(n).padStart(2, '0');
    const name = `rephoto_${now.getFullYear()}${pad(now.getMonth() + 1)}${pad(now.getDate())}_${pad(now.getHours())}${pad(now.getMinutes())}${pad(now.getSeconds())}.jpg`;
    const file = new File([blob], name, { type: 'image/jpeg', lastModified: now.getTime() });
    const savePromise = saveRephotoToLibrary(blob, name);   // v170: 端末の写真アプリにも保存（native=カメラロール / web=ダウンロード）・ベストエフォート（import と並行）
    // v165/166: 位置＝現在地GPS（開いた時に先取り）優先→基準写真の位置を継承（フォルダー設定 rpInheritLoc が ON の時だけ＝既定ON・食事/コーデ等 場所が変わるフォルダーは OFF にできる）。どちらも無ければ null。
    let lat = (s.geo && typeof s.geo.lat === 'number') ? s.geo.lat : null;
    let lng = (s.geo && typeof s.geo.lng === 'number') ? s.geo.lng : null;
    if (lat == null && !s.newSeries && s.base && typeof s.base.lat === 'number' && typeof s.base.lng === 'number') {
      const froot = photoById(rephotoRootOf(s.base));
      if (!froot || froot.rpInheritLoc !== false) { lat = s.base.lat; lng = s.base.lng; }   // 既定ON・OFF なら継承しない
    }
    const res = await importOne(file, { datetime: now, dateSource: 'exif', lat, lng });   // 今この瞬間に撮った＝撮影日

    if (!res || !res.ok) throw new Error(res && res.skipped ? res.skipped : 'import failed');
    const rec = res.record;
    let root;
    if (s.newSeries) {                          // v166: 最初の1枚が新しいフォルダーの root（rpFolder＝1枚でも一覧に出す）
      rec.rpFolder = true;
      if (s.title) rec.rpTitle = s.title;
      root = rec;
    } else {
      rec.rephotoOf = rephotoRootOf(s.base);    // 既存フォルダーにひも付け（スキーマレス＝DB 移行なし）
      root = photoById(rephotoRootOf(s.base)) || s.base;
    }
    await dbPut(rec);
    addPhotos([rec]);
    const saved = await savePromise;   // v170: 端末保存の結果を待ってトーストに反映
    logInfo(saved ? tr('🎞️ 重ね撮りに1枚積みました（端末にも保存）', '🎞️ Added one layered shot (saved to device)') : tr('🎞️ 重ね撮りに1枚積みました', '🎞️ Added one layered shot'));
    closeRephotoCamera();
    render();
    openRephotoSeries(root);   // 積み重なったシリーズをその場で見る
  } catch (e) {
    logErr(tr(`撮影に失敗: ${e?.message || e}`, `Capture failed: ${e?.message || e}`));
    if (rephoState) {
      rephoState.busy = false;
      const b = rephoState.overlay.querySelector('.repho-shutter');
      if (b) b.disabled = false;
    }
  }
}

  const out = [];
  for (const rootId of rootIds) {
    const anchor = photoById(rootId) || allPhotos.find(p => visible(p) && p.rephotoOf === rootId);   // root 写真が消えていても子から辿れる
    if (!anchor) continue;
    const series = rephotoSeriesOf(anchor);
    if (series.length >= 2 || anchor.rpFolder) out.push({ root: anchor, series });   // 明示フォルダーは1枚でも出す
  }
  out.sort((a, b) => (b.series[b.series.length - 1] || b.root).datetime - (a.series[a.series.length - 1] || a.root).datetime);   // 最終更新の新しい順
  return out;
}
