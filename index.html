// ── GPSなし写真の位置補完 (v74) ──────────────────────────────
// 写真の時刻に「ロガーの軌跡上のどこにいたか」を推定する。Notion §③(b) の最小実装。
//  ・写真時刻を挟む前後の記録点があり、その時間差が TRACK_BRACKET_MS 以内 → 線形補間 (歩いた途中の位置)。
//  ・挟めない時は近い片側の点に TRACK_SNAP_MS 以内なら snap。
//  ・どちらも満たさない (記録のある時間帯の外) → null = 補完しない (= ユーザー指定「記録が残っている時間帯のみ」)。
const TRACK_BRACKET_MS = 60 * 60 * 1000;   // 前後点がこの差以内なら間を補間 (1時間)
const TRACK_SNAP_MS    = 30 * 60 * 1000;   // 片側だけの時はこの差以内なら snap (30分)
function estimateFromTrack(timeMs, pts) {
  if (!pts || !pts.length) return null;
  let lo = 0, hi = pts.length;                         // 二分探索: t >= timeMs の最初の index
  while (lo < hi) { const mid = (lo + hi) >> 1; if (pts[mid].t < timeMs) lo = mid + 1; else hi = mid; }
  const next = pts[lo] || null;                         // t >= timeMs の最初
  const prev = pts[lo - 1] || null;                     // t <  timeMs の最後
  if (prev && next) {
    const gap = next.t - prev.t;
    if (gap <= TRACK_BRACKET_MS) {
      const f = gap > 0 ? (timeMs - prev.t) / gap : 0;
      return { lat: prev.lat + f * (next.lat - prev.lat), lng: prev.lng + f * (next.lng - prev.lng) };
    }
  }
  const cand = [prev, next].filter(Boolean).map(p => ({ p, d: Math.abs(p.t - timeMs) })).sort((a, b) => a.d - b.d)[0];
  if (cand && cand.d <= TRACK_SNAP_MS) return { lat: cand.p.lat, lng: cand.p.lng };
  return null;
}

// 推定位置を写真に確定保存 (v59 の手動保存と同じ流儀。geoFromTrack で由来を区別)。確定後は通常のGPS写真扱いに。
async function confirmEstimatedPos(photo, est) {
  photo.lat = +est.lat.toFixed(6);
  photo.lng = +est.lng.toFixed(6);
  photo.geoFromTrack = true;
  if (seals.length) photo._sealed = seals.some(s => sealMatches(s, photo));   // 場所封印に該当しうる
  try { await dbPut(photo); } catch (e) { logErr(tr(`位置の確定に失敗: ${e?.message || e}`, `Failed to confirm location: ${e?.message || e}`)); return; }
  if (mapState && mapState.refreshData) mapState.refreshData();   // GPS扱いになり通常マーカー/動線へ
  render();
}

// v140: 足跡から写真の位置を自動確定するパス。窓ごとに track を読み、位置なし写真の推定が取れたら永続化。
// 各写真は _autoTrackTried で1回だけ試す（毎描画の再計算/DB書き込みを避ける）。由来は geoFromTrack+geoAuto で残す
// = 地図にバッジ(足跡から)が付き、いつでも「📍位置を直す」で修正できる（[[editing-triggers-reminiscence]] の余地を保つ）。
async function autoConfirmTrackPass(windows) {
  const changed = [];
  for (const [s, e] of windows) {
    const ghosts = allPhotos.filter(p => visible(p) && p.lat == null && p.lng == null
      && !p._autoTrackTried && p.datetime.getTime() >= s && p.datetime.getTime() <= e);
    if (!ghosts.length) continue;
    let pts = [];
    try { pts = await trackGetRange(s, e); } catch {}
    for (const ph of ghosts) {
      ph._autoTrackTried = true;                       // 成否によらず1回だけ (再描画で重複計算しない)
      if (!pts.length) continue;
      const est = estimateFromTrack(ph.datetime.getTime(), pts);
      if (!est) continue;
      ph.lat = +est.lat.toFixed(6);
      ph.lng = +est.lng.toFixed(6);
      ph.geoFromTrack = true; ph.geoAuto = true;
      if (seals.length) ph._sealed = seals.some(sl => sealMatches(sl, ph));
      changed.push(ph);
    }
  }
  for (const ph of changed) { try { await dbPut(ph); } catch {} }
  return changed.length;
}

let mapState = null;
// focusPhoto を渡すと、その写真のピンに寄せて popup を開く (連想ウォークの中心写真 → 地図ピン)。
async function openMapView(focusPhoto, opts) {
  if (mapState) return;
  try { await loadLeaflet(); }
  catch { logErr(tr('地図ライブラリの読み込みに失敗しました（オフラインの可能性）', 'Failed to load the map library (possibly offline)')); return; }

  const overlay = document.createElement('div');
  overlay.className = 'map-overlay';
  overlay.innerHTML =
    `<div id="mapEl"></div>` +
    `<div class="map-ctrlbar">` +
      // v155: 1段目=◀ 過去の今日 ▶ 全期間（日ナビ ◀▶ は維持・ユーザー選択）。
      `<div class="mc-row"><button class="mc-btn mc-icon" id="mcPrev" title="${tr('前の日（過去の昨日…）', 'Previous day (yesterday in past years…)')}">◀</button><button class="mc-btn" id="mcToday" title="${tr('今日＝数年分の同じ月日に戻る', 'Back to today (this date across years)')}">${tr('🗺 過去の今日', '🗺 On This Day')}</button><button class="mc-btn mc-icon" id="mcNext" title="${tr('次の日（過去の明日…）', 'Next day (tomorrow in past years…)')}">▶</button><button class="mc-btn" id="mcFilter">${tr('📅 全期間', '📅 All time')}</button></div>` +
      // v155: 2段目=🎲 📍(現在地=アイコンのみ) 🫧囲んで思い出を見る（⋯メニューから昇格） ⋯表示。
      `<div class="mc-row"><button class="mc-btn mc-icon" id="mcRoll" title="${tr('偶然の1日', 'A random day')}">🎲</button>` +
      // 現在地へ移動（📍のみ）。位置オフ/スクショ用 build(LOCATION_AVAILABLE=false)では出さない＝位置許可を求めない。
      (LOCATION_AVAILABLE ? `<button class="mc-btn mc-icon" id="mcLocate" title="${tr('現在地へ移動', 'Go to my current location')}">📍</button>` : '') +
      `<button class="mc-btn" id="mcEncircle" title="${tr('地図を円で囲んで、その範囲の写真を時系列で見る', 'Encircle an area to see its photos over time')}">${tr('🫧 囲んで見る', '🫧 Encircle')}</button><button class="mc-btn" id="mcMore">${tr('⋯ 表示', '⋯ View')}</button></div>` +
    `</div>` +
    `<div class="mc-pop" id="mcPopFilter" hidden></div>` +
    `<div class="mc-pop" id="mcPopMore" hidden></div>` +
    `<div class="mc-pop" id="mcPopSeal" hidden></div>` +
    `<div class="mc-pop" id="mcPopHelp" hidden></div>` +
    `<button class="map-close">✕</button>` +
    `<button class="map-fs-toggle" title="${tr('地図だけ全画面（タップで切替）', 'Full-screen map (tap to toggle)')}">⛶</button>` +
    `<div class="timeline-sheet">` +
      `<div class="sheet-handle"><span class="sheet-grip"></span><span class="sheet-title">${tr('タイムライン', 'Timeline')}</span></div>` +
      `<div class="sheet-body"></div>` +
    `</div>`;
  document.body.appendChild(overlay);

  // ベースタイル: CARTO ダーク (既定・世界対応) + 地理院 (標準/淡色・日本専用)。参照アプリ owntracks と同じ無料タイル。
  const CARTO_ATTR = "&copy; <a href='https://www.openstreetmap.org/copyright'>OpenStreetMap</a> &copy; <a href='https://carto.com/attributions'>CARTO</a>";
  const GSI_ATTR = "地理院タイル（<a href='https://www.gsi.go.jp/'>国土地理院</a>）";
  const dark = L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png", { maxZoom: 19, attribution: CARTO_ATTR });
  const gsiStd = L.tileLayer("https://cyberjapandata.gsi.go.jp/xyz/std/{z}/{x}/{y}.png", { maxZoom: 18, attribution: GSI_ATTR });
  const gsiPale = L.tileLayer("https://cyberjapandata.gsi.go.jp/xyz/pale/{z}/{x}/{y}.png", { maxZoom: 18, attribution: GSI_ATTR });
  // v130: 世界版の下ごしらえ。地理院タイルは日本国外だと真っ白になるので、非日本語ロケールでは
  //   CARTO Voyager(標準)/Positron(淡色) に差し替える（世界対応の無料タイル）。日本語(ja)は現状の地理院のまま＝不変。
  const cartoVoyager = L.tileLayer("https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}.png", { maxZoom: 20, attribution: CARTO_ATTR });
  const cartoPositron = L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png", { maxZoom: 19, attribution: CARTO_ATTR });
  // ベースタイルの選択を記憶 (v86): 前回選んだ地図 (例: 地理院 淡色) で開く。未選択は既定=ダーク。
  //   key は日英で共通(dark/gsiStd/gsiPale)＝localStorage 互換を保ち、layer と表示名だけロケールで替える。
  const BASE_LAYERS = (LANG === 'ja') ? [
    { key: 'dark',    name: 'ダーク',       layer: dark },
    { key: 'gsiStd',  name: '地理院(標準)', layer: gsiStd },
    { key: 'gsiPale', name: '地理院(淡色)', layer: gsiPale },
  ] : [
    { key: 'dark',    name: 'Dark',     layer: dark },
    { key: 'gsiStd',  name: 'Standard', layer: cartoVoyager },
    { key: 'gsiPale', name: 'Light',    layer: cartoPositron },
  ];
  let savedLayerKey = null; try { savedLayerKey = localStorage.getItem('pms-mapLayer'); } catch {}
  const initialBase = BASE_LAYERS.find(b => b.key === savedLayerKey) || BASE_LAYERS[0];
  const map = L.map('mapEl', { layers: [initialBase.layer], zoomControl: false }).setView([36.2, 138.2], 5);  // 既定: 日本全体・前回のタイル
  // v131: 日本語モードは既定=地理院だが、地理院は日本域のみ＝海外旅行の写真を見ると真っ白になる。
  //   世界の下地(CARTO Positron)を最背面に常時敷く＝地理院タイルが無い海外では下地が透けて見える
  //   （日本国内=地理院の詳細／海外=CARTO・国境をまたいでもシームレス）。en は BASE_LAYERS 自体が世界対応なので下地不要。
  const worldUnderlay = (LANG === 'ja')
    ? L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png", { maxZoom: 19, attribution: CARTO_ATTR })
    : null;
  if (worldUnderlay) { worldUnderlay.addTo(map); worldUnderlay.bringToBack(); }
  L.control.zoom({ position: 'bottomleft' }).addTo(map);
  // v99: ベースタイルの切替は L.control.layers（右上）をやめ ⋯表示メニュー「地図の種類」へ移動（全画面 ⛶ を右上の常設アイコンに昇格＝位置を交換）。初期レイヤは上の setView で設定済み。

  // 表示する「日」を入り口で決める。pickDays = 表示する暦日キーの配列 (ヘッダ=ランダム3日 / 写真=その日)、null=従来の期間ブラウズ。
  // focusedDay = 1本の軌跡をタップした時、その日以外を暗くするための注目日。
  mapState = { overlay, map, range: { start: null, end: null }, tripLayers: [], filteredGps: [], lineGps: [],
               pickDays: null, pickMode: null, focusedDay: null,
               trackLayers: [], showTrack: true,        // 🛰️ 位置ロガーの軌跡 (v73)
               trackMerge: null,                        // v139: 表示中の窓のロガー点 (日別)。drawTrips が写真と時刻順に合流
               estLayers: [], showEstimated: true,      // 📍 GPSなし写真を軌跡の時刻位置に配置 (v74)
               anniv: (opts && opts.anniv) || null,     // v127: この地図が思い出の場所由来なら思い出の場所オブジェクト（⋯表示に「📖ログ」を出す）
               immersive: false };                       // ⛶ 没入フルスクリーン (v98)

  // GPS 写真を撮影順に。除外・封印は出さない (初期表示の判定用。再描画は applyFilter が allPhotos から都度算出)。
  const gps = allPhotos.filter(p => visible(p) && p.lat != null && p.lng != null)
                       .sort((a, b) => a.datetime - b.datetime);

  // クラスタとマーカー索引は「中身を入れ替えて」使う (日付/期間フィルタで張り替えても、
  // タイムライン側の closure が握る参照を保つため、Map/cluster は作り直さず clear→再投入)。
  // animate:false = クラスタのズーム/分裂アニメを切る (瞬時クラスタ化で機敏)。
  // removeOutsideVisibleBounds:false = moveend ごとの「画面外マーカーの付け外し」をやめる。これが
  //   近接マーカー + fitBounds/zoomToShowLayer の組合せで稀に「_leaflet_id in undefined」を投げる箇所
  //   (非同期なので呼び出し側で捕まえられない) → 通らなくする。数十〜数百規模なら全保持で問題なし。
  const cluster = L.markerClusterGroup({ maxClusterRadius: 45, spiderfyOnMaxZoom: true, animate: false, removeOutsideVisibleBounds: false });
  const markerById = new Map();
  map.addLayer(cluster);
  mapState.cluster = cluster;
  mapState.markerById = markerById;

  // 表示フィルタ (日付/期間)。range.start==null は全期間。
  function inRange(p) {
    const r = mapState.range;
    if (r.start == null) return true;
    const t = p.datetime.getTime();
    return t >= r.start && t <= r.end;
  }
  // 地図に出す GPS 写真集合。封印/除外を都度反映するため allPhotos から算出 (封印の追加/解除で張り替わる)。
  // pickDays = 選ばれた日 (ヘッダ=ランダム3日 / 写真=その日) の全 GPS。null = 期間内の全 GPS (従来ブラウズ)。
  function visibleGps() {
    let pool;
    if (mapState.pickDays) {
      const set = new Set(mapState.pickDays);
      pool = allPhotos.filter(p => set.has(dayKeyOf(p)));
    } else {
      pool = allPhotos.filter(p => inRange(p));
    }
    return pool.filter(p => visible(p) && p.lat != null && p.lng != null)
               .sort((a, b) => a.datetime - b.datetime);
  }
  function makePhotoMarker(p) {
    const icon = L.divIcon({
      className: 'photo-marker-wrap',
      html: `<div class="photo-marker${locMarkerClass(p)}" style="background-image:url(${thumbUrl(p)})"></div>`,   // v140: 由来を隅ドットで
      iconSize: [44, 44], iconAnchor: [22, 22], popupAnchor: [0, -22],
    });
    const mk = L.marker([p.lat, p.lng], { icon });
    mk.bindPopup(() => buildMarkerPopup(p), { minWidth: 180, closeButton: true });
    return mk;
  }

  // 動線を描く。
  // ・pickDays モード = 選ばれた各日を独立した1本の軌跡に (色分け / 1本タップで他を暗く / 単一日は時刻→空の色)。
  // ・ブラウズ = 旅行(1日以上あいたら別線)を連続線で日ごと色替え (v58)。表示が単一日なら時刻→空の色 (v63)。
  function drawTrips() {
    for (const l of mapState.tripLayers) map.removeLayer(l);
    mapState.tripLayers = [];
    // v139: 写真の点＋位置ロガーの点を「時刻順に1本」へ。写真だけだと飛び飛びの区間を
    //   ロガーの軌跡が埋め、途切れない足取りになる（ユーザー要望）。trackMerge は refreshTrack が
    //   表示中の日/期間ぶんだけ日別に積むキャッシュ。軌跡トグル OFF なら従来どおり写真のみ。
    //   ロガー点は {lat,lng,datetime} の擬似点に変換＝以降の全ロジック（空色グラデ・日別色・
    //   segmentByGap・dayKeyOf）が写真と同じに扱える。
    const line = (() => {
      const tm = mapState.showTrack ? mapState.trackMerge : null;
      if (!tm || !tm.size) return mapState.lineGps;
      const merged = mapState.lineGps.slice();
      for (const arr of tm.values()) for (const q of arr) merged.push({ lat: q.lat, lng: q.lng, datetime: new Date(q.t), _track: true });
      merged.sort((a, b) => a.datetime - b.datetime);
      return merged;
    })();
    if (!line.length) return;

    // v114: 線を見やすく — 暗い縁取り(casing)を下地に敷き、本線を太めに。地図タイルの上でくっきり浮く。
    const pushCased = (latlngs, color, weight, opacity) => {
      // v123: 見た目の線は非インタラクティブに（タップは pickDays の透明な太い hit 線で拾う／browse は素通しで地図へ）。
      mapState.tripLayers.push(L.polyline(latlngs, { color: '#0a0a0a', weight: weight + 4, opacity: Math.min(1, opacity * 0.6), lineCap: 'round', lineJoin: 'round', interactive: false }).addTo(map));
      const pl = L.polyline(latlngs, { color, weight, opacity, lineCap: 'round', lineJoin: 'round', interactive: false }).addTo(map);
      mapState.tripLayers.push(pl);
      return pl;
    };

    // 単一日の軌跡を時刻→空の色のグラデーションで描く (v63)。dim 時は薄く。v114: 全体に1本の縁取り＋太めの本線。
    const drawSkyLine = (pts, opacity) => {
      const all = pts.map(p => [p.lat, p.lng]);
      mapState.tripLayers.push(L.polyline(all, { color: '#0a0a0a', weight: 9, opacity: Math.min(1, opacity * 0.6), lineCap: 'round', lineJoin: 'round' }).addTo(map));
      for (let i = 0; i < pts.length - 1; i++) {
        const a = pts[i], b = pts[i + 1];
        mapState.tripLayers.push(L.polyline([[a.lat, a.lng], [b.lat, b.lng]],
          { color: skyColor(a.datetime), weight: 5, opacity, lineCap: 'round' }).addTo(map));   // 出発点の時刻で色付け
      }
      if (L.polylineDecorator && L.Symbol) {   // 進行方向は薄い白の矢印 (空色の上で読めるように)
        mapState.tripLayers.push(L.polylineDecorator(all, {
          patterns: [{ offset: 24, repeat: 90, symbol: L.Symbol.arrowHead({ pixelSize: 10, polygon: false, pathOptions: { color: 'rgba(255,255,255,0.85)', weight: 2, opacity: 0.85 } }) }]
        }).addTo(map));
      }
    };

    // pickDays モード: 選ばれた各日を独立した軌跡に (タップでその日だけ残して他を暗く)。
    if (mapState.pickDays) {
      const days = [...new Set(line.map(dayKeyOf))].sort();
      days.forEach((dk, idx) => {
        const pts = line.filter(p => dayKeyOf(p) === dk);   // line は時刻昇順
        if (pts.length < 2) return;                          // GPS 1枚の日は線なし (マーカーのみ、それでよい)
        // タイムラインで折りたたんだ日は、地図でも線を出さない (マーカーは残す)。
        const ds = (() => { const [yy, mm, dd] = dk.split('-').map(Number); return new Date(yy, mm, dd).getTime(); })();
        if (mapState.foldedDays && mapState.foldedDays.has(ds)) return;
        const dim = mapState.focusedDay && mapState.focusedDay !== dk;
        if (days.length === 1) { drawSkyLine(pts, dim ? 0.2 : 0.9); return; }   // 1日だけなら空色
        const color = TRIP_COLORS[idx % TRIP_COLORS.length];
        const op = dim ? 0.15 : 0.85;
        const latlngs = pts.map(p => [p.lat, p.lng]);
        const pl = pushCased(latlngs, color, 4, op);   // v114: 縁取り付きで見やすく (見た目だけ)
        mapState.tripLayers.push(pl);
        if (L.polylineDecorator && L.Symbol) {
          mapState.tripLayers.push(L.polylineDecorator(latlngs, {
            patterns: [{ offset: 24, repeat: 90, symbol: L.Symbol.arrowHead({ pixelSize: 9, polygon: false, pathOptions: { color, weight: 2, opacity: op } }) }]
          }).addTo(map));
        }
        // v123: 実機の指では 4px の線にまず当たらない（preview の座標ピッタリなクリックと違い「無反応」に）。
        //   透明で太い「当たり判定」線を最前面に重ね、タップをそこで拾う。bubblingMouseEvents:false で
        //   地図の背景クリック（focusedDay 解除）へ伝播させない（＋二重で L.DomEvent.stop）。
        const hit = L.polyline(latlngs, { color, weight: 24, opacity: 0, interactive: true, bubblingMouseEvents: false, lineCap: 'round', lineJoin: 'round' }).addTo(map);
        hit.on('click', (e) => {   // 1本タップ → その日だけ残して他を暗く（もう一度タップで解除）＋タイムライン連動
          L.DomEvent.stop(e);
          mapState.focusedDay = (mapState.focusedDay === dk ? null : dk);
          drawTrips();
          if (mapState.updateTimelineUI) mapState.updateTimelineUI();   // v122: タイムラインも同じ日だけ明るく
        });
        mapState.tripLayers.push(hit);
      });
      return;
    }

    // ブラウズ: 表示が単一日なら空色、複数日は旅行ごとの連続線 (v58)。
    if (new Set(line.map(dayKeyOf)).size === 1) { drawSkyLine(line, 0.9); return; }
    const drawSub = (latlngs, color) => {
      if (latlngs.length < 2) return;
      pushCased(latlngs, color, 4, 0.85);   // v114: 縁取り付きで見やすく
      if (L.polylineDecorator && L.Symbol) {
        mapState.tripLayers.push(L.polylineDecorator(latlngs, {
          patterns: [{ offset: 24, repeat: 90, symbol: L.Symbol.arrowHead({ pixelSize: 9, polygon: false, pathOptions: { color, weight: 2, opacity: 0.85 } }) }]
        }).addTo(map));
      }
    };
    segmentByGap(line, TRIP_GAP_MS).forEach(seg => {
      if (seg.length < 2) return;
      // 旅行内を「日ごと」のサブ線に分けて色を変える。境界は前日最後の点から引いて連続に見せる。
      let curDay = null, dayIdx = -1, sub = null, prev = null;
      for (const p of seg) {
        const k = dayKeyOf(p);
        if (k !== curDay) {
          if (sub) drawSub(sub, TRIP_COLORS[dayIdx % TRIP_COLORS.length]);   // 前日分を確定
          dayIdx++;
          sub = prev ? [[prev.lat, prev.lng]] : [];   // 前日の最後の点から橋渡し
          curDay = k;
        }
        sub.push([p.lat, p.lng]);
        prev = p;
      }
      if (sub) drawSub(sub, TRIP_COLORS[dayIdx % TRIP_COLORS.length]);   // 最終日分
    });
  }

  // GPSなし写真を「軌跡の時刻位置」に置く推定マーカー (v74)。実GPSの白枠と違い青緑の破線枠で「推定」を示す。
  function makeEstimatedMarker(p, est) {
    const icon = L.divIcon({
      className: 'photo-marker-wrap',
      html: `<div class="photo-marker photo-marker-est" style="background-image:url(${thumbUrl(p)})"></div>`,
      iconSize: [40, 40], iconAnchor: [20, 20], popupAnchor: [0, -20],
    });
    const mk = L.marker([est.lat, est.lng], { icon });
    mk.bindPopup(() => buildEstPopup(p, est), { minWidth: 180, closeButton: true });
    return mk;
  }

  // 🛰️ 位置ロガーの軌跡 (自分の足取り) と、📍 GPSなし写真の推定位置を、いま地図に出ている日/期間ぶんだけ描く。
  // ・軌跡 (v139): 旧「青緑の点線」は廃止＝ロガー点は trackMerge に日別で積み、drawTrips が写真の点と
  //   時刻順に混ぜて本線1本を引く。ここでは記録点の小さなドットだけ描く（記録の実感＋写真由来との区別）。
  //   showTrack で ON/OFF（OFF=写真のみの線に戻る）。
  // ・推定 = GPSなし写真を「その写真の時刻に軌跡上のどこにいたか」で配置。showEstimated で ON/OFF (v74)。
  // どちらも座標+時刻のみ由来。畳んだ日は写真と同じく出さない。canFit=GPS写真ゼロの窓でも収まるよう寄せる。
  async function refreshTrack(canFit) {
    for (const l of mapState.trackLayers) map.removeLayer(l);
    for (const l of mapState.estLayers) map.removeLayer(l);
    mapState.trackLayers = []; mapState.estLayers = [];
    mapState.trackMerge = null;   // v139: 窓が変わった/OFF の古い合流キャッシュを捨てる
    const windows = [];                              // 表示中の時間窓を集める
    if (mapState.pickDays) {
      const folded = mapState.foldedDays;
      for (const dk of mapState.pickDays) {
        const [yy, mm, dd] = dk.split('-').map(Number);
        const s = new Date(yy, mm, dd).getTime();    // dayKeyOf は month 0-based
        if (folded && folded.has(s)) continue;        // 畳んだ日は軌跡も推定も出さない
        windows.push([s, s + 86400000 - 1]);
      }
    } else if (mapState.range.start != null) {
      windows.push([mapState.range.start, mapState.range.end]);
    } else {
      windows.push([0, Date.now()]);                  // 全期間ブラウズ (foreground 記録なので疎)
    }
    const myMap = map;
    // v140: 足跡から写真の位置を自動確定 (既定ON・🛰️パネルで切替)。位置が付いたら real マーカーとして引き直す。
    if (autoConfirmTrackEnabled()) {
      const n = await autoConfirmTrackPass(windows);
      if (!mapState || mapState.map !== myMap) return;         // 閉じられた/再オープン
      if (n > 0) { if (mapState.refreshData) mapState.refreshData(); return; }
    }
    if (!mapState.showTrack && !mapState.showEstimated) { drawTrips(); return; }   // OFF=写真のみの線へ戻す
    const fitPts = [];
    for (const [s, e] of windows) {
      let pts = [];
      try { pts = await trackGetRange(s, e); } catch {}
      if (!mapState || mapState.map !== myMap) return;   // 閉じられた/再オープン → 破棄
      if (!pts.length) continue;
      if (mapState.showTrack) {
        const byDay = new Map();                          // 日ごとに分割 (dayKeyOf と同形式のキー)
        for (const p of pts) { const d = new Date(p.t); const k = `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`; if (!byDay.has(k)) byDay.set(k, []); byDay.get(k).push(p); }
        for (const [k, arr] of byDay) {
          // v139: 線はここで引かず drawTrips へ渡す（写真の点と時刻順に混ざって本線1本になる）。
          if (!mapState.trackMerge) mapState.trackMerge = new Map();
          mapState.trackMerge.set(k, (mapState.trackMerge.get(k) || []).concat(arr));
          for (const p of arr) {
            mapState.trackLayers.push(L.circleMarker([p.lat, p.lng],
              { radius: 3, color: '#2ee6c0', weight: 1, opacity: 0.9, fillColor: '#2ee6c0', fillOpacity: 0.9 }).addTo(myMap));
            fitPts.push([p.lat, p.lng]);
          }
        }
      }
      if (mapState.showEstimated) {                        // GPSなし写真を軌跡の時刻位置に配置
        const ghosts = allPhotos.filter(p => visible(p) && p.lat == null && p.lng == null
          && p.datetime.getTime() >= s && p.datetime.getTime() <= e);
        for (const ph of ghosts) {
          const est = estimateFromTrack(ph.datetime.getTime(), pts);   // 記録のある時間帯のみ非null
          if (!est) continue;
          const mk = makeEstimatedMarker(ph, est).addTo(myMap);
          mapState.estLayers.push(mk);
          fitPts.push([est.lat, est.lng]);
        }
      }
    }
    drawTrips();   // v139: ロガー点が積めたので本線を「写真＋軌跡の1本」に引き直す（無ければ写真のみで再描画）
    // GPS写真が無く軌跡/推定しか無い窓でも画面に収まるように (applyFilter の fitBounds は fg ベースで空振りする)。
    if (canFit && mapState.filteredGps.length === 0 && fitPts.length) {
      try { map.fitBounds(fitPts, { padding: [40, 40], maxZoom: 14, animate: false }); } catch {}
    }
  }
  mapState.refreshTrack = refreshTrack;

  // 日付/期間フィルタを適用: 表示するマーカーと動線を絞り、bounds を合わせ、タイムライン UI を更新。
  function applyFilter(opts) {
    const fgAll = visibleGps();
    // 選択モード (random3 / day / days) で折りたたんだ日は、地図から「線も写真(マーカー)も」消す。
    // 線の色 index は全日基準で安定させたいので lineGps は全日のまま (drawTrips が畳んだ日をスキップ)、
    // マーカー(filteredGps)だけ畳んだ日を除外する。
    const folded = mapState.foldedDays;
    const useFold = folded && folded.size && (mapState.pickMode === 'random3' || mapState.pickMode === 'day' || mapState.pickMode === 'days');
    const fg = useFold
      ? fgAll.filter(p => !folded.has(new Date(p.datetime.getFullYear(), p.datetime.getMonth(), p.datetime.getDate()).getTime()))
      : fgAll;
    mapState.filteredGps = fg;     // マーカー (畳んだ日を除く)
    mapState.lineGps = fgAll;      // 線の色 index 用 (全日。畳んだ日の線は drawTrips でスキップ)
    mapState.trackMerge = null;    // v139: 窓が変わる＝前の窓のロガー点は混ぜない (refreshTrack が積み直す)
    cluster.clearLayers();
    markerById.clear();
    fg.forEach(p => {
      const mk = makePhotoMarker(p);
      cluster.addLayer(mk);
      markerById.set(p.id, { marker: mk, latlng: [p.lat, p.lng] });
    });
    drawTrips();
    if (!(opts && opts.skipFit) && fg.length) {
      map.fitBounds(fg.map(p => [p.lat, p.lng]), { padding: [40, 40], maxZoom: 14, animate: false });
    }
    if (mapState.updateTimelineUI) mapState.updateTimelineUI();
    if (mapState.updateCtrlLabels) mapState.updateCtrlLabels();
    if (mapState.updateCtrlMode) mapState.updateCtrlMode();
    refreshTrack(!(opts && opts.skipFit));   // 🛰️ 軌跡 + 📍 GPSなし写真の推定配置を貼り直す (await しない) (v73/v74)
  }
  mapState.applyFilter = applyFilter;

  // マップ上のコントロール: 📅日付/期間フィルタ と 〰線の日数 を、アイコン → 開くパネルで操作 (ユーザー要望)。
  // 状態はタイムラインの日付タップとも共有 (どちらから絞っても applyFilter / mapState.range に集約)。
  const elFilterBtn = overlay.querySelector('#mcFilter');
  const elMoreBtn   = overlay.querySelector('#mcMore');
  const popFilter   = overlay.querySelector('#mcPopFilter');
  const popMore     = overlay.querySelector('#mcPopMore');
  const popSeal     = overlay.querySelector('#mcPopSeal');
  const popHelp     = overlay.querySelector('#mcPopHelp');

  const startOfDay = ms => { const d = new Date(ms); return new Date(d.getFullYear(), d.getMonth(), d.getDate()).getTime(); };
  const endOfDay   = ms => startOfDay(ms) + 86400000 - 1;
  const toInputVal = ms => { const d = new Date(ms); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; };
  const fromInputVal = v => { const [y, m, d] = v.split('-').map(Number); return new Date(y, m - 1, d).getTime(); };
  const fmtMD = ms => { const d = new Date(ms); return `${d.getMonth()+1}/${d.getDate()}`; };
  const fmtYMD = ms => { const d = new Date(ms); return `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`; };

  // データの日時レンジ (片側だけ指定した時の補完用)
  let dataMin = null, dataMax = null;
  for (const p of allPhotos) { if (!visible(p)) continue; const t = p.datetime.getTime(); if (dataMin == null || t < dataMin) dataMin = t; if (dataMax == null || t > dataMax) dataMax = t; }

  // ボタン/メニューのラベルを現在の状態で更新 (📅フィルタ / 〰線のつなぎ方)。タイムラインから絞っても反映される。
  function updateCtrlLabels() {
    if (mapState.pickMode === 'days') {   // 非連続の複数日選択中は 📅 ボタンに枚数を出す
      elFilterBtn.textContent = `📅 ${mapState.pickDays.length}日`;
      elFilterBtn.classList.add('on');
      return;
    }
    const r = mapState.range;
    if (r.start == null) { elFilterBtn.textContent = tr('📅 全期間', '📅 All time'); elFilterBtn.classList.remove('on'); }
    else {
      const single = r.end === endOfDay(r.start);
      elFilterBtn.textContent = single ? `📅 ${fmtMD(r.start)}` : `📅 ${fmtMD(r.start)}〜${fmtMD(r.end)}`;
      elFilterBtn.classList.add('on');
    }
  }
  mapState.updateCtrlLabels = updateCtrlLabels;

  // ── 表示する日 (地図=軌跡から想起) ───────────────────────────────────
  const mcRoll  = overlay.querySelector('#mcRoll');
  const mcPrev  = overlay.querySelector('#mcPrev');
  const mcToday = overlay.querySelector('#mcToday');
  const mcNext  = overlay.querySelector('#mcNext');

  // v97: ツールバーはどのモードでも同じ並びに固定 (◀ 📆 ▶ / 🎲 📅全期間 ⋯表示)。モードで出し入れしない
  // (= 以前の「入口モードはアイコン列／ブラウズはテキスト」の二重 UI を解消)。モード差は 🎲 の意味だけ:
  // random3 中は「もう一度引く」、それ以外は「偶然の3日」(アイコンは据え置き・title だけ切替)。
  function updateCtrlMode() {
    mcRoll.title = (mapState.pickMode === 'random3') ? tr('もう一度引く', 'Draw again') : tr('偶然の1日', 'A random day');
  }
  mapState.updateCtrlMode = updateCtrlMode;

  // 表示する日の集合をセット。mode: 'today' (ヘッダ=今日の数年分) | 'random3' (偶然3日) | 'day' (写真入口=その日)。
  function setPick(days, mode) {
    mapState.pickDays = days;
    mapState.pickMode = mode;
    mapState.focusedDay = null;
    mapState.range = { start: null, end: null };   // 日選択が「どこまで」を担うので期間はリセット
    if (mapState.rebuildTimeline) mapState.rebuildTimeline();
    applyFilter();
  }
  mapState.setPick = setPick;

  // GPS 写真のある日からランダムに1日 (= 偶然の1本の軌跡)。v125: 3→1日 (mode 名は歴史的に 'random3' のまま)。
  function pickRandom3() {
    const dayKeys = [...new Set(allPhotos.filter(p => visible(p) && p.lat != null && p.lng != null).map(dayKeyOf))];
    for (let i = dayKeys.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [dayKeys[i], dayKeys[j]] = [dayKeys[j], dayKeys[i]]; }
    return dayKeys.slice(0, 1);
  }
  mapState.pickRandom3 = pickRandom3;

  // v83: 今日と同じ月日の写真がある「年」をすべて (= 数年分の今日を重ねる)。毎日の習慣の入口。
  // v87: offset で起点の日をずらせる (0=今日 / -1=昨日 / +1=明日 …) → 「過去の昨日/明日/明後日」。予定立て・振り返りに。
  // 位置の有無は問わない (GPS 有=軌跡 / 無=タイムラインに出る・v74 で時刻位置に推定配置)。昔→今の順。
  function pickToday(offset = 0) {
    const base = new Date(); base.setHours(0, 0, 0, 0); base.setDate(base.getDate() + offset);
    const mo = base.getMonth(), da = base.getDate();
    const keys = [...new Set(allPhotos.filter(p => visible(p) && p.datetime.getMonth() === mo && p.datetime.getDate() === da).map(dayKeyOf))];
    keys.sort((a, b) => (+a.split('-')[0]) - (+b.split('-')[0]));   // 年の昇順 = 昔→今 (パレットが時系列で読める)
    return keys;
  }
  mapState.pickToday = pickToday;
  mapState.todayOffset = 0;   // 📆 起点からの日数ずれ (v87)。◀▶ で増減・📆 で 0 に戻す。

  // offset → 相対の日本語ラベル (見出し用)。0=今日 / ±1=昨日・明日 / ±2=一昨日・明後日 / それ以上は N日前/後。
  function relDayLabel(off) {
    if (off === 0) return tr('今日', 'Today');
    if (off === -1) return tr('昨日', 'Yesterday');   if (off === 1) return tr('明日', 'Tomorrow');
    if (off === -2) return tr('一昨日', '2 days ago'); if (off === 2) return tr('明後日', 'In 2 days');
    return off < 0 ? tr(`${-off}日前`, `${-off} days ago`) : tr(`${off}日後`, `${off} days later`);
  }
  mapState.relDayLabel = relDayLabel;

  // 📆 を offset の日にずらして表示 (today モード維持)。写真ゼロの日でも setPick して「0年分」を正直に出す (予定立てに有用)。
  function gotoTodayOffset(offset) {
    mapState.todayOffset = offset;
    setPick(pickToday(offset), 'today');
  }

  // 日の選択を抜けて従来の期間ブラウズ (全 GPS) に戻る。
  function clearPick() {
    mapState.pickDays = null;
    mapState.pickMode = null;
    mapState.focusedDay = null;
    if (mapState.rebuildTimeline) mapState.rebuildTimeline();
    applyFilter();
  }
  mapState.clearPick = clearPick;

  mcRoll.addEventListener('click', () => { const d = pickRandom3(); if (d.length) setPick(d, 'random3'); });   // もう一度引く / 偶然の3日
  mcToday.addEventListener('click', () => { gotoTodayOffset(0); });                                            // 今日 (数年分) に戻る = offset 0 (v83/v87)
  mcPrev.addEventListener('click', () => { gotoTodayOffset((mapState.todayOffset || 0) - 1); });               // 前の日へ (過去の昨日…) v87
  mcNext.addEventListener('click', () => { gotoTodayOffset((mapState.todayOffset || 0) + 1); });               // 次の日へ (過去の明日…) v87
  const mcLocate = overlay.querySelector('#mcLocate');   // v151: 📍 現在地へ移動（位置ありビルドのみ存在）
  if (mcLocate) mcLocate.addEventListener('click', () => flyToCurrentLocation(mcLocate));
  const mcEncircle = overlay.querySelector('#mcEncircle');   // v155: 🫧 囲んで思い出を見る（⋯メニューから地図バーへ昇格）
  if (mcEncircle) mcEncircle.addEventListener('click', () => { closePops(); startEncircleMode(); });
  // ───────────────────────────────────────────────────────────────────

  function closePops() {
    popFilter.hidden = true; popMore.hidden = true; popSeal.hidden = true; popHelp.hidden = true;
    elFilterBtn.classList.remove('open'); elMoreBtn.classList.remove('open');
  }
  mapState.closePops = closePops;

  // ⛶ 没入フルスクリーン (v98): 地図 + 動線 + 写真だけにする。ツールバー/タイムライン/各コントロールを CSS で隠し、解除アイコン1つだけ。
  // desktop は #mapEl が 320px サイドバー分ぶん広がるので invalidateSize で再描画。
  function setImmersive(on) {
    mapState.immersive = on;
    overlay.classList.toggle('immersive', on);
    if (on) closePops();
    requestAnimationFrame(() => { try { map.invalidateSize(); } catch {} });
  }
  mapState.setImmersive = setImmersive;
  overlay.querySelector('.map-fs-toggle').addEventListener('click', () => setImmersive(!mapState.immersive));   // 右上 ⛶ = 全画面トグル (v99)

  // v151: 現在地へ移動。前面の navigator.geolocation（位置ロガーと同じ API）で1点だけ取り、地図をその場所へ
  //   寄せて青ドットの現在地マーカーを置く。背景記録とは無関係＝許可も「使用中のみ」で足りる。
  //   位置オフ/スクショ用 build では mcLocate 自体を出していないので、ここには来ない（許可も求めない）。
  function flyToCurrentLocation(btn) {
    if (!navigator.geolocation) { logInfo(tr('この端末は位置情報に未対応です', 'This device doesn’t support location')); return; }
    if (btn) btn.classList.add('locating');
    navigator.geolocation.getCurrentPosition(pos => {
      if (btn) btn.classList.remove('locating');
      if (!mapState) return;
      const { latitude, longitude } = pos.coords;
      map.setView([latitude, longitude], Math.max(map.getZoom() || 0, 15), { animate: true });
      if (mapState.hereMarker) { try { map.removeLayer(mapState.hereMarker); } catch {} }
      const icon = L.divIcon({ className: 'here-marker-wrap', html: '<div class="here-marker"></div>', iconSize: [16, 16], iconAnchor: [8, 8] });
      mapState.hereMarker = L.marker([latitude, longitude], { icon, interactive: false, zIndexOffset: 1000 }).addTo(map);
    }, err => {
      if (btn) btn.classList.remove('locating');
      logInfo((err && err.code === 1)
        ? tr('位置情報が許可されていません（設定で許可すると現在地に飛べます）', 'Location permission is off (allow it in Settings to jump to your location)')
        : tr('現在地を取得できませんでした', 'Couldn’t get your current location'));
    }, { enableHighAccuracy: true, timeout: 10000, maximumAge: 30000 });
  }

  // 日付/期間フィルタパネル (date 入力 2つ + 適用 / 全期間)
  popFilter.innerHTML =
    `<div class="mc-pop-title">${tr('日付・期間で絞り込み', 'Filter by date / range')}</div>` +
    // v155: クイック期間（今日から遡って直近N）。よく使う範囲をワンタップで。
    `<div class="mc-pop-quick" id="fQuick">` +
      `<button class="mc-pop-btn" data-days="7">${tr('1週間', '1 week')}</button>` +
      `<button class="mc-pop-btn" data-days="30">${tr('1ヶ月', '1 month')}</button>` +
      `<button class="mc-pop-btn" data-days="90">${tr('3ヶ月', '3 months')}</button>` +
      `<button class="mc-pop-btn" data-days="365">${tr('1年', '1 year')}</button>` +
      `<button class="mc-pop-btn" data-days="1095">${tr('3年', '3 years')}</button>` +
    `</div>` +
    `<div class="mc-pop-quicklabel">${tr('↑ 今日から遡って絞り込み', '↑ From today, going back')}</div>` +
    `<label class="mc-pop-row">${tr('開始', 'From')} <input type="date" id="fFrom"></label>` +
    `<label class="mc-pop-row">${tr('終了', 'To')} <input type="date" id="fTo"></label>` +
    `<div class="mc-pop-actions"><button class="mc-pop-btn" id="fClear">${tr('全期間', 'All time')}</button><button class="mc-pop-btn" id="fAdd">${tr('＋ 追加', '＋ Add')}</button><button class="mc-pop-btn primary" id="fApply">${tr('適用', 'Apply')}</button></div>` +
    `<div class="mc-pop-status" id="fStatus"></div>` +
    `<div class="mc-pop-hint">${tr('<b>適用</b>＝その期間「だけ」を続けて表示。<b>＋追加</b>＝その日／期間を今の表示に<b>重ねる</b>（離れた日や旅行を何度でも足せる。各日が別色の軌跡）。タイムラインの日付タップでも足せます。', '<b>Apply</b> = keep showing only that range. <b>＋Add</b> = <b>overlay</b> that day/range onto the current view (add distant days or trips as often as you like; each day is a differently colored track). You can also add days by tapping dates in the timeline.')}</div>`;
  const fFrom = popFilter.querySelector('#fFrom');
  const fTo   = popFilter.querySelector('#fTo');
  if (dataMin != null) { fFrom.min = fTo.min = toInputVal(dataMin); fFrom.max = fTo.max = toInputVal(dataMax); }
  popFilter.querySelector('#fApply').addEventListener('click', () => {
    mapState.pickDays = null; mapState.pickMode = null; mapState.focusedDay = null;   // 連続範囲に切替 = 非連続の日選択は解除
    const fromV = fFrom.value, toV = fTo.value;
    if (!fromV && !toV) {
      mapState.range = { start: null, end: null };
    } else {
      let sDay = fromV ? startOfDay(fromInputVal(fromV)) : (dataMin != null ? startOfDay(dataMin) : null);
      let eDay = toV   ? startOfDay(fromInputVal(toV))   : (dataMax != null ? startOfDay(dataMax) : null);
      if (sDay != null && eDay != null && sDay > eDay) { const t = sDay; sDay = eDay; eDay = t; }   // 逆指定は入れ替え
      mapState.range = { start: sDay, end: eDay != null ? endOfDay(eDay) : (sDay != null ? endOfDay(sDay) : null) };
    }
    applyFilter();
    closePops();
  });
  popFilter.querySelector('#fClear').addEventListener('click', () => {
    mapState.pickDays = null; mapState.pickMode = null; mapState.focusedDay = null;   // 全期間 = 日選択も解除
    mapState.range = { start: null, end: null };
    fFrom.value = ''; fTo.value = '';
    applyFilter();
    closePops();
  });

  // v155: クイック期間ボタン = 今日から遡って直近N日を表示（range=[今日-N, 今日] を「適用」相当で置き換え）。
  popFilter.querySelectorAll('#fQuick button').forEach(qb => qb.addEventListener('click', () => {
    const days = +qb.dataset.days;
    const start = startOfDay(Date.now() - days * 86400000);
    const end = endOfDay(Date.now());
    mapState.pickDays = null; mapState.pickMode = null; mapState.focusedDay = null;
    mapState.range = { start, end };
    fFrom.value = toInputVal(start); fTo.value = toInputVal(end);
    applyFilter();
    closePops();
  }));

  // 「＋ 追加」: いま入力中の日／期間を「重ねて表示する日の集合」(pickDays / 'days') に足す。
  // タイムラインの日付タップ (toggleDayFilter) と同じ状態に集約 → 片方で足した日がもう片方にも反映され、
  // 出し入れが相互にできる。数年前の日も、タイムラインを延々スクロールせずカレンダーから一発で足せる。
  const fStatus = popFilter.querySelector('#fStatus');
  function dayKeysWithPhotos(startMs, endMs) {   // 期間内で実際に写真がある日だけを dayKeyOf 形式で
    const set = new Set();
    for (const p of allPhotos) {
      if (!visible(p)) continue;
      const t = p.datetime.getTime();
      if (t >= startMs && t <= endMs) set.add(dayKeyOf(p));
    }
    return [...set];
  }
  function refreshFilterStatus(msg) {
    if (msg != null) { fStatus.textContent = msg; return; }
    fStatus.textContent = (mapState.pickMode === 'days' && mapState.pickDays && mapState.pickDays.length)
      ? tr(`📅 いま ${mapState.pickDays.length}日を重ねて表示中`, `📅 Showing ${mapState.pickDays.length} days overlaid`) : '';
  }
  popFilter.querySelector('#fAdd').addEventListener('click', () => {
    const fromV = fFrom.value, toV = fTo.value;
    if (!fromV && !toV) { refreshFilterStatus(tr('日付を入れてから「＋ 追加」を押してください', 'Enter a date first, then tap “＋ Add”')); return; }
    let s = startOfDay(fromInputVal(fromV || toV));   // 開始のみ＝その1日 / 終了のみ＝その1日 / 両方＝範囲
    let e = startOfDay(fromInputVal(toV || fromV));
    if (s > e) { const t = s; s = e; e = t; }
    const keys = dayKeysWithPhotos(s, endOfDay(e));
    if (!keys.length) { refreshFilterStatus(tr('その期間に写真がありません', 'No photos in that range')); return; }
    const cur = (mapState.pickMode === 'days' && mapState.pickDays) ? mapState.pickDays.slice() : [];
    const merged = [...new Set([...cur, ...keys])];
    const added = merged.length - cur.length;
    mapState.pickDays = merged;
    mapState.pickMode = 'days';   // 手で組んだ非連続の集合 (🎲 は出さない / 📅 N日 表示)
    mapState.focusedDay = null;
    mapState.range = { start: null, end: null };   // 日選択が「どこまで」を担う
    applyFilter();   // 地図(マーカー/軌跡/fit) + タイムラインの ✓ 強調を更新 (DOM 再構築なし)
    fFrom.value = ''; fTo.value = '';   // 次の期間を続けて足しやすく入力をクリア (パネルは開いたまま)
    refreshFilterStatus(added ? tr(`✓ ${added}日を追加（いま ${merged.length}日を重ねて表示）`, `✓ Added ${added} day(s) (now showing ${merged.length} days)`)
                              : tr(`その日はもう表示中（いま ${merged.length}日）`, `Already showing that day (${merged.length} days total)`));
  });

  // 📅 期間ボタン: トグルで日付パネルを開閉 (開く時に現在の絞り込みを入力欄へ反映)。
  elFilterBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    const willOpen = popFilter.hidden;
    closePops();
    if (willOpen) {
      const r = mapState.range;
      fFrom.value = r.start != null ? toInputVal(r.start) : '';
      fTo.value   = r.start != null ? toInputVal(r.end)   : '';
      popFilter.hidden = false; elFilterBtn.classList.add('open');
      refreshFilterStatus();   // days モードなら「いま N日を重ねて表示中」を出す
    }
  });

  // ⋯ 表示メニュー (v57→v58): よく使わない設定を1アイコンにまとめる。線のつなぎ方は固定化したので
  // 今は「記憶の封印」のみ (ユーザー要望: 封印が表示の中にある UI は継続)。期間(📅)だけは常時トップに残す。
  popMore.innerHTML =
    `<div class="mc-pop-title">${tr('表示の設定', 'Display settings')}</div>` +
    `<button class="mc-menu-item" id="mmAnnivLog">${tr('📖 思い出の場所のログ', '📖 Memory place log')}</button>` +   // v128: 常時表示。思い出の場所由来の地図→そのログへ／通常地図→思い出の場所一覧へ
    // v155: 「🫧 囲んで思い出を見る」は地図バーの mcEncircle に昇格したので⋯メニューから削除。
    `<button class="mc-menu-item" id="mmRegister">${tr('📍 この辺りを思い出の場所に登録', '📍 Save this area as a memory place')}</button>` +   // v125: いま見ている地図の範囲を思い出の場所に
    // 位置オフ build (iOS v1) では軌跡まわりのトグルを出さない (v104)。記録が無いので元々空動作。
    (LOCATION_AVAILABLE
      ? `<label class="mc-pop-check"><input type="checkbox" id="mmTrack"> ${tr('🛰️ 自分の軌跡（ロガー）', '🛰️ My track (logger)')}</label>` +
        `<label class="mc-pop-check"><input type="checkbox" id="mmEst"> ${tr('📍 GPSなし写真を軌跡から配置', '📍 Place GPS-less photos from track')}</label>`
      : '') +
    `<button class="mc-menu-item" id="mmSeal">${tr('🔒 記憶の封印', '🔒 Seal memories')}</button>` +
    `<button class="mc-menu-item" id="mmHelp">${tr('ⓘ アイコンの説明', 'ⓘ Icon guide')}</button>` +
    `<div class="mc-pop-sub">${tr('地図の種類', 'Map type')}</div>` +
    `<div class="mc-pop-chips" id="mmLayers"></div>`;
  const mmTrack = popMore.querySelector('#mmTrack');
  if (mmTrack) {
    mmTrack.checked = mapState.showTrack;
    mmTrack.addEventListener('change', () => { mapState.showTrack = mmTrack.checked; refreshTrack(); });
  }
  const mmEst = popMore.querySelector('#mmEst');
  if (mmEst) {
    mmEst.checked = mapState.showEstimated;
    mmEst.addEventListener('change', () => { mapState.showEstimated = mmEst.checked; refreshTrack(); });
  }
  const mmAnnivLog = popMore.querySelector('#mmAnnivLog');   // v127: 思い出の場所由来の地図 → ログへ戻る
  if (mmAnnivLog) mmAnnivLog.addEventListener('click', () => { closePops(); if (mapState && mapState.anniv) openAnnivTimeline(mapState.anniv); else openAnnivList(); });   // v128: 思い出の場所由来→そのログ／通常地図→思い出の場所一覧
  const mmRegister = popMore.querySelector('#mmRegister');   // v125: いま見ている地図の範囲を思い出の場所に登録
  if (mmRegister) mmRegister.addEventListener('click', () => {
    closePops();
    const c = map.getCenter();
    const radius = map.distance(c, map.getBounds().getNorthEast());   // 中心→画面隅＝見えている範囲を覆う円
    const list = photosInCircle(c.lat, c.lng, radius);
    if (!list.length) { logInfo('この範囲に位置情報のある写真がありません（地図を動かして囲みたい場所を表示してから）'); return; }
    registerAnniversary({ lat: c.lat, lng: c.lng, radius }, list);
  });
  const mmSeal = popMore.querySelector('#mmSeal');
  mmSeal.addEventListener('click', () => { closePops(); openSealPanel(); });
  const mmHelp = popMore.querySelector('#mmHelp');
  mmHelp.addEventListener('click', (e) => { e.stopPropagation(); closePops(); popHelp.hidden = false; });   // ⓘ アイコンの説明 (v97: ⋯表示メニューから開く)
  // 地図の種類 (v99): 旧 L.control.layers を ⋯表示メニューへ。アクティブな種類を teal で示し、タップで切替＋localStorage 保存。
  let curBaseKey = initialBase.key;
  const mmLayers = popMore.querySelector('#mmLayers');
  function renderLayerChips() {
    mmLayers.innerHTML = BASE_LAYERS.map(b => `<button class="mc-pop-btn${b.key === curBaseKey ? ' primary' : ''}" data-key="${b.key}">${b.name}</button>`).join('');
  }
  renderLayerChips();
  mmLayers.addEventListener('click', (e) => {
    const btn = e.target.closest('button[data-key]'); if (!btn) return;
    const key = btn.dataset.key; if (key === curBaseKey) return;
    const prev = BASE_LAYERS.find(b => b.key === curBaseKey);
    const next = BASE_LAYERS.find(b => b.key === key);
    if (prev) map.removeLayer(prev.layer);
    map.addLayer(next.layer);
    if (next.layer.bringToBack) next.layer.bringToBack();   // ベースタイルは最背面に（マーカー/線の下）
    if (worldUnderlay) worldUnderlay.bringToBack();          // v131: 世界下地は常に地理院よりさらに背面へ（海外フォールバックを維持）
    curBaseKey = key;
    try { localStorage.setItem('pms-mapLayer', key); } catch {}
    renderLayerChips();
  });
  elMoreBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    const willOpen = popMore.hidden;
    closePops();

  popSeal.innerHTML =

    `<label class="mc-pop-check"><input type="checkbox" id="sealBounds" checked> ${tr('📍 いま地図に見えている範囲だけ', '📍 Only the area currently shown on the map')}</label>` +
    `<label class="mc-pop-row">${tr('名前', 'Name')} <input type="text" id="sealLabel"></label>` +
    `<div class="seal-preview" id="sealPreview"></div>` +
    `<div class="mc-pop-actions"><button class="mc-pop-btn primary" id="sealAdd">${tr('🔒 封印する', '🔒 Seal')}</button></div>` +

    `<div class="seal-list-title">${tr('封印中の記憶', 'Sealed memories')}</div>` +
    `<div class="seal-list" id="sealList"></div>`;
  const sealRangeEl   = popSeal.querySelector('#sealRange');
  const sealBoundsEl  = popSeal.querySelector('#sealBounds');
  const sealLabelEl   = popSeal.querySelector('#sealLabel');
  const sealPreviewEl = popSeal.querySelector('#sealPreview');
  const sealAddEl     = popSeal.querySelector('#sealAdd');
  const sealListEl    = popSeal.querySelector('#sealList');

  // いま選んでいる封印条件 {from, to, bounds}。bounds は「範囲だけ」ON のときだけ地図の表示範囲。
  function currentSealSpec() {

  function updateSealPreview() {

  function updateSealList() {

  // 封印パネルを開く (v57: 「⋯ 表示」メニューの 🔒 項目から呼ぶ)。

  // ── 位置を後から設定/修正 (v59) ──────────────────────────────────
  // 撮ったのに GPS が入らなかった写真に、地図のピンをドラッグして位置を付ける (タイムライン/マーカーから起動)。

  function startLocationEdit(photo, seedLatLng) {

    map.closePopup();

    if (sheet && sheet.classList.contains('open') && window.matchMedia('(max-width:719px)').matches) {
      sheet.classList.remove('open');
      setTimeout(() => map.invalidateSize(), 260);
    }
    // 初期位置: 推定/指定座標(seed=軌跡からの推定など) → 既存GPS → 時間的に近いGPS写真(3日以内) → 地図中心
    let start = seedLatLng || ((photo.lat != null && photo.lng != null) ? [photo.lat, photo.lng] : null);

    else {

  const explicit = !!(focusPhoto && focusPhoto.id);

    mapState.todayOffset = opts.todayOffset;

  } else if (explicit) setPick([dayKeyOf(focusPhoto)], 'day');
  else {   // ヘッダ 🗺 過去の今日 = 今日の月日を数年分。v125: 写真ゼロでも「今日（0年分）」を正直に出す（サイコロに逃がさない＝ゼロであることが意味を持つ）。偶然の日は 🎲 で。

// タイムライン: 全写真 (GPS 有無問わず) を日付降順 (新しい旅が上) に。
// 日付見出しタップで地図を「その日 / 期間」に絞り込む (別の日をタップで期間レンジ、✕ で解除)。
// 写真タップ: いま地図に出ている GPS 写真ならフォーカス、それ以外 (フィルタ圏外/GPS無し) はフル画像。
// v148: 地図タイムラインの写真モード＝全可視写真を時系列グリッド(月見出し・タップで全画面スワイプ)。
// 思い出ログの写真グリッドと同じ見た目(.atl-grid)。all は新しい→古い順。
// v158: groupBy='day' で日見出し(食べ物レンズの日ごとモード)。既定 'month' は従来どおり(地図タイムラインは無改修)。
function buildTimelinePhotos(container, all, groupBy, big, opts) {
  const byDay = groupBy === 'day';
  const grid = document.createElement('div'); grid.className = 'atl-grid tl-photos' + (big ? ' big' : '');   // v159: big=2列(大きく)
  let cur = '';
  all.forEach(p => {
    const d = p.datetime;
    const key = byDay ? (d.getFullYear() + '-' + d.getMonth() + '-' + d.getDate()) : (d.getFullYear() + '-' + d.getMonth());
    if (key !== cur) {
      cur = key;
      const h = document.createElement('div'); h.className = 'atl-grid-head';
      h.textContent = byDay
        ? tr(`${d.getFullYear()}年${d.getMonth() + 1}月${d.getDate()}日（${_wdayJa[d.getDay()]}）`, `${_annivMonEn[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()} (${_wdayEn[d.getDay()]})`)
        : tr(`${d.getFullYear()}年${_annivMonJa[d.getMonth()]}`, `${_annivMonEn[d.getMonth()]} ${d.getFullYear()}`);
      grid.appendChild(h);
    }
    const im = document.createElement('img'); im.src = thumbUrl(p); im.loading = 'lazy';
    im.addEventListener('click', () => showFullImage(p, Object.assign({ list: all, index: all.indexOf(p) }, (opts && opts.fullOpts) || {})));
    grid.appendChild(im);
  });
  container.appendChild(grid);
}
function buildTimeline(container, map, cluster, markerById, applyFilter) {
  container.innerHTML = '';
  const all = allPhotos.filter(visible).slice().sort((a, b) => b.datetime - a.datetime);
  if (!all.length) { container.innerHTML = `<div class="tl-empty">${tr('写真がありません', 'No photos')}</div>`; return; }
  const isMobile = () => window.matchMedia('(max-width:719px)').matches;
  const dayStartOf = d => new Date(d.getFullYear(), d.getMonth(), d.getDate()).getTime();
  const dayEndOf = ms => ms + 86400000 - 1;
  const fmtDay = ms => { const d = new Date(ms); return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`; };
  // v149: いまの絞り込み (pickDays / range) に一致する写真だけを返す。🖼写真グリッド・⇆比べる を 📋一覧と揃える
  //  (v148 は写真/比べるが all をそのまま使い、絞り込み中でも全期間を出すバグ)。判定は下の updateTimelineUI の
  //  pickStarts / inR と同一ロジック (どちらかを変えたら両方揃える)。
  const timelineFilteredPhotos = list => {
    if (mapState.pickDays) {
      const pickStarts = new Set(mapState.pickDays.map(dk => { const [y, m, d] = dk.split('-').map(Number); return new Date(y, m, d).getTime(); }));
      return list.filter(p => pickStarts.has(dayStartOf(p.datetime)));
    }
    const r = mapState.range;
    if (r && r.start != null) return list.filter(p => { const ds = dayStartOf(p.datetime); return ds >= r.start && ds <= r.end; });
    return list;
  };
  mapState.foldedDays = new Set();   // 入口モードで畳んでいる日 (dayStart ms)。タイムライン再構築ごとにリセット。

  // v148: 表示切替（📋一覧=従来の日リスト＋位置直す/🗑 は据え置き / 🖼写真=時系列グリッド）＋⇆比べる。
  // 現状の仕組みは残し「付け足す」。写真モードは updateTimelineUI を no-op にして一覧フィルタと干渉させない。
  const tlMode = mapState.tlMode || 'list';
  const modebar = document.createElement('div');
  modebar.className = 'tl-modebar';
  modebar.innerHTML =
    `<span class="tl-tabs">` +
      `<button data-tm="list" class="tl-tab${tlMode === 'list' ? ' on' : ''}" type="button">📋 ${tr('一覧', 'List')}</button>` +
      `<button data-tm="photos" class="tl-tab${tlMode === 'photos' ? ' on' : ''}" type="button">🖼 ${tr('写真', 'Photos')}</button>` +
    `</span>` +
    `<button class="tl-cmp" type="button">${tr('⇆ 比べる', '⇆ Compare')}</button>`;
  container.appendChild(modebar);
  modebar.querySelectorAll('.tl-tab').forEach(b => b.addEventListener('click', () => { mapState.tlMode = b.dataset.tm; if (mapState.rebuildTimeline) mapState.rebuildTimeline(); }));
  modebar.querySelector('.tl-cmp').addEventListener('click', () => {
    const cmp = timelineFilteredPhotos(all).slice().reverse();   // 昔→今（比較ビューは左=古い/右=新しい）。絞り込み中はその範囲だけ
    if (cmp.length < 2) { logInfo(tr('比べるには写真が2枚以上必要です', 'Need at least 2 photos to compare')); return; }

  if (tlMode === 'photos') {

    const photos = timelineFilteredPhotos(all);   // 絞り込み中はその範囲の写真だけ
    const big = !!mapState.tlBig;

    const pbar = document.createElement('div');

    pbar.innerHTML = `<span>${tr(`${photos.length}枚`, `${photos.length}`)}</span>` +
      `<span class="atl-photobar-btns"><button class="atl-size" type="button">${big ? tr('⊞ 小さく', '⊞ Smaller') : tr('⊡ 大きく', '⊡ Bigger')}</button></span>`;
