<style>
  :root { font-family: system-ui, -apple-system, "Hiragino Kaku Gothic ProN", sans-serif; }

<!-- CDN: exifr full (HEIC EXIF まで読める), heic2any (HEIC→JPEG 描画用) -->
<script src="https://cdn.jsdelivr.net/npm/exifr@7/dist/full.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/heic2any@0.0.4/dist/heic2any.min.js"></script>

<script>
"use strict";

// ============================================================
// バージョン (キャッシュ問題切り分け用に画面に表示する)
// commit するたびに上げること
// ============================================================
const BUILD = 'phase1.15 (loading) · 2026-05-29';

// ============================================================
// IndexedDB ラッパー (素の API、薄く)
// ============================================================
const DB_NAME = 'photo-memory-spike';
const DB_VERSION = 1;
const STORE = 'photos';

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = () => {
      const db = req.result;
      if (!db.objectStoreNames.contains(STORE)) {
        const s = db.createObjectStore(STORE, { keyPath: 'id' });
        s.createIndex('datetime', 'datetime');
        s.createIndex('dedup', 'dedup', { unique: false });
      }
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function dbGetAll() {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const req = db.transaction(STORE, 'readonly').objectStore(STORE).getAll();
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function dbPut(record) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE, 'readwrite');
    tx.objectStore(STORE).put(record);
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}

async function dbHasDedup(key) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const req = db.transaction(STORE, 'readonly').objectStore(STORE).index('dedup').get(key);
    req.onsuccess = () => resolve(!!req.result);
    req.onerror = () => reject(req.error);
  });
}

async function dbClear() {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE, 'readwrite');
    tx.objectStore(STORE).clear();
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}

// ============================================================
// 取り込み
// ============================================================
async function readMeta(file) {
  const m = await exifr.parse(file, true);
  const dto = m?.DateTimeOriginal || m?.CreateDate || m?.ModifyDate || null;
  return {
    datetime: dto instanceof Date ? dto : (dto ? new Date(dto) : null),
    lat: m?.latitude ?? null,
    lng: m?.longitude ?? null,
    // EXIF Orientation (1-8)。canvas で transform を当てて補正する。
    // exifr full ビルドは Orientation を「Top-left」のような文字列で返すことがあるので
    // 数値で正規化する手間が要る。spike では文字列が来た場合は 1 にフォールバック。
    orientation: typeof m?.Orientation === 'number' ? m.Orientation : 1,
  };
}

async function toJpegBlob(file) {
  const isHeic = /\.hei[cf]$/i.test(file.name) || /hei[cf]/i.test(file.type);
  if (!isHeic) return file;
  if (typeof heic2any === 'undefined') throw new Error('heic2any not loaded');
  const converted = await heic2any({ blob: file, toType: 'image/jpeg', quality: 0.85 });
  return Array.isArray(converted) ? converted[0] : converted;
}

// ============================================================
// 色彩特徴 (Phase 1.5)
// canvas を NxN グリッドに分けて各セルの平均 RGB を取る → N*N*3 次元
// ユークリッド距離で「色が近い」を判定。AI なしで「夕焼け→夕焼け」「緑→緑」
// のワープを試す土台。
// ============================================================
const COLOR_GRID = 4;
const COLOR_DIM  = COLOR_GRID * COLOR_GRID * 3;  // 48

function extractColorFeature(ctx, w, h) {
  const feat = new Float32Array(COLOR_DIM);
  let idx = 0;
  for (let gy = 0; gy < COLOR_GRID; gy++) {
    for (let gx = 0; gx < COLOR_GRID; gx++) {
      const x = Math.floor(gx * w / COLOR_GRID);
      const y = Math.floor(gy * h / COLOR_GRID);
      const cw = Math.max(1, Math.floor((gx + 1) * w / COLOR_GRID) - x);
      const ch = Math.max(1, Math.floor((gy + 1) * h / COLOR_GRID) - y);
      const data = ctx.getImageData(x, y, cw, ch).data;
      let r = 0, g = 0, b = 0;
      const pxN = data.length / 4;
      for (let i = 0; i < data.length; i += 4) {
        r += data[i]; g += data[i+1]; b += data[i+2];
      }
      feat[idx++] = (r / pxN) / 255;
      feat[idx++] = (g / pxN) / 255;
      feat[idx++] = (b / pxN) / 255;
    }
  }
  return feat;
}

function colorDistance(a, b) {
  if (!a || !b || a.length !== b.length) return Infinity;
  let s = 0;
  for (let i = 0; i < a.length; i++) {
    const d = a[i] - b[i];
    s += d * d;
  }
  return Math.sqrt(s);
}

// EXIF Orientation (1-8) を canvas transform に変換して当てる
// w, h は canvas のサイズ (= 回転後の表示サイズ)
function applyExifTransform(ctx, orientation, w, h) {
  switch (orientation) {
    case 2: ctx.transform(-1, 0, 0,  1, w, 0); break;  // 水平反転
    case 3: ctx.transform(-1, 0, 0, -1, w, h); break;  // 180度
    case 4: ctx.transform( 1, 0, 0, -1, 0, h); break;  // 垂直反転
    case 5: ctx.transform( 0, 1, 1,  0, 0, 0); break;  // 90度 + 反転
    case 6: ctx.transform( 0, 1,-1,  0, h, 0); break;  // 右90度
    case 7: ctx.transform( 0,-1,-1,  0, h, w); break;  // 270度 + 反転
    case 8: ctx.transform( 0,-1, 1,  0, 0, w); break;  // 左90度
    // 1: そのまま
  }
}

// サムネ Blob 生成。<img> + <canvas> 古典方式 (createImageBitmap は iOS Safari で
// TypeError を投げるバージョンがあるため避ける)。orientation は exifr で
// 読んだ値を渡してもらい canvas で補正する。
// 注: 後ろで定義している DOM 要素生成関数 makeThumb と名前が衝突しないよう
//     こちらは createThumbnail という名前にする (前は両方 makeThumb で
//     後ろ勝ちのため importOne が DOM 版を呼んでしまい TypeError していた)
async function createThumbnail(jpegBlob, maxPx, orientation = 1) {
  // 入力の Blob 性を最初に検査して、failed at native code の謎を消す
  if (jpegBlob == null) throw new Error(`blob is ${jpegBlob}`);
  if (!(jpegBlob instanceof Blob)) throw new Error(`not a Blob: ${typeof jpegBlob} ${Object.prototype.toString.call(jpegBlob)}`);
  if (jpegBlob.size === 0) throw new Error(`blob.size=0 type=${jpegBlob.type || '?'}`);

  let s = 'createObjectURL';
  let url = null;
  try {
    url = URL.createObjectURL(jpegBlob);
    s = 'loadImage';
    const img = await new Promise((resolve, reject) => {
      const im = new Image();
      im.onload = () => resolve(im);
      im.onerror = () => reject(new Error(`<img> load failed (blob.size=${jpegBlob.size} type=${jpegBlob.type})`));
      im.src = url;
    });
    s = 'measure';
    const rotated = orientation >= 5 && orientation <= 8;
    const sw = img.naturalWidth, sh = img.naturalHeight;
    if (sw === 0 || sh === 0) throw new Error(`zero natural size ${sw}x${sh}`);
    const dw = rotated ? sh : sw;
    const dh = rotated ? sw : sh;
    const ratio = Math.min(maxPx / dw, maxPx / dh, 1);
    const w = Math.max(1, Math.round(dw * ratio));
    const h = Math.max(1, Math.round(dh * ratio));

    s = 'canvas';
    const canvas = document.createElement('canvas');
    canvas.width = w; canvas.height = h;
    const ctx = canvas.getContext('2d');
    applyExifTransform(ctx, orientation, w, h);
    ctx.drawImage(img, 0, 0, rotated ? h : w, rotated ? w : h);

    // 色彩特徴を抽出 (描画済み canvas のピクセルから、変換を一旦リセットして読む)
    s = 'color';
    ctx.setTransform(1, 0, 0, 1, 0, 0);  // transform をリセットして getImageData は canvas 座標で
    const color = extractColorFeature(ctx, w, h);

    s = 'toBlob';
    const thumb = await new Promise(r => canvas.toBlob(r, 'image/jpeg', 0.8));
    if (!thumb) throw new Error('toBlob returned null');
    return { thumb, color };
  } catch (e) {
    // どの段階で落ちたかを上に伝える
    const wrap = new Error(`thumb.${s}: ${e.name || ''} ${e.message || e}`);
    wrap.stack = e.stack;
    throw wrap;
  } finally {
    if (url) URL.revokeObjectURL(url);
  }
}

async function importOne(file) {
  // stage を持たせておくと、エラー時にどの段階で落ちたか分かる
  let stage = 'meta';
  try {
    const { datetime, lat, lng, orientation } = await readMeta(file);
    if (!datetime) return { skipped: 'no-datetime' };

    stage = 'dedup';
    const dedup = `${file.name}|${file.size}|${datetime.getTime()}`;
    if (await dbHasDedup(dedup)) return { skipped: 'duplicate' };

    stage = 'toJpeg';
    const jpegBlob = await toJpegBlob(file);

    stage = 'thumb';
    const { thumb, color } = await createThumbnail(jpegBlob, 300, orientation);

    stage = 'put';
    const record = {
      id: crypto.randomUUID(),
      name: file.name,
      datetime,
      lat, lng,
      blob: jpegBlob,
      thumb,
      color,
      dedup,
      importedAt: new Date(),
    };
    await dbPut(record);
    return { ok: true, record };
  } catch (e) {
    // stage 情報を残してから rethrow (importFiles 側で詳細ログ)
    const wrapped = new Error(`[${stage}] ${e.name || ''} ${e.message || e}`);
    wrapped.stack = e.stack;
    throw wrapped;
  }
}

// ============================================================
// 連想展開ロジック
// ============================================================
function haversine(lat1, lng1, lat2, lng2) {
  const R = 6371000;
  const toRad = d => d * Math.PI / 180;
  const dLat = toRad(lat2 - lat1), dLng = toRad(lng2 - lng1);
  const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLng/2)**2;
  return 2 * R * Math.asin(Math.sqrt(a));
}

function isSameDay(a, b) {
  return a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate();
}

// 中心写真の時空近傍を最大 limit 枚返す
// 優先順位: GPS 5km以内 → 同日 → ±3日 → ±7日
// 各レイヤー内では中心からの時間差が近い順
function spacetimeNeighbors(center, all, limit) {
  const t = center.datetime.getTime();
  const others = all.filter(p => p.id !== center.id);
  const hasGPS = center.lat != null && center.lng != null;

  const layers = [
    hasGPS
      ? others.filter(p => p.lat != null && p.lng != null && haversine(center.lat, center.lng, p.lat, p.lng) <= 5000)
      : [],
    others.filter(p => isSameDay(p.datetime, center.datetime)),
    others.filter(p => Math.abs(p.datetime.getTime() - t) <= 3 * 86400000),
    others.filter(p => Math.abs(p.datetime.getTime() - t) <= 7 * 86400000),
  ];

  const seen = new Set();
  const result = [];
  for (const layer of layers) {
    layer.sort((a, b) => Math.abs(a.datetime - t) - Math.abs(b.datetime - t));
    for (const p of layer) {
      if (seen.has(p.id)) continue;
      seen.add(p.id);
      result.push(p);
      if (result.length >= limit) return result;
    }
  }
  return result;
}

// 色彩近傍: 時空を無視して全件 (color 持ち) から中心との色距離で並べ替え、上位 6 枚
// → 「夕焼け→別の日の別の場所の夕焼け」のような色ワープが出る
// TODO の検証問い「色の近傍 vs 意味の近傍、どちらが reminiscence を刺激するか」に直結
function colorNeighbors(center, all, limit) {
  if (!center.color) return [];
  const pool = all.filter(p => p.id !== center.id && p.color);
  const scored = pool.map(p => ({ p, d: colorDistance(center.color, p.color) }));
  scored.sort((a, b) => a.d - b.d);
  return scored.slice(0, limit).map(x => x.p);
}

// dispatcher: exploreMode に応じて切替
function neighbors(center, all, limit = 6) {
  if (exploreMode === 'color') return colorNeighbors(center, all, limit);
  return spacetimeNeighbors(center, all, limit);
}

// ============================================================
// フィルタ (条件付ランダム)
// 「触っている中で出てきた要望」のキャプチャ。完全ランダムを壊さないよう
// デフォルトは 'all'。
// ============================================================
const FILTERS = [
  { key: 'all',      label: '全期間' },
  { key: 'season',   label: 'この時季' },
  { key: '1y',       label: '1年前' },
  { key: '10y',      label: '10年前' },
  { key: 'oldest',   label: '久しぶり' },        // 撮影日が古い側のプール
  { key: 'eventDay', label: 'たくさん撮った日' }, // 同日に N枚以上ある日のプール
  // 📍 は GPS つき写真が対象という示唆 (脚注で母数を出すのでこれ単独の役割は副次的)
  { key: 'near',     label: '近場 📍', needsGPS: true },
  { key: 'far',      label: '遠出 📍', needsGPS: true },
];

// 「久しぶり」「たくさん撮った日」のチューニングパラメータ (鉛筆書き、触ってから調整)
const OLDEST_POOL_RATIO = 0.2;   // 古い側 20% をプール
const OLDEST_POOL_MIN   = 10;    // ただし最低10枚は確保
const EVENT_DAY_MIN     = 5;     // 1日に5枚以上撮ってたら「イベント感ある日」と見なす

// 月日のみの差 (日数)。年は問わない。31日換算の簡易計算で十分。
function monthDayDistance(a, b) {
  const aDay = a.getMonth() * 31 + a.getDate();
  const bDay = b.getMonth() * 31 + b.getDate();
  const d = Math.abs(aDay - bDay);
  return Math.min(d, 372 - d);  // 年をまたぐ近さも考慮
}

// 全 GPS つき写真の重心。「近場/遠出」の基準にする (Geolocation 不要で即動かす)
function gpsCentroid(all) {
  const withGPS = all.filter(p => p.lat != null && p.lng != null);
  if (!withGPS.length) return null;
  const lat = withGPS.reduce((s, p) => s + p.lat, 0) / withGPS.length;
  const lng = withGPS.reduce((s, p) => s + p.lng, 0) / withGPS.length;
  return { lat, lng };
}

// 現在のフィルタ key を見て allPhotos から候補を絞る
function pickPool(filterKey, all) {
  if (!filterKey || filterKey === 'all') return all;
  const now = new Date();

  if (filterKey === 'season') {
    // 今の MM/DD ±15日 (年は問わない)
    return all.filter(p => monthDayDistance(p.datetime, now) <= 15);
  }
  if (filterKey === '1y' || filterKey === '10y') {
    const years = filterKey === '1y' ? 1 : 10;
    const widthDays = filterKey === '1y' ? 15 : 60;  // 10年前はサンプル薄いので幅広く
    const target = new Date(now);
    target.setFullYear(now.getFullYear() - years);
    return all.filter(p => Math.abs(p.datetime.getTime() - target.getTime()) <= widthDays * 86400000);
  }
  if (filterKey === 'oldest') {
    // 撮影日が古い順から ratio (もしくは min) のプール → そこからランダム
    const sorted = all.slice().sort((a, b) => a.datetime - b.datetime);
    const n = Math.min(sorted.length, Math.max(OLDEST_POOL_MIN, Math.ceil(all.length * OLDEST_POOL_RATIO)));
    return sorted.slice(0, n);
  }
  if (filterKey === 'eventDay') {
    // 同じ日 (yyyy-mm-dd) に EVENT_DAY_MIN 枚以上ある日の写真をまとめてプールに
    const byDay = new Map();
    for (const p of all) {
      const k = `${p.datetime.getFullYear()}-${p.datetime.getMonth()}-${p.datetime.getDate()}`;
      if (!byDay.has(k)) byDay.set(k, []);
      byDay.get(k).push(p);
    }
    const result = [];
    for (const group of byDay.values()) {
      if (group.length >= EVENT_DAY_MIN) result.push(...group);
    }
    return result;
  }
  if (filterKey === 'near' || filterKey === 'far') {
    const c = gpsCentroid(all);
    if (!c) return [];  // GPS つき写真ゼロなら該当無し
    const threshold = 30000;  // 30km
    return all.filter(p => {
      if (p.lat == null || p.lng == null) return false;
      const d = haversine(c.lat, c.lng, p.lat, p.lng);
      return filterKey === 'near' ? d <= threshold : d > threshold;
    });
  }
  return all;
}

// ============================================================
// エクスポート / インポート (JSON + base64)
// ============================================================
function blobToB64(blob) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = () => resolve(r.result);
    r.onerror = () => reject(r.error);
    r.readAsDataURL(blob);
  });
}

async function b64ToBlob(dataUrl) {
  return (await fetch(dataUrl)).blob();
}

async function exportAll() {
  const all = await dbGetAll();
  if (!all.length) { alert('エクスポートする写真がありません'); return; }
  const out = { version: 1, exportedAt: new Date().toISOString(), photos: [] };
  for (const p of all) {
    out.photos.push({
      id: p.id, name: p.name,
      datetime: p.datetime.toISOString(),
      lat: p.lat, lng: p.lng,
      blob: await blobToB64(p.blob),
      thumb: await blobToB64(p.thumb),
      color: p.color ? Array.from(p.color) : null,  // Float32Array は JSON 化できないので Array に
      dedup: p.dedup,
      importedAt: p.importedAt?.toISOString?.() || null,
    });
  }
  const blob = new Blob([JSON.stringify(out)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `photo-memory-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
  alert(`${all.length} 枚をエクスポートしました`);
}

async function importBackup(file) {
  const data = JSON.parse(await file.text());
  if (data.version !== 1) throw new Error(`未知のバックアップバージョン: ${data.version}`);
  let imported = 0, dup = 0;
  for (const p of data.photos) {
    if (p.dedup && await dbHasDedup(p.dedup)) { dup++; continue; }
    await dbPut({
      id: p.id || crypto.randomUUID(),
      name: p.name,
      datetime: new Date(p.datetime),
      lat: p.lat, lng: p.lng,
      blob: await b64ToBlob(p.blob),
      thumb: await b64ToBlob(p.thumb),
      color: Array.isArray(p.color) ? new Float32Array(p.color) : null,  // 復元
      dedup: p.dedup,
      importedAt: p.importedAt ? new Date(p.importedAt) : new Date(),
    });
    imported++;
  }
  return { imported, dup };
}

// thumbnail を毎回 createObjectURL するとリークするので URL を録っておいて再利用 + 画面遷移時に開放

  if (!thumbUrls.has(photo.id)) thumbUrls.set(photo.id, URL.createObjectURL(photo.thumb));
  return thumbUrls.get(photo.id);
}
function revokeAllThumbUrls() {
  for (const url of thumbUrls.values()) URL.revokeObjectURL(url);
  thumbUrls.clear();
}

// ============================================================
// 長押し → フル画像表示 (タップで閉じる、ESC でも閉じる)
// pointerdown で 500ms タイマー、threshold 超の move でキャンセル。
// 長押し中に出した click は didLongPress フラグで navigation を抑止する。
// iOS Safari: <img> の長押しは「画像をコピー/保存」メニューを開いて
// gesture を奪う → -webkit-touch-callout: none + contextmenu preventDefault。
// ============================================================
const LONG_PRESS_MS = 500;
const LONG_PRESS_MOVE_THRESHOLD = 10;

function attachPhotoGestures(el, photo, onTap) {
  let timer = null;
  let startX = 0, startY = 0;
  let didLongPress = false;
  const cancel = () => { if (timer) { clearTimeout(timer); timer = null; } };

  el.addEventListener('pointerdown', (e) => {
    didLongPress = false;
    startX = e.clientX; startY = e.clientY;
    cancel();
    timer = setTimeout(() => {
      timer = null;
      didLongPress = true;
      showFullImage(photo);
    }, LONG_PRESS_MS);
  });
  el.addEventListener('pointermove', (e) => {
    if (!timer) return;
    if (Math.abs(e.clientX - startX) > LONG_PRESS_MOVE_THRESHOLD ||
        Math.abs(e.clientY - startY) > LONG_PRESS_MOVE_THRESHOLD) cancel();
  });
  el.addEventListener('pointerup', cancel);
  el.addEventListener('pointercancel', cancel);
  el.addEventListener('pointerleave', cancel);

  if (onTap) {
    el.addEventListener('click', () => {
      if (didLongPress) { didLongPress = false; return; }
      onTap();
    });
  }
  el.addEventListener('contextmenu', (e) => e.preventDefault());
}

let fullImageState = null;
function showFullImage(photo) {
  if (fullImageState) closeFullImage();
  // 原画 blob を表示 (サムネではなく)。閉じるときに必ず revoke。
  const url = URL.createObjectURL(photo.blob);
  const overlay = document.createElement('div');
  overlay.className = 'full-overlay';
  overlay.innerHTML = `<img src="${url}">`;
  document.body.appendChild(overlay);
  // 長押し解除直後の click が即閉じを起こさないよう少し遅らせる
  const openedAt = Date.now();
  overlay.addEventListener('click', () => {
    if (Date.now() - openedAt < 200) return;
    closeFullImage();
  });
  fullImageState = { el: overlay, url };
}
function closeFullImage() {
  if (!fullImageState) return;
  URL.revokeObjectURL(fullImageState.url);
  fullImageState.el.remove();
  fullImageState = null;
}
window.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && fullImageState) closeFullImage();
});

      <div class="empty">

    $main.innerHTML = `

  }
}

// ============================================================
// 画面遷移
// ============================================================
// Progressive Indexing (Phase 1.8):
//   フェーズA = 先頭 FAST_TRACK_COUNT 枚だけ処理 → 即メイン画面へ (待ち時間ここで終了)
//   フェーズB = 残りをバックグラウンドキューで低優先処理 (ユーザーは裏で遊べる)
// 大量投入でも「数枚処理したら遊べる」状態に最速で入る。
const FAST_TRACK_COUNT = 6;     // ランダム3枚 + 予備。これだけ処理したら遊べる
const BG_IMPORT_DELAY  = 120;   // バックグラウンド1枚ごとの間 (ms、低優先化)

// render() 後に1フレーム描画させてから重い処理に入る (進捗画面が見えるように)。
// rAF が発火しない環境 (背景タブ等) でハングしないよう setTimeout の保険を併設。
function nextPaint() {
  return new Promise(r => {
    let done = false;
    const finish = () => { if (!done) { done = true; r(); } };
    requestAnimationFrame(() => requestAnimationFrame(finish));
    setTimeout(finish, 100);
  });
}

async function importFiles(files) {
  state = 'importing';
  render();
  await nextPaint();
  const $text = document.getElementById('prog-text');
  const $bar  = document.getElementById('prog-bar');

  // --- フェーズA: 先頭を処理して即メイン画面へ ---
  const fast = files.slice(0, FAST_TRACK_COUNT);
  const rest = files.slice(FAST_TRACK_COUNT);

  for (let i = 0; i < fast.length; i++) {
    try {
      await importOne(fast[i]);
    } catch (e) {
      const stackTop = (e.stack || '').split('\n').find(l => l.trim()) || '';
      logErr(`取込失敗: ${fast[i].name}: ${e.message}  @ ${stackTop.slice(0, 80)}`);
    }
    if ($text) $text.textContent = `読み込み中… ${i+1} / ${fast.length}`;
    if ($bar)  $bar.style.width = `${((i+1)/fast.length*100).toFixed(0)}%`;
  }

  // メイン画面へ遷移 (この時点では何も表示していないので revoke は安全)
  revokeAllThumbUrls();
  allPhotos = await dbGetAll();
  if (allPhotos.length === 0) { state = 'empty'; render(); }
  else await drawRandom();

  // --- フェーズB: 残りはバックグラウンドへ (await しない=ユーザーに制御を返す) ---
  if (rest.length) enqueueBackground(rest);
  else backfillColors().catch(e => logErr(`backfill: ${e.message}`));
}

// バックグラウンド取り込み: キューに積んで1本のループで低優先消化。
// 再インポートが来たらキューに足すだけ (多重ループを作らない)。
function enqueueBackground(files) {
  bgQueue.push(...files);
  if (!bgRunning) runBackgroundImport();
}

async function runBackgroundImport() {
  bgRunning = true;
  let processed = 0;
  importStatus = { done: 0, total: bgQueue.length };
  updateBgStatus();

  while (bgQueue.length) {
    const file = bgQueue.shift();
    try {
      const r = await importOne(file);
      if (r.ok && r.record) {
        // 表示中の thumb URL を壊さないため revokeAllThumbUrls はしない。
        // 新規レコードだけ in-memory で足す (URL は表示時に lazy 生成される)。
        allPhotos.push(r.record);
        // まだ empty 画面なら最初の1枚で random へ
        if (state === 'empty') await drawRandom();
      }
    } catch (e) {
      logErr(`取込失敗(裏): ${file.name}: ${e.message}`);
    }
    processed++;
    importStatus = { done: processed, total: processed + bgQueue.length };
    updateBgStatus();
    await new Promise(r => setTimeout(r, BG_IMPORT_DELAY));
  }

  bgRunning = false;
  importStatus = null;
  updateBgStatus();
  // 新規分は color 付き。古い color 無しレコードがあれば backfill。
  backfillColors().catch(e => logErr(`backfill: ${e.message}`));
}

// ヘッダの控えめな進捗 (🌀 12/30)。完了で消える。枚数表示も同時更新。
function updateBgStatus() {
  const el = document.getElementById('bgStatus');
  if (el) {
    if (importStatus) {
      el.textContent = `🌀 ${importStatus.done}/${importStatus.total}`;
      el.classList.remove('hidden');
    } else {
      el.classList.add('hidden');
    }
  }
  $count.textContent = allPhotos.length > 0 ? `${allPhotos.length} 枚` : '— 枚';
}

// 既存写真で color フィールドが無いものに、保存済み thumb から色彩特徴を計算して付与する。
// 低優先度ループ (1枚 50ms 程度の待ちを挟む) でメイン操作を止めない。
// 二重実行を避けるためフラグを持つ。
let backfillRunning = false;
async function backfillColors() {
  if (backfillRunning) return;
  const missing = allPhotos.filter(p => !p.color);
  if (!missing.length) { backfillStatus = null; return; }

  backfillRunning = true;
  backfillStatus = { done: 0, total: missing.length };
  // explore 表示中ならインジケータを更新
  if (state === 'explore') render();

  // メモリ抑制: thumb を 16x16 に縮小して描画してから getImageData。
  // 4x4 グリッド平均と精度ほぼ同じで、 iOS Safari の Blob ストア圧迫を避ける。
  // (300x300 の thumb をそのまま getImageData だと 135枚 × 90,000px = 1200万ピクセル分のバッファ)
  const TINY = 16;
  const tinyCanvas = document.createElement('canvas');
  tinyCanvas.width = TINY;
  tinyCanvas.height = TINY;
  const tinyCtx = tinyCanvas.getContext('2d');

  for (const p of missing) {
    let url = null;
    try {
      url = URL.createObjectURL(p.thumb);
      const img = await new Promise((resolve, reject) => {
        const im = new Image();
        im.onload = () => resolve(im);
        im.onerror = () => reject(new Error('thumb load failed'));
        im.src = url;
      });
      tinyCtx.clearRect(0, 0, TINY, TINY);
      tinyCtx.drawImage(img, 0, 0, TINY, TINY);
      const color = extractColorFeature(tinyCtx, TINY, TINY);
      const updated = { ...p, color };
      await dbPut(updated);
      const idx = allPhotos.findIndex(x => x.id === p.id);
      if (idx >= 0) allPhotos[idx] = updated;
    } catch (e) {
      console.warn(`[backfill] ${p.name}: ${e.message}`);
    } finally {
      if (url) URL.revokeObjectURL(url);
    }
    backfillStatus.done++;
    await new Promise(r => setTimeout(r, 50));
  }

  // 後始末: iOS Safari がバックフィル中に古い thumb URL を解放してしまっていても
  // 復活させるため、URL キャッシュを破棄して画面を再描画 (?マーク防止)
  revokeAllThumbUrls();
  backfillStatus = null;
  backfillRunning = false;
  if (state === 'random' || state === 'explore') render();
}

async function drawRandom() {
  if (allPhotos.length === 0) { state = 'empty'; render(); return; }
  const filtered = pickPool(currentFilter, allPhotos);
  if (filtered.length === 0) {
    currentRandom = [];  // 該当無し → render(random) 内で専用メッセージ
  } else {
    const pool = filtered.slice();
    for (let i = pool.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [pool[i], pool[j]] = [pool[j], pool[i]];
    }
    currentRandom = pool.slice(0, Math.min(3, pool.length));
  }
  state = 'random';
  render();
}

function showExplore(photo) {
  currentCenter = photo;
  state = 'explore';
  render();
}

// picker を開く共通入口。開いた瞬間に「読み込み中」画面へ切り替え、連打を弾く。
// iOS は Done 後にファイル準備で数秒かかる (HEIC 変換等) → その間も画面が変わって見える。
function openPicker() {
  if (importBusy) return;  // 準備中/取り込み中の連打を無視 (多重 open / 多重 change で詰まるのを防ぐ)
  importBusy = true;
  prevStateBeforePicker = state;
  state = 'preparing';
  render();
  $picker.click();
}

// picker キャンセル時 (ネイティブ cancel イベント or 「やめる」ボタン) に元の画面へ戻す
function cancelPicker() {
  importBusy = false;
  if (state === 'preparing') { state = prevStateBeforePicker; render(); }
}

// ============================================================
// イベント
// ============================================================
document.getElementById('btnAdd').addEventListener('click', openPicker);
document.getElementById('btnExport').addEventListener('click', async () => {
  try { await exportAll(); }
  catch (e) { logErr(`export failed: ${e.message}`); alert(`エクスポート失敗: ${e.message}`); }
});
document.getElementById('btnImport').addEventListener('click', () => $importer.click());
document.getElementById('btnClear').addEventListener('click', async () => {
  if (!confirm('IndexedDB の全写真を削除します。続行?')) return;
  await dbClear();
  revokeAllThumbUrls();
  allPhotos = [];
  state = 'empty';
  render();
});

// ネイティブ picker のキャンセル (Safari 16.4+ / Chrome 113+)。
// これが来ない古い環境向けに preparing 画面に「やめる」ボタンも併設している。
$picker.addEventListener('cancel', cancelPicker);

$picker.addEventListener('change', async (e) => {
  const files = Array.from(e.target.files || []);
  // 注意: iOS Safari では e.target.value = '' を await 前に呼ぶと
  // File 参照が無効化される疑いがある (createObjectURL で TypeError) → 後始末は finally で
  if (!files.length) { e.target.value = ''; cancelPicker(); return; }
  if (importingNow) { e.target.value = ''; return; }  // 多重 change を弾く
  importingNow = true;
  try {
    await importFiles(files);
  } finally {
    // フェーズA 完了で制御を返す (フェーズB は裏で継続)。連打ガードもここで解除。
    importingNow = false;
    importBusy = false;
    e.target.value = '';
  }
});

$importer.addEventListener('change', async (e) => {
  const file = e.target.files?.[0];
  e.target.value = '';
  if (!file) return;
  try {
    const { imported, dup } = await importBackup(file);
    revokeAllThumbUrls();
    allPhotos = await dbGetAll();
    alert(`インポート完了: 新規 ${imported} 枚 / 重複スキップ ${dup} 枚`);
    if (allPhotos.length > 0) await drawRandom();
    else { state = 'empty'; render(); }
    backfillColors().catch(e => logErr(`backfill: ${e.message}`));
  } catch (err) {
    logErr(`インポート失敗: ${err.message}`);
    alert(`インポート失敗: ${err.message}`);
  }
});

// ============================================================
// 起動
// ============================================================
(async () => {
  if (typeof exifr === 'undefined') {
    logErr('exifr ロード失敗 (CDN 到達不可)');
    state = 'empty'; render(); return;
  }
  if (typeof heic2any === 'undefined') {
    logErr('heic2any ロード失敗 (HEIC が混じると失敗します)');
  }
  try {
    allPhotos = await dbGetAll();
    if (allPhotos.length === 0) { state = 'empty'; render(); }
    else await drawRandom();
  } catch (e) {
    logErr(`起動失敗: ${e.message}`);
    state = 'empty'; render();
  }
  // 起動完了後、color が無い既存レコードに非同期でバックフィル
  backfillColors().catch(e => logErr(`backfill: ${e.message}`));
})();
</script>
</body>
</html>
