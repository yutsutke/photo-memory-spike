<html lang="ja">
<head>

<!-- spike 中は HTML を毎回フレッシュに取りたい (iOS Safari の HTML キャッシュ対策) -->
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>写真思い出</title>
<style>
  :root { font-family: system-ui, -apple-system, "Hiragino Kaku Gothic ProN", sans-serif; }
  * { box-sizing: border-box; }
  body { margin: 0; padding: 0; background: #111; color: #eee; min-height: 100vh; }
  header { display: flex; align-items: center; gap: 6px; padding: 10px 14px; border-bottom: 1px solid #222; position: sticky; top: 0; background: #111; z-index: 10; }
  header h1 { font-size: 15px; margin: 0; flex: 1; }
  header h1 .ver { font-size: 10px; color: #666; font-weight: normal; margin-left: 6px; letter-spacing: 0.5px; }
  header .count { font-size: 12px; color: #8bf; margin-right: 4px; }
  header button { padding: 6px 10px; font-size: 12px; background: #333; color: #eee; border: 0; border-radius: 6px; cursor: pointer; }
  header button:active { background: #555; }
  main { padding: 14px; }

  button.primary { padding: 12px 18px; border: 0; border-radius: 8px; background: #2a6; color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; }
  button.secondary { padding: 10px 14px; border: 0; border-radius: 8px; background: #444; color: #eee; font-size: 13px; cursor: pointer; }

  /* empty state */
  .empty { display: flex; flex-direction: column; gap: 14px; max-width: 420px; margin: 40px auto; text-align: center; }
  .empty h2 { font-size: 16px; margin: 0; }
  .empty p { color: #aaa; font-size: 13px; line-height: 1.7; margin: 0; }
  /* 取り込み待ちの注意書き (ランダム画面上部、ヘッダ + の下) */
  .caveat { color: #777; font-size: 11px; line-height: 1.6; text-align: center; max-width: 600px; margin: 2px auto 12px; padding: 0 12px; }

  /* import progress */
  .progress { padding: 14px; background: #1a1a1a; border-radius: 8px; margin: 12px auto; max-width: 420px; }
  .progress .text { font-size: 13px; color: #ddd; }
  .progress .bar { height: 6px; background: #333; border-radius: 3px; overflow: hidden; margin-top: 8px; }
  .progress .bar > div { height: 100%; background: #2a6; transition: width 0.2s; }
  .spinner { width: 28px; height: 28px; border: 3px solid #333; border-top-color: #2a6; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* random 3 cards */
  .cards { display: grid; gap: 14px; grid-template-columns: 1fr; max-width: 420px; margin: 0 auto; }
  @media (min-width: 720px) { .cards { grid-template-columns: 1fr 1fr 1fr; max-width: 1100px; } }
  .card { background: #1a1a1a; border-radius: 12px; overflow: hidden; cursor: pointer; transition: transform 0.08s; position: relative; }
  .card:active { transform: scale(0.98); }
  .card img { width: 100%; aspect-ratio: 4/3; object-fit: cover; display: block; background: #000; }
  .card .meta { padding: 9px 12px 11px; }
  .card .meta .date { color: #eee; font-weight: 600; font-size: 13px; }
  .card .meta .place { color: #8bf; font-size: 11px; margin-top: 3px; }

  /* explore */
  .center-card { background: #1a1a1a; border-radius: 12px; overflow: hidden; margin: 0 auto 14px; max-width: 600px; position: relative; }
  .center-card img { width: 100%; aspect-ratio: 4/3; object-fit: cover; display: block; background: #000; }
  .center-card .meta { padding: 10px 14px 12px; }
  .center-card .meta .date { font-size: 14px; font-weight: 600; }
  .center-card .meta .place { font-size: 12px; color: #8bf; margin-top: 3px; }

  .neighbor-label { text-align: center; color: #888; font-size: 12px; margin: 6px 0 10px; }

  /* explore 画面の「時空/カラー」モードトグル */
  .mode-toggle { display: flex; gap: 6px; justify-content: center; margin: 8px 0 10px; }
  .mode-toggle button { padding: 6px 14px; border: 1px solid #444; border-radius: 999px; background: transparent; color: #aaa; font-size: 12px; cursor: pointer; }
  .mode-toggle button:active { opacity: 0.7; }
  .mode-toggle button.selected { background: #2a6; color: #fff; border-color: #2a6; font-weight: 600; }
  .backfill-note { text-align: center; color: #666; font-size: 10px; margin: 4px 0 0; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; max-width: 600px; margin: 0 auto; }
  .grid .thumb { aspect-ratio: 1; background: #1a1a1a; border-radius: 8px; overflow: hidden; cursor: pointer; position: relative; }
  .grid .thumb:active { opacity: 0.7; }

  .actions { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin: 22px auto; max-width: 600px; }

  /* フィルタチップ (ランダム3枚画面の上に並ぶ) */
  .filter-chips { display: flex; gap: 6px; overflow-x: auto; padding: 0 0 6px; max-width: 600px; margin: 0 auto 4px; -webkit-overflow-scrolling: touch; }
  .filter-chips::-webkit-scrollbar { display: none; }
  .chip { flex: 0 0 auto; padding: 6px 12px; border: 1px solid #444; border-radius: 999px; background: transparent; color: #aaa; font-size: 12px; white-space: nowrap; cursor: pointer; }
  .chip:active { opacity: 0.7; }
  .chip.selected { background: #2a6; color: #fff; border-color: #2a6; font-weight: 600; }
  .filter-note { text-align: center; color: #777; font-size: 11px; max-width: 600px; margin: 0 auto 14px; padding: 0 12px; }

  /* フル画像表示 (長押しで開く、タップで閉じる) */
  .full-overlay { position: fixed; inset: 0; background: #000; z-index: 100; display: flex; align-items: center; justify-content: center; }
  .full-overlay img { max-width: 100%; max-height: 100%; object-fit: contain; }
  /* iOS のロングタップで出る画像メニューを抑止 (これが出ると長押し検知も奪われる) */
  .card img, .thumb img, .center-card img, .full-overlay img { -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }

  /* error/log overlay (起動時/取り込みエラーだけ) */
  .log { position: fixed; bottom: 0; left: 0; right: 0; max-height: 28vh; overflow: auto; background: #200; border-top: 1px solid #500; padding: 6px 10px; font-family: ui-monospace, "SF Mono", Consolas, monospace; font-size: 10px; color: #f88; display: none; }
  .log.show { display: block; }
  /* 成功/情報 (取り込み差分サマリ等) は緑系。エラー(赤)と区別 */
  .log.info { background: #021; border-top-color: #063; color: #9f9; }

  .hidden { display: none !important; }

  /* ワンタップ除外ボタン (各写真の右上)。控えめな半透明、押下で赤 */
  .exclude-btn { position: absolute; top: 6px; right: 6px; width: 26px; height: 26px; padding: 0; border: 0; border-radius: 50%; background: rgba(0,0,0,0.45); color: #fff; font-size: 12px; line-height: 1; cursor: pointer; z-index: 3; display: flex; align-items: center; justify-content: center; }
  .exclude-btn:active { background: rgba(210,50,50,0.9); }

  /* 除外の取り消しトースト */
  .toast { position: fixed; left: 50%; bottom: 22px; transform: translateX(-50%); background: #222; color: #eee; border: 1px solid #444; border-radius: 999px; padding: 9px 14px 9px 18px; font-size: 13px; display: flex; gap: 14px; align-items: center; z-index: 200; box-shadow: 0 6px 20px rgba(0,0,0,0.55); }
  .toast button { background: none; border: 0; color: #8bf; font-weight: 700; font-size: 13px; cursor: pointer; padding: 4px; }

  /* AI 試行モーダル (β) */
  .ai-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.78); z-index: 300; display: flex; align-items: center; justify-content: center; padding: 18px; }
  .ai-modal-card { background: #1a1a1a; border-radius: 12px; padding: 20px 22px; max-width: 460px; width: 100%; max-height: 90vh; overflow-y: auto; }
  .ai-modal-card h2 { font-size: 15px; margin: 0 0 12px; }
  .ai-modal-card p { font-size: 12px; color: #bbb; line-height: 1.7; margin: 0 0 10px; }
  .ai-modal-card .stat { font-size: 12px; color: #8bf; margin: 8px 0; }
  .ai-modal-card .bar { height: 6px; background: #333; border-radius: 3px; overflow: hidden; margin: 6px 0 12px; }
  .ai-modal-card .bar > div { height: 100%; background: #2a6; transition: width 0.2s; }
  .ai-modal-card .actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 14px; }
  .ai-modal-card button { padding: 8px 14px; border: 1px solid #444; border-radius: 6px; background: #222; color: #ddd; font-size: 13px; cursor: pointer; }
  .ai-modal-card button.primary { background: #2a6; border-color: #2a6; color: #fff; font-weight: 600; }

  /* AI 進捗 (ヘッダ右の控えめ表示、🌀 と同列) */

<body>

<header>
  <h1>写真思い出 <span class="ver" id="ver"></span></h1>
  <span class="count" id="count">— 枚</span>
  <span class="count hidden" id="bgStatus"></span>
  <button id="btnAdd" title="追加">+</button>
  <button id="btnAI" title="AI で意味の近傍を試す (β)">🧠</button>
  <button id="btnExport" title="エクスポート">⇩</button>
  <button id="btnImport" title="インポート">⇧</button>
  <button id="btnClear" title="全削除">🗑</button>
</header>

<main id="main"></main>

<input id="picker" class="hidden" type="file" multiple accept="image/*,.heic,.heif">
<input id="importer" class="hidden" type="file" accept="application/json">

<div class="log" id="log"></div>

<!-- CDN: exifr full (HEIC EXIF まで読める), heic2any (HEIC→JPEG 描画用) -->
<script src="https://cdn.jsdelivr.net/npm/exifr@7/dist/full.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/heic2any@0.0.4/dist/heic2any.min.js"></script>

<script>
"use strict";

// ============================================================
// バージョン (キャッシュ問題切り分け用に画面に表示する)
// commit するたびに上げること
// ============================================================
const BUILD = 'phase2 (1万枚対応) · 2026-05-29';

// ============================================================
// IndexedDB ラッパー (素の API、薄く)
// ============================================================
const DB_NAME = 'photo-memory-spike';
const DB_VERSION = 1;
const STORE = 'photos';

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = () => {
      const db = req.result;
      if (!db.objectStoreNames.contains(STORE)) {
        const s = db.createObjectStore(STORE, { keyPath: 'id' });
        s.createIndex('datetime', 'datetime');
        s.createIndex('dedup', 'dedup', { unique: false });
      }
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function dbGetAll() {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const req = db.transaction(STORE, 'readonly').objectStore(STORE).getAll();
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function dbPut(record) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE, 'readwrite');
    tx.objectStore(STORE).put(record);
    tx.oncomplete = () => resolve();
    // iOS Safari は tx.error が null で onerror が来ることがある → 必ず Error を渡す
    tx.onerror = () => reject(tx.error || new Error('IDB transaction aborted'));
    tx.onabort = () => reject(tx.error || new Error('IDB transaction aborted'));
  });
}

async function dbHasDedup(key) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const req = db.transaction(STORE, 'readonly').objectStore(STORE).index('dedup').get(key);
    req.onsuccess = () => resolve(!!req.result);
    req.onerror = () => reject(req.error);
  });
}

async function dbClear() {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE, 'readwrite');
    tx.objectStore(STORE).clear();
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}

// ============================================================
// 取り込み
// ============================================================
async function readMeta(file) {
  const m = await exifr.parse(file, true);
  const dto = m?.DateTimeOriginal || m?.CreateDate || m?.ModifyDate || null;
  return {
    datetime: dto instanceof Date ? dto : (dto ? new Date(dto) : null),
    lat: m?.latitude ?? null,
    lng: m?.longitude ?? null,
    // EXIF Orientation (1-8)。canvas で transform を当てて補正する。
    // exifr full ビルドは Orientation を「Top-left」のような文字列で返すことがあるので
    // 数値で正規化する手間が要る。spike では文字列が来た場合は 1 にフォールバック。
    orientation: typeof m?.Orientation === 'number' ? m.Orientation : 1,
  };
}

async function toJpegBlob(file) {
  const isHeic = /\.hei[cf]$/i.test(file.name) || /hei[cf]/i.test(file.type);
  if (!isHeic) return file;
  if (typeof heic2any === 'undefined') throw new Error('heic2any not loaded');
  const converted = await heic2any({ blob: file, toType: 'image/jpeg', quality: 0.85 });
  return Array.isArray(converted) ? converted[0] : converted;
}

// ============================================================
// 色彩特徴 (Phase 1.5)
// canvas を NxN グリッドに分けて各セルの平均 RGB を取る → N*N*3 次元
// ユークリッド距離で「色が近い」を判定。AI なしで「夕焼け→夕焼け」「緑→緑」
// のワープを試す土台。
// ============================================================
const COLOR_GRID = 4;
const COLOR_DIM  = COLOR_GRID * COLOR_GRID * 3;  // 48

function extractColorFeature(ctx, w, h) {
  const feat = new Float32Array(COLOR_DIM);
  let idx = 0;
  for (let gy = 0; gy < COLOR_GRID; gy++) {
    for (let gx = 0; gx < COLOR_GRID; gx++) {
      const x = Math.floor(gx * w / COLOR_GRID);
      const y = Math.floor(gy * h / COLOR_GRID);
      const cw = Math.max(1, Math.floor((gx + 1) * w / COLOR_GRID) - x);
      const ch = Math.max(1, Math.floor((gy + 1) * h / COLOR_GRID) - y);
      const data = ctx.getImageData(x, y, cw, ch).data;
      let r = 0, g = 0, b = 0;
      const pxN = data.length / 4;
      for (let i = 0; i < data.length; i += 4) {
        r += data[i]; g += data[i+1]; b += data[i+2];
      }
      feat[idx++] = (r / pxN) / 255;
      feat[idx++] = (g / pxN) / 255;
      feat[idx++] = (b / pxN) / 255;
    }
  }
  return feat;
}

function colorDistance(a, b) {
  if (!a || !b || a.length !== b.length) return Infinity;
  let s = 0;
  for (let i = 0; i < a.length; i++) {
    const d = a[i] - b[i];
    s += d * d;
  }
  return Math.sqrt(s);
}

// EXIF Orientation (1-8) を canvas transform に変換して当てる
// w, h は canvas のサイズ (= 回転後の表示サイズ)
function applyExifTransform(ctx, orientation, w, h) {
  switch (orientation) {
    case 2: ctx.transform(-1, 0, 0,  1, w, 0); break;  // 水平反転
    case 3: ctx.transform(-1, 0, 0, -1, w, h); break;  // 180度
    case 4: ctx.transform( 1, 0, 0, -1, 0, h); break;  // 垂直反転
    case 5: ctx.transform( 0, 1, 1,  0, 0, 0); break;  // 90度 + 反転
    case 6: ctx.transform( 0, 1,-1,  0, h, 0); break;  // 右90度
    case 7: ctx.transform( 0,-1,-1,  0, h, w); break;  // 270度 + 反転
    case 8: ctx.transform( 0,-1, 1,  0, 0, w); break;  // 左90度
    // 1: そのまま
  }
}

// サムネ Blob 生成。<img> + <canvas> 古典方式 (createImageBitmap は iOS Safari で
// TypeError を投げるバージョンがあるため避ける)。orientation は exifr で
// 読んだ値を渡してもらい canvas で補正する。
// 注: 後ろで定義している DOM 要素生成関数 makeThumb と名前が衝突しないよう
//     こちらは createThumbnail という名前にする (前は両方 makeThumb で
//     後ろ勝ちのため importOne が DOM 版を呼んでしまい TypeError していた)
async function createThumbnail(jpegBlob, maxPx, orientation = 1) {
  // 入力の Blob 性を最初に検査して、failed at native code の謎を消す
  if (jpegBlob == null) throw new Error(`blob is ${jpegBlob}`);
  if (!(jpegBlob instanceof Blob)) throw new Error(`not a Blob: ${typeof jpegBlob} ${Object.prototype.toString.call(jpegBlob)}`);
  if (jpegBlob.size === 0) throw new Error(`blob.size=0 type=${jpegBlob.type || '?'}`);

  let s = 'createObjectURL';
  let url = null;
  try {
    url = URL.createObjectURL(jpegBlob);
    s = 'loadImage';
    const img = await new Promise((resolve, reject) => {
      const im = new Image();
      im.onload = () => resolve(im);
      im.onerror = () => reject(new Error(`<img> load failed (blob.size=${jpegBlob.size} type=${jpegBlob.type})`));
      im.src = url;
    });
    s = 'measure';
    const rotated = orientation >= 5 && orientation <= 8;
    const sw = img.naturalWidth, sh = img.naturalHeight;
    if (sw === 0 || sh === 0) throw new Error(`zero natural size ${sw}x${sh}`);
    const dw = rotated ? sh : sw;
    const dh = rotated ? sw : sh;
    const ratio = Math.min(maxPx / dw, maxPx / dh, 1);
    const w = Math.max(1, Math.round(dw * ratio));
    const h = Math.max(1, Math.round(dh * ratio));

    s = 'canvas';
    const canvas = document.createElement('canvas');
    canvas.width = w; canvas.height = h;
    const ctx = canvas.getContext('2d');
    applyExifTransform(ctx, orientation, w, h);
    ctx.drawImage(img, 0, 0, rotated ? h : w, rotated ? w : h);

    // 色彩特徴を抽出 (描画済み canvas のピクセルから、変換を一旦リセットして読む)
    s = 'color';
    ctx.setTransform(1, 0, 0, 1, 0, 0);  // transform をリセットして getImageData は canvas 座標で
    const color = extractColorFeature(ctx, w, h);

    s = 'toBlob';
    const thumb = await new Promise(r => canvas.toBlob(r, 'image/jpeg', 0.8));
    if (!thumb) throw new Error('toBlob returned null');
    return { thumb, color };
  } catch (e) {
    // どの段階で落ちたかを上に伝える
    const wrap = new Error(`thumb.${s}: ${e.name || ''} ${e.message || e}`);
    wrap.stack = e.stack;
    throw wrap;
  } finally {
    if (url) URL.revokeObjectURL(url);
  }
}

// v23: 1万枚スケール対応。原画 (3〜5MB/枚) を IndexedDB に保存すると 1万枚で ~30GB →
// iOS の quota 超過/消去リスク。保存は thumb のみに倒す (10k で数百MB に収まる)。
// THUMB_PX を 512 に上げ、グリッド表示と「長押し拡大」を 1 枚の thumb で兼用する
// (原画を持たないので拡大もこれ)。512px は phone のフルスクリーンで実用品質、10k で ~500MB。
// 注意: 大量取り込み後にこの値を変えると 1万枚の再処理が要る (thumb サイズは sticky) → bulk 前に確定。
const THUMB_PX = 512;
const KEEP_ORIGINAL = false;  // true で原画も保存 (小規模で原画拡大を最優先したい時用、容量と引き換え)

async function importOne(file) {
  // stage を持たせておくと、エラー時にどの段階で落ちたか分かる
  let stage = 'meta';
  try {
    const { datetime, lat, lng, orientation } = await readMeta(file);
    if (!datetime) return { skipped: 'no-datetime' };

    stage = 'dedup';
    const dedup = `${file.name}|${file.size}|${datetime.getTime()}`;
    if (await dbHasDedup(dedup)) return { skipped: 'duplicate' };

    stage = 'toJpeg';
    const jpegBlob = await toJpegBlob(file);

    stage = 'thumb';
    const { thumb, color } = await createThumbnail(jpegBlob, THUMB_PX, orientation);

    stage = 'put';
    const record = {
      id: crypto.randomUUID(),
      name: file.name,
      datetime,
      lat, lng,
      blob: KEEP_ORIGINAL ? jpegBlob : null,  // v23: 原画は捨てて thumb のみ保存 (容量優先)
      thumb,
      color,
      dedup,
      importedAt: new Date(),
    };
    await dbPut(record);
    return { ok: true, record };
  } catch (e) {
    // stage 情報を残してから rethrow (importFiles 側で詳細ログ)
    const wrapped = new Error(`[${stage}] ${e.name || ''} ${e.message || e}`);
    wrapped.stack = e.stack;
    throw wrapped;
  }
}

// ============================================================
// 連想展開ロジック
// ============================================================
function haversine(lat1, lng1, lat2, lng2) {
  const R = 6371000;
  const toRad = d => d * Math.PI / 180;
  const dLat = toRad(lat2 - lat1), dLng = toRad(lng2 - lng1);
  const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLng/2)**2;
  return 2 * R * Math.asin(Math.sqrt(a));
}

function isSameDay(a, b) {
  return a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate();
}

// 中心写真の時空近傍を最大 limit 枚返す
// 優先順位: GPS 5km以内 → 同日 → ±3日 → ±7日
// 各レイヤー内では中心からの時間差が近い順
function spacetimeNeighbors(center, all, limit) {
  const t = center.datetime.getTime();
  const others = all.filter(p => p.id !== center.id);
  const hasGPS = center.lat != null && center.lng != null;

  const layers = [
    hasGPS
      ? others.filter(p => p.lat != null && p.lng != null && haversine(center.lat, center.lng, p.lat, p.lng) <= 5000)
      : [],
    others.filter(p => isSameDay(p.datetime, center.datetime)),
    others.filter(p => Math.abs(p.datetime.getTime() - t) <= 3 * 86400000),
    others.filter(p => Math.abs(p.datetime.getTime() - t) <= 7 * 86400000),
  ];

  const seen = new Set();
  const result = [];
  for (const layer of layers) {
    layer.sort((a, b) => Math.abs(a.datetime - t) - Math.abs(b.datetime - t));
    for (const p of layer) {
      if (seen.has(p.id)) continue;
      seen.add(p.id);
      result.push(p);
      if (result.length >= limit) return result;
    }
  }
  return result;
}

// 色彩近傍: 時空を無視して全件 (color 持ち) から中心との色距離で並べ替え、上位 6 枚
// → 「夕焼け→別の日の別の場所の夕焼け」のような色ワープが出る
// TODO の検証問い「色の近傍 vs 意味の近傍、どちらが reminiscence を刺激するか」に直結
function colorNeighbors(center, all, limit) {
  if (!center.color) return [];
  const pool = all.filter(p => p.id !== center.id && p.color);
  const scored = pool.map(p => ({ p, d: colorDistance(center.color, p.color) }));
  scored.sort((a, b) => a.d - b.d);
  return scored.slice(0, limit).map(x => x.p);
}

// ミックス (デフォルト): 時空近傍・色近傍・意味近傍を1プールに混ぜ、重複排除 → シャッフル → 上位 limit 枚。
// 「割合は固定しない」= 時空/色/意味の比率は引くたびにランダム (純シャッフル, [[mix-walk-works]])。
// 中心に色が無ければ色近傍は空、embedding が無ければ意味近傍は空 → 自然に持っている軸だけで混ざる。
// v19: 意味軸 (CLIP) を合流。Phase 2 検証問い「AI が完璧すぎると標準アプリの AI アルバムと
//   既視感が出ないか → 時空/色のノイズを混ぜると連想がドライブするか」を mix そのもので試す。
function mixedNeighbors(center, all, limit) {
  const st = spacetimeNeighbors(center, all, limit);
  const co = colorNeighbors(center, all, limit);
  const me = meaningNeighbors(center, all, limit);
  const seen = new Set();
  const pool = [];
  for (const p of [...st, ...co, ...me]) {
    if (seen.has(p.id)) continue;
    seen.add(p.id);
    pool.push(p);
  }
  for (let i = pool.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [pool[i], pool[j]] = [pool[j], pool[i]];
  }
  return pool.slice(0, limit);
}

// 意味近傍 (Phase 2 pilot): CLIP embedding のコサイン類似度で上位 limit 枚。
// embedding は normalize 済み前提なので内積 = コサイン類似度。
// 中心 or プールに embedding が無いものは弾く (sparse 対応)。
function meaningNeighbors(center, all, limit) {
  if (!center.embedding) return [];
  const pool = all.filter(p => p.id !== center.id && p.embedding && p.embedding.length === center.embedding.length);
  const dim = center.embedding.length;
  const scored = pool.map(p => {
    let dot = 0;
    for (let i = 0; i < dim; i++) dot += center.embedding[i] * p.embedding[i];
    return { p, sim: dot };
  });
  scored.sort((a, b) => b.sim - a.sim);
  return scored.slice(0, limit).map(x => x.p);
}

// ============================================================
// フィルタ (条件付ランダム)
// 「触っている中で出てきた要望」のキャプチャ。完全ランダムを壊さないよう
// デフォルトは 'all'。
// ============================================================
const FILTERS = [
  { key: 'all',      label: '全期間' },
  { key: 'season',   label: 'この時季' },
  { key: '3m',       label: '3ヶ月前' },
  { key: '1y',       label: '1年前' },
  { key: '3y',       label: '3年前' },
  { key: '10y',      label: '10年前' },
  { key: 'oldest',   label: '久しぶり' },        // 撮影日が古い側のプール
  { key: 'eventDay', label: 'たくさん撮った日' }, // 同日に N枚以上ある日のプール
  // 📍 は GPS つき写真が対象という示唆 (脚注で母数を出すのでこれ単独の役割は副次的)
  { key: 'near',     label: '近場 📍', needsGPS: true },
  { key: 'far',      label: '遠出 📍', needsGPS: true },
];

// 「久しぶり」「たくさん撮った日」のチューニングパラメータ (鉛筆書き、触ってから調整)
const OLDEST_POOL_RATIO = 0.2;   // 古い側 20% をプール
const OLDEST_POOL_MIN   = 10;    // ただし最低10枚は確保
const EVENT_DAY_MIN     = 5;     // 1日に5枚以上撮ってたら「イベント感ある日」と見なす

// 月日のみの差 (日数)。年は問わない。31日換算の簡易計算で十分。
function monthDayDistance(a, b) {
  const aDay = a.getMonth() * 31 + a.getDate();
  const bDay = b.getMonth() * 31 + b.getDate();
  const d = Math.abs(aDay - bDay);
  return Math.min(d, 372 - d);  // 年をまたぐ近さも考慮
}

// 全 GPS つき写真の重心。「近場/遠出」の基準にする (Geolocation 不要で即動かす)
function gpsCentroid(all) {
  const withGPS = all.filter(p => p.lat != null && p.lng != null);
  if (!withGPS.length) return null;
  const lat = withGPS.reduce((s, p) => s + p.lat, 0) / withGPS.length;
  const lng = withGPS.reduce((s, p) => s + p.lng, 0) / withGPS.length;
  return { lat, lng };
}

// 現在のフィルタ key を見て allPhotos から候補を絞る
function pickPool(filterKey, all) {
  if (!filterKey || filterKey === 'all') return all;
  const now = new Date();

  if (filterKey === 'season') {
    // 今の MM/DD ±15日 (年は問わない)
    return all.filter(p => monthDayDistance(p.datetime, now) <= 15);
  }
  if (filterKey === '3m') {
    const target = new Date(now);
    target.setMonth(now.getMonth() - 3);
    return all.filter(p => Math.abs(p.datetime.getTime() - target.getTime()) <= 15 * 86400000);
  }
  if (filterKey === '1y' || filterKey === '3y' || filterKey === '10y') {
    const years = filterKey === '1y' ? 1 : filterKey === '3y' ? 3 : 10;
    // 古いほどサンプル薄くなる想定で幅を広げる
    const widthDays = filterKey === '1y' ? 15 : filterKey === '3y' ? 30 : 60;
    const target = new Date(now);
    target.setFullYear(now.getFullYear() - years);
    return all.filter(p => Math.abs(p.datetime.getTime() - target.getTime()) <= widthDays * 86400000);
  }
  if (filterKey === 'oldest') {
    // 撮影日が古い順から ratio (もしくは min) のプール → そこからランダム
    const sorted = all.slice().sort((a, b) => a.datetime - b.datetime);
    const n = Math.min(sorted.length, Math.max(OLDEST_POOL_MIN, Math.ceil(all.length * OLDEST_POOL_RATIO)));
    return sorted.slice(0, n);
  }
  if (filterKey === 'eventDay') {
    // 同じ日 (yyyy-mm-dd) に EVENT_DAY_MIN 枚以上ある日の写真をまとめてプールに
    const byDay = new Map();
    for (const p of all) {
      const k = `${p.datetime.getFullYear()}-${p.datetime.getMonth()}-${p.datetime.getDate()}`;
      if (!byDay.has(k)) byDay.set(k, []);
      byDay.get(k).push(p);
    }
    const result = [];
    for (const group of byDay.values()) {
      if (group.length >= EVENT_DAY_MIN) result.push(...group);
    }
    return result;
  }
  if (filterKey === 'near' || filterKey === 'far') {
    const c = gpsCentroid(all);
    if (!c) return [];  // GPS つき写真ゼロなら該当無し
    const threshold = 30000;  // 30km
    return all.filter(p => {
      if (p.lat == null || p.lng == null) return false;
      const d = haversine(c.lat, c.lng, p.lat, p.lng);
      return filterKey === 'near' ? d <= threshold : d > threshold;
    });
  }
  return all;
}

// ============================================================
// エクスポート / インポート (JSON + base64)
// ============================================================
function blobToB64(blob) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = () => resolve(r.result);
    r.onerror = () => reject(r.error);
    r.readAsDataURL(blob);
  });
}

async function b64ToBlob(dataUrl) {
  return (await fetch(dataUrl)).blob();
}

async function exportAll() {
  const all = await dbGetAll();
  if (!all.length) { alert('エクスポートする写真がありません'); return; }
  const out = { version: 1, exportedAt: new Date().toISOString(), photos: [] };
  for (const p of all) {
    out.photos.push({
      id: p.id, name: p.name,
      datetime: p.datetime.toISOString(),
      lat: p.lat, lng: p.lng,
      blob: p.blob ? await blobToB64(p.blob) : null,  // v23: 原画は無いことがある
      thumb: await blobToB64(p.thumb),
      color: p.color ? Array.from(p.color) : null,  // Float32Array は JSON 化できないので Array に
      excluded: p.excluded || false,
      dedup: p.dedup,
      importedAt: p.importedAt?.toISOString?.() || null,
    });
  }
  const blob = new Blob([JSON.stringify(out)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `photo-memory-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
  alert(`${all.length} 枚をエクスポートしました`);
}

async function importBackup(file) {
  const data = JSON.parse(await file.text());
  if (data.version !== 1) throw new Error(`未知のバックアップバージョン: ${data.version}`);
  let imported = 0, dup = 0;
  for (const p of data.photos) {
    if (p.dedup && await dbHasDedup(p.dedup)) { dup++; continue; }
    await dbPut({
      id: p.id || crypto.randomUUID(),
      name: p.name,
      datetime: new Date(p.datetime),
      lat: p.lat, lng: p.lng,
      blob: p.blob ? await b64ToBlob(p.blob) : null,  // v23: 原画は無いことがある
      thumb: await b64ToBlob(p.thumb),
      color: Array.isArray(p.color) ? new Float32Array(p.color) : null,  // 復元
      excluded: p.excluded || false,
      dedup: p.dedup,
      importedAt: p.importedAt ? new Date(p.importedAt) : new Date(),
    });
    imported++;
  }
  return { imported, dup };
}

// ============================================================
// 長押し → フル画像表示 (タップで閉じる、ESC でも閉じる)
// pointerdown で 500ms タイマー、threshold 超の move でキャンセル。
// 長押し中に出した click は didLongPress フラグで navigation を抑止する。
// iOS Safari: <img> の長押しは「画像をコピー/保存」メニューを開いて
// gesture を奪う → -webkit-touch-callout: none + contextmenu preventDefault。
// ============================================================
const LONG_PRESS_MS = 500;
const LONG_PRESS_MOVE_THRESHOLD = 10;

function attachPhotoGestures(el, photo, onTap) {
  let timer = null;
  let startX = 0, startY = 0;
  let didLongPress = false;
  const cancel = () => { if (timer) { clearTimeout(timer); timer = null; } };

  el.addEventListener('pointerdown', (e) => {
    didLongPress = false;
    startX = e.clientX; startY = e.clientY;
    cancel();
    timer = setTimeout(() => {
      timer = null;
      didLongPress = true;
      showFullImage(photo);
    }, LONG_PRESS_MS);
  });
  el.addEventListener('pointermove', (e) => {
    if (!timer) return;
    if (Math.abs(e.clientX - startX) > LONG_PRESS_MOVE_THRESHOLD ||
        Math.abs(e.clientY - startY) > LONG_PRESS_MOVE_THRESHOLD) cancel();
  });
  el.addEventListener('pointerup', cancel);
  el.addEventListener('pointercancel', cancel);
  el.addEventListener('pointerleave', cancel);

  if (onTap) {
    el.addEventListener('click', () => {
      if (didLongPress) { didLongPress = false; return; }
      onTap();
    });
  }
  el.addEventListener('contextmenu', (e) => e.preventDefault());
}

let fullImageState = null;
function showFullImage(photo) {
  if (fullImageState) closeFullImage();
  // v23: 原画を保存しなくなったので、blob があればそれを、無ければ thumb (512px) を拡大表示。
  // thumb はやや粗いが「原画を持たない代わりに 1万枚入る」容量優先の tradeoff。閉じる時に必ず revoke。
  const src = photo.blob || photo.thumb;
  const url = URL.createObjectURL(src);
  const overlay = document.createElement('div');
  overlay.className = 'full-overlay';
  overlay.innerHTML = `<img src="${url}">`;
  document.body.appendChild(overlay);
  // 長押し解除直後の click が即閉じを起こさないよう少し遅らせる
  const openedAt = Date.now();
  overlay.addEventListener('click', () => {
    if (Date.now() - openedAt < 200) return;
    closeFullImage();
  });
  fullImageState = { el: overlay, url };
}
function closeFullImage() {
  if (!fullImageState) return;
  URL.revokeObjectURL(fullImageState.url);
  fullImageState.el.remove();
  fullImageState = null;
}
window.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && fullImageState) closeFullImage();
});

// 除外: excluded フラグを立てて永続化 (非破壊、blob は残す)。表示は filter で消える。
// 直後にトーストで取り消し可能。
// 描画を先 / DB 保存は後 (保存失敗でも UX をブロックしない、メモリ状態が真実)
async function excludePhoto(photo) {
  photo.excluded = true;
  showUndoToast(photo);
  if (state === 'explore' && currentCenter && currentCenter.id === photo.id) {
    drawRandom();  // 中心を除外 → 別の3枚へ
  } else {
    render();      // 除外写真は filter で消える
  }
  try { await dbPut(photo); } catch (e) { logErr(`除外保存失敗: ${e?.message || String(e)}`); }
}

async function undoExclude(photo) {
  photo.excluded = false;
  render();
  try { await dbPut(photo); } catch (e) { logErr(`取消保存失敗: ${e?.message || String(e)}`); }
}

function renderAIModal() {

  const old = document.getElementById('aiModal');
  if (old) old.remove();
  if (!aiModalOpen) return;

  const total = allPhotos.length;

  const modal = document.createElement('div');

  modal.id = 'aiModal';
  // 背景タップで閉じる (進行中は閉じない=誤タップ救済)
  modal.addEventListener('click', (e) => { if (e.target === modal && !aiExtracting && !aiLoading) closeAIModal(); });

  const card = document.createElement('div');
  card.className = 'ai-modal-card';

  let body = `<h2>🧠 AI で「意味の近傍」を引く</h2>`;

  if (aiLoading || aiExtracting) {
    // 進行中
    const pct = aiStatus && aiStatus.total ? Math.round(100 * aiStatus.done / aiStatus.total) : 0;
    body += `
      <p>${aiStatus?.msg || '処理中…'}</p>
      <div class="stat">${aiStatus?.done ?? 0} / ${aiStatus?.total ?? '?'}</div>
      <div class="bar"><div style="width:${pct}%"></div></div>
      <p style="font-size:11px;color:#888;">画面を閉じても処理は続きます (ヘッダに 🧠 進捗)。タブを背景にすると iOS は処理を遅らせます。</p>
    `;
  } else {
    // 待機 / 完了
    body += `
      <p>「色」「時空」と並ぶ 3 つ目の連想軸として、CLIP モデルで写真の <b>意味</b> (被写体・シーン) を埋め込み、コサイン類似で近傍を引きます。explore のモード切替に「🧠 意味」が出ます。</p>
      <div class="stat">解析済み: ${done} / ${total} 枚 ${remain > 0 ? `(未解析 ${remain})` : '(全件解析済)'}</div>
      ${done > 0 ? `<p style="font-size:11px;color:#888;">explore で写真をタップ → モード「🧠 意味」で確認。</p>` : ''}
      ${aiLastError ? `<p style="color:#f88;font-size:11px;">エラー: ${aiLastError}</p>` : ''}
      <p style="font-size:11px;color:#888;">初回はモデル DL (~100MB)。Wi-Fi 推奨。抽出自体は速いです。写真は端末から出ません。</p>
    `;
  }

  card.innerHTML = body;

  const actions = document.createElement('div');
  actions.className = 'actions';
  if (aiLoading || aiExtracting) {
    const closeBtn = document.createElement('button');
    closeBtn.textContent = '閉じる (処理は続く)';
    closeBtn.addEventListener('click', closeAIModal);
    actions.appendChild(closeBtn);
    if (aiExtracting) {
      // 中断ボタン (DL 中は中断できない、抽出ループ中のみ)
      const cancelBtn = document.createElement('button');
      cancelBtn.textContent = '中断';
      cancelBtn.addEventListener('click', () => { aiCancel = true; });
      actions.appendChild(cancelBtn);
    }
  } else {
    const closeBtn = document.createElement('button');
    closeBtn.textContent = '閉じる';
    closeBtn.addEventListener('click', closeAIModal);
    const runBtn = document.createElement('button');
    runBtn.className = 'primary';
    runBtn.textContent = remain > 0 ? `${remain} 枚を解析` : '解析完了';
    runBtn.disabled = (remain === 0);
    runBtn.addEventListener('click', () => { runEmbeddingExtraction(); });  // limit 無し = 全件
    actions.appendChild(closeBtn);
    actions.appendChild(runBtn);
  }
  card.appendChild(actions);

  modal.appendChild(card);
  document.body.appendChild(modal);
}

function render() {
  $main.innerHTML = '';
  const activeCount = allPhotos.reduce((n, p) => n + (p.excluded ? 0 : 1), 0);
  $count.textContent = activeCount > 0 ? `${activeCount} 枚` : '— 枚';
  renderAIModal();  // モーダルは独立 (state に依存しない overlay)

  if (state === 'loading') {
    $main.innerHTML = `<p style="text-align:center;color:#888;margin-top:40px;">読み込み中…</p>`;
    return;
  }

  if (state === 'empty') {
    $main.innerHTML = `
      <div class="empty">
        <h2>写真を取り込んで始める</h2>
        <p>選んだ写真は端末から出ません (IndexedDB に保存)。<br>
        まず 20〜30 枚くらい入れて感触を見るのが目安です。</p>
        <button class="primary" id="emptyAdd">📷 写真を選ぶ</button>
      </div>`;
    document.getElementById('emptyAdd').addEventListener('click', openPicker);
    return;
  }

  // picker を開いた瞬間〜change が来るまで。
  // 注: iOS のネイティブ写真ピッカーが前面にいる間はこれは裏に隠れる。
  //     ピッカーが閉じてから change までの隙間でだけ見える (それも出せない区間がある)。
  if (state === 'preparing') {
    $main.innerHTML = `
      <div class="progress" style="text-align:center;">
        <div class="spinner"></div>
        <div class="text">📷 写真を読み込んでいます…</div>
        <div class="text" style="color:#888;font-size:11px;margin-top:6px;">写真が多いと選択後の準備に数十秒かかることがあります</div>
      </div>
      <div class="actions"><button class="secondary" id="cancelPrep">やめる</button></div>`;
    document.getElementById('cancelPrep').addEventListener('click', cancelPicker);
    return;
  }

  if (state === 'importing') {
    $main.innerHTML = `
      <div class="progress">
        <div class="text" id="prog-text">読み込み開始…</div>
        <div class="bar"><div id="prog-bar" style="width:0%"></div></div>
      </div>`;
    return;
  }

  if (state === 'random') {
    // 取り込み待ちの注意書き (ヘッダ + の下 = この画面の最上部)
    const caveat = document.createElement('div');
    caveat.className = 'caveat';
    caveat.textContent = '※ 写真を多く選ぶほど、選んだ後の端末側の準備に時間がかかります（百枚規模で数十秒）。準備が終われば裏で読み込みながらすぐ使えます。';
    $main.appendChild(caveat);

    // フィルタチップ (デフォルト 'all' で従来通り完全ランダム)
    const chips = document.createElement('div');
    chips.className = 'filter-chips';
    for (const f of FILTERS) {
      const btn = document.createElement('button');
      btn.className = 'chip' + (currentFilter === f.key ? ' selected' : '');
      btn.textContent = f.label;
      btn.addEventListener('click', () => {
        if (currentFilter === f.key) return;
        currentFilter = f.key;
        drawRandom();
      });
      chips.appendChild(btn);
    }
    $main.appendChild(chips);

    // 母数の脚注 (どのフィルタでも何枚から引いているかを見える化)
    // 副次的に「近場/遠出 は GPS つき写真のみ対象」が自然に伝わる
    const currentFilterObj = FILTERS.find(x => x.key === currentFilter);
    const active = allPhotos.filter(p => !p.excluded);
    const filtered = pickPool(currentFilter, active);
    const gpsCount = active.filter(p => p.lat != null && p.lng != null).length;
    const note = document.createElement('div');
    note.className = 'filter-note';
    if (currentFilterObj?.needsGPS) {
      note.textContent = `${filtered.length} 枚から (GPS付き ${gpsCount} / ${allPhotos.length} 枚)`;
    } else {
      note.textContent = `${filtered.length} 枚から`;
    }
    $main.appendChild(note);

    // 表示は除外を除いた先頭3枚。除外で次が繰り上がり、取り消しで元に戻る (他の2枚は不動)
    const visibleRandom = currentRandom.filter(p => !p.excluded).slice(0, 3);
    if (currentRandom.length === 0) {
      const msg = document.createElement('p');
      msg.style.cssText = 'text-align:center;color:#888;margin:40px 0;';
      if (currentFilter === 'all') {
        msg.textContent = '写真がありません';
      } else if (currentFilterObj?.needsGPS && gpsCount === 0) {
        msg.innerHTML = `GPS情報を持つ写真がありません<br><span style="font-size:11px;color:#666;">「${currentFilterObj.label}」は位置情報がある写真から引きます</span>`;
      } else {
        msg.textContent = `「${currentFilterObj.label}」に該当する写真がありません`;
      }
      $main.appendChild(msg);
    } else if (visibleRandom.length === 0) {
      const msg = document.createElement('p');
      msg.style.cssText = 'text-align:center;color:#888;margin:40px 0;';
      msg.textContent = '全部除外されています。引き直すかフィルタを変えてください。';
      $main.appendChild(msg);
    } else {
      const cards = document.createElement('div');
      cards.className = 'cards';
      visibleRandom.forEach(p => cards.appendChild(makeCard(p, () => showExplore(p))));
      $main.appendChild(cards);
    }

    const actions = document.createElement('div');
    actions.className = 'actions';
    actions.innerHTML = `<button class="primary" id="reroll">🎲 もう一度引く</button>`;
    $main.appendChild(actions);
    document.getElementById('reroll').addEventListener('click', drawRandom);
    return;
  }

  if (state === 'explore') {
    const center = currentCenter;

    const centerEl = document.createElement('div');
    centerEl.className = 'center-card';
    centerEl.innerHTML = `<img src="${thumbUrl(center)}">
      <div class="meta">
        <div class="date">${fmtDate(center.datetime)}</div>
        ${fmtPlace(center.lat, center.lng) ? `<div class="place">${fmtPlace(center.lat, center.lng)}</div>` : ''}
      </div>`;
    // 中心カードは tap action なし、長押しでフル画像のみ
    attachPhotoGestures(centerEl, center, null);
    centerEl.appendChild(makeExcludeBtn(center));
    $main.appendChild(centerEl);

    // モード切替の開閉 opener (普段は隠し、必要時に展開して軸を固定)
    const modeBar = document.createElement('div');
    modeBar.className = 'mode-toggle';
    const opener = document.createElement('button');
    opener.textContent = modeToggleVisible ? 'モード ▲' : 'モード ▼';
    opener.style.cssText = 'border-color:#333;color:#888;';
    opener.addEventListener('click', () => {
      modeToggleVisible = !modeToggleVisible;
      saveModePrefs();
      render();
    });
    modeBar.appendChild(opener);
    $main.appendChild(modeBar);

    // 展開時のみ ミックス / 時空 / カラー / 意味 を出す
    // 意味モードは embedding を持つ写真が ≥3 枚ある時だけ表示 (Phase 2 pilot)
    if (modeToggleVisible) {
      const toggle = document.createElement('div');
      toggle.className = 'mode-toggle';
      const mkBtn = (mode, label) => {
        const b = document.createElement('button');
        b.textContent = label;
        if (exploreMode === mode) b.classList.add('selected');
        b.addEventListener('click', () => {
          if (exploreMode === mode) return;
          exploreMode = mode;
          saveModePrefs();
          refreshNeighbors();
          render();
        });
        return b;
      };
      toggle.appendChild(mkBtn('mix', '🎲 ミックス'));
      toggle.appendChild(mkBtn('spacetime', '⏳ 時空'));
      toggle.appendChild(mkBtn('color', '🎨 カラー'));
      if (aiEmbeddedCount() >= 3) toggle.appendChild(mkBtn('meaning', '🧠 意味'));
      $main.appendChild(toggle);
    }

    // バックフィル中の注釈 (カラー優先で中心に color が無いケースなど)
    if (backfillStatus && backfillStatus.done < backfillStatus.total) {
      const note = document.createElement('div');
      note.className = 'backfill-note';
      note.textContent = `🌀 色情報を準備中… ${backfillStatus.done} / ${backfillStatus.total}`;
      $main.appendChild(note);
    }

    // ラベル + グリッド
    if (exploreMode === 'color' && !center.color) {
      const label = document.createElement('div');
      label.className = 'neighbor-label';
      label.textContent = 'この写真の色情報がまだありません';
      $main.appendChild(label);
    } else if (exploreMode === 'meaning' && !center.embedding) {
      const label = document.createElement('div');
      label.className = 'neighbor-label';
      label.textContent = 'この写真はまだ AI 解析されていません (🧠 から追加解析)';
      $main.appendChild(label);
    } else {
      const ns = currentNeighbors.filter(p => !p.excluded).slice(0, 6);
      const label = document.createElement('div');
      label.className = 'neighbor-label';
      if (ns.length === 0) {
        label.textContent = '近くに写真がありません';
      } else if (exploreMode === 'color') {
        label.textContent = `色の近く ${ns.length} 枚`;
      } else if (exploreMode === 'spacetime') {
        label.textContent = `この時空の近く ${ns.length} 枚`;
      } else if (exploreMode === 'meaning') {
        label.textContent = `意味の近く ${ns.length} 枚`;
      } else {
        label.textContent = `この写真のまわり ${ns.length} 枚`;
      }
      $main.appendChild(label);

      if (ns.length > 0) {
        const grid = document.createElement('div');
        grid.className = 'grid';
        ns.forEach(p => grid.appendChild(makeThumb(p, () => showExplore(p))));
        $main.appendChild(grid);
      }
    }

    const actions = document.createElement('div');
    actions.className = 'actions';
    actions.innerHTML = `<button class="secondary" id="backRandom">← ランダム3枚に戻る</button>`;
    $main.appendChild(actions);
    document.getElementById('backRandom').addEventListener('click', drawRandom);
    return;
  }
}

// ============================================================
// 画面遷移
// ============================================================
// Progressive Indexing (Phase 1.8):
//   フェーズA = 先頭 FAST_TRACK_COUNT 枚だけ処理 → 即メイン画面へ (待ち時間ここで終了)
//   フェーズB = 残りをバックグラウンドキューで低優先処理 (ユーザーは裏で遊べる)
// 大量投入でも「数枚処理したら遊べる」状態に最速で入る。
const FAST_TRACK_COUNT = 6;     // ランダム3枚 + 予備。これだけ処理したら遊べる
const BG_IMPORT_DELAY  = 120;   // バックグラウンド1枚ごとの間 (ms、低優先化)

// render() 後に1フレーム描画させてから重い処理に入る (進捗画面が見えるように)。
// rAF が発火しない環境 (背景タブ等) でハングしないよう setTimeout の保険を併設。
function nextPaint() {
  return new Promise(r => {
    let done = false;
    const finish = () => { if (!done) { done = true; r(); } };
    requestAnimationFrame(() => requestAnimationFrame(finish));
    setTimeout(finish, 100);
  });
}

// importOne の戻り値を当該セッションの差分集計に加算 (v22)。
function tallyImport(r) {
  if (!importStats) return;
  if (r?.ok) importStats.added++;
  else if (r?.skipped === 'duplicate') importStats.dup++;
  else importStats.skipped++;   // no-datetime 等、取り込めなかったもの
}

// 取り込み完了時に「新規 N / 重複スキップ M」を緑のログで表示 (差分が起きたことの可視化, v22)。
// 「アプリを開くと自動で差分 UP」は web では不可能 → ピッカーで選び直す → 既存はスキップ、を見える化する。
function showImportSummary() {
  if (!importStats) return;
  const { added, dup, skipped, failed } = importStats;
  let msg;
  if (added === 0 && dup > 0 && skipped === 0 && failed === 0) {
    msg = `✓ 新規なし — 選んだ ${dup} 枚はすべて取り込み済みでした`;
  } else {
    const parts = [`✓ 新規 ${added} 枚`];
    if (dup)     parts.push(`既にある分はスキップ ${dup}`);
    if (skipped) parts.push(`日時なしで除外 ${skipped}`);
    if (failed)  parts.push(`失敗 ${failed}`);
    msg = parts.join(' / ');
  }
  logInfo(msg);
  importStats = null;
}

async function importFiles(files) {
  importStats = { added: 0, dup: 0, skipped: 0, failed: 0 };  // この取り込みセッションの差分集計 (v22)
  state = 'importing';
  render();
  await nextPaint();
  const $text = document.getElementById('prog-text');
  const $bar  = document.getElementById('prog-bar');

  // --- フェーズA: 先頭を処理して即メイン画面へ ---
  const fast = files.slice(0, FAST_TRACK_COUNT);
  const rest = files.slice(FAST_TRACK_COUNT);

  for (let i = 0; i < fast.length; i++) {
    try {
      tallyImport(await importOne(fast[i]));
    } catch (e) {
      if (importStats) importStats.failed++;
      const stackTop = (e.stack || '').split('\n').find(l => l.trim()) || '';
      logErr(`取込失敗: ${fast[i].name}: ${e.message}  @ ${stackTop.slice(0, 80)}`);
    }
    if ($text) $text.textContent = `読み込み中… ${i+1} / ${fast.length}`;
    if ($bar)  $bar.style.width = `${((i+1)/fast.length*100).toFixed(0)}%`;
  }

  // メイン画面へ遷移 (この時点では何も表示していないので revoke は安全)
  revokeAllThumbUrls();
  allPhotos = await dbGetAll();
  if (allPhotos.length === 0) { state = 'empty'; render(); }
  else await drawRandom();

  // --- フェーズB: 残りはバックグラウンドへ (await しない=ユーザーに制御を返す) ---
  // 残りがあれば runBackgroundImport の末尾で backfill→自動 embedding を回す。
  // fast-track だけ (rest 無し) の時はここで色 backfill → AI opt-in 済なら自動 embedding 抽出。
  if (rest.length) {
    enqueueBackground(rest);  // 残りの集計とサマリは runBackgroundImport 末尾で
  } else {
    showImportSummary();      // fast-track だけで完結 → ここで差分サマリ
    backfillColors().then(maybeAutoExtractEmbeddings).catch(e => logErr(`backfill: ${e?.message || e}`));
  }
}

// バックグラウンド取り込み: キューに積んで1本のループで低優先消化。
// 再インポートが来たらキューに足すだけ (多重ループを作らない)。
function enqueueBackground(files) {
  bgQueue.push(...files);
  if (!bgRunning) runBackgroundImport();
}

async function runBackgroundImport() {
  bgRunning = true;
  let processed = 0;
  importStatus = { done: 0, total: bgQueue.length };
  updateBgStatus();

  while (bgQueue.length) {
    const file = bgQueue.shift();
    try {
      const r = await importOne(file);
      tallyImport(r);
      if (r.ok && r.record) {
        // 表示中の thumb URL を壊さないため revokeAllThumbUrls はしない。
        // 新規レコードだけ in-memory で足す (URL は表示時に lazy 生成される)。
        allPhotos.push(r.record);
        // まだ empty 画面なら最初の1枚で random へ
        if (state === 'empty') await drawRandom();
      }
    } catch (e) {
      if (importStats) importStats.failed++;
      logErr(`取込失敗(裏): ${file.name}: ${e.message}`);
    }
    processed++;
    importStatus = { done: processed, total: processed + bgQueue.length };
    updateBgStatus();
    await new Promise(r => setTimeout(r, BG_IMPORT_DELAY));
  }

  bgRunning = false;
  importStatus = null;
  updateBgStatus();
  showImportSummary();  // fast + background の合算で差分サマリを表示 (v22)
  // 新規分は color 付き。古い color 無しレコードがあれば backfill → その後 AI opt-in 済なら
  // 新規写真の embedding を自動抽出 (mix の意味軸を生かし続ける、v20)。
  backfillColors().then(maybeAutoExtractEmbeddings).catch(e => logErr(`backfill: ${e?.message || e}`));
}

// ヘッダの控えめな進捗 (🌀 12/30 取り込み / 🧠 40/300 AI 解析)。完了で消える。
function updateBgStatus() {
  const el = document.getElementById('bgStatus');
  if (el) {
    if (importStatus) {
      el.textContent = `🌀 ${importStatus.done}/${importStatus.total}`;
      el.classList.remove('hidden', 'ai-bg');
    } else if (aiExtracting && aiStatus && aiStatus.phase === 'extract') {
      el.textContent = `🧠 ${aiStatus.done}/${aiStatus.total}`;
      el.classList.remove('hidden');
      el.classList.add('ai-bg');
    } else {
      el.classList.add('hidden');
      el.classList.remove('ai-bg');
    }
  }
  const activeCount = allPhotos.reduce((n, p) => n + (p.excluded ? 0 : 1), 0);
  $count.textContent = activeCount > 0 ? `${activeCount} 枚` : '— 枚';
}

// 既存写真で color フィールドが無いものに、保存済み thumb から色彩特徴を計算して付与する。
// 低優先度ループ (1枚 50ms 程度の待ちを挟む) でメイン操作を止めない。
// 二重実行を避けるためフラグを持つ。
let backfillRunning = false;
async function backfillColors() {
  if (backfillRunning) return;
  const missing = allPhotos.filter(p => !p.color);
  if (!missing.length) { backfillStatus = null; return; }

  backfillRunning = true;
  backfillStatus = { done: 0, total: missing.length };
  // explore 表示中ならインジケータを更新
  if (state === 'explore') render();

  // メモリ抑制: thumb を 16x16 に縮小して描画してから getImageData。
  // 4x4 グリッド平均と精度ほぼ同じで、 iOS Safari の Blob ストア圧迫を避ける。
  // (300x300 の thumb をそのまま getImageData だと 135枚 × 90,000px = 1200万ピクセル分のバッファ)
  const TINY = 16;
  const tinyCanvas = document.createElement('canvas');
  tinyCanvas.width = TINY;
  tinyCanvas.height = TINY;
  const tinyCtx = tinyCanvas.getContext('2d');

  for (const p of missing) {
    let url = null;
    try {
      url = URL.createObjectURL(p.thumb);
      const img = await new Promise((resolve, reject) => {
        const im = new Image();
        im.onload = () => resolve(im);
        im.onerror = () => reject(new Error('thumb load failed'));
        im.src = url;
      });
      tinyCtx.clearRect(0, 0, TINY, TINY);
      tinyCtx.drawImage(img, 0, 0, TINY, TINY);
      const color = extractColorFeature(tinyCtx, TINY, TINY);
      const updated = { ...p, color };
      await dbPut(updated);
      const idx = allPhotos.findIndex(x => x.id === p.id);
      if (idx >= 0) allPhotos[idx] = updated;
    } catch (e) {
      console.warn(`[backfill] ${p.name}: ${e.message}`);
    } finally {
      if (url) URL.revokeObjectURL(url);
    }
    backfillStatus.done++;
    await new Promise(r => setTimeout(r, 50));
  }

  // 後始末: iOS Safari がバックフィル中に古い thumb URL を解放してしまっていても
  // 復活させるため、URL キャッシュを破棄して画面を再描画 (?マーク防止)
  revokeAllThumbUrls();
  backfillStatus = null;
  backfillRunning = false;
  if (state === 'random' || state === 'explore') render();
}

// ============================================================
// Phase 2: CLIP embedding による意味の近傍 (opt-in)
// pilot で「意味での手触り最高」と実機検証 → 全件 backfill を主に。
// モデル DL (~100MB) 後の抽出は速い、~300枚まで待ち許容 (実機 signal)。
// ============================================================
const PHASE2_MODEL = 'Xenova/clip-vit-base-patch32';
const PHASE2_CDN   = 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.0.2/dist/transformers.min.js';

let aiExtractor = null;       // transformers pipeline インスタンス (lazy)
let aiLoading   = false;      // モデル DL or init 中
let aiExtracting = false;     // embedding 抽出ループ中
let aiCancel = false;         // 抽出の中断要求
let aiStatus = null;          // { phase: 'dl'|'extract', done, total, msg }
let aiModalOpen = false;      // モーダル表示中フラグ
let aiLastError = null;       // 直近のエラー (モーダルに出す)

async function loadAIPipeline() {
  if (aiExtractor) return aiExtractor;
  aiLoading = true;
  aiStatus = { phase: 'dl', done: 0, total: 100, msg: 'AI モデル DL 中…' };
  if (aiModalOpen) render();
  try {
    const tx = await import(PHASE2_CDN);
    const { pipeline } = tx;
    aiExtractor = await pipeline('image-feature-extraction', PHASE2_MODEL, {
      progress_callback: (data) => {
        // data: { status, name, file, progress, loaded, total }
        if (data?.status === 'progress' && typeof data.progress === 'number') {
          aiStatus = { phase: 'dl', done: Math.round(data.progress), total: 100, msg: `モデル DL ${data.file || ''} ${Math.round(data.progress)}%` };
          if (aiModalOpen) render();
        }
      }
    });
    return aiExtractor;
  } finally {
    aiLoading = false;
  }
}

async function extractEmbeddingForPhoto(p) {
  const url = URL.createObjectURL(p.thumb);
  try {
    const result = await aiExtractor(url, { pooling: 'mean', normalize: true });
    // Float32Array(512) を期待、Tensor の場合は .data
    return result?.data || result;
  } finally {
    URL.revokeObjectURL(url);
  }
}

// embedding 抽出。limit 未指定なら未解析の全件 (実機検証で ~300枚まで待ち許容と確認)。
// 中断可能 (aiCancel)。閉じても処理継続 (ヘッダ 🧠 N/M で進捗)。
async function runEmbeddingExtraction(limit) {
  if (aiExtracting) return;
  const candidates = allPhotos.filter(p => !p.excluded && !p.embedding);
  if (!candidates.length) { aiStatus = null; if (aiModalOpen) render(); return; }

  // シャッフル: 途中で中断しても満遍なく解析されているように
  for (let i = candidates.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [candidates[i], candidates[j]] = [candidates[j], candidates[i]];
  }
  const target = (limit && limit < candidates.length) ? candidates.slice(0, limit) : candidates;

  try {
    await loadAIPipeline();
  } catch (e) {
    aiLastError = e?.message || String(e);
    aiStatus = null;
    if (aiModalOpen) render();
    return;
  }

  aiExtracting = true;
  aiCancel = false;
  aiLastError = null;
  aiStatus = { phase: 'extract', done: 0, total: target.length, msg: '🧠 解析中…' };
  if (aiModalOpen) render();
  updateBgStatus();

  for (const p of target) {
    if (aiCancel) break;
    try {
      const embedding = await extractEmbeddingForPhoto(p);
      const updated = { ...p, embedding };
      await dbPut(updated);
      const idx = allPhotos.findIndex(x => x.id === p.id);
      if (idx >= 0) allPhotos[idx] = updated;
    } catch (e) {
      console.warn(`[ai-extract] ${p.name}: ${e?.message || e}`);
    }
    aiStatus.done++;
    if (aiStatus.done % 3 === 0) { if (aiModalOpen) render(); updateBgStatus(); }
    await new Promise(r => setTimeout(r, 0));
  }

  aiExtracting = false;
  aiCancel = false;
  aiStatus = null;
  try { localStorage.setItem('pms-phase2-tried', '1'); } catch {}
  // 後始末: iOS Safari は CLIP の重い推論中に「表示中サムネの blob URL」を巻き込んで無効化することがある
  // (? 化, CHANGELOG v5/v7 と同じ罠)。backfillColors と同様に URL キャッシュを破棄し、新しい URL で
  // 描き直す。これをしないと解析後に一部サムネが ? のまま残る。
  revokeAllThumbUrls();
  if (state === 'explore') refreshNeighbors();  // 新しい embedding を mix/意味の近傍に反映
  render();                                      // 常に再描画 (modal も renderAIModal で同時に更新される)
  updateBgStatus();
}

function aiEmbeddedCount() {
  return allPhotos.reduce((n, p) => n + (p.embedding ? 1 : 0), 0);
}

// 新規取り込み後の自動 embedding 抽出 (v20)。
// mix の意味軸 ([[mix-walk-works]] v19 で「混ざったほうがおもしろい」と確定) を新しい写真でも生かし続ける。
// ゲート: AI を一度でも使った人 (embedding を 1 枚以上持つ) だけ自動起動。
//   未 opt-in (embedding ゼロ) には一切何もしない = 100MB DL を強制しない (UI 最小干渉の原則)。
// 色 backfill の後にチェーンして呼ぶ (色計算と CLIP 推論を同時に走らせず iOS のメモリ/発熱を抑える)。
// モデルは初回 opt-in 時に DL 済 → Cache Storage から高速復元 (meaning-walk-works の性能 signal)。
async function maybeAutoExtractEmbeddings() {
  if (aiExtracting) return;                                       // 既に解析中なら任せる (多重起動しない)
  if (aiEmbeddedCount() === 0) return;                            // AI 未 opt-in → 何もしない
  if (!allPhotos.some(p => !p.excluded && !p.embedding)) return;  // 未解析の新規写真なし
  await runEmbeddingExtraction();                                 // limit なし = 未解析の全件 (中断は header 経由では不可、import 規模は通常小さい)
}

async function drawRandom() {
  if (allPhotos.length === 0) { state = 'empty'; render(); return; }
  const filtered = pickPool(currentFilter, allPhotos.filter(p => !p.excluded));
  if (filtered.length === 0) {
    currentRandom = [];  // 該当無し → render(random) 内で専用メッセージ
  } else {
    const pool = filtered.slice();
    for (let i = pool.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [pool[i], pool[j]] = [pool[j], pool[i]];
    }
    currentRandom = pool;  // 全候補を保持。表示は先頭3枚、除外すると次が繰り上がる (取り消しで戻る)
  }
  state = 'random';
  render();
}

function showExplore(photo) {
  currentCenter = photo;
  refreshNeighbors();
  state = 'explore';
  render();
}

// currentCenter + exploreMode から近傍を計算してキャッシュ。
// 中心/モードが変わった時だけ呼ぶ (再描画のたびに mix が再シャッフルされるのを防ぐ)。
function refreshNeighbors() {
  const c = currentCenter;
  if (!c) { currentNeighbors = []; return; }
  // 表示は6枚だが、除外時に繰り上げる候補を確保するため 12 枚キャッシュする
  const active = allPhotos.filter(p => !p.excluded);
  if (exploreMode === 'spacetime') currentNeighbors = spacetimeNeighbors(c, active, 12);
  else if (exploreMode === 'color') currentNeighbors = colorNeighbors(c, active, 12);
  else if (exploreMode === 'meaning') currentNeighbors = meaningNeighbors(c, active, 12);
  else currentNeighbors = mixedNeighbors(c, active, 12);
}

function saveModePrefs() {
  try {
    localStorage.setItem('pms-exploreMode', exploreMode);
    localStorage.setItem('pms-modeToggleVisible', modeToggleVisible ? '1' : '0');
  } catch {}
}

// picker を開く共通入口。開いた瞬間に「読み込み中」画面へ切り替え、連打を弾く。
// iOS は Done 後にファイル準備で数秒かかる (HEIC 変換等) → その間も画面が変わって見える。
function openPicker() {
  if (importBusy) return;  // 準備中/取り込み中の連打を無視 (多重 open / 多重 change で詰まるのを防ぐ)
  importBusy = true;
  prevStateBeforePicker = state;
  state = 'preparing';
  render();
  $picker.click();
}

// picker キャンセル時 (ネイティブ cancel イベント or 「やめる」ボタン) に元の画面へ戻す
function cancelPicker() {
  importBusy = false;
  if (state === 'preparing') { state = prevStateBeforePicker; render(); }
}

// ============================================================
// イベント
// ============================================================
document.getElementById('btnAdd').addEventListener('click', openPicker);
document.getElementById('btnAI').addEventListener('click', openAIModal);
document.getElementById('btnExport').addEventListener('click', async () => {
  try { await exportAll(); }
  catch (e) { logErr(`export failed: ${e.message}`); alert(`エクスポート失敗: ${e.message}`); }
});
document.getElementById('btnImport').addEventListener('click', () => $importer.click());
document.getElementById('btnClear').addEventListener('click', async () => {
  if (!confirm('IndexedDB の全写真を削除します。続行?')) return;
  await dbClear();
  revokeAllThumbUrls();
  allPhotos = [];
  state = 'empty';
  render();
});

// ネイティブ picker のキャンセル (Safari 16.4+ / Chrome 113+)。
// これが来ない古い環境向けに preparing 画面に「やめる」ボタンも併設している。
$picker.addEventListener('cancel', cancelPicker);

$picker.addEventListener('change', async (e) => {
  const files = Array.from(e.target.files || []);
  // 注意: iOS Safari では e.target.value = '' を await 前に呼ぶと
  // File 参照が無効化される疑いがある (createObjectURL で TypeError) → 後始末は finally で
  if (!files.length) { e.target.value = ''; cancelPicker(); return; }
  if (importingNow) { e.target.value = ''; return; }  // 多重 change を弾く
  importingNow = true;
  try {
    await importFiles(files);
  } finally {
    // フェーズA 完了で制御を返す (フェーズB は裏で継続)。連打ガードもここで解除。
    importingNow = false;
    importBusy = false;
    e.target.value = '';
  }
});

$importer.addEventListener('change', async (e) => {
  const file = e.target.files?.[0];
  e.target.value = '';
  if (!file) return;
  try {
    const { imported, dup } = await importBackup(file);
    revokeAllThumbUrls();
    allPhotos = await dbGetAll();
    alert(`インポート完了: 新規 ${imported} 枚 / 重複スキップ ${dup} 枚`);
    if (allPhotos.length > 0) await drawRandom();
    else { state = 'empty'; render(); }
    backfillColors().catch(e => logErr(`backfill: ${e.message}`));
  } catch (err) {
    logErr(`インポート失敗: ${err.message}`);
    alert(`インポート失敗: ${err.message}`);
  }
});

// ============================================================
// 起動
// ============================================================
// v23: 大量 (数千〜1万枚) のサムネを抱えても Safari に消去されにくくする (best-effort)。
// 失敗しても通常動作には影響しない。usage/quota も console に出して実機で容量を見られるように。
async function requestPersistentStorage() {
  try {
    if (navigator.storage?.persist) {
      const granted = await navigator.storage.persist();
      console.log(`[storage] persistent=${granted}`);
    }
    if (navigator.storage?.estimate) {
      const { usage, quota } = await navigator.storage.estimate();
      console.log(`[storage] usage=${Math.round((usage || 0) / 1e6)}MB / quota=${Math.round((quota || 0) / 1e6)}MB`);
    }
  } catch (e) { console.warn('[storage] persist/estimate failed', e); }
}

(async () => {
  if (typeof exifr === 'undefined') {
    logErr('exifr ロード失敗 (CDN 到達不可)');
    state = 'empty'; render(); return;
  }
  if (typeof heic2any === 'undefined') {
    logErr('heic2any ロード失敗 (HEIC が混じると失敗します)');
  }
  requestPersistentStorage();  // await しない (起動を遅らせない)
  try {
    allPhotos = await dbGetAll();
    if (allPhotos.length === 0) { state = 'empty'; render(); }
    else await drawRandom();
  } catch (e) {
    logErr(`起動失敗: ${e.message}`);
    state = 'empty'; render();
  }
  // 起動完了後、color が無い既存レコードに非同期でバックフィル
  backfillColors().catch(e => logErr(`backfill: ${e.message}`));
})();
</script>
</body>
</html>
