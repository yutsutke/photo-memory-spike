<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<!-- spike 中は HTML を毎回フレッシュに取りたい (iOS Safari の HTML キャッシュ対策) -->
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>写真思い出スパイク — Phase 0</title>
<style>
  :root { font-family: system-ui, -apple-system, "Hiragino Kaku Gothic ProN", sans-serif; }
  body { margin: 0; padding: 16px; background: #111; color: #eee; }
  h1 { font-size: 18px; margin: 0 0 12px; }
  .desc { font-size: 13px; color: #aaa; margin: 0 0 16px; line-height: 1.6; }
  .picker-wrap { display: flex; flex-direction: column; gap: 10px; }
  /* file input を視覚的に隠さない (iOS で display:none だと挙動が不安定) */
  input[type=file] { width: 100%; padding: 10px; border: 2px dashed #555; border-radius: 8px; background: #222; color: #eee; font-size: 14px; }
  button { padding: 12px 16px; border: 0; border-radius: 8px; background: #2a6; color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; }
  button.secondary { background: #444; }
  .boot { margin: 12px 0; font-size: 12px; color: #888; }
  .boot.ok { color: #9f9; }
  .boot.err { color: #f88; }
  .stats { margin: 16px 0 8px; font-size: 13px; color: #ddd; }
  .stats b { color: #8bf; }
  .log { font-family: ui-monospace, "SF Mono", Consolas, monospace; font-size: 11px; background: #000; border: 1px solid #333; border-radius: 6px; padding: 8px; max-height: 50vh; overflow: auto; white-space: pre-wrap; word-break: break-all; }
  .row { padding: 4px 0; border-bottom: 1px solid #1a1a1a; }
  .row.ok { color: #9f9; }
  .row.warn { color: #fc6; }
  .row.err { color: #f88; }
</style>
</head>
<body>

<h1>写真思い出スパイク — Phase 0（前提検証）</h1>
<p class="desc">
  写真を選んで <b>DateTimeOriginal</b> と <b>GPS</b> が読めるか確認する。
  日時取得率がほぼ100%なら Phase 1 に進む。
</p>

<div class="picker-wrap">
  <input id="picker" type="file" multiple accept="image/*">
  <button id="pickBtn">📷 写真を選ぶ</button>
</div>

<div class="boot" id="boot">起動中…</div>
<div class="stats" id="stats">未選択</div>
<div class="log" id="log"></div>

<!-- UMD 版 exifr (full = JPEG/HEIC/TIFF + EXIF/IPTC/XMP/ICC/JFIF まで全部入り)
     mini は JFIF パーサーが入っていないので parse(f, true) で落ちる → full に固定 -->
<script src="https://cdn.jsdelivr.net/npm/exifr@7/dist/full.umd.js"></script>

<script>
  const $picker = document.getElementById('picker');
  const $pickBtn = document.getElementById('pickBtn');
  const $boot   = document.getElementById('boot');
  const $stats  = document.getElementById('stats');
  const $log    = document.getElementById('log');

  function row(cls, text) {
    const div = document.createElement('div');
    div.className = 'row ' + cls;
    div.textContent = text;
    $log.appendChild(div);
  }

  // 起動確認: exifr がロードされてるか
  if (typeof exifr === 'undefined') {
    $boot.className = 'boot err';
    $boot.textContent = '❌ exifr (CDN) がロードできない。ネット接続を確認してください。';
  } else {
    $boot.className = 'boot ok';
    $boot.textContent = '✅ exifr OK (UA: ' + navigator.userAgent.slice(0, 60) + '…)';
  }

  // ボタンからも明示的に開けるように (input display:none を避けつつ tap target を確保)
  $pickBtn.addEventListener('click', () => $picker.click());

  $picker.addEventListener('change', async (e) => {
    const files = Array.from(e.target.files || []);
    // change が発火したことを即座に表示 (parse 前)
    $stats.innerHTML = `📥 change 発火: <b>${files.length}</b> 件選択`;
    $log.innerHTML = '';
    if (!files.length) { $stats.textContent = '未選択 (files.length=0)'; return; }

    let withDate = 0, withGPS = 0, errors = 0, heic = 0;

    for (let i = 0; i < files.length; i++) {
      const f = files[i];
      const isHeic = /\.hei[cf]$/i.test(f.name) || /hei[cf]/i.test(f.type);
      if (isHeic) heic++;

      try {
        // 全セグメント取りに行く (mini ビルドでも tiff/exif/gps/ifd0 全部 true で広めに拾う)
        const meta = await exifr.parse(f, true);
        const dto = meta?.DateTimeOriginal || meta?.CreateDate || meta?.ModifyDate || null;
        const lat = meta?.latitude ?? null;
        const lng = meta?.longitude ?? null;
        if (dto) withDate++;
        if (lat != null && lng != null) withGPS++;

        const tag = isHeic ? '[HEIC]' : '';
        const cls = dto ? 'ok' : 'warn';
        const dtoStr = dto instanceof Date ? dto.toISOString() : (dto ?? '—');
        const metaKeys = meta ? Object.keys(meta).slice(0, 12).join(',') : '(null)';
        row(cls, `${tag} ${f.name}  date=${dtoStr}  gps=${lat != null ? `${lat.toFixed(4)},${lng.toFixed(4)}` : '—'}  size=${(f.size/1024).toFixed(0)}KB`);
        row('warn', `   meta keys=[${metaKeys}]`);
      } catch (err) {
        errors++;
        row('err', `[ERR] ${f.name}  ${err && err.message ? err.message : String(err)}  type=${f.type || '?'}`);
      }
      $stats.textContent = `読み込み中… ${i+1} / ${files.length}`;
    }

    const pctDate = ((withDate / files.length) * 100).toFixed(0);
    const pctGPS  = ((withGPS  / files.length) * 100).toFixed(0);
    $stats.innerHTML = `<b>${files.length}枚</b>  日時取得 <b>${withDate} (${pctDate}%)</b>  GPS取得 <b>${withGPS} (${pctGPS}%)</b>  HEIC <b>${heic}</b>  エラー <b>${errors}</b>`;
  });

  // 念のためグローバルエラーもログに出す (スマホで console 見れない時用)
  window.addEventListener('error', (e) => {
    row('err', `[window error] ${e.message}  at ${e.filename}:${e.lineno}`);
  });
  window.addEventListener('unhandledrejection', (e) => {
    row('err', `[promise rejection] ${e.reason && e.reason.message ? e.reason.message : String(e.reason)}`);
  });
</script>

</body>
</html>
